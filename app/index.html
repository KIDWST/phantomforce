<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#02060a" />
    <title>PhantomForce — Launching Cockpit</title>
    <meta name="description" content="Launching the live PhantomForce cockpit." />
    <script>
      (() => {
        const target = new URL("https://admin.phantomforce.online/app/index.html");
        const incoming = new URLSearchParams(location.search);
        for (const [key, value] of incoming.entries()) {
          if (key !== "session") target.searchParams.set(key, value);
        }
        location.replace(target.toString() + location.hash);
      })();
    </script>
    <style>
      :root { color-scheme: dark; background: #02060a; color: #eafff4; font-family: Inter, system-ui, sans-serif; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: radial-gradient(circle at center, rgba(65,255,161,.16), transparent 36%), #02060a; }
      main { width: min(520px, calc(100vw - 40px)); border: 1px solid rgba(65,255,161,.3); border-radius: 28px; padding: 32px; background: rgba(2,8,10,.78); box-shadow: 0 0 80px rgba(65,255,161,.12); }
      p { color: rgba(234,255,244,.72); line-height: 1.55; }
      a { color: #41ffa1; }
    </style>
  </head>
  <body>
    <main>
      <h1>Launching PhantomForce</h1>
      <p>The live cockpit is now served through the private admin host.</p>
      <p><a href="https://admin.phantomforce.online/app/index.html">Open the live cockpit</a></p>
    </main>
  </body>
</html>
