<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">PhantomCube cover art</title>
  <desc id="desc">An isometric floor of tiles, some crumbling, with a glowing player cube and a bright exit portal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a1030"/><stop offset=".5" stop-color="#0c1428"/><stop offset="1" stop-color="#06161f"/>
    </linearGradient>
    <linearGradient id="cube" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#8affd6"/><stop offset="1" stop-color="#2fd6ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <!-- isometric tile floor: each tile a diamond -->
  <g stroke="#1c3a52" stroke-width="2">
    <g fill="#12324a">
      <polygon points="600,300 720,360 600,420 480,360"/>
      <polygon points="720,360 840,420 720,480 600,420"/>
      <polygon points="480,360 600,420 480,480 360,420"/>
      <polygon points="600,420 720,480 600,540 480,480"/>
      <polygon points="840,420 960,480 840,540 720,480"/>
      <polygon points="360,420 480,480 360,540 240,480"/>
      <polygon points="720,480 840,540 720,600 600,540"/>
      <polygon points="480,480 600,540 480,600 360,540"/>
    </g>
    <!-- crumbling tiles (cracked / faded) -->
    <g fill="#0a1a26" opacity=".7" stroke="#3a2020">
      <polygon points="960,480 1080,540 960,600 840,540"/>
      <polygon points="240,480 360,540 240,600 120,540"/>
      <polygon points="600,540 720,600 600,660 480,600"/>
    </g>
  </g>
  <!-- glowing exit portal -->
  <g filter="url(#glow)">
    <polygon points="840,300 960,360 840,420 720,360" fill="#ffd24a" opacity=".35"/>
    <ellipse cx="840" cy="360" rx="46" ry="26" fill="none" stroke="#ffe66b" stroke-width="6"/>
    <ellipse cx="840" cy="360" rx="24" ry="14" fill="#fff6c9"/>
  </g>
  <!-- glowing player cube -->
  <g filter="url(#glow)">
    <polygon points="480,300 540,335 480,370 420,335" fill="#d6fff0"/>
    <polygon points="420,335 480,370 480,440 420,405" fill="#2fd6ff"/>
    <polygon points="540,335 480,370 480,440 540,405" fill="url(#cube)"/>
  </g>
  <text x="55" y="95" fill="#eafff6" font-family="Arial Black,Arial,sans-serif" font-size="56" letter-spacing="3">PHANTOMCUBE</text>
  <text x="60" y="146" fill="#8affd6" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="3">SLIDE · CLEAR · REACH THE EXIT</text>
</svg>
