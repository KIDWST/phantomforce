<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Signal Sweeper cover art</title>
  <desc id="desc">A grid of minesweeper cells, some revealed with glowing numbers, two flag markers, and a spark reveal chain.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a2116"/><stop offset=".52" stop-color="#050e0a"/><stop offset="1" stop-color="#1a2a08"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <!-- grid: 6 cols x 4 rows, cell 96, origin 336,240 -->
  <g font-family="Arial Black,Arial,sans-serif" font-size="52" text-anchor="middle">
    <!-- unrevealed raised cells -->
    <g fill="#123c28" stroke="#1f6a45" stroke-width="3">
      <rect x="336" y="240" width="96" height="96" rx="6"/><rect x="432" y="240" width="96" height="96" rx="6"/>
      <rect x="720" y="240" width="96" height="96" rx="6"/>
      <rect x="336" y="336" width="96" height="96" rx="6"/><rect x="816" y="336" width="96" height="96" rx="6"/>
      <rect x="624" y="432" width="96" height="96" rx="6"/><rect x="816" y="432" width="96" height="96" rx="6"/>
    </g>
    <!-- revealed sunken cells -->
    <g fill="#07160e" stroke="#0e2c1c" stroke-width="3">
      <rect x="528" y="240" width="96" height="96" rx="6"/><rect x="624" y="240" width="96" height="96" rx="6"/>
      <rect x="432" y="336" width="96" height="96" rx="6"/><rect x="528" y="336" width="96" height="96" rx="6"/>
      <rect x="624" y="336" width="96" height="96" rx="6"/><rect x="720" y="336" width="96" height="96" rx="6"/>
      <rect x="336" y="432" width="96" height="96" rx="6"/><rect x="432" y="432" width="96" height="96" rx="6"/><rect x="528" y="432" width="96" height="96" rx="6"/>
      <rect x="720" y="432" width="96" height="96" rx="6"/>
    </g>
    <!-- glowing numbers -->
    <g filter="url(#glow)">
      <text x="576" y="308" fill="#3bd6ff">1</text>
      <text x="672" y="308" fill="#3bd6ff">2</text>
      <text x="480" y="404" fill="#43ff8f">1</text>
      <text x="672" y="404" fill="#ffd23b">3</text>
      <text x="768" y="404" fill="#ff7a3b">2</text>
    </g>
    <!-- spark reveal chain -->
    <g filter="url(#glow)" fill="none" stroke="#eaffef" stroke-width="4" opacity=".8">
      <path d="M576 288 L672 384 L768 480" stroke-dasharray="6 10"/>
    </g>
    <g fill="#fff6c2" filter="url(#glow)">
      <path d="M624 336 l6 14 15 2 -11 11 3 15 -13 -8 -13 8 3 -15 -11 -11 15 -2z"/>
    </g>
    <!-- flag markers -->
    <g filter="url(#glow)">
      <g transform="translate(360 264)"><rect x="6" y="4" width="6" height="60" fill="#0e2c1c"/><path d="M12 4 l38 14 -38 14z" fill="#ff3b4e"/></g>
      <g transform="translate(744 456)"><rect x="6" y="4" width="6" height="60" fill="#0e2c1c"/><path d="M12 4 l38 14 -38 14z" fill="#ff3b4e"/></g>
    </g>
  </g>
  <text x="55" y="95" fill="#eaffef" font-family="Arial Black,Arial,sans-serif" font-size="56" letter-spacing="3">SIGNAL SWEEPER</text>
  <text x="60" y="146" fill="#43ff8f" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="5">SWEEP THE GRID</text>
</svg>
