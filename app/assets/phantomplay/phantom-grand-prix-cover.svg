<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Phantom Grand Prix cover art</title>
  <desc id="desc">A neon kart race on a rain-glossed city circuit with four hover karts drifting through a green-lit hairpin and item boxes glowing above the track.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06111f"/>
      <stop offset=".54" stop-color="#092516"/>
      <stop offset="1" stop-color="#03040a"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171b26"/>
      <stop offset=".52" stop-color="#272333"/>
      <stop offset="1" stop-color="#05060b"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#41ffa1"/>
      <stop offset=".45" stop-color="#33e0ff"/>
      <stop offset="1" stop-color="#ffd166"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="rain" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <path d="M2 0V10" stroke="#9be7ff" stroke-opacity=".11" stroke-width="2"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#sky)"/>
  <rect width="1200" height="675" fill="url(#rain)"/>
