<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Chicklet Grand Prix cover art</title>
  <desc id="desc">Little chicks tucked in glass roll-balls race down a floating ribbon circuit at sunrise, the whole world tilted with speed.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe7b3"/>
      <stop offset=".5" stop-color="#ffc178"/>
      <stop offset="1" stop-color="#8fd0ff"/>
    </linearGradient>
    <radialGradient id="sun" cx=".62" cy=".28" r=".5">
      <stop offset="0" stop-color="#fff7dd"/>
      <stop offset="1" stop-color="#fff7dd00"/>
    </radialGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6d7a86"/>
      <stop offset="1" stop-color="#525d67"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#57cf78"/>
      <stop offset="1" stop-color="#3fa85f"/>
    </linearGradient>
    <radialGradient id="ball" cx=".38" cy=".32" r=".75">
      <stop offset="0" stop-color="#fff2b0"/>
      <stop offset=".6" stop-color="#ffd23f"/>
      <stop offset="1" stop-color="#f2ab1e"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="675" fill="url(#sky)"/>
  <rect width="1200" height="675" fill="url(#sun)"/>

  <!-- whole scene tilted for speed (the roll) -->
  <g transform="rotate(-7 600 470)">
    <!-- grass field -->
    <rect x="-200" y="360" width="1600" height="520" fill="url(#grass)"/>
    <!-- distant rolling hills -->
    <path d="M-200 372 Q120 336 360 366 T900 360 T1400 372 V420 H-200 Z" fill="#7fc98a" opacity=".8"/>
    <!-- floating ribbon road -->
    <path d="M-60 700 C220 560 320 520 520 512 C760 502 800 392 980 388 C1120 385 1220 430 1300 486" fill="none" stroke="#3a424c" stroke-width="196" stroke-linecap="round"/>
    <path d="M-60 700 C220 560 320 520 520 512 C760 502 800 392 980 388 C1120 385 1220 430 1300 486" fill="none" stroke="url(#road)" stroke-width="176" stroke-linecap="round"/>
    <!-- rumble strips -->
    <path d="M-60 700 C220 560 320 520 520 512 C760 502 800 392 980 388 C1120 385 1220 430 1300 486" fill="none" stroke="#ff6f9c" stroke-width="196" stroke-linecap="round" stroke-dasharray="30 30" opacity=".9"/>
    <!-- centre dashes -->
    <path d="M-60 700 C220 560 320 520 520 512 C760 502 800 392 980 388 C1120 385 1220 430 1300 486" fill="none" stroke="#f4f9ff" stroke-width="7" stroke-dasharray="34 40" stroke-linecap="round" opacity=".85"/>
    <!-- boost chevrons -->
    <path d="M700 470 l40 -8 l-40 -8 M740 466 l40 -8 l-40 -8" fill="none" stroke="#8f7bff" stroke-width="10" opacity=".8"/>

    <!-- chicklet roll-balls -->
    <g filter="url(#soft)">
      <g transform="translate(470 560)">
        <ellipse cx="0" cy="86" rx="80" ry="20" fill="#0003"/>
        <circle r="86" fill="url(#ball)"/>
        <ellipse cx="8" cy="26" rx="44" ry="34" fill="#ffe98a"/>
        <ellipse cx="-38" cy="6" rx="24" ry="40" fill="#ff9e2c" transform="rotate(-28 -38 6)"/>
        <circle cx="12" cy="-14" r="10" fill="#20242e"/><circle cx="42" cy="-14" r="10" fill="#20242e"/>
        <path d="M22 6 L46 12 L22 20 Z" fill="#ff9e2c"/>
        <path d="M0 -60 l-6 -20 M8 -60 l8 -20" stroke="#ff9e2c" stroke-width="7" stroke-linecap="round"/>
        <circle r="86" fill="none" stroke="#ffffff88" stroke-width="5"/>
        <ellipse cx="-30" cy="-34" rx="22" ry="11" fill="#ffffff77" transform="rotate(-30 -30 -34)"/>
      </g>
      <g transform="translate(690 470) scale(.62)">
        <ellipse cx="0" cy="86" rx="80" ry="20" fill="#0003"/>
        <circle r="86" fill="#b4f0c9"/>
        <ellipse cx="8" cy="26" rx="44" ry="34" fill="#d6ffe6"/>
        <circle cx="12" cy="-14" r="10" fill="#20242e"/><circle cx="42" cy="-14" r="10" fill="#20242e"/>
        <path d="M22 6 L46 12 L22 20 Z" fill="#ff9e2c"/>
        <circle r="86" fill="none" stroke="#ffffff88" stroke-width="6"/>
      </g>
      <g transform="translate(560 500) scale(.5)">
        <ellipse cx="0" cy="86" rx="80" ry="20" fill="#0003"/>
        <circle r="86" fill="#ffc2d6"/>
        <circle cx="12" cy="-14" r="10" fill="#20242e"/><circle cx="42" cy="-14" r="10" fill="#20242e"/>
        <path d="M22 6 L46 12 L22 20 Z" fill="#ff9e2c"/>
        <circle r="86" fill="none" stroke="#ffffff88" stroke-width="7"/>
      </g>
    </g>
  </g>

  <!-- title -->
  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <text x="62" y="80" fill="#ff9e2c" font-size="20" font-weight="900" letter-spacing="5">ROLL RACING</text>
    <text x="60" y="140" fill="#241206" font-size="60" font-weight="900" letter-spacing="0">Chicklet Grand Prix</text>
    <text x="64" y="178" fill="#5c3a12" font-size="20" font-weight="700" letter-spacing="1">Tilt the world. Roll the line. Little chicks, big momentum.</text>
    <text x="64" y="626" fill="#8a4d10" font-size="17" font-weight="900" letter-spacing="3">TILT · FLOW BURST · SLIPSTREAM · 3 WORLDS</text>
  </g>
</svg>
