<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Color Rush cover art</title>
  <desc id="desc">Four vertical color columns with tiles falling toward glowing target lanes at the bottom.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1b1030"/>
      <stop offset=".5" stop-color="#0a0714"/>
      <stop offset="1" stop-color="#120a1f"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <g opacity=".14" fill="#ffffff">
    <rect x="200" y="180" width="200" height="540"/>
    <rect x="440" y="180" width="200" height="540"/>
    <rect x="680" y="180" width="200" height="540"/>
    <rect x="920" y="180" width="200" height="540"/>
  </g>
  <g filter="url(#glow)">
    <rect x="234" y="240" width="132" height="72" rx="12" fill="#ff3b6b"/>
    <rect x="234" y="420" width="132" height="72" rx="12" fill="#ff3b6b" opacity=".7"/>
    <rect x="474" y="300" width="132" height="72" rx="12" fill="#2ee6ff"/>
    <rect x="714" y="210" width="132" height="72" rx="12" fill="#5cff8f"/>
    <rect x="714" y="400" width="132" height="72" rx="12" fill="#5cff8f" opacity=".7"/>
    <rect x="954" y="330" width="132" height="72" rx="12" fill="#ffcf3b"/>
  </g>
  <g filter="url(#glow)" fill="none" stroke-width="10">
    <rect x="222" y="612" width="156" height="70" rx="14" fill="#3a0d1c" stroke="#ff3b6b"/>
    <rect x="462" y="612" width="156" height="70" rx="14" fill="#083038" stroke="#2ee6ff"/>
    <rect x="702" y="612" width="156" height="70" rx="14" fill="#0b3320" stroke="#5cff8f"/>
    <rect x="942" y="612" width="156" height="70" rx="14" fill="#3a2f08" stroke="#ffcf3b"/>
  </g>
  <g opacity=".6" stroke-width="5" stroke-linecap="round">
    <path d="M300 520v70" stroke="#ff3b6b"/><path d="M540 520v70" stroke="#2ee6ff"/>
    <path d="M780 520v70" stroke="#5cff8f"/><path d="M1020 520v70" stroke="#ffcf3b"/>
  </g>
  <text x="54" y="95" fill="#fff4fa" font-family="Arial Black,Arial,sans-serif" font-size="56" letter-spacing="3">COLOR RUSH</text>
  <text x="58" y="146" fill="#2ee6ff" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="5">CATCH THE COLOR</text>
</svg>
