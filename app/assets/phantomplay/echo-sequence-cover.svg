<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Echo Sequence cover art</title>
  <desc id="desc">A premium memory puzzle arena with four glowing quadrant pads, rising echo rings, signal traces, and a central pulse core waiting for the player to repeat the pattern.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#281052"/>
      <stop offset=".48" stop-color="#080715"/>
      <stop offset="1" stop-color="#08273c"/>
    </linearGradient>
    <radialGradient id="halo" cx=".55" cy=".48" r=".55">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".3"/>
      <stop offset=".42" stop-color="#7c4dff" stop-opacity=".16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#ffffff" stroke-opacity=".05"/>
    </pattern>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#41ffa1"/>
      <stop offset=".34" stop-color="#ffd23b"/>
      <stop offset=".68" stop-color="#ff3b66"/>
      <stop offset="1" stop-color="#2f9dff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#halo)"/>
  <g transform="translate(705 380)">
    <g fill="none" filter="url(#glow)" opacity=".92">
      <circle r="238" stroke="url(#ring)" stroke-width="3" opacity=".42"/>
      <circle r="304" stroke="#ffffff" stroke-width="3" opacity=".14"/>
      <circle r="372" stroke="#41ffa1" stroke-width="2" opacity=".08"/>
      <path d="M-440 -86 C-320 -146 -220 -126 -108 -38 S104 64 218 4 S412 -90 500 -28" stroke="#41ffa1" stroke-width="4" opacity=".22" stroke-linecap="round"/>
      <path d="M-485 88 C-346 24 -212 30 -92 96 S135 138 252 84 S420 12 516 70" stroke="#2f9dff" stroke-width="4" opacity=".18" stroke-linecap="round"/>
    </g>
    <g filter="url(#glow)">
      <path d="M-18 -18 A210 210 0 0 0 -210 -18 A192 192 0 0 1 -18 -210 Z" fill="#25e06a" stroke="#d7ffe8" stroke-opacity=".65" stroke-width="4"/>
      <path d="M18 -18 A210 210 0 0 1 210 -18 A192 192 0 0 0 18 -210 Z" fill="#ff3b4e" stroke="#ffd7de" stroke-opacity=".62" stroke-width="4"/>
      <path d="M-18 18 A210 210 0 0 1 -210 18 A192 192 0 0 0 -18 210 Z" fill="#ffd23b" stroke="#fff2b8" stroke-opacity=".65" stroke-width="4"/>
      <path d="M18 18 A210 210 0 0 0 210 18 A192 192 0 0 1 18 210 Z" fill="#2f9dff" stroke="#d9efff" stroke-opacity=".68" stroke-width="4"/>
      <circle r="82" fill="#090716" stroke="#9b83ff" stroke-width="7"/>
      <circle r="42" fill="#ffffff"/>
      <circle r="17" fill="#41ffa1"/>
    </g>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-weight="900" text-anchor="middle">
      <text x="-112" y="-82" fill="#06120b" font-size="34">1</text>
      <text x="114" y="-82" fill="#ffffff" font-size="34">2</text>
      <text x="-112" y="124" fill="#06120b" font-size="34">3</text>
      <text x="114" y="124" fill="#ffffff" font-size="34">4</text>
    </g>
  </g>
  <g filter="url(#glow)">
    <circle cx="174" cy="432" r="7" fill="#41ffa1"/>
    <circle cx="238" cy="344" r="5" fill="#ffd23b"/>
    <circle cx="1008" cy="190" r="6" fill="#ff3b4e"/>
    <path d="M174 432 C260 384 310 312 406 298" stroke="#41ffa1" stroke-width="3" opacity=".5" fill="none"/>
    <path d="M1008 190 C948 246 914 296 865 330" stroke="#ff3b4e" stroke-width="3" opacity=".45" fill="none"/>
  </g>
  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <text x="62" y="78" fill="#41ffa1" font-size="20" font-weight="900" letter-spacing="5">MEMORY SIGNAL</text>
    <text x="62" y="132" fill="#f6f0ff" font-size="58" font-weight="900" letter-spacing="2">Echo Sequence</text>
    <text x="66" y="174" fill="#c9b8ff" font-size="20" font-weight="700" letter-spacing="1">Watch the pulse. Repeat the pattern before it fades.</text>
    <text x="66" y="612" fill="#ffd23b" font-size="17" font-weight="900" letter-spacing="3">FOCUS - MEMORY - PATTERN RECALL</text>
  </g>
</svg>
