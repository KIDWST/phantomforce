<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Phantom Pizzeria cover art</title>
  <desc id="desc">A top-down pizza pie with pepperoni and toppings, a glowing oven arch behind, and a small order ticket.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3a1207"/><stop offset=".5" stop-color="#1c0a04"/><stop offset="1" stop-color="#40260a"/>
    </linearGradient>
    <radialGradient id="oven" cx=".5" cy=".9" r=".9">
      <stop offset="0" stop-color="#ffd166"/><stop offset=".5" stop-color="#ff7a1a"/><stop offset="1" stop-color="#7a1e05"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <!-- glowing oven arch -->
  <g filter="url(#glow)">
    <path d="M340 560 L340 430 a260 260 0 0 1 520 0 L860 560 Z" fill="url(#oven)" opacity=".55"/>
    <path d="M340 560 L340 430 a260 260 0 0 1 520 0 L860 560" fill="none" stroke="#ffb454" stroke-width="6"/>
    <rect x="300" y="558" width="600" height="26" rx="6" fill="#7a1e05" stroke="#ffb454" stroke-width="3"/>
  </g>
  <!-- top-down pizza pie -->
  <g filter="url(#glow)">
    <circle cx="600" cy="470" r="150" fill="#f2c14e" stroke="#b5721f" stroke-width="10"/>
    <circle cx="600" cy="470" r="126" fill="#e0491f"/>
    <circle cx="600" cy="470" r="116" fill="#f2c14e"/>
    <!-- pepperoni + toppings -->
    <circle cx="558" cy="420" r="20" fill="#c11f2e"/><circle cx="650" cy="432" r="20" fill="#c11f2e"/>
    <circle cx="540" cy="500" r="20" fill="#c11f2e"/><circle cx="640" cy="512" r="20" fill="#c11f2e"/>
    <circle cx="600" cy="470" r="18" fill="#c11f2e"/>
    <circle cx="596" cy="418" r="9" fill="#3fae57"/><circle cx="672" cy="480" r="9" fill="#3fae57"/>
    <circle cx="556" cy="458" r="9" fill="#3fae57"/><circle cx="606" cy="520" r="9" fill="#3fae57"/>
    <!-- slice cuts -->
    <path d="M600 470 L600 354 M600 470 L700 528 M600 470 L500 528" stroke="#b5721f" stroke-width="4"/>
  </g>
  <!-- order ticket -->
  <g filter="url(#glow)">
    <rect x="835" y="150" width="150" height="180" rx="8" fill="#fdf6e3" stroke="#c99a2e" stroke-width="4"/>
    <rect x="855" y="176" width="110" height="10" rx="4" fill="#e0491f"/>
    <rect x="855" y="208" width="90" height="8" rx="4" fill="#7a1e05"/>
    <rect x="855" y="232" width="100" height="8" rx="4" fill="#7a1e05"/>
    <rect x="855" y="256" width="70" height="8" rx="4" fill="#7a1e05"/>
    <rect x="855" y="290" width="110" height="12" rx="4" fill="#3fae57"/>
  </g>
  <text x="55" y="95" fill="#ffe9b0" font-family="Arial Black,Arial,sans-serif" font-size="52" letter-spacing="2">PHANTOM PIZZERIA</text>
  <text x="60" y="146" fill="#ff7a1a" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="5">BUILD · BAKE · SERVE</text>
</svg>
