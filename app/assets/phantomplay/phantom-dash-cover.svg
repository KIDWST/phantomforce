<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Phantom Dash cover art</title>
  <desc id="desc">A neon geometric cube mid-jump over a row of spikes beside a gravity-flip gate with speed streaks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2a0a4a"/>
      <stop offset=".5" stop-color="#0a0618"/>
      <stop offset="1" stop-color="#04101f"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <g filter="url(#glow)" stroke="#00e5ff" stroke-width="7" opacity=".7" stroke-linecap="round">
    <path d="M120 300h260M90 350h360M140 400h300"/>
  </g>
  <path d="M60 590h1080" stroke="#00e5ff" stroke-width="8" opacity=".6"/>
  <g filter="url(#glow)" fill="#3a0d18" stroke="#ff2e63" stroke-width="6">
    <path d="M470 590l40-90 40 90z"/><path d="M552 590l40-90 40 90z"/>
    <path d="M634 590l40-90 40 90z"/><path d="M716 590l40-90 40 90z"/>
  </g>
  <g filter="url(#glow)">
    <rect x="300" y="290" width="130" height="130" rx="14" transform="rotate(18 365 355)"
          fill="#14203a" stroke="#00e5ff" stroke-width="10"/>
    <path d="M338 355l50-30v60z" fill="#00e5ff" transform="rotate(18 365 355)"/>
  </g>
  <g filter="url(#glow)" opacity=".85" stroke="#ffd23f" stroke-width="9" fill="none">
    <path d="M900 180v420"/>
    <path d="M900 200l-40 40M900 200l40 40M900 580l-40-40M900 580l40-40"/>
    <circle cx="900" cy="390" r="34" fill="#3a2c08"/>
    <path d="M900 372v36M882 390h36" stroke-width="7"/>
  </g>
  <g fill="none" stroke="#ff2e63" stroke-width="6" opacity=".55" stroke-linecap="round">
    <path d="M980 300h180M1010 360h150M990 420h190"/>
  </g>
  <text x="54" y="95" fill="#eafcff" font-family="Arial Black,Arial,sans-serif" font-size="56" letter-spacing="3">PHANTOM DASH</text>
  <text x="58" y="146" fill="#00e5ff" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="5">JUMP · FLIP GRAVITY · SURVIVE</text>
</svg>
