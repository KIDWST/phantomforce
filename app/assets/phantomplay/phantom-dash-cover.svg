      <circle cx="552" cy="215" r="20"/>
      <circle cx="632" cy="250" r="20"/>
    </g>
  </g>
  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <text x="62" y="78" fill="#00e5ff" font-size="20" font-weight="900" letter-spacing="5">NEON RUNNER</text>
    <text x="62" y="132" fill="#eafcff" font-size="58" font-weight="900" letter-spacing="2">Phantom Dash</text>
    <text x="66" y="174" fill="#aeeeff" font-size="20" font-weight="700" letter-spacing="1">Jump, flip gravity, and thread the spike fields.</text>
    <text x="66" y="626" fill="#ffd23f" font-size="17" font-weight="900" letter-spacing="3">JUMP - FLIP - COIN CHAIN - SURVIVE</text>
