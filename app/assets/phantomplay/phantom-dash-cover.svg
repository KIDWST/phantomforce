<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Phantom Dash cover art</title>
  <desc id="desc">A high-speed neon runner course with a glowing cube jumping over spike fields, gravity gates, coin rings, and motion streaks across a cyber tunnel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d0a50"/>
      <stop offset=".48" stop-color="#080614"/>
      <stop offset="1" stop-color="#021c2d"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2e63"/>
      <stop offset=".45" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#ffd23f"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity=".045"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <g opacity=".28" stroke="#00e5ff" stroke-width="4" stroke-linecap="round">
    <path d="M78 280 H400"/>
    <path d="M34 342 H472"/>
    <path d="M104 406 H430"/>
    <path d="M900 260 H1140"/>
    <path d="M948 330 H1174"/>
    <path d="M882 398 H1160"/>
  </g>
  <g filter="url(#glow)">
    <path d="M44 552 C210 512 328 526 470 540 C668 560 812 506 1158 500" fill="none" stroke="#05111c" stroke-width="86" stroke-linecap="round"/>
    <path d="M44 552 C210 512 328 526 470 540 C668 560 812 506 1158 500" fill="none" stroke="url(#track)" stroke-width="9" stroke-linecap="round"/>
    <path d="M44 592 H1158" stroke="#00e5ff" stroke-width="7" opacity=".56"/>
  </g>
  <g filter="url(#glow)">
    <g fill="#3a0d18" stroke="#ff2e63" stroke-width="6">
      <path d="M498 592l36-92 36 92z"/>
      <path d="M574 592l36-92 36 92z"/>
      <path d="M650 592l36-92 36 92z"/>
      <path d="M726 592l36-92 36 92z"/>
    </g>
    <g transform="translate(336 356) rotate(19)">
      <rect x="-76" y="-76" width="152" height="152" rx="18" fill="#111b35" stroke="#00e5ff" stroke-width="10"/>
      <path d="M-28 0 L30 -34 L30 34 Z" fill="#00e5ff"/>
      <path d="M-76 -76 L76 76" stroke="#ff2e63" stroke-width="5" opacity=".45"/>
    </g>
    <path d="M424 236 C496 192 562 204 640 250" stroke="#ffd23f" stroke-width="7" fill="none" stroke-dasharray="20 18" stroke-linecap="round"/>
    <g transform="translate(902 210)">
      <path d="M0 0 V344" stroke="#ffd23f" stroke-width="10" stroke-linecap="round"/>
      <path d="M0 18 l-52 52M0 18 l52 52M0 326 l-52 -52M0 326 l52 -52" stroke="#ffd23f" stroke-width="8" fill="none" stroke-linecap="round"/>
      <circle cy="172" r="43" fill="#3a2c08" stroke="#ffd23f" stroke-width="7"/>
      <path d="M0 146 V198M-26 172 H26" stroke="#fff3b0" stroke-width="8" stroke-linecap="round"/>
    </g>
    <g fill="none" stroke="#ffd23f" stroke-width="6">
