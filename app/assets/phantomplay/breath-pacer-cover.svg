<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Breath Pacer cover art</title>
  <desc id="desc">A serene breathing trainer interface with a luminous central orb, inhale-hold-exhale timing rings, soft waveforms, and calm teal violet gradients.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#082735"/>
      <stop offset=".52" stop-color="#101f35"/>
      <stop offset="1" stop-color="#271a42"/>
    </linearGradient>
    <radialGradient id="orb" cx=".42" cy=".34" r=".68">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".34" stop-color="#c8fff1"/>
      <stop offset=".72" stop-color="#5fe6c9"/>
      <stop offset="1" stop-color="#7c7bff"/>
    </radialGradient>
    <radialGradient id="calm" cx=".5" cy=".52" r=".6">
      <stop offset="0" stop-color="#5fe6c9" stop-opacity=".2"/>
      <stop offset=".52" stop-color="#7c7bff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="stars" width="86" height="86" patternUnits="userSpaceOnUse">
      <circle cx="9" cy="17" r="1.5" fill="#eafff8" opacity=".16"/>
      <circle cx="64" cy="52" r="1.2" fill="#9d9bff" opacity=".15"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#stars)"/>
  <rect width="1200" height="675" fill="url(#calm)"/>
  <g transform="translate(710 364)" filter="url(#glow)">
    <g fill="none">
      <circle r="272" stroke="#7c7bff" stroke-width="3" opacity=".3"/>
      <circle r="222" stroke="#6fd8ff" stroke-width="4" opacity=".42"/>
      <circle r="172" stroke="#5fe6c9" stroke-width="5" opacity=".62"/>
      <circle r="122" stroke="#eafff8" stroke-width="2" opacity=".34"/>
      <path d="M-352 58 Q-264 -18 -176 58 T0 58 T176 58 T352 58" stroke="#8fe9d6" stroke-width="5" opacity=".6" stroke-linecap="round"/>
      <path d="M-352 -72 Q-264 -148 -176 -72 T0 -72 T176 -72 T352 -72" stroke="#9d9bff" stroke-width="5" opacity=".42" stroke-linecap="round"/>
      <path d="M-286 150 Q-214 106 -142 150 T2 150 T146 150 T290 150" stroke="#eafff8" stroke-width="3" opacity=".22" stroke-linecap="round"/>
    </g>
    <circle r="104" fill="url(#orb)"/>
    <circle r="54" fill="#f2fffb" opacity=".88"/>
    <circle r="18" fill="#102238"/>
    <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="18" font-weight="900" text-anchor="middle">
      <text x="0" y="-198" fill="#5fe6c9">INHALE</text>
      <text x="198" y="8" fill="#9d9bff">HOLD</text>
      <text x="0" y="218" fill="#5fe6c9">EXHALE</text>
      <text x="-198" y="8" fill="#9d9bff">HOLD</text>
    </g>
  </g>
  <g transform="translate(92 248)">
    <rect x="0" y="0" width="306" height="178" rx="18" fill="#06131d" fill-opacity=".66" stroke="#5fe6c9" stroke-opacity=".26"/>
    <text x="28" y="48" fill="#5fe6c9" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="18" font-weight="900" letter-spacing="3">CURRENT CYCLE</text>
    <text x="28" y="104" fill="#eafff8" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="54" font-weight="900">4 - 4 - 4 - 4</text>
    <path d="M30 140 H276" stroke="#eafff8" stroke-opacity=".12" stroke-width="8" stroke-linecap="round"/>
    <path d="M30 140 H154" stroke="#5fe6c9" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <text x="62" y="78" fill="#5fe6c9" font-size="20" font-weight="900" letter-spacing="5">FOCUS RESET</text>
    <text x="62" y="132" fill="#eafff8" font-size="58" font-weight="900" letter-spacing="2">Breath Pacer</text>
    <text x="66" y="174" fill="#bdece4" font-size="20" font-weight="700" letter-spacing="1">Calm the session with a guided box-breathing loop.</text>
    <text x="66" y="612" fill="#9d9bff" font-size="17" font-weight="900" letter-spacing="3">INHALE - HOLD - EXHALE - RESET</text>
  </g>
</svg>
