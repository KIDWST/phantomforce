<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Breath Pacer cover art</title>
  <desc id="desc">Concentric expanding calm rings around a soft central orb with gentle phase-wave arcs in a serene teal-violet palette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d2733"/><stop offset=".55" stop-color="#152238"/><stop offset="1" stop-color="#241a3c"/>
    </linearGradient>
    <radialGradient id="orb" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#eafff8"/><stop offset=".6" stop-color="#5fe6c9"/><stop offset="1" stop-color="#7c7bff"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(600 390)" fill="none">
    <circle cx="0" cy="0" r="240" stroke="#7c7bff" stroke-width="3" opacity=".35"/>
    <circle cx="0" cy="0" r="190" stroke="#6fd8ff" stroke-width="4" opacity=".5"/>
    <circle cx="0" cy="0" r="140" stroke="#5fe6c9" stroke-width="5" opacity=".7"/>
    <!-- gentle phase-wave arcs -->
    <path d="M -300 40 Q -225 -20 -150 40 T 0 40 T 150 40 T 300 40" stroke="#8fe9d6" stroke-width="4" opacity=".55" stroke-linecap="round"/>
    <path d="M -300 -60 Q -225 -120 -150 -60 T 0 -60 T 150 -60 T 300 -60" stroke="#9d9bff" stroke-width="4" opacity=".45" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="92" fill="url(#orb)"/>
    <circle cx="0" cy="0" r="50" fill="#f2fffb" opacity=".85"/>
  </g>
  <text x="55" y="95" fill="#eafff8" font-family="Arial Black,Arial,sans-serif" font-size="56" letter-spacing="3">BREATH PACER</text>
  <text x="60" y="146" fill="#5fe6c9" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="4">BOX-BREATHE · 4·4·4·4</text>
</svg>
