<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <title>Phantom Ages cover art</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26331f"/>
      <stop offset="60%" stop-color="#16201a"/>
      <stop offset="100%" stop-color="#0a0d0a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="2.4" fill="#ffffff" opacity="0.5"/>
  <circle cx="360" cy="90" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="540" cy="140" r="2.2" fill="#ffffff" opacity="0.45"/>
  <circle cx="900" cy="100" r="2" fill="#ffffff" opacity="0.4"/>
  <!-- ground -->
  <rect x="0" y="470" width="1200" height="205" fill="#1b2318"/>
  <rect x="0" y="470" width="1200" height="5" fill="#2b3a24"/>
  <!-- era progression: club, spear, cannon, tower silhouettes left to right -->
  <g fill="#6f8a5a">
    <rect x="120" y="430" width="18" height="40" rx="3"/>
    <circle cx="129" cy="418" r="12"/>
  </g>
  <g fill="#8fae6f">
    <rect x="330" y="380" width="10" height="90" rx="3" transform="rotate(20 335 425)"/>
    <polygon points="373,352 385,372 361,372" transform="rotate(20 373 362)"/>
  </g>
  <g fill="#b9803f">
    <rect x="560" y="410" width="70" height="34" rx="6"/>
    <circle cx="560" cy="427" r="16"/>
    <circle cx="630" cy="427" r="16"/>
    <rect x="600" y="398" width="46" height="12" rx="4"/>
  </g>
  <g>
    <rect x="820" y="300" width="90" height="170" fill="#5c7fa8"/>
    <rect x="820" y="300" width="90" height="170" fill="none" stroke="#33445e" stroke-width="3"/>
    <rect x="845" y="245" width="40" height="55" fill="#8a93ab"/>
    <circle cx="865" cy="230" r="9" fill="#ffe9a8"/>
    <circle cx="865" cy="230" r="16" fill="#ffe9a8" opacity="0.25"/>
  </g>
  <text x="600" y="560" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="50" font-weight="700" fill="#eef2fb" letter-spacing="2">Phantom Ages</text>
  <text x="600" y="602" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="20" fill="#9aa7c7" letter-spacing="1">Raise the city through eras</text>
</svg>
