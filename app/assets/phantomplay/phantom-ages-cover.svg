<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <title>Phantom Ages — PhantomPlay cover</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1826"/>
      <stop offset="55%" stop-color="#071019"/>
      <stop offset="100%" stop-color="#03070c"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2233"/>
      <stop offset="100%" stop-color="#050b12"/>
    </linearGradient>
    <radialGradient id="glowP" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#1ef0ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1ef0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowE" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ff8a3d" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ff8a3d" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#sky)"/>
  <rect y="470" width="1200" height="205" fill="url(#ground)"/>
  <line x1="0" y1="470" x2="1200" y2="470" stroke="rgba(120,200,255,0.18)" stroke-width="2"/>

  <!-- player base (left, cyan) -->
  <ellipse cx="130" cy="560" rx="150" ry="60" fill="url(#glowP)"/>
  <rect x="70" y="360" width="60" height="150" rx="6" fill="#0e2f3a" stroke="#1ef0ff" stroke-width="3"/>
  <rect x="80" y="330" width="40" height="40" rx="4" fill="#0e2f3a" stroke="#1ef0ff" stroke-width="3"/>
  <circle cx="100" cy="350" r="6" fill="#1ef0ff"/>

  <!-- enemy base (right, orange) -->
  <ellipse cx="1070" cy="560" rx="150" ry="60" fill="url(#glowE)"/>
  <rect x="1070" y="360" width="60" height="150" rx="6" fill="#3a1c0e" stroke="#ff8a3d" stroke-width="3"/>
  <rect x="1080" y="330" width="40" height="40" rx="4" fill="#3a1c0e" stroke="#ff8a3d" stroke-width="3"/>
  <circle cx="1100" cy="350" r="6" fill="#ff8a3d"/>

  <!-- advancing player units -->
  <g>
    <circle cx="330" cy="500" r="20" fill="#41ffa1" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
    <circle cx="430" cy="500" r="22" fill="#1ef0ff" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
    <circle cx="520" cy="500" r="18" fill="#41ffa1" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
  </g>
  <!-- advancing enemy units -->
  <g>
    <circle cx="870" cy="500" r="20" fill="#ff5d6c" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
    <circle cx="770" cy="500" r="22" fill="#ff8a3d" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
    <circle cx="680" cy="500" r="18" fill="#ff5d6c" stroke="rgba(255,255,255,.4)" stroke-width="2"/>
  </g>
  <!-- clash spark at center -->
  <g transform="translate(600,500)" stroke="#ffd166" stroke-width="4" stroke-linecap="round">
    <line x1="-26" y1="0" x2="26" y2="0"/>
    <line x1="0" y1="-26" x2="0" y2="26"/>
    <line x1="-18" y1="-18" x2="18" y2="18"/>
    <line x1="-18" y1="18" x2="18" y2="-18"/>
  </g>

  <!-- era arc -->
  <g fill="none" stroke="rgba(200,168,230,0.35)" stroke-width="2">
    <path d="M 260 210 Q 600 90 940 210"/>
  </g>
  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="17" fill="#8fb7d6" text-anchor="middle" letter-spacing="1">
    <text x="300" y="200">STONE</text>
    <text x="450" y="150">BRONZE</text>
    <text x="600" y="128">IRON</text>
    <text x="750" y="150">INDUSTRIAL</text>
    <text x="900" y="200">FUTURE</text>
  </g>

  <text x="600" y="600" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="56" font-weight="700" fill="#eafff4" letter-spacing="3">PHANTOM AGES</text>
  <text x="600" y="638" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="19" fill="#c9a8e6" letter-spacing="2">advance eras · push the lane · break their base</text>
</svg>
