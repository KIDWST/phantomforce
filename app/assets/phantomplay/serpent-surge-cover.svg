<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Serpent Surge cover art</title>
  <desc id="desc">A long glowing serpent coils across a dark arena littered with energy orbs as a storm ring closes in.</desc>
  <defs>
    <radialGradient id="bg" cx="48%" cy="42%" r="75%">
      <stop offset="0" stop-color="#1a2f52"/>
      <stop offset=".55" stop-color="#0a1420"/>
      <stop offset="1" stop-color="#050308"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <g filter="url(#glow)" opacity=".55" fill="none" stroke="#7b5bff" stroke-width="6" stroke-dasharray="26 22">
    <circle cx="640" cy="380" r="330"/>
    <circle cx="640" cy="380" r="260" opacity=".6"/>
  </g>
  <g filter="url(#glow)">
    <path d="M150 560c130-30 150-190 30-230-120-40-140-180 10-230 150-50 300 40 350 150 46 100 170 130 300 60"
