  <text x="54" y="95" fill="#eafff5" font-family="Arial Black,Arial,sans-serif" font-size="56" letter-spacing="3">SERPENT SURGE</text>
  <text x="58" y="146" fill="#37ff9d" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="5">SLITHER · GROW · OUTLAST THE STORM</text>
