    <path d="M150 560c130-30 150-190 30-230-120-40-140-180 10-230 150-50 300 40 350 150 46 100 170 130 300 60"
          fill="none" stroke="#37ff9d" stroke-width="40" stroke-linecap="round" stroke-dasharray="4 46"/>
    <path d="M150 560c130-30 150-190 30-230-120-40-140-180 10-230 150-50 300 40 350 150 46 100 170 130 300 60"
          fill="none" stroke="#c6ffe6" stroke-width="10" stroke-linecap="round"/>
    <circle cx="850" cy="308" r="46" fill="#0d5a3a" stroke="#37ff9d" stroke-width="10"/>
    <circle cx="838" cy="296" r="10" fill="#eafff5"/>
    <circle cx="866" cy="300" r="10" fill="#eafff5"/>
    <path d="M872 340l58 10-58 12z" fill="#ff5f7e"/>
  </g>
  <g filter="url(#glow)" fill="#ffe15a">
    <circle cx="360" cy="250" r="16"/><circle cx="560" cy="500" r="13"/>
    <circle cx="740" cy="470" r="18"/><circle cx="430" cy="440" r="11"/>
    <circle cx="620" cy="230" r="14"/><circle cx="300" cy="470" r="12"/>
  </g>
  <g opacity=".85">
