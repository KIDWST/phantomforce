<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <title>Kingdom Breakers cover art</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182238"/>
      <stop offset="60%" stop-color="#101828"/>
      <stop offset="100%" stop-color="#0a0d13"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="180" cy="120" r="2.4" fill="#ffffff" opacity="0.5"/>
  <circle cx="360" cy="90" r="2" fill="#ffffff" opacity="0.4"/>
  <circle cx="540" cy="140" r="2.2" fill="#ffffff" opacity="0.45"/>
  <circle cx="900" cy="100" r="2" fill="#ffffff" opacity="0.4"/>
  <!-- ground -->
  <rect x="0" y="470" width="1200" height="205" fill="#161c2c"/>
  <rect x="0" y="470" width="1200" height="5" fill="#20293e"/>
  <!-- siege engine, left -->
  <g>
    <polygon points="150,470 200,470 182,420 168,420" fill="#3a2a18"/>
    <rect x="176" y="330" width="10" height="72" rx="4" fill="#c97f2f" transform="rotate(-38 181 402)"/>
    <circle cx="152" cy="352" r="9" fill="#ffb454"/>
  </g>
  <!-- fortress hold -->
  <g>
    <rect x="640" y="330" width="90" height="140" fill="#8a93ab"/>
    <rect x="640" y="330" width="90" height="140" fill="none" stroke="#5c6480" stroke-width="3"/>
    <rect x="750" y="260" width="90" height="210" fill="#5c7fa8"/>
    <rect x="750" y="260" width="90" height="210" fill="none" stroke="#33445e" stroke-width="3"/>
    <rect x="860" y="360" width="90" height="110" fill="#8a93ab"/>
    <rect x="860" y="360" width="90" height="110" fill="none" stroke="#5c6480" stroke-width="3"/>
    <rect x="770" y="205" width="50" height="55" fill="#b9803f"/>
    <rect x="770" y="205" width="50" height="55" fill="none" stroke="#7d5527" stroke-width="3"/>
    <circle cx="795" cy="190" r="9" fill="#ffe9a8"/>
    <circle cx="795" cy="190" r="16" fill="#ffe9a8" opacity="0.25"/>
  </g>
  <!-- ember charge in flight -->
  <circle cx="460" cy="330" r="10" fill="#ff6a5d"/>
  <circle cx="460" cy="330" r="18" fill="#ff6a5d" opacity="0.25"/>
  <text x="600" y="560" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="50" font-weight="700" fill="#eef2fb" letter-spacing="2">Kingdom Breakers</text>
  <text x="600" y="602" text-anchor="middle" font-family="ui-monospace,Menlo,Consolas,monospace" font-size="20" fill="#9aa7c7" letter-spacing="1">Break the hold before dawn</text>
</svg>
