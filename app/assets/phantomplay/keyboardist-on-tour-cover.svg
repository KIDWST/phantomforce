<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Keyboardist On Tour cover art</title>
  <desc id="desc">A neon concert stage where falling letter notes descend toward a glowing keyboard highway while synth towers and audience lights frame the arena.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090516"/>
      <stop offset=".46" stop-color="#16102d"/>
      <stop offset="1" stop-color="#041b24"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11213d" stop-opacity=".35"/>
      <stop offset="1" stop-color="#02040a"/>
    </linearGradient>
    <linearGradient id="keyGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2fb0"/>
      <stop offset=".28" stop-color="#33e0ff"/>
      <stop offset=".55" stop-color="#ffd23f"/>
      <stop offset=".78" stop-color="#41ffa1"/>
      <stop offset="1" stop-color="#b98bff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M0 7H8" stroke="#ffffff" stroke-opacity=".04"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#scan)"/>
  <path d="M0 675 L310 250 H890 L1200 675 Z" fill="url(#floor)"/>
  <g stroke="#41ffa1" stroke-opacity=".18" stroke-width="2">
