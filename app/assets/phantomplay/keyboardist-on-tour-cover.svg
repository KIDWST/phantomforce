  </g>
  <g filter="url(#glow)" font-family="ui-monospace,Menlo,Consolas,monospace" font-weight="900" text-anchor="middle">
    <g transform="translate(385 212)">
      <rect x="-32" y="-32" width="64" height="64" rx="12" fill="#ff2fb0" fill-opacity=".2" stroke="#ff2fb0" stroke-width="3"/>
