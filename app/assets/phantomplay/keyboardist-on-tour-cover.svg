  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <text x="66" y="78" fill="#41ffa1" font-size="20" font-weight="900" letter-spacing="5">RHYTHM TOUR</text>
    <text x="66" y="126" fill="#f4eef9" font-size="52" font-weight="900" letter-spacing="1">Keyboardist On Tour</text>
    <text x="70" y="166" fill="#b7a9d1" font-size="20" font-weight="700" letter-spacing="1">Hit the pulses before the stage goes dark.</text>
