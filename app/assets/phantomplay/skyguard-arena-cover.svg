<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Skyguard Arena cover art</title>
  <desc id="desc">Floating skyline route defended by neon sentinels against incoming raid waves.</desc>
  <defs>
