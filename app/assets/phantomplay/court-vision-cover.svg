<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Court Vision cover art</title>
  <desc id="desc">A basketball on a dotted arc trajectory sinking into a neon hoop with net, arena lights glowing behind.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0a2a4a"/><stop offset=".5" stop-color="#08131f"/><stop offset="1" stop-color="#3a1a05"/>
    </linearGradient>
    <radialGradient id="ball" cx=".38" cy=".32" r=".8">
      <stop offset="0" stop-color="#ffb454"/><stop offset="1" stop-color="#d5620a"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <!-- arena lights -->
  <g filter="url(#glow)">
    <circle cx="200" cy="150" r="10" fill="#eafcff"/><circle cx="300" cy="120" r="10" fill="#eafcff"/>
    <circle cx="900" cy="120" r="10" fill="#eafcff"/><circle cx="1000" cy="150" r="10" fill="#eafcff"/>
    <circle cx="1050" cy="240" r="10" fill="#eafcff"/><circle cx="150" cy="240" r="10" fill="#eafcff"/>
  </g>
  <g filter="url(#glow)">
    <!-- backboard + neon hoop + net (right) -->
    <rect x="905" y="300" width="120" height="150" rx="6" fill="none" stroke="#00f0d0" stroke-width="5"/>
    <rect x="945" y="340" width="44" height="34" rx="4" fill="none" stroke="#00f0d0" stroke-width="4"/>
    <ellipse cx="880" cy="470" rx="66" ry="18" fill="none" stroke="#ff5ca0" stroke-width="7"/>
    <path d="M820 474 L836 545 M844 480 L854 548 M868 482 L872 552 M892 482 L888 552 M916 480 L910 548 M936 474 L924 545" stroke="#eafcff" stroke-width="3" fill="none"/>
    <!-- dotted arc trajectory -->
    <path d="M180 560 Q560 130 878 452" fill="none" stroke="#00f0d0" stroke-width="4" stroke-dasharray="3 18" stroke-linecap="round"/>
    <!-- basketball -->
    <circle cx="450" cy="300" r="58" fill="url(#ball)" stroke="#7a3405" stroke-width="3"/>
    <path d="M450 242 L450 358 M392 300 L508 300 M405 258 Q450 300 405 342 M495 258 Q450 300 495 342" stroke="#7a3405" stroke-width="3" fill="none"/>
  </g>
  <text x="55" y="95" fill="#eafcff" font-family="Arial Black,Arial,sans-serif" font-size="56" letter-spacing="3">COURT VISION</text>
  <text x="60" y="146" fill="#ff5ca0" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="5">SINK THE FREE THROW</text>
</svg>
