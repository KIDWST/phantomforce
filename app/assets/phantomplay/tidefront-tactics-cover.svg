<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Tidefront Tactics cover art</title>
  <desc id="desc">Two neon skiffs trade artillery across a windy ocean battlefield.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#061627"/>
      <stop offset=".55" stop-color="#062030"/>
      <stop offset="1" stop-color="#02080d"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
