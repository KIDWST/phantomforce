<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Pixel Bloom cover art</title>
  <desc id="desc">A soft mirrored neon flower radiating symmetric petals from center on a calm pastel-dark gradient.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#241a3a"/><stop offset=".5" stop-color="#3a2450"/><stop offset="1" stop-color="#4a2a55"/>
    </linearGradient>
    <radialGradient id="core" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#fff4d6"/><stop offset="1" stop-color="#ffb3d9"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <g filter="url(#glow)" transform="translate(600 380)" fill="none" stroke-linecap="round">
    <!-- 8 symmetric petals -->
    <g stroke="#ff9ecb" stroke-width="26" opacity=".92">
      <ellipse cx="0" cy="-140" rx="46" ry="120"/>
      <ellipse cx="0" cy="140" rx="46" ry="120"/>
      <ellipse cx="-140" cy="0" rx="120" ry="46"/>
      <ellipse cx="140" cy="0" rx="120" ry="46"/>
    </g>
    <g stroke="#a6ffe0" stroke-width="22" opacity=".85" transform="rotate(45)">
      <ellipse cx="0" cy="-150" rx="38" ry="110"/>
      <ellipse cx="0" cy="150" rx="38" ry="110"/>
      <ellipse cx="-150" cy="0" rx="110" ry="38"/>
      <ellipse cx="150" cy="0" rx="110" ry="38"/>
    </g>
    <g stroke="#bfa6ff" stroke-width="14" opacity=".7" transform="rotate(22.5)">
      <ellipse cx="0" cy="-190" rx="24" ry="80"/>
      <ellipse cx="0" cy="190" rx="24" ry="80"/>
      <ellipse cx="-190" cy="0" rx="80" ry="24"/>
      <ellipse cx="190" cy="0" rx="80" ry="24"/>
    </g>
    <circle cx="0" cy="0" r="62" fill="url(#core)" stroke="none"/>
    <circle cx="0" cy="0" r="30" fill="#fff9ec" stroke="none" opacity=".9"/>
  </g>
  <text x="55" y="95" fill="#fff4fb" font-family="Arial Black,Arial,sans-serif" font-size="56" letter-spacing="3">PIXEL BLOOM</text>
  <text x="60" y="146" fill="#a6ffe0" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="5">GENTLE PATTERN PLAY</text>
</svg>
