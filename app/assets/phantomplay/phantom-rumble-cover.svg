<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Phantom Rumble cover art</title>
  <desc id="desc">A neon platform brawler arena with two stylized fighters colliding above a floating stage, damage meters, pickup orbs, and a stadium grid behind them.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b0b42"/>
      <stop offset=".45" stop-color="#100718"/>
      <stop offset="1" stop-color="#06263a"/>
    </linearGradient>
    <linearGradient id="stage" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2fb0"/>
      <stop offset=".5" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#41ffa1"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity=".05"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <g opacity=".28" stroke="#41ffa1" stroke-width="2" fill="none">
    <path d="M150 598 C250 420 374 342 520 318 C690 290 838 332 1048 126"/>
    <path d="M82 504 C232 430 330 420 488 442 C654 466 748 520 1064 470"/>
    <circle cx="260" cy="286" r="78"/>
    <circle cx="946" cy="278" r="90"/>
  </g>
  <g filter="url(#glow)">
    <rect x="255" y="478" width="690" height="38" rx="14" fill="url(#stage)"/>
    <path d="M292 516 L382 608 H820 L914 516 Z" fill="#071725" stroke="#00e5ff" stroke-width="4" opacity=".9"/>
    <path d="M340 540 H860" stroke="#41ffa1" stroke-opacity=".45" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g filter="url(#glow)">
    <g transform="translate(472 430) rotate(-10)">
      <path d="M0 46 L0 -54 L-36 -102 L-4 -142 L42 -112 L58 -170 L94 -146 L82 -76 L112 -24 L88 46 L54 46 L44 -28 L24 46 Z" fill="#ff2fb0"/>
      <path d="M86 -56 L178 -84 L204 -54 L120 -14 Z" fill="#ff2fb0"/>
      <circle cx="18" cy="-158" r="26" fill="#ffd166"/>
      <path d="M-10 -184 L18 -222 L48 -184" fill="#ff2fb0"/>
    </g>
    <g transform="translate(736 430) scale(-1 1) rotate(-10)">
      <path d="M0 46 L0 -54 L-36 -102 L-4 -142 L42 -112 L58 -170 L94 -146 L82 -76 L112 -24 L88 46 L54 46 L44 -28 L24 46 Z" fill="#41ffa1"/>
      <path d="M86 -56 L178 -84 L204 -54 L120 -14 Z" fill="#41ffa1"/>
      <circle cx="18" cy="-158" r="26" fill="#eafff4"/>
      <path d="M-12 -186 L18 -224 L52 -186" fill="#41ffa1"/>
    </g>
    <polygon points="604,242 630,312 704,306 646,350 670,424 604,378 538,424 562,350 504,306 578,312" fill="#fff27a"/>
    <circle cx="604" cy="344" r="30" fill="#ffffff"/>
  </g>
  <g filter="url(#glow)" font-family="ui-monospace,Menlo,Consolas,monospace" font-weight="900">
    <g transform="translate(88 512)">
      <rect width="202" height="66" rx="12" fill="#100718" stroke="#ff2fb0" stroke-width="3"/>
      <text x="20" y="42" fill="#ff2fb0" font-size="31">147%</text>
    </g>
    <g transform="translate(910 512)">
      <rect width="202" height="66" rx="12" fill="#100718" stroke="#41ffa1" stroke-width="3"/>
      <text x="20" y="42" fill="#41ffa1" font-size="31">083%</text>
    </g>
    <circle cx="1006" cy="162" r="22" fill="#00e5ff"/>
    <circle cx="190" cy="214" r="18" fill="#ffd166"/>
    <path d="M1006 162 l-42 42M190 214 l46 52" stroke="#ffffff" stroke-opacity=".35" stroke-width="4"/>
  </g>
  <g font-family="ui-monospace,Menlo,Consolas,monospace">
    <text x="62" y="78" fill="#41ffa1" font-size="20" font-weight="900" letter-spacing="5">LOCAL ARENA</text>
    <text x="62" y="132" fill="#ffffff" font-size="58" font-weight="900" letter-spacing="2">Phantom Rumble</text>
    <text x="66" y="174" fill="#ff9ed3" font-size="20" font-weight="700" letter-spacing="1">Knock rivals off the stage before your damage climbs.</text>
    <text x="66" y="626" fill="#00e5ff" font-size="17" font-weight="900" letter-spacing="3">DUEL - VERSUS - PLATFORM BRAWLER</text>
  </g>
</svg>
