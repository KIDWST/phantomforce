<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Logic Lights cover art</title>
  <desc id="desc">A five by five Lights Out grid with some cells glowing bright and others dark, and a flip spark bursting on one cell.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#3a0f2e"/><stop offset=".52" stop-color="#120616"/><stop offset="1" stop-color="#141033"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="lit" cx=".4" cy=".35" r=".8">
      <stop offset="0" stop-color="#fff6a8"/><stop offset=".5" stop-color="#ffcf3b"/><stop offset="1" stop-color="#ff7a1f"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <!-- 5x5 grid, cell 92, gap via 100 step, origin 420,150 -->
  <g>
    <!-- dark cells -->
    <g fill="#1c0f2a" stroke="#3a2450" stroke-width="3">
      <rect x="420" y="150" width="84" height="84" rx="12"/><rect x="620" y="150" width="84" height="84" rx="12"/><rect x="820" y="150" width="84" height="84" rx="12"/>
      <rect x="520" y="250" width="84" height="84" rx="12"/><rect x="720" y="250" width="84" height="84" rx="12"/>
      <rect x="420" y="350" width="84" height="84" rx="12"/><rect x="620" y="350" width="84" height="84" rx="12"/>
      <rect x="520" y="450" width="84" height="84" rx="12"/><rect x="720" y="450" width="84" height="84" rx="12"/><rect x="820" y="450" width="84" height="84" rx="12"/>
      <rect x="420" y="550" width="84" height="84" rx="12"/><rect x="620" y="550" width="84" height="84" rx="12"/><rect x="820" y="550" width="84" height="84" rx="12"/>
    </g>
    <!-- lit cells -->
    <g fill="url(#lit)" filter="url(#glow)">
      <rect x="520" y="150" width="84" height="84" rx="12"/><rect x="720" y="150" width="84" height="84" rx="12"/>
      <rect x="420" y="250" width="84" height="84" rx="12"/><rect x="620" y="250" width="84" height="84" rx="12"/><rect x="820" y="250" width="84" height="84" rx="12"/>
      <rect x="520" y="350" width="84" height="84" rx="12"/><rect x="820" y="350" width="84" height="84" rx="12"/>
      <rect x="420" y="450" width="84" height="84" rx="12"/><rect x="620" y="450" width="84" height="84" rx="12"/>
      <rect x="520" y="550" width="84" height="84" rx="12"/><rect x="720" y="550" width="84" height="84" rx="12"/>
    </g>
    <!-- flip spark on one cell (row3,col3 lit) -->
    <g transform="translate(720 392)" filter="url(#glow)" stroke="#fff6a8" stroke-width="6" stroke-linecap="round">
      <path d="M0 -70 V-40 M0 70 V40 M-70 0 H-40 M70 0 H40 M-50 -50 L-30 -30 M50 50 L30 30 M50 -50 L30 -30 M-50 50 L-30 30"/>
    </g>
    <rect x="700" y="350" width="84" height="84" rx="12" fill="#fff6a8" filter="url(#glow)"/>
  </g>
  <text x="55" y="95" fill="#fff6e8" font-family="Arial Black,Arial,sans-serif" font-size="56" letter-spacing="3">LOGIC LIGHTS</text>
  <text x="60" y="146" fill="#ffcf3b" font-family="ui-monospace,Menlo,monospace" font-size="24" font-weight="900" letter-spacing="5">CLEAR THE LIGHTS</text>
</svg>
