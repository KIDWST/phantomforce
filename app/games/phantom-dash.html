<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'"/>
<title>Phantom Dash</title><style>
:root{color-scheme:dark}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020504;color:#eafff3;font-family:Inter,system-ui,sans-serif}
body{display:grid;place-items:center;background:radial-gradient(circle at 50% 15%,#102b20 0,#04110d 48%,#010403 100%)}
canvas{width:100%;height:100%;display:block;touch-action:none}
.hud{position:fixed;inset:16px 16px auto;display:flex;justify-content:space-between;gap:12px;pointer-events:none;font:900 13px ui-monospace,monospace;letter-spacing:.08em;color:#b9ffd7;text-shadow:0 0 12px #22c55e}
.hud span{padding:8px 11px;border:1px solid #39ff9b33;border-radius:999px;background:#03120dcc;box-shadow:0 0 22px #00ff8840}
.callout{position:fixed;left:50%;top:18%;transform:translateX(-50%);font:900 clamp(22px,4vw,56px) ui-monospace,monospace;letter-spacing:.12em;color:#eafff3;text-shadow:0 0 18px #39ff9b,0 0 42px #39ff9b;opacity:0;pointer-events:none;transition:opacity .15s,transform .2s;z-index:3}.callout.show{opacity:1;transform:translateX(-50%) scale(1.06)}
.overlay{position:fixed;inset:0;display:grid;place-items:center;background:#010504d8;z-index:4}.overlay[hidden]{display:none!important}
.panel{text-align:center;max-width:620px;padding:28px}.k{font:900 11px ui-monospace,monospace;letter-spacing:.22em;color:#39ff9b}
h1{margin:6px 0 10px;font-size:clamp(42px,2.5rem,86px);line-height:.9;text-transform:uppercase;color:#eafff3;text-shadow:0 0 34px #22c55e66}
p{margin:0 auto 18px;max-width:520px;color:#9cb8aa;line-height:1.55}
button{border:1px solid #39ff9b66;border-radius:18px;background:#39ff9b;color:#03120d;font:900 16px ui-monospace,monospace;padding:15px 22px;cursor:pointer;box-shadow:0 0 34px #22c55e55}
.ghost{margin-left:8px;background:#03120d;color:#caffdd}
</style></head><body>
<canvas aria-label="Phantom Dash play area" tabindex="0"></canvas><div class="hud"><span data-score>0</span><span data-level>LEVEL 1</span><span data-combo>COMBO 0</span><span data-best>BEST 0</span></div><div class="callout" data-callout></div>
<div class="overlay" data-menu><div class="panel"><div class="k">BY TAK · ARCADE</div><h1>Phantom Dash</h1><p>Jump, double-jump, and flip gravity through a neon gauntlet. Space, click, tap, or ↑ to jump.</p><button data-start>START RUN</button></div></div>
<div class="overlay" data-end hidden><div class="panel"><div class="k" data-end-k>RUN ENDED</div><h1 data-title>CRASH</h1><p data-copy></p><button data-retry>TRY AGAIN</button><button class="ghost" data-menu-btn>MENU</button></div></div>
<script>
'use strict';
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
function loadBest(){try{return Number(localStorage.pfDashBest||0)}catch{return 0}}
function saveBest(v){try{localStorage.pfDashBest=v}catch{}}
const c=document.querySelector('canvas'),x=c.getContext('2d');
const menu=document.querySelector('[data-menu]'),end=document.querySelector('[data-end]');
const scoreEl=document.querySelector('[data-score]'),levelEl=document.querySelector('[data-level]'),comboEl=document.querySelector('[data-combo]'),bestEl=document.querySelector('[data-best]'),callout=document.querySelector('[data-callout]');
let W=0,H=0,D=1,reduced=false,run=false,over=false,paused=false,raf=0,last=0,score=0,best=loadBest(),level=1,shownLevel=1,t=0,speed=430,dist=0,shake=0,gravity=1,flipTimer=0,combo=0,callTimer=0,audio=null;
let player,blocks=[],orbs=[],sparks=[],rings=[];
function size(){D=Math.min(2,devicePixelRatio||1);W=c.width=Math.max(720,innerWidth*D);H=c.height=Math.max(420,innerHeight*D)}addEventListener('resize',size);size();
const ground=()=>H*.76, ceil=()=>H*.24, rnd=(a,b)=>a+Math.random()*(b-a);
function reset(){cancelAnimationFrame(raf);run=true;over=false;paused=false;score=0;level=1;shownLevel=1;t=0;dist=0;speed=430;shake=0;gravity=1;flipTimer=0;combo=0;callTimer=0;blocks=[];orbs=[];sparks=[];rings=[];say('GO');tone(220,.05,'square',.05);tone(440,.08,'sawtooth',.04);player={x:W*.2,y:ground()-34*D,vy:0,s:34*D,jumps:0,rot:0};spawnWave(W*.85);menu.hidden=true;end.hidden=true;last=performance.now();loop(last);host('progress',{progress:0,state:null})}
function spawnWave(start){let x0=start;for(let i=0;i<18;i++){const gap=Math.max(145*D,250*D-level*9*D);x0+=gap+rnd(0,120*D);const h=rnd(34,92)*D;const kind=Math.random()<.18?'flip':Math.random()<.38?'spike':'block';blocks.push({x:x0,w:kind==='spike'?46*D:rnd(42,72)*D,h,kind,passed:false});if(Math.random()<.35)orbs.push({x:x0+rnd(55,130)*D,y:rnd(ceil()+70*D,ground()-130*D),r:13*D,hit:false})}}
function audioCtx(){if(audio)return audio;try{audio=new (window.AudioContext||window.webkitAudioContext)()}catch{}return audio}
function tone(freq,dur=.07,type='sine',gain=.035){const ac=audioCtx();if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+dur)}
function say(text){callout.textContent=text;callout.classList.add('show');clearTimeout(callout._t);callout._t=setTimeout(()=>callout.classList.remove('show'),520)}
function jump(){if(!run||paused||over)return;if(player.jumps<2){player.vy=-15.5*D*gravity;player.jumps++;burst(player.x,player.y,'#39ff9b');rings.push({x:player.x,y:player.y,r:8*D,a:.75,c:'#39ff9b'});tone(player.jumps===1?330:510,.06,'triangle',.035)}}
addEventListener('keydown',e=>{if([' ','ArrowUp','w','W'].includes(e.key)){e.preventDefault();jump()}});
addEventListener('pointerdown',jump);
document.querySelector('[data-start]').onclick=reset;document.querySelector('[data-retry]').onclick=reset;document.querySelector('[data-menu-btn]').onclick=()=>{end.hidden=true;menu.hidden=false;draw(0)};
function burst(px,py,col,n=16){if(reduced)return;for(let i=0;i<n;i++)sparks.push({x:px,y:py,vx:rnd(-5,5)*D,vy:rnd(-5,5)*D,a:1,c:col})}
function die(){if(over)return;over=true;run=false;shake=14*D;cancelAnimationFrame(raf);best=Math.max(best,score);saveBest(best);host('score',{score});host('complete',{score,progress:100,state:null});document.querySelector('[data-title]').textContent='CRASH';document.querySelector('[data-copy]').textContent=`Score ${score}. Level ${level}. Best ${best}. Max combo ${combo}.`;end.hidden=false;burst(player.x,player.y,'#ff4f75',42);tone(90,.22,'sawtooth',.06)}
function win(){over=true;run=false;cancelAnimationFrame(raf);score+=1000+combo*25;best=Math.max(best,score);saveBest(best);host('score',{score});host('complete',{score,progress:100,state:null});document.querySelector('[data-title]').textContent='PHASE CLEAR';document.querySelector('[data-copy]').textContent=`You cleared the neon gauntlet with ${score} points and a ${combo}x flow chain.`;end.hidden=false;tone(660,.18,'triangle',.05);setTimeout(()=>tone(990,.2,'triangle',.04),90)}
function hit(a,b){return a.x+a.s*.42>b.x&&a.x-a.s*.42<b.x+b.w&&a.y+a.s*.42>b.y-b.h&&a.y-a.s*.42<b.y}
function tick(dt){t+=dt;dist+=speed*dt;score=Math.max(score,Math.floor(dist/12)+combo*8);level=Math.min(10,1+Math.floor(dist/1700));if(level!==shownLevel){shownLevel=level;say(`LEVEL ${level}`);tone(300+level*45,.11,'square',.035);burst(player.x,player.y,'#39ff9b',28)}speed=430+level*48+combo*.8;if(level>=10&&dist>17800)win();const floor=ground(),roof=ceil();player.vy+=gravity*38*D*dt;player.y+=player.vy*dt*60;player.rot+=gravity*(player.vy*.0009+dt*5);const surface=gravity>0?floor-player.s*.52:roof+player.s*.52;if((gravity>0&&player.y>=surface)||(gravity<0&&player.y<=surface)){player.y=surface;player.vy=0;player.jumps=0}for(const b of blocks){b.x-=speed*dt;if(b.kind==='flip'&&Math.abs(player.x-b.x)<36*D&&flipTimer<=0){gravity*=-1;flipTimer=.7;combo+=2;say('GRAVITY');burst(player.x,player.y,'#5eead4',30);rings.push({x:player.x,y:player.y,r:16*D,a:.9,c:'#5eead4'});tone(180,.08,'sawtooth',.035);tone(520,.12,'triangle',.03)}if(hit(player,{x:b.x,w:b.w,y:gravity>0?floor:roof+hFor(b),h:b.h})&&b.kind!=='flip')die();if(!b.passed&&b.x+b.w<player.x){b.passed=true;combo++;score+=b.kind==='spike'?55+combo*2:30+combo; if(combo&&combo%10===0){say(`${combo}X FLOW`);tone(760,.08,'triangle',.04)}}}flipTimer=Math.max(0,flipTimer-dt);for(const o of orbs){o.x-=speed*dt;if(!o.hit&&Math.hypot(o.x-player.x,o.y-player.y)<o.r+player.s*.48){o.hit=true;combo+=3;score+=110+combo*4;player.vy=-17*D*gravity;player.jumps=1;burst(o.x,o.y,'#f0abfc',26);rings.push({x:o.x,y:o.y,r:10*D,a:.8,c:'#f0abfc'});tone(880,.06,'sine',.04)}}blocks=blocks.filter(b=>b.x>-120*D);orbs=orbs.filter(o=>o.x>-80*D&&!o.hit);if(blocks.length<12)spawnWave(W+300*D);for(const s of sparks){s.x+=s.vx;s.y+=s.vy;s.a-=dt*2.2}sparks=sparks.filter(s=>s.a>0);for(const r of rings){r.r+=120*D*dt;r.a-=dt*1.5}rings=rings.filter(r=>r.a>0);host('progress',{progress:Math.min(99,Math.floor(dist/178)),state:{level,combo,gravity}})}
function hFor(b){return gravity>0?0:b.h}
function draw(){x.clearRect(0,0,W,H);x.save();if(shake)x.translate(rnd(-shake,shake),rnd(-shake,shake));let g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#04130f');g.addColorStop(.55,'#071b14');g.addColorStop(1,'#020504');x.fillStyle=g;x.fillRect(0,0,W,H);x.strokeStyle='#39ff9b20';x.lineWidth=1*D;for(let gx=(-dist*.18)%(80*D);gx<W;gx+=80*D){x.beginPath();x.moveTo(gx,0);x.lineTo(gx,H);x.stroke()}for(let y=ceil();y<=ground();y+=70*D){x.beginPath();x.moveTo(0,y);x.lineTo(W,y);x.stroke()}x.strokeStyle='#39ff9baa';x.lineWidth=4*D;x.beginPath();x.moveTo(0,ground());x.lineTo(W,ground());x.moveTo(0,ceil());x.lineTo(W,ceil());x.stroke();
for(const b of blocks){const y=gravity>0?ground():ceil()+b.h;x.save();x.translate(b.x,y);x.shadowBlur=18*D;x.shadowColor=b.kind==='flip'?'#5eead4':b.kind==='spike'?'#ff4f75':'#39ff9b';x.fillStyle=b.kind==='flip'?'#5eead4':b.kind==='spike'?'#ff4f75':'#39ff9b';if(b.kind==='spike'){x.beginPath();x.moveTo(0,0);x.lineTo(b.w/2,-b.h*gravity);x.lineTo(b.w,0);x.closePath();x.fill()}else if(b.kind==='flip'){x.rotate(t*4);x.strokeStyle='#5eead4';x.lineWidth=4*D;x.strokeRect(-18*D,-18*D,36*D,36*D)}else x.fillRect(0,-b.h*gravity,b.w,b.h*gravity);x.restore()}
for(const o of orbs){x.shadowBlur=18*D;x.shadowColor='#f0abfc';x.fillStyle='#f0abfc';x.beginPath();x.arc(o.x,o.y,o.r*(1+Math.sin(t*8)*.08),0,7);x.fill()}for(const r of rings){x.globalAlpha=r.a;x.strokeStyle=r.c;x.lineWidth=3*D;x.beginPath();x.arc(r.x,r.y,r.r,0,7);x.stroke()}for(const s of sparks){x.globalAlpha=s.a;x.fillStyle=s.c;x.fillRect(s.x,s.y,3*D,3*D)}x.globalAlpha=1;if(player){x.save();x.translate(player.x,player.y);x.rotate(player.rot);x.shadowBlur=24*D;x.shadowColor=gravity>0?'#39ff9b':'#5eead4';x.fillStyle=gravity>0?'#39ff9b':'#5eead4';x.fillRect(-player.s/2,-player.s/2,player.s,player.s);x.strokeStyle='#03120d';x.lineWidth=3*D;x.strokeRect(-player.s*.28,-player.s*.28,player.s*.56,player.s*.56);x.restore()}x.restore();scoreEl.textContent=`${score}`;levelEl.textContent=`LEVEL ${level}`;comboEl.textContent=`COMBO ${combo}`;bestEl.textContent=`BEST ${best}`}
function loop(now){if(!run)return;let dt=Math.min(.033,(now-last)/1000);last=now;if(!paused)tick(dt);draw();raf=requestAnimationFrame(loop)}
addEventListener('message',e=>{const d=e.data;if(!d||d.source!=='phantomplay-host')return;if(d.type==='settings'){reduced=!!d.reducedMotion;gpOn=!!d.gamepad}if(d.type==='pause'){paused=true;host('paused',{paused:true})}if(d.type==='resume'){paused=false;host('paused',{paused:false})}if(d.type==='restart')reset();if(d.type==='exit'){cancelAnimationFrame(raf);run=false;over=false;menu.hidden=false;end.hidden=true;draw(0)}});
// --- Gamepad (PhantomPlay standard mapping): A/Cross = start/retry/jump ---
let gpOn=false,gpIdx=null,gpPrevA=false;
function gpPad(){const p=navigator.getGamepads?navigator.getGamepads():[];if(gpIdx===null)for(let i=0;i<p.length;i++)if(p[i]){gpIdx=i;break}return gpIdx===null?null:p[gpIdx]}
function gpAction(){if(!run)reset();else jump()}
(function gpLoop(){if(gpOn&&!paused){const pad=gpPad();if(pad){const a=!!(pad.buttons[0]&&pad.buttons[0].pressed);if(a&&!gpPrevA)gpAction();gpPrevA=a}}requestAnimationFrame(gpLoop)})();
draw(0);host('ready');
</script></body></html>
