<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'"><title>Focus Stack</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020706;color:#effff6;font-family:system-ui,sans-serif}body{background:radial-gradient(circle at 50% 15%,#173c30,#020706 62%)}canvas{width:100%;height:100%;display:block}.hud{position:fixed;inset:20px;display:flex;justify-content:space-between;pointer-events:none}.hud b{color:#63ffad;font-size:36px}.hud span{display:block;color:#8ba99a;font:700 11px ui-monospace}.hint{position:fixed;left:50%;bottom:max(26px,env(safe-area-inset-bottom));transform:translateX(-50%);padding:12px 18px;border:1px solid #4dffa36b;border-radius:999px;background:#03110ccc;color:#caffdf;font-weight:700;white-space:nowrap}.over{position:fixed;inset:0;display:grid;place-items:center;background:#010504d9}.over[hidden]{display:none}.over div{text-align:center}.over h1{font-size:64px;color:#5affa9;margin:0}.over button{border:0;border-radius:999px;background:#55ffa8;padding:14px 24px;font-weight:900;cursor:pointer}@media(max-width:600px){.hud b{font-size:28px}.over h1{font-size:42px}}</style></head><body><canvas></canvas><div class="hud"><div><span>HEIGHT</span><b data-score>0</b></div><div><span>BEST</span><b data-best>0</b></div></div><button class="hint">Tap / Space to drop</button><div class="over" hidden><div><h1>Stack complete</h1><p data-result></p><button>Play again</button></div></div><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*'),c=document.querySelector('canvas'),g=c.getContext('2d');let W,H,blocks=[],moving,score=0,best=0,speed=2.4,dir=1,running=true,reduced=false;function size(){W=c.width=innerWidth*devicePixelRatio;H=c.height=innerHeight*devicePixelRatio;reset()}addEventListener('resize',size);function reset(){blocks=[{x:W*.22,y:H*.86,w:W*.56,h:Math.max(22,H*.035),color:'#2dff99'}];moving={x:W*.05,y:H*.82,w:blocks[0].w,h:blocks[0].h,color:'#60ffc0'};score=0;speed=2.4*devicePixelRatio;running=true;document.querySelector('.over').hidden=true;draw()}function drop(){if(!running)return;const base=blocks[blocks.length-1],left=Math.max(moving.x,base.x),right=Math.min(moving.x+moving.w,base.x+base.w),overlap=right-left;if(overlap<8*devicePixelRatio){finish();return}moving.x=left;moving.w=overlap;blocks.push({...moving});score++;best=Math.max(best,score);document.querySelector('[data-score]').textContent=score;document.querySelector('[data-best]').textContent=best;host('score',{score:score*10,progress:Math.min(99,score*8),state:{height:score}});if(score>=12){finish(true);return}const y=Math.max(H*.18,base.y-blocks[0].h);moving={x:dir>0?0:W-overlap,y:y-blocks[0].h,w:overlap,h:blocks[0].h,color:`hsl(${145+score*6} 100% 65%)`};speed+=.18*devicePixelRatio}function finish(win=false){running=false;document.querySelector('[data-result]').textContent=win?`Perfect tower: ${score} layers.`:`Tower height: ${score} layers.`;document.querySelector('.over').hidden=false;host('complete',{score:score*10,progress:100,state:{height:score}})}function loop(){if(running){moving.x+=speed*dir;if(moving.x<=0||moving.x+moving.w>=W)dir*=-1;draw()}requestAnimationFrame(loop)}function draw(){g.clearRect(0,0,W,H);g.strokeStyle='#36ff941a';for(let y=H*.15;y<H;y+=H*.08){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke()}[...blocks,moving].forEach((b,i)=>{if(!b)return;g.fillStyle=b.color;g.shadowColor=b.color;g.shadowBlur=reduced?0:18*devicePixelRatio;g.fillRect(b.x,b.y,b.w,b.h)});g.shadowBlur=0}document.querySelector('.hint').onclick=drop;addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();drop()}});document.querySelector('.over button').onclick=reset;addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings')reduced=!!e.data.reducedMotion});size();loop();host('ready');
</script></body></html>
