<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'">
  <title>Focus Stack</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020706;color:#effff6;font-family:system-ui,sans-serif;touch-action:manipulation;user-select:none}body{background:radial-gradient(circle at 50% 15%,#173c30,#020706 62%)}canvas{width:100%;height:100%;display:block}.hud{position:fixed;z-index:3;inset:max(16px,env(safe-area-inset-top)) 18px auto;display:flex;justify-content:space-between;pointer-events:none}.hud b{color:#63ffad;font-size:36px}.hud span{display:block;color:#8ba99a;font:700 11px ui-monospace}.hint{position:fixed;z-index:4;left:50%;bottom:max(22px,env(safe-area-inset-bottom));transform:translateX(-50%);min-width:180px;min-height:46px;padding:12px 18px;border:1px solid #4dffa36b;border-radius:999px;background:#03110ce8;color:#caffdf;font-weight:800;white-space:nowrap}.hint:active{background:#41ffa124}.overlay{position:fixed;z-index:6;inset:0;display:grid;place-items:center;background:#010504dc;backdrop-filter:blur(4px)}.overlay[hidden]{display:none}.overlay div{text-align:center;padding:26px}.overlay h1{font-size:56px;line-height:1;margin:0;color:#5affa9}.overlay p{max-width:430px;color:#9db8aa;line-height:1.5}.overlay button{min-width:145px;min-height:48px;border:0;border-radius:999px;background:#55ffa8;padding:14px 24px;font-weight:900;cursor:pointer}@media(max-width:600px){.hud b{font-size:28px}.overlay h1{font-size:40px}}
  </style>
</head>
<body>
  <canvas aria-label="Focus Stack play field"></canvas>
  <div class="hud"><div><span>HEIGHT</span><b data-score>0</b></div><div><span>BEST</span><b data-best>0</b></div></div>
  <button class="hint" type="button">Tap / Space to drop</button>
  <div class="overlay start"><div><h1>Focus Stack</h1><p>Drop each moving layer on the tower. Clean overlaps build higher; misses end the run.</p><button type="button">Start stacking</button></div></div>
  <div class="overlay pause" hidden><div><h1>Paused</h1><p>Your tower is waiting.</p><button type="button">Resume</button></div></div>
  <div class="overlay result" hidden><div><h1>Run complete</h1><p data-result></p><button type="button">Play again</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*'),c=document.querySelector('canvas'),g=c.getContext('2d'),startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause'),resultEl=document.querySelector('.result');
    let W=0,H=0,blocks=[],moving=null,score=0,best=0,speed=0,dir=1,running=false,paused=false,reduced=false;

    function updateHud(){document.querySelector('[data-score]').textContent=score;document.querySelector('[data-best]').textContent=best}
    function makeBase(){const h=Math.max(22,H*.035);blocks=[{x:W*.22,y:H*.86,w:W*.56,h,color:'#2dff99'}];moving={x:W*.05,y:H*.82,w:blocks[0].w,h,color:'#60ffc0'};speed=2.35*devicePixelRatio;dir=1;score=0;updateHud();draw()}
    function resize(){const oldW=W||1,oldH=H||1;W=c.width=Math.max(320,Math.round(innerWidth*devicePixelRatio));H=c.height=Math.max(480,Math.round(innerHeight*devicePixelRatio));if(!blocks.length){makeBase();return}const sx=W/oldW,sy=H/oldH;blocks=blocks.map(block=>({...block,x:block.x*sx,y:block.y*sy,w:block.w*sx,h:block.h*sy}));if(moving)moving={...moving,x:moving.x*sx,y:moving.y*sy,w:moving.w*sx,h:moving.h*sy};speed*=sx;draw()}
    function startRun(){makeBase();running=true;paused=false;startEl.hidden=true;pauseEl.hidden=true;resultEl.hidden=true;host('progress',{score:0,progress:0,state:{height:0}})}
    function setPaused(next){if(!running)return;paused=next;pauseEl.hidden=!paused;host('paused',{paused})}
    function drop(){if(!running||paused||!moving)return;const base=blocks[blocks.length-1],left=Math.max(moving.x,base.x),right=Math.min(moving.x+moving.w,base.x+base.w),overlap=right-left;if(overlap<8*devicePixelRatio){finish(false);return}moving.x=left;moving.w=overlap;blocks.push({...moving});score++;best=Math.max(best,score);updateHud();host('score',{score:score*10,progress:Math.min(96,score*8),state:{height:score}});if(score>=12){finish(true);return}const nextY=Math.max(H*.18,base.y-blocks[0].h);moving={x:dir>0?0:W-overlap,y:nextY-blocks[0].h,w:overlap,h:blocks[0].h,color:`hsl(${145+score*6} 100% 65%)`};speed+=.18*devicePixelRatio}
    function finish(win){running=false;paused=false;resultEl.hidden=false;resultEl.querySelector('h1').textContent=win?'Perfect tower':'Tower slipped';resultEl.querySelector('[data-result]').textContent=win?`You stacked all ${score} layers.`:`You reached ${score} layer${score===1?'':'s'}. Try for a cleaner drop.`;host('complete',{score:score*10,progress:100,state:{height:score}})}
    function loop(){if(running&&!paused&&moving){moving.x+=speed*dir;if(moving.x<=0){moving.x=0;dir=1}else if(moving.x+moving.w>=W){moving.x=W-moving.w;dir=-1}draw()}requestAnimationFrame(loop)}
    function draw(){g.clearRect(0,0,W,H);g.strokeStyle='#36ff941a';g.lineWidth=Math.max(1,devicePixelRatio);for(let y=H*.15;y<H;y+=H*.08){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke()}[...blocks,moving].forEach(block=>{if(!block)return;g.fillStyle=block.color;g.shadowColor=block.color;g.shadowBlur=reduced?0:18*devicePixelRatio;g.fillRect(block.x,block.y,block.w,block.h)});g.shadowBlur=0}

    document.querySelector('.hint').onclick=drop;startEl.querySelector('button').onclick=startRun;pauseEl.querySelector('button').onclick=()=>setPaused(false);resultEl.querySelector('button').onclick=startRun;
    addEventListener('resize',resize);addEventListener('keydown',event=>{if(event.code==='Space'||event.code==='Enter'){event.preventDefault();drop()}if(event.key==='p'||event.key==='P'){event.preventDefault();setPaused(!paused)}});
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&running&&!paused)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='settings')reduced=!!event.data.reducedMotion;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='restart')startRun()});
    resize();loop();host('ready');
  </script>
</body>
</html>
