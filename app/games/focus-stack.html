<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'">
  <title>Focus Stack</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020706;color:#effff6;font-family:system-ui,sans-serif;touch-action:none;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}body{background:radial-gradient(circle at 50% 15%,#173c30,#020706 62%)}canvas{width:100%;height:100%;display:block;outline:0}.hud{position:fixed;z-index:3;inset:max(16px,env(safe-area-inset-top)) 18px auto;display:flex;justify-content:space-between;pointer-events:none}.hud b{color:#63ffad;font-size:36px}.hud span{display:block;color:#8ba99a;font:700 11px ui-monospace}.hint{position:fixed;z-index:4;left:50%;bottom:max(14px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(320px,calc(100vw - 30px));min-height:50px;padding:12px 18px;border:1px solid #4dffa36b;border-radius:999px;background:#03110ce8;color:#caffdf;font-weight:800;white-space:nowrap;touch-action:manipulation}.hint:active{background:#41ffa124}.overlay{position:fixed;z-index:6;inset:0;display:grid;place-items:center;background:#010504dc;backdrop-filter:blur(4px)}.overlay[hidden]{display:none}.overlay div{text-align:center;padding:26px}.overlay h1{font-size:56px;line-height:1;margin:0;color:#5affa9}.overlay p{max-width:430px;color:#9db8aa;line-height:1.5}.overlay button{min-width:145px;min-height:50px;border:0;border-radius:999px;background:#55ffa8;padding:14px 24px;font-weight:900;cursor:pointer;touch-action:manipulation}@media(max-width:600px){.hud{inset:max(12px,env(safe-area-inset-top)) 12px auto}.hud b{font-size:28px}.overlay div{padding:22px 18px}.overlay h1{font-size:40px}.hint{min-height:54px}}
  </style>
</head>
<body>
  <canvas aria-label="Focus Stack play field"></canvas>
  <div class="hud"><div><span>SCORE</span><b data-score>0</b></div><div><span>HEIGHT</span><b data-height>0</b></div><div><span>FLOW</span><b data-flow>0</b></div><div><span>BEST</span><b data-best>0</b></div></div>
  <button class="hint" type="button">Tap / Space to drop</button>
  <div class="overlay start"><div><h1>Focus Stack</h1><p>Drop each moving layer on the tower. Clean overlaps build higher; misses end the run.</p><button type="button">Start stacking</button></div></div>
  <div class="overlay pause" hidden><div><h1>Paused</h1><p>Your tower is waiting.</p><button type="button">Resume</button></div></div>
  <div class="overlay result" hidden><div><h1>Run complete</h1><p data-result></p><button type="button">Play again</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*'),c=document.querySelector('canvas'),g=c.getContext('2d'),startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause'),resultEl=document.querySelector('.result');
    let W=0,H=0,blocks=[],moving=null,score=0,points=0,best=0,flow=0,speed=0,dir=1,running=false,paused=false,reduced=false,shake=0,audio=null,particles=[],shards=[],waves=[];

    function tone(freq,dur=.06,type='triangle',gain=.035){try{audio=audio||new (window.AudioContext||window.webkitAudioContext)();const o=audio.createOscillator(),a=audio.createGain();o.type=type;o.frequency.value=freq;a.gain.setValueAtTime(gain,audio.currentTime);a.gain.exponentialRampToValueAtTime(.0001,audio.currentTime+dur);o.connect(a).connect(audio.destination);o.start();o.stop(audio.currentTime+dur)}catch{}}
    function burst(x,y,color,n=18){if(reduced)return;for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()*2-1)*7*devicePixelRatio,vy:(Math.random()*-6-1)*devicePixelRatio,a:1,c:color,s:(2+Math.random()*3)*devicePixelRatio})}
    function wave(x,y,color='#55ffa8'){if(!reduced)waves.push({x,y,r:8*devicePixelRatio,a:1,c:color})}
    function shard(x,y,w,h,color,side){if(reduced||w<3*devicePixelRatio)return;shards.push({x,y,w,h,c:color,vx:(side==='left'?-1:1)*(1.8+Math.random()*2)*devicePixelRatio,vy:(-2-Math.random()*2)*devicePixelRatio,rot:0,vr:(Math.random()-.5)*.18,a:1})}
    function updateHud(){document.querySelector('[data-score]').textContent=points;document.querySelector('[data-height]').textContent=score;document.querySelector('[data-flow]').textContent=flow;document.querySelector('[data-best]').textContent=best}
    function makeBase(){const h=Math.max(22,H*.035);blocks=[{x:W*.22,y:H*.86,w:W*.56,h,color:'#2dff99'}];moving={x:W*.05,y:H*.82,w:blocks[0].w,h,color:'#60ffc0'};speed=2.35*devicePixelRatio;dir=1;score=0;points=0;flow=0;shake=0;particles=[];shards=[];waves=[];updateHud();draw()}
    function resize(){const oldW=W||1,oldH=H||1;W=c.width=Math.max(320,Math.round(innerWidth*devicePixelRatio));H=c.height=Math.max(480,Math.round(innerHeight*devicePixelRatio));if(!blocks.length){makeBase();return}const sx=W/oldW,sy=H/oldH;blocks=blocks.map(block=>({...block,x:block.x*sx,y:block.y*sy,w:block.w*sx,h:block.h*sy}));if(moving)moving={...moving,x:moving.x*sx,y:moving.y*sy,w:moving.w*sx,h:moving.h*sy};speed*=sx;draw()}
    function startRun(){makeBase();running=true;paused=false;startEl.hidden=true;pauseEl.hidden=true;resultEl.hidden=true;host('progress',{score:0,progress:0,state:{height:0}})}
    function setPaused(next){if(!running)return;paused=next;pauseEl.hidden=!paused;host('paused',{paused})}
    function drop(){if(!running||paused||!moving)return;const base=blocks[blocks.length-1],old={...moving},left=Math.max(moving.x,base.x),right=Math.min(moving.x+moving.w,base.x+base.w),overlap=right-left,drift=Math.abs((moving.x+moving.w/2)-(base.x+base.w/2)),perfect=drift<7*devicePixelRatio;if(overlap<8*devicePixelRatio){shake=12*devicePixelRatio;shard(old.x,old.y,old.w,old.h,old.color,old.x<base.x?'left':'right');tone(90,.2,'sawtooth',.05);finish(false);return}if(old.x<left)shard(old.x,old.y,left-old.x,old.h,old.color,'left');if(old.x+old.w>right)shard(right,old.y,old.x+old.w-right,old.h,old.color,'right');moving.x=left;if(perfect){flow++;points+=80+flow*25;burst(left+overlap/2,moving.y,'#facc15',30);wave(left+overlap/2,moving.y+moving.h/2,'#facc15');tone(720,.08);setTimeout(()=>tone(960,.08),55)}else{flow=0;points+=Math.round(35+overlap/W*120);burst(left+overlap/2,moving.y,moving.color,14);wave(left+overlap/2,moving.y+moving.h/2,moving.color);tone(360,.05)}moving.w=overlap;blocks.push({...moving});score++;best=Math.max(best,score);updateHud();host('score',{score:points,progress:Math.min(96,score*8),state:{height:score,flow}});if(score>=14){finish(true);return}const nextY=Math.max(H*.16,base.y-blocks[0].h);moving={x:dir>0?0:W-overlap,y:nextY-blocks[0].h,w:overlap,h:blocks[0].h,color:`hsl(${145+score*8} 100% 65%)`};speed+=.2*devicePixelRatio+flow*.035*devicePixelRatio}
    function finish(win){running=false;paused=false;resultEl.hidden=false;if(win){points+=500+flow*50;tone(880,.16);setTimeout(()=>tone(1180,.18),90);burst(W/2,H*.45,'#55ffa8',60)}resultEl.querySelector('h1').textContent=win?'Perfect tower':'Tower slipped';resultEl.querySelector('[data-result]').textContent=win?`Score ${points}. You stacked all ${score} layers with ${flow}x flow.`:`Score ${points}. You reached ${score} layer${score===1?'':'s'}. Try for perfect-drop flow.`;host('complete',{score:points,progress:100,state:{height:score,flow}})}
    function loop(){if(running&&!paused&&moving){moving.x+=speed*dir;if(moving.x<=0){moving.x=0;dir=1}else if(moving.x+moving.w>=W){moving.x=W-moving.w;dir=-1}}for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.22*devicePixelRatio;p.a-=.028}particles=particles.filter(p=>p.a>0);for(const s of shards){s.x+=s.vx;s.y+=s.vy;s.vy+=.28*devicePixelRatio;s.rot+=s.vr;s.a-=.012}shards=shards.filter(s=>s.a>0&&s.y<H+80*devicePixelRatio);for(const w of waves){w.r+=5.5*devicePixelRatio;w.a-=.035}waves=waves.filter(w=>w.a>0);draw();requestAnimationFrame(loop)}
    function draw(){g.clearRect(0,0,W,H);g.save();if(shake){g.translate((Math.random()*2-1)*shake,(Math.random()*2-1)*shake);shake*=.86}const bg=g.createRadialGradient(W*.5,H*.4,0,W*.5,H*.45,Math.max(W,H)*.75);bg.addColorStop(0,'#083424');bg.addColorStop(.7,'#020706');g.fillStyle=bg;g.fillRect(0,0,W,H);g.strokeStyle='#36ff941a';g.lineWidth=Math.max(1,devicePixelRatio);for(let y=H*.15;y<H;y+=H*.08){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke()}const base=blocks[blocks.length-1];if(running&&moving&&base){g.save();g.strokeStyle='rgba(250,204,21,.55)';g.setLineDash([8*devicePixelRatio,8*devicePixelRatio]);g.lineWidth=2*devicePixelRatio;g.beginPath();g.moveTo(base.x,moving.y-8*devicePixelRatio);g.lineTo(base.x,base.y+base.h);g.moveTo(base.x+base.w,moving.y-8*devicePixelRatio);g.lineTo(base.x+base.w,base.y+base.h);g.stroke();g.restore()}[...blocks,moving].forEach(block=>{if(!block)return;g.fillStyle=block.color;g.shadowColor=block.color;g.shadowBlur=reduced?0:18*devicePixelRatio;g.fillRect(block.x,block.y,block.w,block.h);g.fillStyle='rgba(255,255,255,.22)';g.fillRect(block.x,block.y,block.w,Math.max(2,block.h*.18))});for(const s of shards){g.save();g.globalAlpha=Math.max(0,s.a);g.translate(s.x+s.w/2,s.y+s.h/2);g.rotate(s.rot);g.fillStyle=s.c;g.shadowColor=s.c;g.shadowBlur=reduced?0:12*devicePixelRatio;g.fillRect(-s.w/2,-s.h/2,s.w,s.h);g.restore()}for(const w of waves){g.globalAlpha=Math.max(0,w.a);g.strokeStyle=w.c;g.lineWidth=3*devicePixelRatio;g.shadowColor=w.c;g.shadowBlur=reduced?0:18*devicePixelRatio;g.beginPath();g.arc(w.x,w.y,w.r,0,Math.PI*2);g.stroke()}for(const p of particles){g.globalAlpha=Math.max(0,p.a);g.fillStyle=p.c;g.shadowColor=p.c;g.shadowBlur=reduced?0:10*devicePixelRatio;g.fillRect(p.x,p.y,p.s,p.s)}g.globalAlpha=1;g.restore();g.shadowBlur=0}

    document.querySelector('.hint').onclick=drop;startEl.querySelector('button').onclick=startRun;pauseEl.querySelector('button').onclick=()=>setPaused(false);resultEl.querySelector('button').onclick=startRun;
    document.addEventListener('pointerdown',event=>{if(event.target.closest('button')||event.target.closest('.overlay'))return;event.preventDefault();drop()},{passive:false});
    addEventListener('resize',resize);addEventListener('keydown',event=>{if(event.code==='Space'||event.code==='Enter'){event.preventDefault();drop()}if(event.key==='Escape'){event.preventDefault();setPaused(!paused)}});
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&running&&!paused)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='settings')reduced=!!event.data.reducedMotion;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')startRun()});
    resize();loop();host('ready');
  </script>
</body>
</html>
