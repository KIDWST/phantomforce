<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:">
  <title>Circuit Serpent</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020806;color:#effff6;font-family:system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
    body{display:grid;place-items:center;padding:max(10px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 0,#0e3323,#020806 60%)}
    main{width:min(560px,100%);height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:8px}
    header{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
    h1{margin:0;font-size:28px;color:#58ffa8}
    .stats{display:flex;gap:14px;font:800 12px ui-monospace,monospace;color:#8fb3a1;white-space:nowrap}
    .stats b{color:#41ffa1;font-size:16px}
    .board{align-self:center;justify-self:center;width:min(100%,calc(100dvh - 138px));max-width:520px;aspect-ratio:1;border:1px solid #41ffa144;border-radius:12px;overflow:hidden;background:#03130c;touch-action:none}
    canvas{width:100%;height:100%;display:block}
    .hint{text-align:center;color:#7ea391;font-size:12px;margin:0}
    .overlay{position:fixed;inset:0;z-index:6;display:grid;place-items:center;background:#010504dc;backdrop-filter:blur(4px)}
    .overlay.pause{z-index:7}
    .overlay[hidden]{display:none}
    .overlay>div{text-align:center;padding:24px;max-width:430px}
    .overlay h2{margin:0 0 8px;font-size:42px;line-height:1.05;color:#5affa9}
    .overlay p{margin:0 0 18px;color:#9db8aa;line-height:1.5}
    .overlay button{min-width:150px;min-height:48px;border:0;border-radius:999px;background:#55ffa8;color:#03130c;padding:12px 26px;font-weight:900;font-size:15px;cursor:pointer}
    .reduced *{transition:none!important;animation:none!important}
    @media(max-width:420px){h1{font-size:20px}.stats b{font-size:14px}.overlay h2{font-size:32px}.hint{font-size:10px}}
  </style>
</head>
<body>
  <main>
    <header><h1>Circuit Serpent</h1><div class="stats"><span>SCORE <b data-score>0</b></span><span>PACKETS <b data-packets>0</b></span><span>LEVEL <b data-level>1</b></span></div></header>
    <div class="board"><canvas aria-label="Circuit Serpent play grid"></canvas></div>
    <p class="hint">Arrows / WASD steer &middot; P pauses</p>
  </main>
  <div class="overlay start"><div><h2>Circuit Serpent</h2><p>Eat data-packets to grow. Hit a wall or your own tail and the run ends.</p><button type="button">Start</button></div></div>
  <div class="overlay pause" hidden><div><h2>Paused</h2><p>The grid is holding your place.</p><button type="button">Resume</button></div></div>
  <div class="overlay result" hidden><div><h2>Signal lost</h2><p data-final></p><button type="button">Play again</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const N=17,canvas=document.querySelector('canvas'),g=canvas.getContext('2d');
    const startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause'),resultEl=document.querySelector('.result');
    const scoreEl=document.querySelector('[data-score]'),packetsEl=document.querySelector('[data-packets]'),levelEl=document.querySelector('[data-level]');
    let snake=[],dir={x:1,y:0},queue=[],food=null,bursts=[],score=0,packets=0,level=1,stepMs=160,acc=0,lastT=null,phase='idle',paused=false,soundOn=true,reduced=false,ac=null,gpEnabled=false,gpIdx=null;

    function tone(f,d=.08,type='square',vol=.05){
      if(!soundOn)return;
      try{
        ac=ac||new (window.AudioContext||window.webkitAudioContext)();
        if(ac.state==='suspended')ac.resume();
        const o=ac.createOscillator(),v=ac.createGain(),t=ac.currentTime;
        o.type=type;o.frequency.value=f;
        v.gain.setValueAtTime(vol,t);v.gain.exponentialRampToValueAtTime(.0001,t+d);
        o.connect(v);v.connect(ac.destination);o.start(t);o.stop(t+d);
      }catch(err){}
    }
    function resize(){const s=Math.max(180,Math.round(canvas.clientWidth*devicePixelRatio));canvas.width=s;canvas.height=s;draw()}
    function freeCells(){
      const used=new Set(snake.map(p=>p.x+','+p.y)),out=[];
      for(let y=0;y<N;y++)for(let x=0;x<N;x++)if(!used.has(x+','+y))out.push({x,y});
      return out;
    }
    function placeFood(){const free=freeCells();if(!free.length){food=null;gameOver(true);return}food=free[Math.floor(Math.random()*free.length)]}
    function updateHud(){scoreEl.textContent=score;packetsEl.textContent=packets;levelEl.textContent=level}
    function burst(x,y,color='#8affc9'){if(reduced)return;for(let i=0;i<18;i++)bursts.push({x,y,color,a:Math.random()*Math.PI*2,v:1.5+Math.random()*3,life:18+Math.random()*18})}
    function start(){
      snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}];dir={x:1,y:0};queue=[];bursts=[];
      score=0;packets=0;level=1;stepMs=160;acc=0;lastT=null;phase='play';paused=false;
      startEl.hidden=true;pauseEl.hidden=true;resultEl.hidden=true;
      placeFood();updateHud();draw();
      host('progress',{score:0,progress:0,state:{packets:0}});
    }
    function pushDir(x,y){
      if(phase!=='play')return;
      const base=queue.length?queue[queue.length-1]:dir;
      if((x===base.x&&y===base.y)||(x===-base.x&&y===-base.y)||queue.length>=2)return;
      queue.push({x,y});
    }
    function step(){
      if(queue.length)dir=queue.shift();
      const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
      if(head.x<0||head.y<0||head.x>=N||head.y>=N)return gameOver(false);
      const eat=!!food&&head.x===food.x&&head.y===food.y;
      const body=eat?snake:snake.slice(0,-1);
      if(body.some(p=>p.x===head.x&&p.y===head.y))return gameOver(false);
      snake.unshift(head);
      if(eat){
        level=1+Math.floor(packets/5);
        score+=10+Math.max(0,level-1)*2;packets++;
        if(packets%5===0){stepMs=Math.max(70,stepMs-9);level=1+Math.floor(packets/5);tone(880,.12,'triangle',.05)}
        burst(food.x,food.y);
        updateHud();tone(620+packets*7,.07,'square',.045);
        host('score',{score,progress:Math.min(99,packets*4),state:{packets,length:snake.length,level}});
        placeFood();
      }else snake.pop();
    }
    function gameOver(filled){
      if(phase!=='play')return;
      phase='over';paused=false;pauseEl.hidden=true;
      tone(110,.32,'sawtooth',.06);
      resultEl.querySelector('h2').textContent=filled?'Grid conquered':'Signal lost';
      resultEl.querySelector('[data-final]').textContent=`Final score ${score} — ${packets} data-packet${packets===1?'':'s'} consumed · level ${level}.`;
      resultEl.hidden=false;
      host('complete',{score,progress:100,state:{packets,level,result:filled?'filled':'crash'}});
    }
    function setPaused(next){if(phase!=='play'||paused===next)return;paused=next;pauseEl.hidden=!paused;host('paused',{paused})}
    function draw(){
      const s=canvas.width;if(!s)return;
      const cell=s/N;
      g.clearRect(0,0,s,s);
      g.strokeStyle='#41ffa112';g.lineWidth=1;
      for(let i=1;i<N;i++){g.beginPath();g.moveTo(i*cell,0);g.lineTo(i*cell,s);g.stroke();g.beginPath();g.moveTo(0,i*cell);g.lineTo(s,i*cell);g.stroke()}
      if(food){
        g.save();g.fillStyle='#8affc9';
        if(!reduced){g.shadowColor='#41ffa1';g.shadowBlur=cell*.6}
        const fx=(food.x+.5)*cell,fy=(food.y+.5)*cell,r=cell*.32;
        g.beginPath();g.moveTo(fx,fy-r);g.lineTo(fx+r,fy);g.lineTo(fx,fy+r);g.lineTo(fx-r,fy);g.closePath();g.fill();g.restore();
      }
      snake.forEach((p,i)=>{
        g.fillStyle=i===0?'#8dffc4':'#41ffa1';
        if(!reduced&&i===0){g.shadowColor='#41ffa1';g.shadowBlur=cell*.5}else g.shadowBlur=0;
        const pad=cell*.09;
        g.fillRect(p.x*cell+pad,p.y*cell+pad,cell-pad*2,cell-pad*2);
      });
      for(const b of bursts){
        const px=(b.x+.5)*cell+Math.cos(b.a)*b.v*(36-b.life),py=(b.y+.5)*cell+Math.sin(b.a)*b.v*(36-b.life);
        g.globalAlpha=Math.max(0,b.life/36);g.fillStyle=b.color;g.beginPath();g.arc(px,py,Math.max(1,cell*.08),0,Math.PI*2);g.fill();b.life-=1;
      }
      g.globalAlpha=1;bursts=bursts.filter(b=>b.life>0);
      g.shadowBlur=0;
    }
    function loop(t){
      if(lastT==null)lastT=t;
      if(phase==='play'&&!paused){
        acc+=t-lastT;
        let guard=0;
        while(acc>=stepMs&&phase==='play'&&guard++<8){acc-=stepMs;step()}
      }else acc=0;
      lastT=t;
      draw();
      requestAnimationFrame(loop);
    }

    const KEYS={ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],W:[0,-1],S:[0,1],A:[-1,0],D:[1,0]};
    addEventListener('keydown',e=>{
      if(e.key==='Escape'){e.preventDefault();setPaused(!paused);return}
      const k=KEYS[e.key];
      if(k){e.preventDefault();pushDir(k[0],k[1])}
    });
    let touch=null;
    document.addEventListener('pointerdown',e=>{if(phase!=='play'||paused)return;e.preventDefault();touch={x:e.clientX,y:e.clientY}});
    document.addEventListener('pointerup',e=>{
      const t0=touch;touch=null;
      if(phase!=='play'||paused||!t0)return;
      const dx=e.clientX-t0.x,dy=e.clientY-t0.y;
      if(Math.max(Math.abs(dx),Math.abs(dy))>=24){
        if(Math.abs(dx)>Math.abs(dy))pushDir(Math.sign(dx),0);else pushDir(0,Math.sign(dy));
      }else{
        const nx=(e.clientX-innerWidth/2)/(innerWidth/2),ny=(e.clientY-innerHeight/2)/(innerHeight/2);
        if(Math.max(Math.abs(nx),Math.abs(ny))<.4)return;
        if(Math.abs(nx)>Math.abs(ny))pushDir(Math.sign(nx),0);else pushDir(0,Math.sign(ny));
      }
    });
    document.addEventListener('pointercancel',()=>{touch=null});

    startEl.querySelector('button').onclick=start;
    pauseEl.querySelector('button').onclick=()=>setPaused(false);
    resultEl.querySelector('button').onclick=start;
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&phase==='play'&&!paused)setPaused(true)});
    addEventListener('message',e=>{
      if(e.data?.source!=='phantomplay-host')return;
      if(e.data.type==='settings'){
        soundOn=e.data.sound!==false;
        reduced=!!e.data.reducedMotion;
        gpEnabled=!!e.data.gamepad;
        document.body.classList.toggle('reduced',reduced);
        draw();
      }
      if(e.data.type==='pause')setPaused(true);
      if(e.data.type==='resume')setPaused(false);
      if(e.data.type==='restart')start();
    });
    addEventListener('resize',resize);

    // --- Gamepad (PhantomPlay standard mapping): d-pad/stick steers, Start pauses ---
    function gpPad(){const p=navigator.getGamepads?navigator.getGamepads():[];if(gpIdx===null)for(let i=0;i<p.length;i++)if(p[i]){gpIdx=i;break}return gpIdx===null?null:p[gpIdx]}
    let gpPrevUp=false,gpPrevDown=false,gpPrevLeft=false,gpPrevRight=false,gpPrevStart=false;
    function gpPoll(){
      if(gpEnabled){
        const pad=gpPad();
        if(pad){
          const b=pad.buttons,ax=pad.axes[0]||0,ay=pad.axes[1]||0;
          const up=!!(b[12]&&b[12].pressed)||ay<-.5,down=!!(b[13]&&b[13].pressed)||ay>.5,left=!!(b[14]&&b[14].pressed)||ax<-.5,right=!!(b[15]&&b[15].pressed)||ax>.5,start=!!(b[9]&&b[9].pressed);
          if(up&&!gpPrevUp)pushDir(0,-1);
          else if(down&&!gpPrevDown)pushDir(0,1);
          else if(left&&!gpPrevLeft)pushDir(-1,0);
          else if(right&&!gpPrevRight)pushDir(1,0);
          if(start&&!gpPrevStart)setPaused(!paused);
          gpPrevUp=up;gpPrevDown=down;gpPrevLeft=left;gpPrevRight=right;gpPrevStart=start;
        }
      }
      requestAnimationFrame(gpPoll);
    }
    requestAnimationFrame(gpPoll);

    resize();requestAnimationFrame(loop);host('ready');
  </script>
</body>
</html>
