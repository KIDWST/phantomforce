<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>Tile Flow</title><style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020806;color:#effff6;font-family:system-ui,sans-serif}body{display:grid;place-items:start center;padding:18px;background:radial-gradient(circle at 50% 0,#123a2d,#020806 60%)}main{width:min(520px,100%)}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:14px;gap:12px}h1{margin:0;color:#58ffa8;font-size:40px}p{color:#94ad9f;margin:4px 0 0}.meta{text-align:right;font:800 12px ui-monospace;color:#77ffb8;white-space:nowrap}.meta b{font-size:22px;display:block;color:#effff6}.board{position:relative;display:grid;gap:4px;width:100%;aspect-ratio:1;margin-bottom:12px;touch-action:manipulation;filter:drop-shadow(0 0 24px #41ffa10f)}.board::before{content:"";position:absolute;inset:-6%;border-radius:24px;background:radial-gradient(circle,#41ffa112,transparent 62%);opacity:.45;pointer-events:none;animation:gridBreath 3.4s ease-in-out infinite}.board.solved::before{animation:surgeBoard .7s ease-out}.cell{position:relative;border-radius:10px;background:#08160f;border:1px solid #133a29;cursor:pointer;overflow:hidden;transition:transform .12s,box-shadow .18s,background .18s}.cell:active{transform:scale(.97)}.cell.sel{outline:2px solid #effff6;outline-offset:-2px}.cell.twist{animation:twist .22s ease-out}.cell.lit{background:#0b3424;border-color:#41ffa1;box-shadow:0 0 18px #41ffa144,inset 0 0 16px #41ffa11e}.cell.lit::after{content:"";position:absolute;inset:10%;border-radius:999px;background:radial-gradient(circle,#aaffd655,transparent 62%);animation:cellPulse 1.1s ease-in-out infinite;pointer-events:none}.cell svg{position:absolute;inset:0;width:100%;height:100%;transition:transform .16s}.cell.node .dot{fill:#effff6}.cell.node{animation:nodePulse 1.9s ease-in-out infinite}.cell.lit .pipe{stroke:#76ffba;filter:drop-shadow(0 0 4px #41ffa1);stroke-dasharray:22 12;animation:flowDash .62s linear infinite}.pipe{stroke:#5a7a6c;stroke-width:14;fill:none;stroke-linecap:round}.node .ring{fill:none;stroke:#41ffa1;stroke-width:8}.spark{position:absolute;z-index:3;width:7px;height:7px;border-radius:50%;background:#7dffc0;box-shadow:0 0 16px #7dffc0;pointer-events:none}.status{text-align:center;min-height:24px;color:#a9c5b7;margin-bottom:10px}.controls{display:flex;gap:8px}.controls button{flex:1;border:1px solid #42ff9a55;border-radius:12px;background:#03110c;color:#caffdf;font-weight:800;padding:12px;cursor:pointer}.controls button.primary{background:#41ffa1;color:#012}.over{position:fixed;inset:0;display:grid;place-items:center;background:#010504e6;padding:20px}.over[hidden]{display:none}.over div{text-align:center;max-width:400px}.over h1{font-size:48px;margin:0}.over button{border:0;border-radius:999px;background:#55ffa8;padding:14px 26px;font-weight:900;cursor:pointer;margin-top:12px}@keyframes flowDash{to{stroke-dashoffset:-34}}@keyframes cellPulse{0%,100%{opacity:.2;transform:scale(.65)}50%{opacity:.8;transform:scale(1.08)}}@keyframes nodePulse{0%,100%{box-shadow:0 0 14px #41ffa125}50%{box-shadow:0 0 24px #41ffa188}}@keyframes twist{45%{transform:scale(1.08) rotate(4deg)}}@keyframes gridBreath{0%,100%{opacity:.28;transform:scale(.98)}50%{opacity:.62;transform:scale(1.02)}}@keyframes surgeBoard{0%{opacity:.2;transform:scale(.92)}45%{opacity:1;transform:scale(1.08)}100%{opacity:.45;transform:scale(1)}}@media(max-width:460px){h1{font-size:32px}}</style></head><body><main><header><div><h1>Tile Flow</h1><p>Rotate pipes to link start to end. Click / tap or arrows + Enter.</p></div><div class="meta"><b data-score>0</b>SCORE<br><b data-level>1</b>/ <span data-total>8</span></div></header><div class="board"></div><div class="status" data-status>Connect the two nodes.</div><div class="controls"><button data-quit>End session</button><button class="primary" data-rotate>Rotate</button></div></main><div class="over" hidden><div><h1 data-title>Flow complete</h1><p data-result></p><button data-again>Play again</button></div></div><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
const N=5,TOTAL=8;
// direction bits: 1=up 2=right 4=down 8=left
const DIRS=[{b:1,dx:0,dy:-1,op:4},{b:2,dx:1,dy:0,op:8},{b:4,dx:0,dy:1,op:1},{b:8,dx:-1,dy:0,op:2}];
let grid=[],start=null,end=null,level=1,score=0,sel=0,reduced=false,actx=null,lastTwist=-1;
const boardEl=document.querySelector('.board'),statusEl=document.querySelector('[data-status]');
boardEl.style.gridTemplateColumns=`repeat(${N},1fr)`;
function ensureAudio(){if(actx||reduced)return;try{actx=new (AudioContext||webkitAudioContext)()}catch{}}
function tone(freq=330,dur=.07,gain=.022,type='sine'){if(!actx)return;const o=actx.createOscillator(),v=actx.createGain();o.type=type;o.frequency.value=freq;v.gain.setValueAtTime(.0001,actx.currentTime);v.gain.exponentialRampToValueAtTime(gain,actx.currentTime+.012);v.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);o.connect(v);v.connect(actx.destination);o.start();o.stop(actx.currentTime+dur)}
function boardSpark(n=18){if(reduced)return;for(let i=0;i<n;i++){const s=document.createElement('i');s.className='spark';boardEl.appendChild(s);const x=10+Math.random()*80,y=10+Math.random()*80,a=Math.random()*Math.PI*2;s.style.left=x+'%';s.style.top=y+'%';s.animate([{opacity:0,transform:'translate(-50%,-50%) scale(.4)'},{opacity:1,offset:.2},{opacity:0,transform:`translate(${Math.cos(a)*60-50}%,${Math.sin(a)*60-50}%) scale(1.6)`}],{duration:650+Math.random()*500,easing:'ease-out'}).onfinish=()=>s.remove()}}
function idx(x,y){return y*N+x}
function inb(x,y){return x>=0&&x<N&&y>=0&&y<N}
function rot(mask,times){for(let t=0;t<times;t++){let m=0;if(mask&1)m|=2;if(mask&2)m|=4;if(mask&4)m|=8;if(mask&8)m|=1;mask=m}return mask}
function genLevel(){
 // random walk path from start to end
 for(let attempt=0;attempt<400;attempt++){
  const conn=new Array(N*N).fill(0);
  let sx=Math.floor(Math.random()*N),sy=0;
  const sxEnd=Math.floor(Math.random()*N),syEnd=N-1;
  let x=sx,y=sy;const path=[[x,y]];const seen=new Set([idx(x,y)]);let ok=false;
  for(let step=0;step<80;step++){
   if(x===sxEnd&&y===syEnd){ok=true;break}
   const opts=DIRS.filter(d=>{const nx=x+d.dx,ny=y+d.dy;return inb(nx,ny)&&!seen.has(idx(nx,ny))});
   if(!opts.length)break;
   // bias toward end
   opts.sort((a,b)=>{const da=Math.abs(x+a.dx-sxEnd)+Math.abs(y+a.dy-syEnd),db=Math.abs(x+b.dx-sxEnd)+Math.abs(y+b.dy-syEnd);return da-db});
   const d=Math.random()<0.6?opts[0]:opts[Math.floor(Math.random()*opts.length)];
   conn[idx(x,y)]|=d.b;const nx=x+d.dx,ny=y+d.dy;conn[idx(nx,ny)]|=d.op;seen.add(idx(nx,ny));path.push([nx,ny]);x=nx;y=ny;
  }
  if(!ok)continue;
  // add a few random branch pipes for difficulty (optional, keep solvable: they don't affect required path)
  start=idx(sx,sy);end=idx(sxEnd,syEnd);
  grid=conn.map((sol,i)=>({sol,mask:sol,rot:0,node:i===start||i===end}));
  // scatter rotations
  let scrambled=false;
  grid.forEach(t=>{if(t.sol){const r=Math.floor(Math.random()*4);t.rot=r;t.mask=rot(t.sol,r);if(r)scrambled=true}});
  if(!scrambled&&grid.some(t=>t.sol)){const t=grid.find(x=>x.sol);t.rot=1;t.mask=rot(t.sol,1)}
  return;
 }
 // fallback trivial
 grid=new Array(N*N).fill(0).map(()=>({sol:0,mask:0,rot:0,node:false}));
 start=idx(0,0);end=idx(0,1);grid[start]={sol:4,mask:4,rot:0,node:true};grid[end]={sol:1,mask:1,rot:0,node:true};
}
function pipeSVG(mask,node){
 const c=50,paths=[];
 if(mask&1)paths.push(`M${c} ${c} L${c} 0`);
 if(mask&2)paths.push(`M${c} ${c} L100 ${c}`);
 if(mask&4)paths.push(`M${c} ${c} L${c} 100`);
 if(mask&8)paths.push(`M${c} ${c} L0 ${c}`);
 let inner=paths.map(d=>`<path class="pipe" d="${d}"/>`).join('');
 if(node)inner+=`<circle class="ring" cx="50" cy="50" r="20"/><circle class="dot" cx="50" cy="50" r="9"/>`;
 return `<svg viewBox="0 0 100 100">${inner}</svg>`;
}
function connected(){
 // BFS from start following matched openings
 const lit=new Set();const q=[start];lit.add(start);
 while(q.length){const cur=q.shift();const cx=cur%N,cy=Math.floor(cur/N);for(const d of DIRS){if(!(grid[cur].mask&d.b))continue;const nx=cx+d.dx,ny=cy+d.dy;if(!inb(nx,ny))continue;const ni=idx(nx,ny);if(!(grid[ni].mask&d.op))continue;if(lit.has(ni))continue;lit.add(ni);q.push(ni)}}
 return {ok:lit.has(end),lit};
}
function render(){
 const {ok,lit}=connected();
 boardEl.innerHTML=grid.map((t,i)=>`<button class="cell ${t.node?'node':''} ${lit.has(i)?'lit':''} ${i===sel?'sel':''} ${i===lastTwist?'twist':''}" data-i="${i}" style="transform:none">${pipeSVG(t.mask,t.node)}</button>`).join('');
 if(lastTwist>=0)setTimeout(()=>{const el=boardEl.querySelector(`[data-i="${lastTwist}"]`);if(el)el.classList.remove('twist');lastTwist=-1},240);
 boardEl.querySelectorAll('button').forEach(b=>{b.onclick=()=>{sel=+b.dataset.i;rotate(+b.dataset.i)}});
 return ok;
}
function rotate(i){ensureAudio();const t=grid[i];if(!t.sol&&!t.node){tone(120,.05,.012,'sawtooth')}t.rot=(t.rot+1)%4;t.mask=rot(t.sol,t.rot);lastTwist=i;tone(260+(t.mask||1)*18,.045,.018,'triangle');const ok=render();if(ok)solved()}
let solving=false;
function solved(){if(solving)return;solving=true;boardEl.classList.remove('solved');void boardEl.offsetWidth;boardEl.classList.add('solved');score+=100+level*25;document.querySelector('[data-score]').textContent=score;statusEl.textContent='Flow linked! Current surged through the grid.';boardSpark(22+level*2);tone(520,.12,.034);setTimeout(()=>tone(760,.12,.026),90);host('score',{score,progress:Math.min(100,Math.round(level/TOTAL*100)),state:{level}});if(level>=TOTAL){setTimeout(finish,850);return}setTimeout(()=>{level++;document.querySelector('[data-level]').textContent=level;newLevel();solving=false},950)}
function newLevel(){boardEl.classList.remove('solved');genLevel();sel=start;render();statusEl.textContent='Connect the two nodes.';host('progress',{score,progress:Math.round((level-1)/TOTAL*100)})}
function finish(){document.querySelector('[data-title]').textContent='Flow complete';document.querySelector('[data-result]').textContent=`You cleared ${level} grids for ${score} points.`;document.querySelector('.over').hidden=false;host('complete',{score,progress:100,state:{level}})}
function quit(){document.querySelector('[data-title]').textContent='Session ended';document.querySelector('[data-result]').textContent=`Reached grid ${level} with ${score} points.`;document.querySelector('.over').hidden=false;host('complete',{score,progress:Math.min(100,Math.round(level/TOTAL*100)),state:{level}})}
function start_game(){level=1;score=0;solving=false;document.querySelector('[data-score]').textContent=0;document.querySelector('[data-level]').textContent=1;document.querySelector('[data-total]').textContent=TOTAL;document.querySelector('.over').hidden=true;newLevel();host('progress',{score:0,progress:0})}
document.querySelector('[data-rotate]').onclick=()=>rotate(sel);
document.querySelector('[data-quit]').onclick=quit;
document.querySelector('[data-again]').onclick=start_game;
addEventListener('keydown',e=>{const sx=sel%N,sy=Math.floor(sel/N);if(e.key==='ArrowUp'){e.preventDefault();if(sy>0)sel=idx(sx,sy-1)}else if(e.key==='ArrowDown'){e.preventDefault();if(sy<N-1)sel=idx(sx,sy+1)}else if(e.key==='ArrowLeft'){e.preventDefault();if(sx>0)sel=idx(sx-1,sy)}else if(e.key==='ArrowRight'){e.preventDefault();if(sx<N-1)sel=idx(sx+1,sy)}else if(e.key==='Enter'||e.key===' '){e.preventDefault();rotate(sel);return}else return;render()});
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion}});
start_game();host('ready');
</script></body></html>
