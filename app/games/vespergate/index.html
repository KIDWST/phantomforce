<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src data:; connect-src 'none'; media-src 'none'; font-src 'none'; base-uri 'none'; form-action 'none'" />
<title>Vespergate: The Hollow Geometry</title>
<style>
  :root { color-scheme: dark; --ink:#eaf2ff; --dim:#8a9ac0; --dawn:#8fe9ff; --dusk:#ff9ad0; --gold:#ffcf6b; }
  * { box-sizing: border-box; }
  html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#05040c; color:var(--ink);
    font-family:"Georgia", "Times New Roman", serif; -webkit-tap-highlight-color:transparent; user-select:none; }
  .vg-app { position:fixed; inset:0; display:grid; place-items:center; background:
    radial-gradient(120% 90% at 50% 0%, #0c0a1a, #05040c 70%); }
  canvas#vg { display:block; image-rendering:pixelated; box-shadow:0 0 80px rgba(80,60,160,0.2); }
  [data-vg-hint] { position:fixed; left:50%; bottom:14px; transform:translateX(-50%); z-index:4;
    font:500 12px/1.4 "Georgia", serif; color:var(--dim); background:rgba(6,5,16,0.7);
    padding:6px 14px; border:1px solid rgba(120,140,220,0.2); border-radius:10px; max-width:80vw; text-align:center; }
  [data-vg-overlay] { position:fixed; inset:0; z-index:6; display:grid; place-items:center; padding:20px;
    background:radial-gradient(90% 80% at 50% 40%, rgba(10,8,24,0.82), rgba(3,2,9,0.96)); }
  [data-vg-overlay][hidden] { display:none; }
  .vg-panel { max-width:560px; text-align:center; }
  .vg-kick { margin:0 0 6px; letter-spacing:0.4em; font:600 11px monospace; color:var(--dawn); }
  .vg-panel h1 { margin:0 0 12px; font-size:clamp(38px,8vw,64px); letter-spacing:0.04em;
    background:linear-gradient(180deg,#eaf2ff,#9fb4e8); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(143,233,255,0.2); }
  .vg-sub { margin:0 auto 22px; max-width:44ch; color:var(--dim); font-size:15px; line-height:1.6; }
  .vg-btns { display:flex; flex-direction:column; gap:10px; max-width:280px; margin:0 auto; }
  .vg-btn { padding:12px 22px; border:1px solid rgba(143,233,255,0.25); border-radius:12px; cursor:pointer;
    background:rgba(20,18,40,0.6); color:var(--ink); font:600 15px "Georgia", serif; transition:.15s; }
  .vg-btn:hover { border-color:var(--dawn); background:rgba(40,50,90,0.5); transform:translateY(-1px); }
  .vg-primary { background:linear-gradient(180deg,#3a5a9a,#243a6a); border:0; box-shadow:0 6px 24px rgba(60,90,160,0.3); }
  .vg-controls { margin:22px auto 0; max-width:52ch; font-size:11px; color:var(--dim); line-height:1.7; }
  .vg-settings { max-width:420px; }
  .vg-set { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:8px 0; font-size:13px; color:var(--dim); }
  .vg-set input[type=range] { flex:0 0 160px; accent-color:var(--dawn); }
  .vg-set input[type=checkbox] { accent-color:var(--dawn); width:18px; height:18px; }
</style>
</head>
<body>
<div class="vg-app">
  <canvas id="vg" width="640" height="360" aria-label="Vespergate game"></canvas>
</div>
<div data-vg-hint hidden></div>
<div data-vg-overlay data-kind="title"></div>
<script src="./engine.js"></script>
<script src="./portal.js"></script>
<script src="./world.js"></script>
<script src="./rooms.js"></script>
<script src="./game.js"></script>
</body>
</html>
