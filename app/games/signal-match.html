<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>Signal Match</title><style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020807;color:#effff6;font-family:system-ui,sans-serif}body{display:grid;place-items:center;padding:20px;background:radial-gradient(circle at 50% 0,#123a2d,#020807 58%)}main{width:min(720px,100%)}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:18px}h1{margin:0;color:#58ffa8;font-size:48px}p{color:#94ad9f}.score{font:800 13px ui-monospace;color:#77ffb8}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.card{aspect-ratio:1;border:1px solid #42ff9a44;border-radius:16px;background:linear-gradient(145deg,#0a2118,#020806);color:transparent;font-size:44px;cursor:pointer;transition:transform .2s,background .2s}.card:hover{transform:translateY(-2px)}.card.open,.card.done{color:#76ffba;background:#0b3424;border-color:#51ffab}.card.done{opacity:.6}.status{text-align:center;min-height:28px;margin-top:16px;color:#a9c5b7}@media(max-width:460px){.grid{gap:7px}.card{border-radius:12px;font-size:30px}h1{font-size:34px}}</style></head><body><main><header><div><h1>Signal Match</h1><p>Match every pair with the fewest turns.</p></div><span class="score">MOVES <b>0</b></span></header><div class="grid"></div><div class="status">Choose a signal.</div></main><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*'),icons=['◆','●','▲','✦','⬡','▣','⌁','◎'];let deck=[],open=[],done=new Set,moves=0,locked=false;const grid=document.querySelector('.grid'),status=document.querySelector('.status');function shuffle(a){for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}function start(){deck=shuffle([...icons,...icons].map((v,i)=>({v,id:i})));open=[];done=new Set;moves=0;render();host('progress',{score:0,progress:0})}function render(){grid.innerHTML=deck.map((c,i)=>`<button class="card ${open.includes(i)?'open':''} ${done.has(i)?'done':''}" data-i="${i}" aria-label="${done.has(i)?'Matched signal':open.includes(i)?c.v:'Hidden signal'}">${c.v}</button>`).join('');document.querySelector('.score b').textContent=moves;grid.querySelectorAll('button').forEach(b=>b.onclick=()=>pick(+b.dataset.i))}function pick(i){if(locked||open.includes(i)||done.has(i))return;open.push(i);render();if(open.length<2)return;moves++;const [a,b]=open;if(deck[a].v===deck[b].v){done.add(a);done.add(b);open=[];status.textContent='Signal matched.';const progress=Math.round(done.size/deck.length*100),score=Math.max(0,200-moves*5);host(progress===100?'complete':'score',{score,progress,state:{matched:done.size,moves}});if(progress===100)status.textContent=`Grid clear in ${moves} moves.`;render()}else{locked=true;status.textContent='Signals differ.';setTimeout(()=>{open=[];locked=false;render()},650)}}start();host('ready');
</script></body></html>
