<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:">
  <title>Signal Match</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#effff6;font-family:system-ui,sans-serif;touch-action:manipulation;user-select:none}body{display:grid;place-items:center;padding:max(12px,env(safe-area-inset-top)) 14px max(12px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 0,#123a2d,#020807 58%)}main{width:min(660px,100%);height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;align-items:center}header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:4px 0 10px}h1{margin:0;color:#58ffa8;font-size:40px;line-height:1}.sub{margin:5px 0 0;color:#94ad9f;font-size:13px}.score{display:flex;align-items:center;gap:10px;font:800 12px ui-monospace;color:#77ffb8}.score button{min-height:38px;padding:8px 12px;border:1px solid #42ff9a44;border-radius:999px;background:#07150f;color:#caffdf;font-weight:800}.grid{align-self:center;justify-self:center;width:min(100%,calc(100dvh - 145px));max-width:590px;aspect-ratio:1;display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.card{min-width:0;aspect-ratio:1;border:1px solid #42ff9a44;border-radius:15px;background:linear-gradient(145deg,#0a2118,#020806);color:transparent;font-size:40px;cursor:pointer;transition:transform .14s,background .18s,color .18s,box-shadow .18s}.card:hover,.card:focus-visible{transform:translateY(-2px);outline:2px solid #65ffb1;outline-offset:1px}.card.open,.card.done,.card.preview{color:#76ffba;background:#0b3424;border-color:#51ffab}.card.preview{animation:flashSignal .7s ease both;box-shadow:0 0 26px #41ffa13b}.card.done{opacity:.5}.card:disabled{cursor:not-allowed}.status{text-align:center;min-height:28px;margin:9px 0 0;color:#a9c5b7}.pause{position:fixed;z-index:5;inset:0;display:grid;place-items:center;background:#010504dc;backdrop-filter:blur(4px)}.pause[hidden]{display:none}.pause div{text-align:center}.pause h2{margin:0;color:#5affa9;font-size:46px}.pause button{margin-top:10px;min-width:130px;min-height:46px;border:0;border-radius:999px;background:#55ffa8;font-weight:900}@keyframes flashSignal{0%,100%{transform:scale(1);filter:brightness(1)}45%{transform:scale(1.05);filter:brightness(1.55)}}@media(max-width:520px){header{align-items:flex-start}.sub{display:none}h1{font-size:30px}.score{font-size:10px}.score button{min-height:34px;padding:6px 9px}.grid{gap:6px;width:min(100%,calc(100dvh - 115px))}.card{border-radius:10px;font-size:28px}.status{font-size:12px}}
  </style>
</head>
<body>
  <main><header><div><h1>Signal Match</h1><p class="sub">Watch the flash, memorize positions, then match every pair.</p></div><span class="score">MOVES <b>0</b><button type="button" data-new>New grid</button></span></header><div class="grid" aria-label="Signal matching grid"></div><div class="status" aria-live="polite">Memorize the signal flash.</div></main>
  <div class="pause" hidden><div><h2>Paused</h2><button type="button">Resume</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*'),icons=['◆','●','▲','✦','⬡','▣','⌁','◎'];
    let deck=[],open=[],done=new Set(),preview=new Set(),moves=0,locked=false,paused=false,previewing=false,previewTimer=0;
    const grid=document.querySelector('.grid'),status=document.querySelector('.status'),pauseEl=document.querySelector('.pause');
    function shuffle(values){for(let i=values.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[values[i],values[j]]=[values[j],values[i]]}return values}
    function start(){clearTimeout(previewTimer);deck=shuffle([...icons,...icons].map((value,id)=>({value,id})));open=[];done=new Set();preview=new Set(deck.map((_,i)=>i));moves=0;locked=true;previewing=true;paused=false;pauseEl.hidden=true;status.textContent='Memorize the signal flash…';render();host('progress',{score:0,progress:0,state:{matched:0,moves:0,phase:'preview'}});previewTimer=setTimeout(()=>{preview.clear();previewing=false;locked=false;status.textContent='Now match the pairs from memory.';render()},2600)}
    function render(){grid.innerHTML=deck.map((card,index)=>{const visible=open.includes(index)||done.has(index)||preview.has(index);return `<button type="button" class="card ${open.includes(index)?'open':''} ${done.has(index)?'done':''} ${preview.has(index)?'preview':''}" data-i="${index}" aria-label="${done.has(index)?'Matched signal':visible?card.value:'Hidden signal'}" ${done.has(index)||previewing?'disabled':''}>${card.value}</button>`}).join('');document.querySelector('.score b').textContent=moves;grid.querySelectorAll('button').forEach(button=>button.onclick=()=>pick(Number(button.dataset.i)))}
    function pick(index){if(paused||previewing||locked||open.includes(index)||done.has(index))return;open.push(index);render();if(open.length<2)return;moves++;const [a,b]=open;if(deck[a].value===deck[b].value){done.add(a);done.add(b);open=[];status.textContent='Match found.';const progress=Math.round(done.size/deck.length*100),score=Math.max(10,260-moves*7);host(progress===100?'complete':'score',{score,progress,state:{matched:done.size,moves,phase:'matching'}});if(progress===100)status.textContent=`Grid clear in ${moves} moves. Tap New grid to play again.`;render()}else{locked=true;status.textContent='Not a match — use the flash memory.';render();setTimeout(()=>{open=[];locked=false;status.textContent='Choose another pair from memory.';render()},720)}}
    function setPaused(next){paused=next;pauseEl.hidden=!paused;host('paused',{paused});if(!paused&&previewing){status.textContent='Memorize the signal flash…'}}
    document.querySelector('[data-new]').onclick=start;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    addEventListener('keydown',event=>{if(event.key==='p'||event.key==='P'){event.preventDefault();setPaused(!paused)}});
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&!paused)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='restart')start()});
    start();host('ready');
  </script>
</body>
</html>
