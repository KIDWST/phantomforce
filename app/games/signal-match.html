<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:">
  <title>Signal Match</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#effff6;font-family:system-ui,sans-serif;touch-action:manipulation;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;padding:max(10px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 0,#123a2d,#020807 58%)}main{width:min(680px,100%);height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;align-items:center}header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:4px 0 10px}h1{margin:0;color:#58ffa8;font-size:40px;line-height:1;text-shadow:0 0 24px #58ffa855}.sub{margin:5px 0 0;color:#94ad9f;font-size:13px}.score{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;font:800 12px ui-monospace;color:#77ffb8}.score b{font-size:18px;color:#effff6}.score i{font-style:normal;color:#8ba99a}.score button{min-height:40px;padding:8px 12px;border:1px solid #42ff9a44;border-radius:999px;background:#07150f;color:#caffdf;font-weight:800;touch-action:manipulation}.grid{position:relative;align-self:center;justify-self:center;width:min(100%,calc(100svh - 142px));max-width:600px;max-height:min(600px,calc(100svh - 142px));aspect-ratio:1;display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.grid::before{content:"";position:absolute;inset:-12px;border:1px solid #42ff9a22;border-radius:24px;box-shadow:0 0 44px #42ff9a12;pointer-events:none}.card{min-width:0;min-height:0;aspect-ratio:1;border:1px solid #42ff9a44;border-radius:15px;background:radial-gradient(circle at 50% 15%,#123526,#020806);color:transparent;font-size:42px;cursor:pointer;touch-action:manipulation;transition:transform .14s,background .18s,color .1s,box-shadow .18s}.card:hover,.card:focus-visible{transform:translateY(-2px);outline:2px solid #65ffb1;outline-offset:1px}.card.preview,.card.open,.card.done{color:#76ffba;background:#0b3424;border-color:#51ffab;box-shadow:0 0 26px #42ff9a44 inset,0 0 18px #42ff9a22}.card.preview{animation:signalFlash .62s ease both}.card.miss{background:#35111a;border-color:#ff4f75;color:#ffb0c0;box-shadow:0 0 26px #ff4f7544 inset}.card.done{opacity:.55}.spark{position:absolute;z-index:3;width:7px;height:7px;border-radius:50%;background:#7dffc0;box-shadow:0 0 16px #7dffc0;pointer-events:none}.status{text-align:center;min-height:28px;margin:9px 0 0;color:#a9c5b7}.status b{color:#58ffa8}.pause{position:fixed;z-index:5;inset:0;display:grid;place-items:center;background:#010504dc;backdrop-filter:blur(4px)}.pause[hidden]{display:none}.pause div{text-align:center}.pause h2{margin:0;color:#5affa9;font-size:46px}.pause button{margin-top:10px;min-width:130px;min-height:46px;border:0;border-radius:999px;background:#55ffa8;font-weight:900}@keyframes signalFlash{0%{transform:scale(.84);filter:brightness(.6)}45%{transform:scale(1.13);filter:brightness(1.7)}100%{transform:scale(1);filter:brightness(1)}}@media(max-width:520px){body{padding:max(8px,env(safe-area-inset-top)) 8px max(8px,env(safe-area-inset-bottom))}main{align-items:stretch}header{align-items:flex-start;padding-bottom:6px}.sub{display:none}h1{font-size:30px}.score{gap:6px;font-size:10px}.score b{font-size:15px}.score button{min-height:38px;padding:6px 9px}.grid{gap:6px;width:min(100%,calc(100svh - 108px));max-height:calc(100svh - 108px)}.card{border-radius:10px;font-size:30px}.status{min-height:22px;margin-top:6px;font-size:12px}}
  </style>
</head>
<body>
  <main><header><div><h1>Signal Match</h1><p class="sub">Watch the flash. Then match every pair from memory.</p></div><span class="score">SCORE <b data-score>0</b><i>MOVES <b data-moves>0</b></i><i>STREAK <b data-streak>0</b></i><button type="button" data-new>New grid</button></span></header><div class="grid" aria-label="Signal matching grid"></div><div class="status" aria-live="polite">Memorize the flash.</div></main>
  <div class="pause" hidden><div><h2>Paused</h2><button type="button">Resume</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*'),icons=['◆','●','▲','✦','⬡','▣','⌁','◎'];
    let deck=[],open=[],done=new Set(),moves=0,score=0,streak=0,locked=false,paused=false,preview=true,previewSeq=new Set(),previewTimers=[],audio=null,missPair=[];
    const grid=document.querySelector('.grid'),status=document.querySelector('.status'),pauseEl=document.querySelector('.pause');
    function shuffle(values){for(let i=values.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[values[i],values[j]]=[values[j],values[i]]}return values}
    function audioCtx(){if(audio)return audio;try{audio=new (window.AudioContext||window.webkitAudioContext)()}catch{}return audio}
    function tone(freq,dur=.07,type='sine',gain=.035){const ac=audioCtx();if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+dur)}
    function clearPreviewTimers(){previewTimers.forEach(clearTimeout);previewTimers=[];previewSeq.clear()}
    function previewOrder(){const pairs={};deck.forEach((c,i)=>(pairs[c.value]||(pairs[c.value]=[])).push(i));return shuffle(Object.values(pairs)).flatMap(pair=>shuffle([...pair]))}
    function sparkCard(index,n=8){const b=grid.querySelector(`[data-i="${index}"]`);if(!b)return;const r=b.getBoundingClientRect(),gr=grid.getBoundingClientRect();for(let i=0;i<n;i++){const s=document.createElement('i');s.className='spark';grid.appendChild(s);const a=Math.random()*Math.PI*2;s.style.left=(r.left-gr.left+r.width/2)+'px';s.style.top=(r.top-gr.top+r.height/2)+'px';s.animate([{opacity:0,transform:'translate(-50%,-50%) scale(.4)'},{opacity:1,offset:.2},{opacity:0,transform:`translate(${Math.cos(a)*42-50}%,${Math.sin(a)*42-50}%) scale(1.5)`}],{duration:520+Math.random()*260,easing:'ease-out'}).onfinish=()=>s.remove()}}
    function runPreview(){clearPreviewTimers();preview=true;const order=previewOrder();order.forEach((index,step)=>{previewTimers.push(setTimeout(()=>{previewSeq.clear();previewSeq.add(index);status.innerHTML=`Signal <b>${step+1}/${order.length}</b> — memorize it.`;tone(320+step*24,.05,'triangle');render()},260+step*190))});previewTimers.push(setTimeout(()=>{preview=false;previewSeq.clear();status.textContent='Now match the pairs from memory.';render()},520+order.length*190))}
    function start(){clearPreviewTimers();deck=shuffle([...icons,...icons].map((value,id)=>({value,id})));open=[];done=new Set();moves=0;score=0;streak=0;missPair=[];locked=false;paused=false;preview=true;pauseEl.hidden=true;status.innerHTML='Memorize the <b>signal sequence</b>.';render();host('progress',{score:0,progress:0,state:{matched:0,moves:0,streak}});tone(330,.06,'triangle');setTimeout(()=>tone(520,.06,'triangle'),130);runPreview()}
    function render(){grid.innerHTML=deck.map((card,index)=>`<button type="button" class="card ${previewSeq.has(index)?'preview':''} ${open.includes(index)?'open':''} ${done.has(index)?'done':''} ${missPair.includes(index)?'miss':''}" data-i="${index}" aria-label="${done.has(index)?'Matched signal':(previewSeq.has(index)||open.includes(index))?card.value:'Hidden signal'}" ${done.has(index)||preview?'disabled':''}>${card.value}</button>`).join('');document.querySelector('[data-score]').textContent=score;document.querySelector('[data-moves]').textContent=moves;document.querySelector('[data-streak]').textContent=streak;grid.querySelectorAll('button').forEach(button=>button.onclick=()=>pick(Number(button.dataset.i)))}
    function pick(index){if(paused||preview||locked||open.includes(index)||done.has(index))return;open.push(index);tone(420+open.length*120,.045,'triangle');render();if(open.length<2)return;moves++;const [a,b]=open;if(deck[a].value===deck[b].value){done.add(a);done.add(b);open=[];streak++;const progress=Math.round(done.size/deck.length*100);score+=120+streak*35-Math.min(70,moves*3);status.innerHTML=`Match found. <b>${streak}x streak</b>.`;tone(650,.08,'sine');setTimeout(()=>tone(850,.08,'sine'),70);setTimeout(()=>{sparkCard(a,10);sparkCard(b,10)},20);host(progress===100?'complete':'score',{score,progress,state:{matched:done.size,moves,streak}});if(progress===100)status.innerHTML=`Grid clear. Score <b>${score}</b>. Tap New grid to play again.`;render()}else{locked=true;streak=0;missPair=[a,b];status.textContent='Not a match — lock those positions in.';tone(120,.16,'sawtooth',.04);render();setTimeout(()=>{open=[];missPair=[];locked=false;status.textContent='Choose another pair.';render()},740)}}
    function setPaused(next){paused=next;pauseEl.hidden=!paused;host('paused',{paused})}
    document.querySelector('[data-new]').onclick=start;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    addEventListener('keydown',event=>{if(event.key==='p'||event.key==='P'){event.preventDefault();setPaused(!paused)}});
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&!paused)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')start()});
    start();host('ready');
  </script>
</body>
</html>
