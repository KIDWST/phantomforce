<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:">
  <title>Signal Match</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#effff6;font-family:system-ui,sans-serif;touch-action:manipulation;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;padding:max(10px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 0,#123a2d,#020807 58%)}main{width:min(660px,100%);height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;align-items:center}header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:4px 0 10px}h1{margin:0;color:#58ffa8;font-size:40px;line-height:1}.sub{margin:5px 0 0;color:#94ad9f;font-size:13px}.score{display:flex;align-items:center;gap:10px;font:800 12px ui-monospace;color:#77ffb8}.score button{min-height:40px;padding:8px 12px;border:1px solid #42ff9a44;border-radius:999px;background:#07150f;color:#caffdf;font-weight:800;touch-action:manipulation}.grid{align-self:center;justify-self:center;width:min(100%,calc(100svh - 132px));max-width:590px;max-height:min(590px,calc(100svh - 132px));aspect-ratio:1;display:grid;grid-template-columns:repeat(4,1fr);gap:9px}.card{min-width:0;min-height:0;aspect-ratio:1;border:1px solid #42ff9a44;border-radius:15px;background:linear-gradient(145deg,#0a2118,#020806);color:transparent;font-size:40px;cursor:pointer;touch-action:manipulation;transition:transform .14s,background .18s}.card:hover,.card:focus-visible{transform:translateY(-2px);outline:2px solid #65ffb1;outline-offset:1px}.card.open,.card.done{color:#76ffba;background:#0b3424;border-color:#51ffab}.card.done{opacity:.5}.status{text-align:center;min-height:28px;margin:9px 0 0;color:#a9c5b7}.pause{position:fixed;z-index:5;inset:0;display:grid;place-items:center;background:#010504dc;backdrop-filter:blur(4px)}.pause[hidden]{display:none}.pause div{text-align:center}.pause h2{margin:0;color:#5affa9;font-size:46px}.pause button{margin-top:10px;min-width:130px;min-height:46px;border:0;border-radius:999px;background:#55ffa8;font-weight:900}@media(max-width:520px){body{padding:max(8px,env(safe-area-inset-top)) 8px max(8px,env(safe-area-inset-bottom))}main{align-items:stretch}header{align-items:flex-start;padding-bottom:6px}.sub{display:none}h1{font-size:30px}.score{gap:6px;font-size:10px}.score button{min-height:38px;padding:6px 9px}.grid{gap:6px;width:min(100%,calc(100svh - 96px));max-height:calc(100svh - 96px)}.card{border-radius:10px;font-size:28px}.status{min-height:22px;margin-top:6px;font-size:12px}}
  </style>
</head>
<body>
  <main><header><div><h1>Signal Match</h1><p class="sub">Match every pair with the fewest turns.</p></div><span class="score">MOVES <b>0</b><button type="button" data-new>New grid</button></span></header><div class="grid" aria-label="Signal matching grid"></div><div class="status" aria-live="polite">Choose a signal.</div></main>
  <div class="pause" hidden><div><h2>Paused</h2><button type="button">Resume</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*'),icons=['◆','●','▲','✦','⬡','▣','⌁','◎'];
    let deck=[],open=[],done=new Set(),moves=0,locked=false,paused=false;
    const grid=document.querySelector('.grid'),status=document.querySelector('.status'),pauseEl=document.querySelector('.pause');
    function shuffle(values){for(let i=values.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[values[i],values[j]]=[values[j],values[i]]}return values}
    function start(){deck=shuffle([...icons,...icons].map((value,id)=>({value,id})));open=[];done=new Set();moves=0;locked=false;paused=false;pauseEl.hidden=true;status.textContent='Choose a signal.';render();host('progress',{score:0,progress:0,state:{matched:0,moves:0}})}
    function render(){grid.innerHTML=deck.map((card,index)=>`<button type="button" class="card ${open.includes(index)?'open':''} ${done.has(index)?'done':''}" data-i="${index}" aria-label="${done.has(index)?'Matched signal':open.includes(index)?card.value:'Hidden signal'}" ${done.has(index)?'disabled':''}>${card.value}</button>`).join('');document.querySelector('.score b').textContent=moves;grid.querySelectorAll('button').forEach(button=>button.onclick=()=>pick(Number(button.dataset.i)))}
    function pick(index){if(paused||locked||open.includes(index)||done.has(index))return;open.push(index);render();if(open.length<2)return;moves++;const [a,b]=open;if(deck[a].value===deck[b].value){done.add(a);done.add(b);open=[];status.textContent='Match found.';const progress=Math.round(done.size/deck.length*100),score=Math.max(10,220-moves*6);host(progress===100?'complete':'score',{score,progress,state:{matched:done.size,moves}});if(progress===100)status.textContent=`Grid clear in ${moves} moves. Tap New grid to play again.`;render()}else{locked=true;status.textContent='Not a match — remember both.';render();setTimeout(()=>{open=[];locked=false;status.textContent='Choose another pair.';render()},620)}}
    function setPaused(next){paused=next;pauseEl.hidden=!paused;host('paused',{paused})}
    document.querySelector('[data-new]').onclick=start;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    addEventListener('keydown',event=>{if(event.key==='p'||event.key==='P'){event.preventDefault();setPaused(!paused)}});
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&!paused)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='restart')start()});
    start();host('ready');
  </script>
</body>
</html>
