<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'"><title>Neon Drift</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#eafff3;font-family:system-ui,sans-serif}body{display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,#0b3c2a 0,#03110c 38%,#010504 75%)}canvas{width:100%;height:100%;display:block}.hud{position:fixed;inset:18px 18px auto;display:flex;justify-content:space-between;pointer-events:none}.hud span{padding:8px 12px;border:1px solid #2cff9b55;border-radius:999px;background:#020b08cc;font:700 12px ui-monospace;color:#7dffbd}.start{position:fixed;inset:0;display:grid;place-items:center;background:#010504aa}.start div{text-align:center;padding:28px;max-width:420px}.start h1{font-size:58px;margin:0;color:#61ffb0}.start p{color:#9bb7aa;line-height:1.5}.start button{border:0;border-radius:999px;background:#4bffa3;color:#021109;padding:14px 24px;font-weight:900;cursor:pointer}.touch{position:fixed;inset:auto 0 0;height:42%;display:grid;grid-template-columns:1fr 1fr}.touch button{border:0;background:transparent;color:transparent}@media(max-width:600px){.start h1{font-size:38px}}@media(pointer:fine){.touch{display:none}}</style></head><body><canvas></canvas><div class="hud"><span data-score>SCORE 0</span><span data-best>STREAK 0</span></div><div class="start"><div><h1>Neon Drift</h1><p>Move through the signal lanes. Arrow keys, A/D, or tap either side.</p><button>Start run</button></div></div><div class="touch"><button data-left>Left</button><button data-right>Right</button></div><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');const c=document.querySelector('canvas'),x=c.getContext('2d'),scoreEl=document.querySelector('[data-score]'),bestEl=document.querySelector('[data-best]');let W=0,H=0,running=false,last=0,score=0,streak=0,player=.5,velocity=0,spawn=0,rocks=[],reduced=false;
function size(){W=c.width=Math.max(320,innerWidth*devicePixelRatio);H=c.height=Math.max(480,innerHeight*devicePixelRatio)}addEventListener('resize',size);size();
function move(dir){velocity=dir*.0013*W}addEventListener('keydown',e=>{if(['ArrowLeft','a','A'].includes(e.key))move(-1);if(['ArrowRight','d','D'].includes(e.key))move(1)});addEventListener('keyup',()=>velocity=0);for(const [sel,dir] of [['[data-left]',-1],['[data-right]',1]]){const b=document.querySelector(sel);b.onpointerdown=()=>move(dir);b.onpointerup=()=>velocity=0;b.onpointercancel=()=>velocity=0}
document.querySelector('.start button').onclick=()=>{document.querySelector('.start').hidden=true;running=true;last=performance.now();requestAnimationFrame(loop)};
function reset(){score=Math.max(0,score-5);streak=0;rocks=[];player=.5;host('score',{score,progress:Math.min(99,score)});bestEl.textContent='STREAK 0'}
function loop(t){if(!running)return;const dt=Math.min(32,t-last);last=t;player=Math.max(.08,Math.min(.92,player+velocity*dt/W));spawn-=dt;if(spawn<=0){spawn=Math.max(230,720-score*4);rocks.push({x:.08+Math.random()*.84,y:-.08,s:.026+Math.random()*.025,v:.00022+Math.random()*.00018})}for(const r of rocks)r.y+=r.v*dt;for(const r of rocks){if(!r.hit&&r.y>.78&&r.y<.92&&Math.abs(r.x-player)<r.s+.035){r.hit=true;reset();break}if(!r.hit&&r.y>1.05){r.hit=true;score++;streak++;scoreEl.textContent='SCORE '+score;bestEl.textContent='STREAK '+streak;host('score',{score,progress:Math.min(99,score*2),state:{streak}});if(score>=50){running=false;host('complete',{score,progress:100,state:{streak}});document.querySelector('.start').hidden=false;document.querySelector('.start h1').textContent='Run complete';document.querySelector('.start p').textContent='Signal storm cleared. Start another run when you are ready.';document.querySelector('.start button').textContent='Play again'}}}rocks=rocks.filter(r=>!r.hit);draw(t);requestAnimationFrame(loop)}
function draw(t){x.clearRect(0,0,W,H);x.strokeStyle='#32ff9a22';x.lineWidth=1*devicePixelRatio;for(let i=0;i<8;i++){x.beginPath();x.moveTo(W/2,H*.14);x.lineTo(W*(i/7),H);x.stroke()}for(let y=.2;y<1;y+=.1){x.beginPath();x.moveTo(0,H*y);x.lineTo(W,H*y);x.stroke()}for(const r of rocks){x.fillStyle='#ff4f75';x.shadowBlur=18*devicePixelRatio;x.shadowColor='#ff315f';x.beginPath();x.arc(W*r.x,H*r.y,W*r.s,0,Math.PI*2);x.fill()}x.shadowBlur=24*devicePixelRatio;x.shadowColor='#41ffa1';x.fillStyle='#55ffad';x.beginPath();x.moveTo(W*player,H*.78);x.lineTo(W*(player-.045),H*.9);x.lineTo(W*(player+.045),H*.9);x.closePath();x.fill();if(!reduced){x.fillStyle='#45ffa933';for(let i=0;i<20;i++)x.fillRect((Math.sin(t*.001+i)*.5+.5)*W,(i/20)*H,2*devicePixelRatio,2*devicePixelRatio)}}
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings')reduced=!!e.data.reducedMotion});document.addEventListener('visibilitychange',()=>{if(document.hidden)velocity=0});host('ready');
</script></body></html>
