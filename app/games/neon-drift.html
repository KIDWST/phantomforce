<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
  <title>Neon Drift</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#eafff3;font-family:system-ui,sans-serif;touch-action:none;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;background:radial-gradient(circle at 50% 28%,#0c3f2d 0,#03110c 42%,#010403 80%)}canvas{width:100%;height:100%;display:block;outline:0;touch-action:none}.hud{position:fixed;z-index:4;inset:max(12px,env(safe-area-inset-top)) 12px auto;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;pointer-events:none}.hud span{min-width:0;padding:8px 9px;border:1px solid #2cff9b55;border-radius:999px;background:#020b08dd;font:900 10px ui-monospace,monospace;color:#7dffbd;text-align:center;box-shadow:0 0 20px #28ff8d16}.start,.pause-card{position:fixed;z-index:8;inset:0;display:grid;place-items:center;background:#010504d9;backdrop-filter:blur(6px)}.start[hidden],.pause-card[hidden]{display:none}.start div,.pause-card div{text-align:center;padding:28px;max-width:500px}.start h1,.pause-card h2{font-size:54px;line-height:1;margin:0;color:#61ffb0;text-shadow:0 0 28px #28ff8d55}.start p,.pause-card p{color:#b3cebf;line-height:1.5}.start button,.pause-card button{min-width:150px;min-height:50px;border:0;border-radius:999px;background:#4bffa3;color:#021109;padding:14px 24px;font-weight:950;cursor:pointer}.hit{position:fixed;z-index:7;inset:0;pointer-events:none;opacity:0;background:#ff315f2b}.hit.flash{animation:hit .24s ease}.power-note{position:fixed;z-index:6;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);padding:9px 13px;border:1px solid #41ffa155;border-radius:999px;background:#04120dde;color:#caffdf;font:900 10px ui-monospace,monospace;letter-spacing:.08em;text-transform:uppercase;opacity:0;transition:opacity .2s ease}.power-note.show{opacity:1}@keyframes hit{45%{opacity:1}}@media(max-width:620px){.hud{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.hud span{padding:7px 8px;font-size:9px}.start div,.pause-card div{padding:22px 18px}.start h1,.pause-card h2{font-size:38px}.start button,.pause-card button{min-width:160px;min-height:52px}}
  </style>
</head>
<body>
  <canvas aria-label="Neon Drift play field" tabindex="0"></canvas>
  <div class="hud">
    <span data-score>SCORE 0</span>
    <span data-lives>HULL 3</span>
    <span data-wave>WAVE 1</span>
    <span data-power>POWER BASE</span>
  </div>
  <div class="start"><div><h1>Neon Drift</h1><p>Auto-fire spaceship shooter. Hold Shift to boost, grab weapon drops, clear waves, and stay alive.</p><button type="button">Launch ship</button></div></div>
  <div class="pause-card" hidden><div><h2>Paused</h2><p>Your run is safe.</p><button type="button">Resume</button></div></div>
  <div class="hit"></div>
  <div class="power-note" data-note></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const c=document.querySelector('canvas'),x=c.getContext('2d'),scoreEl=document.querySelector('[data-score]'),livesEl=document.querySelector('[data-lives]'),waveEl=document.querySelector('[data-wave]'),powerEl=document.querySelector('[data-power]'),startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause-card'),hitEl=document.querySelector('.hit'),noteEl=document.querySelector('[data-note]');
    let W=0,H=0,D=1,running=false,paused=false,reduced=false,last=0,score=0,lives=3,wave=1,combo=0,shake=0,spawn=0,fire=0,waveKills=0,scrollBoost=0;
    // player.inputBoost mirrors the input-state convention used elsewhere in PhantomPlay
    // (e.g. Phantom Grand Prix's kart.inputSteer/inputThrottle/inputDrift): keyboard writes
    // the flag every frame, update() reads it, so a future gamepad pass can just also write
    // this same flag (e.g. from RT/R2) without touching any physics code.
    const player={x:.5,y:.82,vx:0,vy:0,r:.014,shield:0,magnet:0,invuln:0,weapon:'base',weaponTimer:0,heat:0,beamVent:0,beamOn:false,lanceCD:0,droneList:[],mineCD:0,riftCD:0,boostFuel:100,inputBoost:false,boosting:false,boostCooldown:0};
    const keys=new Set(),shots=[],enemies=[],sparks=[],powerups=[],stars=[],mines=[],rifts=[];
    const MAX_MINES=4;
    const powers={rapid:["RAPID FIRE","#64ffdb"],spread:["SPREAD SHOT","#b78cff"],shield:["SHIELD","#75ff8b"],magnet:["MAGNET","#ffd166"],repair:["REPAIR","#7cc7ff"],plasma:["PLASMA BEAM","#ff5ce0"],potato:["POTATO LAUNCHER","#ffbd59"],lance:["ION LANCE","#8cf0ff"],drones:["DRONE SWARM","#9dff6b"],chain:["CHAIN VOLT","#ffe66b"],mines:["MINE LAYER","#ff8b3d"],overdrive:["OVERDRIVE CORE","#ff3d5c"],cryo:["CRYO SHARD","#8ecbff"],rift:["VOID RIFT","#b98cff"]};
    const WEAPON_DURATIONS={rapid:6500,spread:6500,plasma:9000,potato:9000,lance:9500,drones:10000,chain:8500,mines:10000,overdrive:6500,cryo:9000,rift:11000};
    function size(){D=devicePixelRatio||1;W=c.width=Math.max(320,Math.round(innerWidth*D));H=c.height=Math.max(480,Math.round(innerHeight*D));stars.length=0;for(let i=0;i<90;i++)stars.push({x:Math.random(),y:Math.random(),s:.5+Math.random()*1.8,a:.25+Math.random()*.55});draw(performance.now())}
    function hud(){scoreEl.textContent=`SCORE ${score}`;livesEl.textContent=`HULL ${lives}`;waveEl.textContent=`WAVE ${wave}`;const wname=player.weapon!=="base"?(powers[player.weapon]?powers[player.weapon][0]:player.weapon.toUpperCase()):(player.magnet>0?"MAGNET":"BASE");const active=player.shield>0?"SHIELD":wname;powerEl.textContent=`POWER ${active}`}
    function showNote(text){noteEl.textContent=text;noteEl.classList.add('show');clearTimeout(showNote.t);showNote.t=setTimeout(()=>noteEl.classList.remove('show'),1100)}
    function startRun(){score=0;lives=3;wave=1;combo=0;shake=0;spawn=240;fire=0;waveKills=0;scrollBoost=0;Object.assign(player,{x:.5,y:.82,vx:0,vy:0,r:.014,shield:0,magnet:0,invuln:900,weapon:'base',weaponTimer:0,heat:0,beamVent:0,beamOn:false,lanceCD:0,droneList:[],mineCD:0,riftCD:0,boostFuel:100,inputBoost:false,boosting:false,boostCooldown:0});shots.length=0;enemies.length=0;sparks.length=0;powerups.length=0;mines.length=0;rifts.length=0;running=true;paused=false;startEl.hidden=true;pauseEl.hidden=true;hud();last=performance.now();host('progress',{score:0,progress:0,state:{wave,lives}});requestAnimationFrame(loop);c.focus?.()}
    function finish(title,copy){running=false;paused=false;startEl.hidden=false;startEl.querySelector('h1').textContent=title;startEl.querySelector('p').textContent=copy;startEl.querySelector('button').textContent='Play again';host('complete',{score,progress:100,state:{wave,lives,combo}})}
    function setPaused(next){if(!running)return;paused=next;pauseEl.hidden=!paused;last=performance.now();host('paused',{paused})}
    function rnd(a,b){return a+Math.random()*(b-a)}
    function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
    function addSparks(px,py,color,count=14){if(reduced)return;for(let i=0;i<count;i++)sparks.push({x:px,y:py,vx:rnd(-.00035,.00035),vy:rnd(-.0005,.00022),life:rnd(260,620),t:0,color})}
    function spawnEnemy(){const type=Math.random()<Math.min(.18+wave*.015,.42)?"zig":Math.random()<.22?"tank":"drone";const hp=type==="tank"?3+Math.floor(wave/3):1;enemies.push({type,x:rnd(.08,.92),y:-.08,r:type==="tank"?.034:.025,hp,max:hp,v:rnd(.00013,.00023)+wave*.000016,phase:Math.random()*9,shoot:rnd(780,1480),value:type==="tank"?85:40,frost:0,frozen:0})}
    function spawnPower(px,py){if(Math.random()>.22)return;const pool=["shield","shield","magnet","magnet","repair","repair","rapid","spread","plasma","potato","lance","drones","chain","mines","overdrive","cryo","rift"];const kind=pool[Math.floor(Math.random()*pool.length)];powerups.push({kind,x:px,y:py,r:.02,v:.00016,spin:0})}
    function splitFrags(sx,sy){for(let i=0;i<4;i++){const ang=(i/4)*Math.PI*2+rnd(-.3,.3);shots.push({x:sx,y:sy,vx:Math.cos(ang)*.0011,vy:Math.sin(ang)*.0011-.0004,r:.007,life:520,enemy:false,color:"#ffbd59",dmg:1,kind:"frag"})}addSparks(sx,sy,"#ffbd59",16)}
    function killEnemyIfDead(e){if(e.hp<=0&&!e.dead){e.dead=true;score+=e.value+combo*3;combo++;waveKills++;spawnPower(e.x,e.y);addSparks(e.x,e.y,e.type==="tank"?"#ffd166":"#41ffa1",22);if(waveKills>=10+wave*3){wave++;waveKills=0;showNote(`Wave ${wave}`)}}}
    function chainBolt(e,chains){let cur=e,left=chains;const hitSet=new Set([e]);while(left>0){let best=null,bd=.16*.16;for(const oe of enemies){if(oe.dead||hitSet.has(oe))continue;const ddx=oe.x-cur.x,ddy=oe.y-cur.y,dd=ddx*ddx+ddy*ddy;if(dd<bd){bd=dd;best=oe}}if(!best)break;best.hp-=1;hitSet.add(best);addSparks(best.x,best.y,"#ffe66b",10);killEnemyIfDead(best);cur=best;left--}}
    // Weapon roster (9 new designs beyond the original rapid/spread):
    // plasma (heat-managed continuous beam), potato (splits into frags on impact/fuse),
    // lance (long-cooldown piercing burst), drones (protectable orbiting companions),
    // chain (falls off across nearby enemies, weak on lone targets), mines (capped
    // deployable field), overdrive (bigger hitbox + shorter i-frames for more DPS),
    // cryo (frost-stacks into a freeze + shatter bonus), rift (single-charge pull+AoE).
    function shoot(){const w=player.weapon;if(w==="plasma")return;if(w==="lance"){if(player.lanceCD>0)return;player.lanceCD=1100;shots.push({x:player.x,y:player.y-.05,vx:0,vy:-.0026,r:.009,life:1000,enemy:false,color:"#8cf0ff",dmg:4,kind:"lance",pierce:3});return}if(fire>0)return;const rate=w==="rapid"?58:w==="overdrive"?46:w==="cryo"?128:108;fire=rate;const dmg=w==="overdrive"?2:1;const base={x:player.x,y:player.y-.052,vy:-.00155,r:.006,life:900,enemy:false,dmg};if(w==="potato"){fire=340;shots.push({...base,vx:0,r:.014,dmg:2,life:1500,color:"#ffbd59",kind:"potato",splitFuse:650})}else if(w==="chain"){shots.push({...base,vx:0,color:"#ffe66b",kind:"chain",chains:3})}else if(w==="cryo"){shots.push({...base,vx:0,color:"#8ecbff",kind:"cryo"})}else{shots.push({...base,vx:0,color:"#7dffbd"});if(w==="spread"){shots.push({...base,vx:-.00035,color:"#d8a2ff"});shots.push({...base,vx:.00035,color:"#d8a2ff"})}}}
    function enemyShot(e){shots.push({x:e.x,y:e.y+.025,vx:(player.x-e.x)*.00012,vy:.00042+wave*.000012,r:.008,life:2200,enemy:true,color:"#ff4f75",dmg:1})}
    function damage(){if(player.invuln>0)return;if(player.shield>0){player.shield=0;player.invuln=700;showNote("Shield broke");addSparks(player.x,player.y,"#75ff8b",28);return}lives--;combo=0;shake=12;player.invuln=player.weapon==="overdrive"?520:1050;hitEl.classList.remove('flash');void hitEl.offsetWidth;hitEl.classList.add('flash');addSparks(player.x,player.y,"#ff4f75",36);hud();host('score',{score,progress:Math.min(98,score/18),state:{wave,lives}});if(lives<=0)finish('Ship down',`You reached wave ${wave} with ${score} points. Upgrade the run.`)}
    function collect(p){if(p.kind==="repair"){lives=Math.min(5,lives+1)}else if(p.kind==="shield"){player.shield=1}else if(p.kind==="magnet"){player.magnet=6500}else{if(player.weapon==="drones"&&p.kind!=="drones")player.droneList=[];player.weapon=p.kind;player.weaponTimer=WEAPON_DURATIONS[p.kind]||7000;player.heat=0;player.beamVent=0;player.beamOn=false;player.lanceCD=0;player.mineCD=0;player.riftCD=0;if(p.kind==="drones")player.droneList=[{a:0,hp:3,t:0,x:player.x,y:player.y},{a:Math.PI,hp:3,t:420,x:player.x,y:player.y}]}showNote(powers[p.kind][0]);addSparks(p.x,p.y,powers[p.kind][1],24);hud()}
    function update(dt){
      player.inputBoost=keys.has('shift');
      if(player.boostCooldown>0)player.boostCooldown=Math.max(0,player.boostCooldown-dt);
      const boosting=player.inputBoost&&player.boostFuel>0&&player.boostCooldown<=0;
      player.boosting=boosting;
      if(boosting){player.boostFuel=Math.max(0,player.boostFuel-dt*.062);if(player.boostFuel<=0)player.boostCooldown=650}else{player.boostFuel=Math.min(100,player.boostFuel+dt*.02)}
      scrollBoost+=dt*(boosting?.00035:0);
      if(boosting&&Math.random()<.6)addSparks(player.x,player.y+.024,"#41ffe0",2);
      player.r=player.weapon==="overdrive"?.02:.014;
      const accelBase=.00012*W*(dt/16),drag=Math.pow(.91,dt/16),maxSpeed=.0032,curMax=boosting?maxSpeed*1.55:maxSpeed,accel=accelBase*(boosting?1.65:1);
      let ax=0,ay=0;if(keys.has('a')||keys.has('arrowleft'))ax-=accel;if(keys.has('d')||keys.has('arrowright'))ax+=accel;if(keys.has('w')||keys.has('arrowup'))ay-=accel;if(keys.has('s')||keys.has('arrowdown'))ay+=accel;if(gpOn){ax+=gpAxX*accel;ay+=gpAxY*accel}
      player.vx=clamp((player.vx+ax)*drag,-curMax*W,curMax*W);player.vy=clamp((player.vy+ay)*drag,-curMax*H,curMax*H);
      player.x=clamp(player.x+player.vx*dt/W,.055,.945);player.y=clamp(player.y+player.vy*dt/H,.16,.94);
      fire=Math.max(0,fire-dt);shoot();
      if(player.weapon==="lance")player.lanceCD=Math.max(0,player.lanceCD-dt);
      if(player.weapon==="rift"){player.riftCD-=dt;if(player.riftCD<=0){player.riftCD=3200;shots.push({x:player.x,y:player.y-.05,vx:0,vy:-.0009,r:.016,life:2600,enemy:false,color:"#b98cff",dmg:2,kind:"riftorb"})}}
      if(player.weapon==="mines"){player.mineCD=Math.max(0,player.mineCD-dt);if(player.mineCD<=0&&mines.length<MAX_MINES){mines.push({x:player.x,y:player.y+.045,arm:400,r:.022,age:0});player.mineCD=550}}
      if(player.weapon==="drones"&&player.droneList.length){for(const d of player.droneList){d.a+=dt*.0018;d.x=player.x+Math.cos(d.a)*.1;d.y=player.y+Math.sin(d.a)*.06-.02;d.t-=dt;if(d.t<=0){d.t=520;let best=null,bd=1e9;for(const e of enemies){if(e.dead)continue;const ddx=e.x-d.x,ddy=e.y-d.y,dd=ddx*ddx+ddy*ddy;if(dd<bd){bd=dd;best=e}}if(best){const ang=Math.atan2(best.y-d.y,best.x-d.x);shots.push({x:d.x,y:d.y,vx:Math.cos(ang)*.0016,vy:Math.sin(ang)*.0016,r:.005,life:900,enemy:false,color:"#9dff6b",dmg:1,kind:"drone"})}}}}
      if(player.weapon==="plasma"){if(player.beamVent>0){player.beamVent=Math.max(0,player.beamVent-dt);player.heat=Math.max(0,player.heat-dt*.055);player.beamOn=false}else{player.beamOn=true;player.heat=Math.min(100,player.heat+dt*.045);let target=null;for(const e of enemies){if(e.dead)continue;if(Math.abs(e.x-player.x)<.045&&e.y<player.y){if(!target||e.y>target.y)target=e}}if(target){target.hp-=dt*.0022;if(Math.random()<.4)addSparks(target.x,target.y,"#ff5ce0",1);killEnemyIfDead(target)}if(player.heat>=100){player.beamVent=1400;player.beamOn=false;showNote("Overheat — venting")}}}else{player.beamOn=false}
      player.weaponTimer=Math.max(0,player.weaponTimer-dt);if(player.weaponTimer<=0&&player.weapon!=="base"){if(player.weapon==="drones")player.droneList=[];player.weapon="base"}
      player.magnet=Math.max(0,player.magnet-dt);player.invuln=Math.max(0,player.invuln-dt);
      spawn-=dt;if(spawn<=0){spawn=Math.max(130,390-wave*18);spawnEnemy()}
      for(const e of enemies){if(e.frozen>0){e.frozen=Math.max(0,e.frozen-dt);continue}e.phase+=dt*.004;e.y+=e.v*dt;if(e.type==="zig")e.x+=Math.sin(e.phase)*.00012*dt;e.shoot-=dt;if(e.shoot<=0){e.shoot=rnd(1200,2100)-wave*20;enemyShot(e)}}
      for(const s of shots){s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt;if(s.kind==="potato"){s.splitFuse-=dt;if(s.splitFuse<=0){splitFrags(s.x,s.y);s.life=0}}}
      for(const p of powerups){p.y+=p.v*dt;p.spin+=dt*.006;if(player.magnet>0){p.x+=(player.x-p.x)*.004*dt;p.y+=(player.y-p.y)*.004*dt}}
      for(const q of sparks){q.x+=q.vx*dt;q.y+=q.vy*dt;q.t+=dt}
      for(const m of mines){if(m.dead)continue;m.arm=Math.max(0,m.arm-dt);m.age+=dt;if(m.arm<=0){let trig=false;for(const e of enemies){if(e.dead)continue;const dx=e.x-m.x,dy=e.y-m.y;if(dx*dx+dy*dy<(m.r+e.r+.02)*(m.r+e.r+.02)){trig=true;break}}if(trig){for(const e of enemies){if(e.dead)continue;const dx=e.x-m.x,dy=e.y-m.y;if(dx*dx+dy*dy<.09*.09){e.hp-=3;killEnemyIfDead(e)}}addSparks(m.x,m.y,"#ff8b3d",30);shake=Math.max(shake,10);m.dead=true}else if(m.age>6000){m.dead=true}}}
      for(const r of rifts){r.t+=dt;const pr=Math.min(1,r.t/r.life);r.r=.02+pr*.16;for(const e of enemies){if(e.dead)continue;const dx=r.x-e.x,dy=r.y-e.y,dist=Math.hypot(dx,dy);if(dist<.22&&dist>.001){e.x+=dx/dist*.00028*dt;e.y+=dy/dist*.00028*dt}}if(pr>=1&&!r.dead){for(const e of enemies){if(e.dead)continue;const dx=e.x-r.x,dy=e.y-r.y;if(dx*dx+dy*dy<r.r*r.r){e.hp-=3;killEnemyIfDead(e)}}addSparks(r.x,r.y,"#b98cff",26);shake=Math.max(shake,8);r.dead=true}}
      shake=Math.max(0,shake-dt*.05);
      for(const s of shots){if(s.enemy||s.kind==="riftorb")continue;for(const e of enemies){if(e.dead)continue;const dx=s.x-e.x,dy=s.y-e.y;if(dx*dx+dy*dy<(s.r+e.r)*(s.r+e.r)){addSparks(s.x,s.y,s.color||"#7dffbd",5);if(s.kind==="cryo"){e.frost=(e.frost||0)+1;if(e.frost>=3){e.frost=0;e.frozen=900;e.hp-=s.dmg+1;addSparks(e.x,e.y,"#8ecbff",16)}else{e.hp-=s.dmg}}else{e.hp-=s.dmg}if(s.kind==="lance"){s.pierce--;if(s.pierce<=0)s.life=0}else{s.life=0}killEnemyIfDead(e);if(s.kind==="chain"&&s.chains>0)chainBolt(e,s.chains);if(s.kind==="potato"){splitFrags(s.x,s.y)}break}}}
      for(const s of shots){if(s.kind!=="riftorb")continue;let hit=false;for(const e of enemies){if(e.dead)continue;const dx=s.x-e.x,dy=s.y-e.y;if(dx*dx+dy*dy<(s.r+e.r)*(s.r+e.r)){hit=true;break}}if(hit||s.life<=0){rifts.push({x:s.x,y:s.y,t:0,life:1100,r:.02});s.life=0}}
      for(const s of shots){if(!s.enemy||s.life<=0)continue;const dx=s.x-player.x,dy=s.y-player.y;if(dx*dx+dy*dy<(s.r+player.r)*(s.r+player.r)){s.life=0;damage();continue}if(player.weapon==="drones"){for(const d of player.droneList){if(d.hp<=0)continue;const ddx=s.x-d.x,ddy=s.y-d.y;if(ddx*ddx+ddy*ddy<(s.r+.02)*(s.r+.02)){s.life=0;d.hp--;addSparks(d.x,d.y,"#9dff6b",10);break}}}}
      if(player.weapon==="drones")player.droneList=player.droneList.filter(d=>d.hp>0);
      for(const e of enemies){if(e.dead)continue;const dx=e.x-player.x,dy=e.y-player.y;if(e.y>1.12){e.dead=true}else if(dx*dx+dy*dy<(e.r+player.r)*(e.r+player.r)){e.dead=true;damage()}}
      for(const p of powerups){if(p.dead)continue;const dx=p.x-player.x,dy=p.y-player.y;if(dx*dx+dy*dy<(p.r+player.r+.01)*(p.r+player.r+.01)){p.dead=true;collect(p)}}
      shots.splice(0,shots.length,...shots.filter(s=>s.life>0&&s.y>-.1&&s.y<1.12&&s.x>-.08&&s.x<1.08));
      enemies.splice(0,enemies.length,...enemies.filter(e=>!e.dead&&e.y<1.15));
      powerups.splice(0,powerups.length,...powerups.filter(p=>!p.dead&&p.y<1.1));
      sparks.splice(0,sparks.length,...sparks.filter(s=>s.t<s.life));
      mines.splice(0,mines.length,...mines.filter(m=>!m.dead));
      rifts.splice(0,rifts.length,...rifts.filter(r=>!r.dead));
      hud()
    }
    function drawShip(px,py){x.save();x.translate(px,py);x.globalAlpha=player.invuln>0?.56+Math.sin(performance.now()*.03)*.28:1;x.shadowBlur=(player.weapon==="overdrive"?34:24)*D;x.shadowColor=player.shield>0?"#75ff8b":player.weapon==="overdrive"?"#ff3d5c":"#41ffa1";x.fillStyle=player.weapon==="overdrive"?"#ff8a9e":"#4bffa3";x.beginPath();x.moveTo(0,-24*D);x.lineTo(-18*D,20*D);x.lineTo(0,11*D);x.lineTo(18*D,20*D);x.closePath();x.fill();x.fillStyle="#062117";x.fillRect(-5*D,-2*D,10*D,15*D);if(player.shield>0){x.strokeStyle="#75ff8b99";x.lineWidth=2*D;x.beginPath();x.arc(0,0,31*D,0,Math.PI*2);x.stroke()}x.restore()}
    function draw(t=0){x.clearRect(0,0,W,H);x.save();if(shake)x.translate(rnd(-shake,shake)*D,rnd(-shake,shake)*D);const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#04110d");g.addColorStop(.58,"#061f15");g.addColorStop(1,"#020604");x.fillStyle=g;x.fillRect(0,0,W,H);x.strokeStyle="#39ff9b22";x.lineWidth=1*D;for(let i=0;i<10;i++){x.beginPath();x.moveTo(W/2,H*.18);x.lineTo(W*(i/9),H);x.stroke()}for(let y=.22;y<1;y+=.095){x.beginPath();x.moveTo(0,H*y);x.lineTo(W,H*y);x.stroke()}for(const st of stars){const yy=((st.y+t*.000055+scrollBoost)%1)*H;const len=player.boosting?(st.s*3+7)*D:st.s*D;x.fillStyle=player.boosting?`rgba(160,255,224,${Math.min(1,st.a+.2)})`:`rgba(125,255,189,${st.a})`;x.fillRect(st.x*W,yy,st.s*D,len)}for(const r of rifts){x.save();x.globalAlpha=1-r.t/r.life;x.strokeStyle="#b98cff";x.lineWidth=3*D;x.shadowBlur=22*D;x.shadowColor="#b98cff";x.beginPath();x.arc(r.x*W,r.y*H,r.r*W,0,Math.PI*2);x.stroke();x.restore()}for(const m of mines){x.save();x.translate(m.x*W,m.y*H);x.rotate(Math.PI/4);const armed=m.arm<=0;x.globalAlpha=armed?.6+Math.sin(performance.now()*.012)*.4:.7;x.fillStyle=armed?"#ff8b3d":"#a85a26";x.shadowBlur=14*D;x.shadowColor="#ff8b3d";x.fillRect(-8*D,-8*D,16*D,16*D);x.restore()}for(const p of powerups){x.save();x.translate(p.x*W,p.y*H);x.rotate(p.spin);x.shadowBlur=20*D;x.shadowColor=powers[p.kind][1];x.strokeStyle=powers[p.kind][1];x.lineWidth=3*D;x.strokeRect(-12*D,-12*D,24*D,24*D);x.restore()}for(const s of shots){x.shadowBlur=14*D;x.shadowColor=s.color;x.fillStyle=s.color;x.beginPath();x.arc(s.x*W,s.y*H,s.r*W,0,Math.PI*2);x.fill()}for(const e of enemies){x.shadowBlur=22*D;x.shadowColor=e.type==="tank"?"#ffd166":"#ff4f75";x.fillStyle=e.type==="tank"?"#ffd166":"#ff4f75";x.beginPath();x.arc(e.x*W,e.y*H,e.r*W,0,Math.PI*2);x.fill();if(e.frozen>0){x.strokeStyle="#bfe9ffcc";x.lineWidth=2*D;x.beginPath();x.arc(e.x*W,e.y*H,(e.r+.006)*W,0,Math.PI*2);x.stroke()}if(e.hp>1){x.fillStyle="#03110c";x.fillRect((e.x-e.r)*W,(e.y-e.r-.014)*H,e.r*2*W,3*D);x.fillStyle="#4bffa3";x.fillRect((e.x-e.r)*W,(e.y-e.r-.014)*H,e.r*2*W*(e.hp/e.max),3*D)}}if(player.weapon==="drones"){for(const d of player.droneList){x.save();x.translate(d.x*W,d.y*H);x.shadowBlur=14*D;x.shadowColor="#9dff6b";x.fillStyle="#9dff6b";x.beginPath();x.arc(0,0,6*D,0,Math.PI*2);x.fill();x.restore()}}if(player.weapon==="plasma"&&player.beamOn){x.save();x.globalAlpha=.75;x.strokeStyle="#ff5ce0";x.lineWidth=5*D;x.shadowBlur=24*D;x.shadowColor="#ff5ce0";x.beginPath();x.moveTo(player.x*W,player.y*H-20*D);x.lineTo(player.x*W,0);x.stroke();x.restore()}for(const q of sparks){x.fillStyle=q.color;x.globalAlpha=1-q.t/q.life;x.fillRect(q.x*W,q.y*H,2.2*D,2.2*D)}x.globalAlpha=1;drawShip(player.x*W,player.y*H);if(player.weapon==="plasma"){const bw=70*D;x.fillStyle="#03110c";x.fillRect(player.x*W-bw/2,player.y*H+34*D,bw,5*D);x.fillStyle=player.heat>=100?"#ff3d5c":"#ff5ce0";x.fillRect(player.x*W-bw/2,player.y*H+34*D,bw*(player.heat/100),5*D)}const bw2=70*D;x.fillStyle="#03110c";x.fillRect(player.x*W-bw2/2,player.y*H+42*D,bw2,4*D);x.fillStyle=player.boosting?"#41ffe0":"#38c9a8";x.fillRect(player.x*W-bw2/2,player.y*H+42*D,bw2*(player.boostFuel/100),4*D);x.restore();if(player.boosting){const vg=x.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.66);const pulse=.1+Math.sin(t*.02)*.04;vg.addColorStop(0,"rgba(65,255,224,0)");vg.addColorStop(1,`rgba(65,255,224,${pulse})`);x.fillStyle=vg;x.fillRect(0,0,W,H)}}
    function loop(t){if(!running)return;if(paused){last=t;requestAnimationFrame(loop);return}const dt=Math.min(34,Math.max(0,t-last));last=t;update(dt);draw(t);host('score',{score,progress:Math.min(98,score/20),state:{wave,lives,combo}});requestAnimationFrame(loop)}
    addEventListener('resize',size);
    addEventListener('keydown',event=>{const k=event.key.toLowerCase();if(["arrowleft","arrowright","arrowup","arrowdown","w","a","s","d"," ","p","shift"].includes(k))event.preventDefault();if(k===" "||k==="p")setPaused(!paused);else keys.add(k)});
    addEventListener('keyup',event=>keys.delete(event.key.toLowerCase()));
    c.addEventListener('pointerdown',event=>{event.preventDefault();c.setPointerCapture?.(event.pointerId);touchMove(event)});
    c.addEventListener('pointermove',touchMove);
    c.addEventListener('pointerup',()=>{player.vx*=.4;player.vy*=.4});
    c.addEventListener('pointercancel',()=>{player.vx*=.4;player.vy*=.4});
    function touchMove(event){if(!running||paused)return;const rect=c.getBoundingClientRect();const tx=(event.clientX-rect.left)/rect.width,ty=(event.clientY-rect.top)/rect.height;player.vx+=(tx-player.x)*.00054*W;player.vy+=(ty-player.y)*.00054*H}
    startEl.querySelector('button').onclick=startRun;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&running&&!paused)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='settings'){reduced=!!event.data.reducedMotion;gpOn=!!event.data.gamepad}if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')startRun()});
    // --- Gamepad (PhantomPlay standard mapping): stick/d-pad steer (additive with keyboard), A launches/resumes, Start pauses ---
    let gpOn=false,gpIdx=null,gpAxX=0,gpAxY=0,gpPrevA=false,gpPrevStart=false;
    function gpPad(){const p=navigator.getGamepads?navigator.getGamepads():[];if(gpIdx===null)for(let i=0;i<p.length;i++)if(p[i]){gpIdx=i;break}return gpIdx===null?null:p[gpIdx]}
    function gpAction(){if(!running){startRun();return}if(paused)setPaused(false)}
    (function gpLoop(){if(gpOn){const pad=gpPad();if(pad){const b=pad.buttons,ax0=pad.axes[0]||0,ay0=pad.axes[1]||0;let axX=Math.abs(ax0)>.15?ax0:0,axY=Math.abs(ay0)>.15?ay0:0;if(b[14]&&b[14].pressed)axX=-1;if(b[15]&&b[15].pressed)axX=1;if(b[12]&&b[12].pressed)axY=-1;if(b[13]&&b[13].pressed)axY=1;gpAxX=axX;gpAxY=axY;const a=!!(b[0]&&b[0].pressed),st=!!(b[9]&&b[9].pressed);if(a&&!gpPrevA)gpAction();if(st&&!gpPrevStart&&running)setPaused(!paused);gpPrevA=a;gpPrevStart=st}else{gpAxX=0;gpAxY=0}}requestAnimationFrame(gpLoop)})();
    size();hud();host('ready');
  </script>
</body>
