<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
  <title>Neon Drift</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#eafff3;font-family:system-ui,sans-serif;touch-action:none;user-select:none}body{display:grid;place-items:center;background:radial-gradient(circle at 50% 20%,#0b3c2a 0,#03110c 38%,#010504 75%)}canvas{width:100%;height:100%;display:block}.hud{position:fixed;z-index:4;inset:max(14px,env(safe-area-inset-top)) 14px auto;display:flex;gap:7px;justify-content:space-between;pointer-events:none}.hud span{min-width:72px;padding:8px 11px;border:1px solid #2cff9b55;border-radius:999px;background:#020b08d9;font:800 11px ui-monospace;color:#7dffbd;text-align:center}.start,.pause-card{position:fixed;z-index:8;inset:0;display:grid;place-items:center;background:#010504d9;backdrop-filter:blur(5px)}.start[hidden],.pause-card[hidden]{display:none}.start div,.pause-card div{text-align:center;padding:28px;max-width:440px}.start h1,.pause-card h2{font-size:56px;line-height:1;margin:0;color:#61ffb0}.start p,.pause-card p{color:#a9c4b6;line-height:1.5}.start button,.pause-card button{min-width:138px;min-height:48px;border:0;border-radius:999px;background:#4bffa3;color:#021109;padding:14px 24px;font-weight:900;cursor:pointer}.touch{position:fixed;z-index:5;inset:auto 0 0;height:44%;display:grid;grid-template-columns:1fr 1fr}.touch button{display:flex;align-items:flex-end;justify-content:center;padding-bottom:max(22px,env(safe-area-inset-bottom));border:0;background:linear-gradient(90deg,#41ffa105,transparent);color:#8dffc4;font-size:34px;opacity:.35}.touch button:last-child{background:linear-gradient(270deg,#41ffa105,transparent)}.touch button:active{opacity:.8;background:#41ffa118}.hit{position:fixed;z-index:7;inset:0;pointer-events:none;opacity:0;background:#ff315f33}.hit.flash{animation:hit .24s ease}@keyframes hit{45%{opacity:1}}@media(pointer:fine){.touch{display:none}}@media(max-width:600px){.start h1,.pause-card h2{font-size:38px}.hud span{min-width:62px;padding:7px 8px;font-size:9px}}
  </style>
</head>
<body>
  <canvas aria-label="Neon Drift play field"></canvas>
  <div class="hud"><span data-score>SCORE 0</span><span data-lives>LIVES 3</span><span data-best>STREAK 0</span></div>
  <div class="start"><div><h1>Neon Drift</h1><p>Dodge the red signals. Use arrow keys, A/D, or hold either side of the screen.</p><button type="button">Start run</button></div></div>
  <div class="pause-card" hidden><div><h2>Paused</h2><p>Your run is safe.</p><button type="button">Resume</button></div></div>
  <div class="hit"></div>
  <div class="touch"><button type="button" data-left aria-label="Move left">‹</button><button type="button" data-right aria-label="Move right">›</button></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const c=document.querySelector('canvas'),x=c.getContext('2d'),scoreEl=document.querySelector('[data-score]'),streakEl=document.querySelector('[data-best]'),livesEl=document.querySelector('[data-lives]'),startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause-card'),hitEl=document.querySelector('.hit');
    let W=0,H=0,running=false,paused=false,last=0,score=0,streak=0,lives=3,player=.5,velocity=0,spawn=0,rocks=[],reduced=false;

    function size(){W=c.width=Math.max(320,Math.round(innerWidth*devicePixelRatio));H=c.height=Math.max(480,Math.round(innerHeight*devicePixelRatio));draw(performance.now())}
    function move(dir){if(running&&!paused)velocity=dir*.00115*W}
    function stopMove(){velocity=0}
    function updateHud(){scoreEl.textContent=`SCORE ${score}`;streakEl.textContent=`STREAK ${streak}`;livesEl.textContent=`LIVES ${lives}`}
    function setPaused(next){if(!running)return;paused=next;stopMove();pauseEl.hidden=!paused;last=performance.now();host('paused',{paused})}
    function startRun(){score=0;streak=0;lives=3;player=.5;velocity=0;spawn=120;rocks=[];running=true;paused=false;startEl.hidden=true;pauseEl.hidden=true;updateHud();last=performance.now();host('progress',{score:0,progress:0,state:{streak:0,lives:3}});requestAnimationFrame(loop);c.focus?.()}
    function finish(title,copy){running=false;paused=false;stopMove();startEl.hidden=false;startEl.querySelector('h1').textContent=title;startEl.querySelector('p').textContent=copy;startEl.querySelector('button').textContent='Play again';host('complete',{score,progress:100,state:{streak,lives}})}
    function collide(){lives--;streak=0;rocks=[];player=.5;spawn=420;updateHud();hitEl.classList.remove('flash');void hitEl.offsetWidth;hitEl.classList.add('flash');host('score',{score,progress:Math.min(96,score*3),state:{streak,lives}});if(lives<=0)finish('Run over',`You cleared ${score} signals. Beat it on the next run.`)}
    function loop(t){if(!running)return;if(paused){last=t;requestAnimationFrame(loop);return}const dt=Math.min(32,Math.max(0,t-last));last=t;player=Math.max(.08,Math.min(.92,player+velocity*dt/W));spawn-=dt;if(spawn<=0){spawn=Math.max(250,760-score*7);rocks.push({x:.08+Math.random()*.84,y:-.08,s:.025+Math.random()*.024,v:.00023+Math.random()*.00019,hit:false})}for(const r of rocks)r.y+=r.v*dt;for(const r of rocks){if(!r.hit&&r.y>.76&&r.y<.93&&Math.abs(r.x-player)<r.s+.038){r.hit=true;collide();break}if(!r.hit&&r.y>1.05){r.hit=true;score++;streak++;updateHud();host('score',{score,progress:Math.min(96,score*3),state:{streak,lives}});if(score>=30){finish('Storm cleared',`Clean run. ${score} signals dodged with ${lives} lives left.`);break}}}rocks=rocks.filter(r=>!r.hit);draw(t);if(running)requestAnimationFrame(loop)}
    function draw(t=0){x.clearRect(0,0,W,H);const horizon=H*.16;x.strokeStyle='#32ff9a24';x.lineWidth=Math.max(1,devicePixelRatio);for(let i=0;i<9;i++){x.beginPath();x.moveTo(W/2,horizon);x.lineTo(W*(i/8),H);x.stroke()}for(let y=.22;y<1;y+=.095){x.beginPath();x.moveTo(0,H*y);x.lineTo(W,H*y);x.stroke()}for(const r of rocks){x.fillStyle='#ff4f75';x.shadowBlur=18*devicePixelRatio;x.shadowColor='#ff315f';x.beginPath();x.arc(W*r.x,H*r.y,W*r.s,0,Math.PI*2);x.fill()}x.shadowBlur=24*devicePixelRatio;x.shadowColor='#41ffa1';x.fillStyle='#55ffad';x.beginPath();x.moveTo(W*player,H*.76);x.lineTo(W*(player-.05),H*.91);x.lineTo(W*(player+.05),H*.91);x.closePath();x.fill();if(!reduced){x.fillStyle='#45ffa933';for(let i=0;i<24;i++)x.fillRect((Math.sin(t*.001+i*2.3)*.5+.5)*W,(i/24)*H,2*devicePixelRatio,2*devicePixelRatio)}x.shadowBlur=0}

    addEventListener('resize',size);
    addEventListener('keydown',event=>{if(['ArrowLeft','a','A','ArrowRight','d','D',' ','p','P'].includes(event.key))event.preventDefault();if(event.key==='ArrowLeft'||event.key==='a'||event.key==='A')move(-1);if(event.key==='ArrowRight'||event.key==='d'||event.key==='D')move(1);if(event.key==='p'||event.key==='P'||event.key===' ')setPaused(!paused)});
    addEventListener('keyup',event=>{if(['ArrowLeft','ArrowRight','a','A','d','D'].includes(event.key))stopMove()});
    for(const [selector,direction] of [['[data-left]',-1],['[data-right]',1]]){const button=document.querySelector(selector);button.onpointerdown=event=>{event.preventDefault();button.setPointerCapture?.(event.pointerId);move(direction)};button.onpointerup=stopMove;button.onpointercancel=stopMove}
    startEl.querySelector('button').onclick=startRun;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&running&&!paused)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='settings')reduced=!!event.data.reducedMotion;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='restart')startRun()});
    size();updateHud();host('ready');
  </script>
</body>
</html>
