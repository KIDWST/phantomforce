<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
  <title>Neon Drift</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#eafff3;font-family:system-ui,sans-serif;touch-action:none;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;background:radial-gradient(circle at 50% 28%,#0c3f2d 0,#03110c 42%,#010403 80%)}canvas{width:100%;height:100%;display:block;outline:0}.hud{position:fixed;z-index:4;inset:max(12px,env(safe-area-inset-top)) 12px auto;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;pointer-events:none}.hud span{min-width:0;padding:8px 9px;border:1px solid #2cff9b55;border-radius:999px;background:#020b08dd;font:900 10px ui-monospace,monospace;color:#7dffbd;text-align:center;box-shadow:0 0 20px #28ff8d16}.start,.pause-card{position:fixed;z-index:8;inset:0;display:grid;place-items:center;background:#010504d9;backdrop-filter:blur(6px)}.start[hidden],.pause-card[hidden]{display:none}.start div,.pause-card div{text-align:center;padding:28px;max-width:500px}.start h1,.pause-card h2{font-size:54px;line-height:1;margin:0;color:#61ffb0;text-shadow:0 0 28px #28ff8d55}.start p,.pause-card p{color:#b3cebf;line-height:1.5}.start button,.pause-card button{min-width:150px;min-height:50px;border:0;border-radius:999px;background:#4bffa3;color:#021109;padding:14px 24px;font-weight:950;cursor:pointer}.touch{position:fixed;z-index:5;inset:auto 0 0;height:max(44%,240px);display:grid;grid-template-columns:1fr 1fr;pointer-events:none}.touch .pad{pointer-events:auto;border:0;background:radial-gradient(circle at 50% 65%,#41ffa111,transparent 46%);color:#8dffc4;font-size:13px;font-weight:950;opacity:.5;touch-action:none}.touch .pad:active{opacity:.9;background:#41ffa118}.hit{position:fixed;z-index:7;inset:0;pointer-events:none;opacity:0;background:#ff315f2b}.hit.flash{animation:hit .24s ease}.power-note{position:fixed;z-index:6;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);padding:9px 13px;border:1px solid #41ffa155;border-radius:999px;background:#04120dde;color:#caffdf;font:900 10px ui-monospace,monospace;letter-spacing:.08em;text-transform:uppercase;opacity:0;transition:opacity .2s ease}.power-note.show{opacity:1}@keyframes hit{45%{opacity:1}}@media(pointer:fine){.touch{display:none}}@media(max-width:620px){.hud{grid-template-columns:repeat(2,minmax(0,1fr));gap:6px}.hud span{padding:7px 8px;font-size:9px}.start div,.pause-card div{padding:22px 18px}.start h1,.pause-card h2{font-size:38px}.start button,.pause-card button{min-width:160px;min-height:52px}.touch{height:54%}}
  </style>
</head>
<body>
  <canvas aria-label="Neon Drift play field" tabindex="0"></canvas>
  <div class="hud">
    <span data-score>SCORE 0</span>
    <span data-lives>HULL 3</span>
    <span data-wave>WAVE 1</span>
    <span data-power>POWER BASE</span>
  </div>
  <div class="start"><div><h1>Neon Drift</h1><p>Auto-fire spaceship shooter. Move with WASD or arrow keys. Touch and drag on mobile. Grab powerups, clear waves, and stay alive.</p><button type="button">Launch ship</button></div></div>
  <div class="pause-card" hidden><div><h2>Paused</h2><p>Your run is safe.</p><button type="button">Resume</button></div></div>
  <div class="hit"></div>
  <div class="power-note" data-note></div>
  <div class="touch"><button type="button" class="pad" data-touch aria-label="Touch steering">DRAG TO FLY</button><button type="button" class="pad" data-touch aria-label="Touch steering">DRAG TO FLY</button></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const c=document.querySelector('canvas'),x=c.getContext('2d'),scoreEl=document.querySelector('[data-score]'),livesEl=document.querySelector('[data-lives]'),waveEl=document.querySelector('[data-wave]'),powerEl=document.querySelector('[data-power]'),startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause-card'),hitEl=document.querySelector('.hit'),noteEl=document.querySelector('[data-note]');
    let W=0,H=0,D=1,running=false,paused=false,reduced=false,last=0,score=0,lives=3,wave=1,combo=0,shake=0,spawn=0,fire=0,waveKills=0;
    const player={x:.5,y:.82,vx:0,vy:0,r:.014,shield:0,rapid:0,spread:0,magnet:0,invuln:0};
    const keys=new Set(),shots=[],enemies=[],sparks=[],powerups=[],stars=[];
    const powers={rapid:["RAPID FIRE","#64ffdb"],spread:["SPREAD SHOT","#b78cff"],shield:["SHIELD","#75ff8b"],magnet:["MAGNET","#ffd166"],repair:["REPAIR","#7cc7ff"]};
    function size(){D=devicePixelRatio||1;W=c.width=Math.max(320,Math.round(innerWidth*D));H=c.height=Math.max(480,Math.round(innerHeight*D));stars.length=0;for(let i=0;i<90;i++)stars.push({x:Math.random(),y:Math.random(),s:.5+Math.random()*1.8,a:.25+Math.random()*.55});draw(performance.now())}
    function hud(){scoreEl.textContent=`SCORE ${score}`;livesEl.textContent=`HULL ${lives}`;waveEl.textContent=`WAVE ${wave}`;const active=player.shield>0?"SHIELD":player.spread>0?"SPREAD":player.rapid>0?"RAPID":player.magnet>0?"MAGNET":"BASE";powerEl.textContent=`POWER ${active}`}
    function showNote(text){noteEl.textContent=text;noteEl.classList.add('show');clearTimeout(showNote.t);showNote.t=setTimeout(()=>noteEl.classList.remove('show'),1100)}
    function startRun(){score=0;lives=3;wave=1;combo=0;shake=0;spawn=240;fire=0;waveKills=0;Object.assign(player,{x:.5,y:.82,vx:0,vy:0,shield:0,rapid:0,spread:0,magnet:0,invuln:900});shots.length=0;enemies.length=0;sparks.length=0;powerups.length=0;running=true;paused=false;startEl.hidden=true;pauseEl.hidden=true;hud();last=performance.now();host('progress',{score:0,progress:0,state:{wave,lives}});requestAnimationFrame(loop);c.focus?.()}
    function finish(title,copy){running=false;paused=false;startEl.hidden=false;startEl.querySelector('h1').textContent=title;startEl.querySelector('p').textContent=copy;startEl.querySelector('button').textContent='Play again';host('complete',{score,progress:100,state:{wave,lives,combo}})}
    function setPaused(next){if(!running)return;paused=next;pauseEl.hidden=!paused;last=performance.now();host('paused',{paused})}
    function rnd(a,b){return a+Math.random()*(b-a)}
    function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
    function addSparks(px,py,color,count=14){if(reduced)return;for(let i=0;i<count;i++)sparks.push({x:px,y:py,vx:rnd(-.00035,.00035),vy:rnd(-.0005,.00022),life:rnd(260,620),t:0,color})}
    function spawnEnemy(){const type=Math.random()<Math.min(.18+wave*.015,.42)?"zig":Math.random()<.22?"tank":"drone";const hp=type==="tank"?3+Math.floor(wave/3):1;enemies.push({type,x:rnd(.08,.92),y:-.08,r:type==="tank"?.034:.025,hp,max:hp,v:rnd(.00013,.00023)+wave*.000016,phase:Math.random()*9,shoot:rnd(780,1480),value:type==="tank"?85:40})}
    function spawnPower(px,py){if(Math.random()>.22)return;const pool=["rapid","spread","shield","magnet","repair"];const kind=pool[Math.floor(Math.random()*pool.length)];powerups.push({kind,x:px,y:py,r:.02,v:.00016,spin:0})}
    function shoot(){const rate=player.rapid>0?62:108;if(fire>0)return;fire=rate;const base={x:player.x,y:player.y-.052,vy:-.00155,r:.006,life:900,enemy:false,color:"#7dffbd",dmg:1};shots.push({...base,vx:0});if(player.spread>0){shots.push({...base,vx:-.00035,color:"#d8a2ff"});shots.push({...base,vx:.00035,color:"#d8a2ff"})}}
    function enemyShot(e){shots.push({x:e.x,y:e.y+.025,vx:(player.x-e.x)*.00012,vy:.00042+wave*.000012,r:.008,life:2200,enemy:true,color:"#ff4f75",dmg:1})}
    function damage(){if(player.invuln>0)return;if(player.shield>0){player.shield=0;player.invuln=700;showNote("Shield broke");addSparks(player.x,player.y,"#75ff8b",28);return}lives--;combo=0;shake=12;player.invuln=1050;hitEl.classList.remove('flash');void hitEl.offsetWidth;hitEl.classList.add('flash');addSparks(player.x,player.y,"#ff4f75",36);hud();host('score',{score,progress:Math.min(98,score/18),state:{wave,lives}});if(lives<=0)finish('Ship down',`You reached wave ${wave} with ${score} points. Upgrade the run.`)}
    function collect(p){if(p.kind==="repair")lives=Math.min(5,lives+1);else player[p.kind]=p.kind==="shield"?1:6500;showNote(powers[p.kind][0]);addSparks(p.x,p.y,powers[p.kind][1],24);hud()}
    function update(dt){const accel=.000055*W,drag=Math.pow(.91,dt/16),maxSpeed=.0032;let ax=0,ay=0;if(keys.has('a')||keys.has('arrowleft'))ax-=accel;if(keys.has('d')||keys.has('arrowright'))ax+=accel;if(keys.has('w')||keys.has('arrowup'))ay-=accel;if(keys.has('s')||keys.has('arrowdown'))ay+=accel;player.vx=clamp((player.vx+ax)*drag,-maxSpeed*W,maxSpeed*W);player.vy=clamp((player.vy+ay)*drag,-maxSpeed*H,maxSpeed*H);player.x=clamp(player.x+player.vx*dt/W,.055,.945);player.y=clamp(player.y+player.vy*dt/H,.16,.94);fire=Math.max(0,fire-dt);shoot();spawn-=dt;if(spawn<=0){spawn=Math.max(130,390-wave*18);spawnEnemy()}for(const key of ["rapid","spread","magnet"])player[key]=Math.max(0,player[key]-dt);player.invuln=Math.max(0,player.invuln-dt);
      for(const e of enemies){e.phase+=dt*.004;e.y+=e.v*dt;if(e.type==="zig")e.x+=Math.sin(e.phase)*.00012*dt;e.shoot-=dt;if(e.shoot<=0){e.shoot=rnd(1200,2100)-wave*20;enemyShot(e)}}for(const s of shots){s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt}for(const p of powerups){p.y+=p.v*dt;p.spin+=dt*.006;if(player.magnet>0){p.x+=(player.x-p.x)*.004*dt;p.y+=(player.y-p.y)*.004*dt}}for(const q of sparks){q.x+=q.vx*dt;q.y+=q.vy*dt;q.t+=dt}shake=Math.max(0,shake-dt*.05);
      for(const s of shots){if(s.enemy)continue;for(const e of enemies){if(e.dead)continue;const dx=s.x-e.x,dy=s.y-e.y;if(dx*dx+dy*dy<(s.r+e.r)*(s.r+e.r)){s.life=0;e.hp-=s.dmg;addSparks(s.x,s.y,"#7dffbd",5);if(e.hp<=0){e.dead=true;score+=e.value+combo*3;combo++;waveKills++;spawnPower(e.x,e.y);addSparks(e.x,e.y,e.type==="tank"?"#ffd166":"#41ffa1",22);if(waveKills>=10+wave*3){wave++;waveKills=0;showNote(`Wave ${wave}`)}}break}}}
      for(const s of shots){if(!s.enemy||s.life<=0)continue;const dx=s.x-player.x,dy=s.y-player.y;if(dx*dx+dy*dy<(s.r+player.r)*(s.r+player.r)){s.life=0;damage()}}for(const e of enemies){if(e.dead)continue;const dx=e.x-player.x,dy=e.y-player.y;if(e.y>1.12){e.dead=true}else if(dx*dx+dy*dy<(e.r+player.r)*(e.r+player.r)){e.dead=true;damage()}}for(const p of powerups){if(p.dead)continue;const dx=p.x-player.x,dy=p.y-player.y;if(dx*dx+dy*dy<(p.r+player.r+.01)*(p.r+player.r+.01)){p.dead=true;collect(p)}}shots.splice(0,shots.length,...shots.filter(s=>s.life>0&&s.y>-.1&&s.y<1.12&&s.x>-.08&&s.x<1.08));enemies.splice(0,enemies.length,...enemies.filter(e=>!e.dead&&e.y<1.15));powerups.splice(0,powerups.length,...powerups.filter(p=>!p.dead&&p.y<1.1));sparks.splice(0,sparks.length,...sparks.filter(s=>s.t<s.life));hud()}
    function drawShip(px,py){x.save();x.translate(px,py);x.globalAlpha=player.invuln>0?.56+Math.sin(performance.now()*.03)*.28:1;x.shadowBlur=24*D;x.shadowColor=player.shield>0?"#75ff8b":"#41ffa1";x.fillStyle="#4bffa3";x.beginPath();x.moveTo(0,-24*D);x.lineTo(-18*D,20*D);x.lineTo(0,11*D);x.lineTo(18*D,20*D);x.closePath();x.fill();x.fillStyle="#062117";x.fillRect(-5*D,-2*D,10*D,15*D);if(player.shield>0){x.strokeStyle="#75ff8b99";x.lineWidth=2*D;x.beginPath();x.arc(0,0,31*D,0,Math.PI*2);x.stroke()}x.restore()}
    function draw(t=0){x.clearRect(0,0,W,H);x.save();if(shake)x.translate(rnd(-shake,shake)*D,rnd(-shake,shake)*D);const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#04110d");g.addColorStop(.58,"#061f15");g.addColorStop(1,"#020604");x.fillStyle=g;x.fillRect(0,0,W,H);x.strokeStyle="#39ff9b22";x.lineWidth=1*D;for(let i=0;i<10;i++){x.beginPath();x.moveTo(W/2,H*.18);x.lineTo(W*(i/9),H);x.stroke()}for(let y=.22;y<1;y+=.095){x.beginPath();x.moveTo(0,H*y);x.lineTo(W,H*y);x.stroke()}for(const st of stars){x.fillStyle=`rgba(125,255,189,${st.a})`;x.fillRect(st.x*W,((st.y+t*.000055)%1)*H,st.s*D,st.s*D)}for(const p of powerups){x.save();x.translate(p.x*W,p.y*H);x.rotate(p.spin);x.shadowBlur=20*D;x.shadowColor=powers[p.kind][1];x.strokeStyle=powers[p.kind][1];x.lineWidth=3*D;x.strokeRect(-12*D,-12*D,24*D,24*D);x.restore()}for(const s of shots){x.shadowBlur=14*D;x.shadowColor=s.color;x.fillStyle=s.color;x.beginPath();x.arc(s.x*W,s.y*H,s.r*W,0,Math.PI*2);x.fill()}for(const e of enemies){x.shadowBlur=22*D;x.shadowColor=e.type==="tank"?"#ffd166":"#ff4f75";x.fillStyle=e.type==="tank"?"#ffd166":"#ff4f75";x.beginPath();x.arc(e.x*W,e.y*H,e.r*W,0,Math.PI*2);x.fill();if(e.hp>1){x.fillStyle="#03110c";x.fillRect((e.x-e.r)*W,(e.y-e.r-.014)*H,e.r*2*W,3*D);x.fillStyle="#4bffa3";x.fillRect((e.x-e.r)*W,(e.y-e.r-.014)*H,e.r*2*W*(e.hp/e.max),3*D)}}for(const q of sparks){x.fillStyle=q.color;x.globalAlpha=1-q.t/q.life;x.fillRect(q.x*W,q.y*H,2.2*D,2.2*D)}x.globalAlpha=1;drawShip(player.x*W,player.y*H);x.restore()}
    function loop(t){if(!running)return;if(paused){last=t;requestAnimationFrame(loop);return}const dt=Math.min(34,Math.max(0,t-last));last=t;update(dt);draw(t);host('score',{score,progress:Math.min(98,score/20),state:{wave,lives,combo}});requestAnimationFrame(loop)}
    addEventListener('resize',size);
    addEventListener('keydown',event=>{const k=event.key.toLowerCase();if(["arrowleft","arrowright","arrowup","arrowdown","w","a","s","d"," ","p"].includes(k))event.preventDefault();if(k===" "||k==="p")setPaused(!paused);else keys.add(k)});
    addEventListener('keyup',event=>keys.delete(event.key.toLowerCase()));
    for(const pad of document.querySelectorAll('[data-touch]')){pad.onpointerdown=event=>{event.preventDefault();pad.setPointerCapture?.(event.pointerId);touchMove(event)};pad.onpointermove=touchMove;pad.onpointerup=()=>{player.vx*=.4;player.vy*=.4};pad.onpointercancel=pad.onpointerup}
    function touchMove(event){if(!running||paused)return;const rect=c.getBoundingClientRect();const tx=(event.clientX-rect.left)/rect.width,ty=(event.clientY-rect.top)/rect.height;player.vx+=(tx-player.x)*.00054*W;player.vy+=(ty-player.y)*.00054*H}
    startEl.querySelector('button').onclick=startRun;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&running&&!paused)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='settings')reduced=!!event.data.reducedMotion;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')startRun()});
    size();hud();host('ready');
  </script>
</body>
</html>
