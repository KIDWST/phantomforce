<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
  <title>Neon Drift</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#eafff3;font-family:Inter,system-ui,sans-serif;touch-action:none;user-select:none}body{display:grid;place-items:center;background:radial-gradient(circle at 50% 15%,#113522 0,#03110d 34%,#010403 80%)}canvas{width:100%;height:100%;display:block}.hud{position:fixed;z-index:4;inset:max(12px,env(safe-area-inset-top)) 12px auto;display:flex;gap:8px;justify-content:space-between;pointer-events:none}.hud span{min-width:76px;padding:8px 11px;border:1px solid #2cff9b66;border-radius:999px;background:#020b08e6;font:900 10px ui-monospace;color:#8dffc4;text-align:center;box-shadow:0 0 18px #25ff9b16}.start,.pause-card{position:fixed;z-index:8;inset:0;display:grid;place-items:center;background:linear-gradient(160deg,#010504f2,#040816e8);backdrop-filter:blur(8px)}.start[hidden],.pause-card[hidden]{display:none}.start div,.pause-card div{text-align:center;padding:30px;max-width:520px}.start h1,.pause-card h2{font-size:clamp(42px,8vw,78px);line-height:.92;margin:0;color:#61ffb0;text-shadow:0 0 28px #41ffa144}.start p,.pause-card p{color:#b1d6c3;line-height:1.55}.start button,.pause-card button{min-width:150px;min-height:50px;border:0;border-radius:999px;background:#4bffa3;color:#021109;padding:14px 24px;font-weight:950;cursor:pointer;box-shadow:0 12px 34px #41ffa122}.touch{position:fixed;z-index:5;inset:auto 0 0;height:44%;display:grid;grid-template-columns:1fr 1fr}.touch button{display:flex;align-items:flex-end;justify-content:center;padding-bottom:max(22px,env(safe-area-inset-bottom));border:0;background:linear-gradient(90deg,#41ffa108,transparent);color:#8dffc4;font-size:34px;opacity:.35}.touch button:last-child{background:linear-gradient(270deg,#41ffa108,transparent)}.touch button:active{opacity:.85;background:#41ffa11f}.hit{position:fixed;z-index:7;inset:0;pointer-events:none;opacity:0;background:#ff315f33}.hit.flash{animation:hit .24s ease}@keyframes hit{45%{opacity:1}}.level-flash{position:fixed;z-index:6;left:50%;top:22%;transform:translate(-50%,-50%) scale(.9);opacity:0;color:#eafff3;font:950 clamp(26px,5vw,54px) ui-monospace;text-shadow:0 0 22px #41ffa1}.level-flash.show{animation:levelPop 1.1s ease}@keyframes levelPop{20%,78%{opacity:1;transform:translate(-50%,-50%) scale(1)}}@media(pointer:fine){.touch{display:none}}@media(max-width:600px){.hud{flex-wrap:wrap}.hud span{min-width:64px;padding:7px 8px;font-size:9px}}
  </style>
</head>
<body>
  <canvas aria-label="Neon Drift play field"></canvas>
  <div class="hud"><span data-score>SCORE 0</span><span data-level>LVL 1</span><span data-lives>SHIELDS 3</span><span data-streak>CHAIN 0</span></div>
  <div class="start"><div><h1>Neon Drift</h1><p>Hard mode: dodge red mines, purple slicers, and blue sweepers. Survive level gates. Arrow keys, A/D, or hold either side.</p><button type="button">Start hard run</button></div></div>
  <div class="pause-card" hidden><div><h2>Paused</h2><p>Your run is safe.</p><button type="button">Resume</button></div></div>
  <div class="level-flash" data-level-flash>LEVEL 1</div>
  <div class="hit"></div>
  <div class="touch"><button type="button" data-left aria-label="Move left">‹</button><button type="button" data-right aria-label="Move right">›</button></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const c=document.querySelector('canvas'),x=c.getContext('2d');
    const scoreEl=document.querySelector('[data-score]'),levelEl=document.querySelector('[data-level]'),streakEl=document.querySelector('[data-streak]'),livesEl=document.querySelector('[data-lives]');
    const startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause-card'),hitEl=document.querySelector('.hit'),levelFlash=document.querySelector('[data-level-flash]');
    let W=0,H=0,D=1,running=false,paused=false,last=0,score=0,streak=0,lives=3,level=1,player=.5,velocity=0,spawn=0,hazards=[],sparks=[],stars=[],sound=true,reduced=false,audio=null,melodyTimer=0,beat=0,screenShake=0;
    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    const rnd=(a,b)=>a+Math.random()*(b-a);
    const levelCfg=()=>({speed:1+(level-1)*.18,spawn:Math.max(135,440-level*32),hazards:level<3?['mine']:level<5?['mine','slicer']:['mine','slicer','sweeper']});

    function size(){D=devicePixelRatio||1;W=c.width=Math.max(320,Math.round(innerWidth*D));H=c.height=Math.max(480,Math.round(innerHeight*D));stars=Array.from({length:reduced?20:90},()=>({x:Math.random(),y:Math.random(),z:rnd(.25,1),h:rnd(140,160)}));draw(performance.now())}
    function updateHud(){scoreEl.textContent=`SCORE ${score}`;levelEl.textContent=`LVL ${level}`;streakEl.textContent=`CHAIN ${streak}`;livesEl.textContent=`SHIELDS ${lives}`}
    function audioCtx(){if(!sound)return null;if(!audio){const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;audio=new AC()}audio.resume?.();return audio}
    function tone(freq=.01,len=.08,type='sine',gain=.035){const ac=audioCtx();if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+len);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+len)}
    function music(dt){if(!running||paused||reduced||!sound)return;melodyTimer-=dt;if(melodyTimer>0)return;const notes=[196,247,294,370,330,247,392,294];tone(notes[beat++%notes.length]*(1+level*.018),.09,'triangle',.018);melodyTimer=Math.max(92,180-level*8)}
    function showLevel(){levelFlash.textContent=`LEVEL ${level}`;levelFlash.classList.remove('show');void levelFlash.offsetWidth;levelFlash.classList.add('show');tone(330+level*42,.18,'sawtooth',.03)}
    function move(dir){if(running&&!paused)velocity=dir*(.00138+.000035*level)*W}
    function stopMove(){velocity=0}
    function postProgress(type='score'){host(type,{score,progress:Math.min(98,Math.round((level-1)*12+score*.8)),state:{streak,lives,level}})}
    function setPaused(next){if(!running)return;paused=next;stopMove();pauseEl.hidden=!paused;last=performance.now();host('paused',{paused})}
    function startRun(){score=0;streak=0;lives=3;level=1;player=.5;velocity=0;spawn=120;hazards=[];sparks=[];screenShake=0;running=true;paused=false;startEl.hidden=true;pauseEl.hidden=true;updateHud();showLevel();postProgress('progress');last=performance.now();audioCtx();requestAnimationFrame(loop);c.focus?.()}
    function finish(title,copy){running=false;paused=false;stopMove();startEl.hidden=false;startEl.querySelector('h1').textContent=title;startEl.querySelector('p').textContent=copy;startEl.querySelector('button').textContent='Play again';host('complete',{score,progress:100,state:{streak,lives,level}});tone(96,.35,'sawtooth',.045)}
    function spawnHazard(){const cfg=levelCfg();const type=cfg.hazards[Math.floor(Math.random()*cfg.hazards.length)];const base={type,x:rnd(.08,.92),y:-.08,s:rnd(.022,.04),v:rnd(.00034,.00056)*cfg.speed,hit:false,phase:rnd(0,9)};if(type==='slicer'){base.w=rnd(.15,.28);base.s=.018;base.v*=1.07}else if(type==='sweeper'){base.s=.026;base.v*=.86;base.dir=Math.random()<.5?-1:1;base.x=base.dir<0?.96:.04}else if(level>6&&Math.random()<.18){base.type='splitter';base.s=.034;base.v*=.92}hazards.push(base)}
    function addSparks(px,py,color,count=16){if(reduced)return;for(let i=0;i<count;i++)sparks.push({x:px,y:py,vx:rnd(-.7,.7),vy:rnd(-1.2,.25),life:rnd(220,520),color})}
    function damage(){lives--;streak=0;screenShake=16;hazards=[];player=.5;spawn=520;updateHud();hitEl.classList.remove('flash');void hitEl.offsetWidth;hitEl.classList.add('flash');tone(74,.22,'sawtooth',.05);postProgress();if(lives<=0)finish('Signal crash',`You reached level ${level} and scored ${score}. This one bites back.`)}
    function clearHazard(h){h.hit=true;score+=h.type==='sweeper'?2:1;streak++;if(streak&&streak%8===0){score+=level;tone(520+level*20,.12,'square',.028)}const nextLevel=Math.min(10,1+Math.floor(score/10));if(nextLevel>level){level=nextLevel;showLevel()}updateHud();postProgress();addSparks(W*h.x,H*h.y,'#41ffa1',10);if(level>=10&&score>=110)finish('Neon legend',`Level 10 cleared. ${score} points. That is the ghost line.`)}
    function hazardHits(h){const px=player,py=.82;if(h.type==='slicer')return h.y>.72&&h.y<.92&&Math.abs(h.x-px)<(h.w||.2)*.5&&Math.abs(py-h.y)<.055;if(h.type==='sweeper')return h.y>.68&&h.y<.95&&Math.abs(h.x-px)<h.s+.04;if(h.type==='splitter')return h.y>.73&&h.y<.93&&Math.abs(h.x-px)<h.s+.045;return h.y>.75&&h.y<.94&&Math.abs(h.x-px)<h.s+.04}
    function loop(t){if(!running)return;if(paused){last=t;requestAnimationFrame(loop);return}const dt=Math.min(34,Math.max(0,t-last));last=t;music(dt);player=clamp(player+velocity*dt/W,.06,.94);spawn-=dt;if(spawn<=0){spawn=levelCfg().spawn*rnd(.58,1.05);spawnHazard();if(level>4&&Math.random()<.26)spawnHazard()}for(const h of hazards){h.y+=h.v*dt;if(h.type==='sweeper')h.x+=h.dir*.00052*dt*levelCfg().speed;if(h.type==='slicer')h.x+=Math.sin(t*.004+h.phase)*.0016;if(h.type==='splitter'){h.x+=Math.sin(t*.005+h.phase)*.001; if(h.y>.38&&!h.split){h.split=true;hazards.push({...h,type:'mine',x:clamp(h.x-.09,.06,.94),s:.023,v:h.v*1.18,hit:false},{...h,type:'mine',x:clamp(h.x+.09,.06,.94),s:.023,v:h.v*1.18,hit:false})}}}
      for(const h of hazards){if(!h.hit&&hazardHits(h)){h.hit=true;damage();break}if(!h.hit&&(h.y>1.08||h.x<-.12||h.x>1.12))clearHazard(h)}
      hazards=hazards.filter(h=>!h.hit);sparks.forEach(s=>{s.life-=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=.002*dt});sparks=sparks.filter(s=>s.life>0);screenShake=Math.max(0,screenShake-dt*.08);draw(t);requestAnimationFrame(loop)}
    function draw(t=0){const shake=screenShake?rnd(-screenShake,screenShake)*D:0;x.setTransform(1,0,0,1,shake,0);x.clearRect(-40,-40,W+80,H+80);const g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,'#06180f');g.addColorStop(.55,'#020705');g.addColorStop(1,'#000');x.fillStyle=g;x.fillRect(-40,-40,W+80,H+80);const horizon=H*.16;x.strokeStyle='#32ff9a26';x.lineWidth=Math.max(1,D);for(let i=0;i<13;i++){x.beginPath();x.moveTo(W/2,horizon);x.lineTo(W*(i/12),H);x.stroke()}for(let y=.2;y<1;y+=.075){const yy=H*(y+((t*.00005*level)% .075));x.beginPath();x.moveTo(0,yy);x.lineTo(W,yy);x.stroke()}for(const s of stars){s.y=(s.y+s.z*.00018*level)%1;x.fillStyle=`hsla(${s.h},100%,70%,${.18+s.z*.4})`;x.fillRect(s.x*W,s.y*H,Math.max(1,D*s.z*2),Math.max(4,D*s.z*9))}for(const h of hazards){x.shadowBlur=22*D;x.shadowColor=h.type==='sweeper'?'#4bd6ff':h.type==='slicer'?'#b05cff':'#ff315f';if(h.type==='slicer'){x.strokeStyle='#b05cff';x.lineWidth=Math.max(4,D*5);x.beginPath();x.moveTo(W*(h.x-(h.w||.2)/2),H*h.y);x.lineTo(W*(h.x+(h.w||.2)/2),H*h.y);x.stroke()}else{x.fillStyle=h.type==='sweeper'?'#4bd6ff':h.type==='splitter'?'#ffb84b':'#ff4f75';x.beginPath();x.arc(W*h.x,H*h.y,W*h.s*(1+Math.sin(t*.012+h.phase)*.08),0,Math.PI*2);x.fill();if(h.type==='sweeper'){x.strokeStyle='#4bd6ff88';x.beginPath();x.moveTo(W*h.x,H*h.y);x.lineTo(W*(h.x-h.dir*.18),H*(h.y-.04));x.stroke()}}}for(const s of sparks){x.shadowBlur=12*D;x.shadowColor=s.color;x.fillStyle=s.color;x.fillRect(s.x,s.y,2*D,8*D)}x.shadowBlur=26*D;x.shadowColor='#41ffa1';const py=H*.82,px=W*player;x.fillStyle='#55ffad';x.beginPath();x.moveTo(px,py-H*.065);x.lineTo(px-W*.048,py+H*.055);x.lineTo(px+W*.048,py+H*.055);x.closePath();x.fill();x.strokeStyle='#dffff2';x.lineWidth=2*D;x.stroke();x.shadowBlur=0;x.setTransform(1,0,0,1,0,0)}

    addEventListener('resize',size);
    addEventListener('keydown',event=>{if(['ArrowLeft','a','A','ArrowRight','d','D',' ','p','P'].includes(event.key))event.preventDefault();if(event.key==='ArrowLeft'||event.key==='a'||event.key==='A')move(-1);if(event.key==='ArrowRight'||event.key==='d'||event.key==='D')move(1);if(event.key==='p'||event.key==='P'||event.key===' ')setPaused(!paused)});
    addEventListener('keyup',event=>{if(['ArrowLeft','ArrowRight','a','A','d','D'].includes(event.key))stopMove()});
    for(const [selector,direction] of [['[data-left]',-1],['[data-right]',1]]){const button=document.querySelector(selector);button.onpointerdown=event=>{event.preventDefault();button.setPointerCapture?.(event.pointerId);move(direction)};button.onpointerup=stopMove;button.onpointercancel=stopMove}
    startEl.querySelector('button').onclick=startRun;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&running&&!paused)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='settings'){sound=event.data.sound!==false;reduced=!!event.data.reducedMotion;if(reduced)sparks=[]}if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='restart')startRun()});
    size();updateHud();host('ready');
  </script>
</body>
</html>
