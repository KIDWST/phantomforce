<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>Color Rush</title><style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020806;color:#effff6;font-family:system-ui,sans-serif;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;padding:16px;background:radial-gradient(circle at 50% 0,#0f3a2c,#020806 62%)}main{width:min(480px,100%)}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:12px;gap:10px}h1{margin:0;color:#58ffa8;font-size:30px;letter-spacing:-1px}.sub{color:#8fae9f;font-size:12px;margin:2px 0 0}.stats{display:flex;gap:14px;font:800 12px ui-monospace,monospace;text-align:right}.stats b{color:#77ffb8;font-size:20px;display:block}.stats span{color:#6f8a7d;text-transform:uppercase;letter-spacing:1px;font-size:9px}.lives{color:#ff7a7a}
.target{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;font:800 13px system-ui;color:#a9c5b7}.swatch{width:26px;height:26px;border-radius:8px;box-shadow:0 0 16px currentColor;border:2px solid #ffffff55}
.board{position:relative;width:100%;aspect-ratio:3/4;border:1px solid #42ff9a30;border-radius:16px;background:linear-gradient(180deg,#04120c,#020806);overflow:hidden;touch-action:none}
.cols{position:absolute;inset:0;display:grid;grid-template-columns:repeat(4,1fr)}.col{position:relative;border-right:1px solid #ffffff08;display:flex;align-items:flex-end;justify-content:center;cursor:pointer}.col:last-child{border-right:none}.col.hit{background:#ffffff10}
.key{margin-bottom:8px;padding:3px 0;width:60%;text-align:center;border:1px solid #ffffff22;border-radius:8px;font:800 12px ui-monospace,monospace;color:#7f9a8d;background:#ffffff08;z-index:2}
.catch{position:absolute;bottom:0;left:0;right:0;height:12%;border-top:2px dashed #58ffa855;pointer-events:none}
.tile{position:absolute;width:20%;aspect-ratio:1;border-radius:12px;left:0;top:0;box-shadow:0 0 14px currentColor,inset 0 -4px 8px #00000040;border:2px solid #ffffff33;will-change:transform}
.pop{position:absolute;font:900 15px ui-monospace,monospace;pointer-events:none;z-index:5;text-shadow:0 0 6px #000}
.status{text-align:center;min-height:20px;margin-top:10px;color:#a9c5b7;font-size:14px}
.btn{display:block;margin:12px auto 0;padding:12px 30px;border:1px solid #58ffa8;border-radius:30px;background:#0c3221;color:#defff0;font:800 15px system-ui;cursor:pointer}.btn:active{transform:scale(.96)}.hide{display:none}
@media(max-width:420px){h1{font-size:26px}}</style></head><body><main><header><div><h1>Color Rush</h1><p class="sub">Catch the target color. Keys A S D F.</p></div><div class="stats"><div><b id="score">0</b><span>Score</span></div><div><b class="lives" id="lives">♥♥♥</b><span>Lives</span></div></div></header>
<div class="target">CATCH <span class="swatch" id="swatch"></span> <b id="cname">—</b></div>
<div class="board" id="board"><div class="cols" id="cols"></div><div class="catch"></div></div>
<div class="status" id="status">Tap start to begin.</div><button class="btn" id="btn">Start</button></main><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
let reduced=false,sound=true;
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion;sound=!!e.data.sound}});
const COLORS=[{n:'GREEN',c:'#41ffa1'},{n:'CYAN',c:'#42d9ff'},{n:'AMBER',c:'#ffc24d'},{n:'MAGENTA',c:'#ff5cc8'},{n:'VIOLET',c:'#b078ff'}];
const KEYS=['A','S','D','F'];
const board=document.getElementById('board'),cols=document.getElementById('cols'),swatch=document.getElementById('swatch'),cname=document.getElementById('cname'),scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),statusEl=document.getElementById('status'),btn=document.getElementById('btn');
const colEls=[];for(let i=0;i<4;i++){const d=document.createElement('div');d.className='col';d.dataset.c=i;const k=document.createElement('div');k.className='key';k.textContent=KEYS[i];d.appendChild(k);cols.appendChild(d);colEls.push(d)}
let ac=null;function beep(f,d,t,v){if(!sound)return;try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(.0001,ac.currentTime);g.gain.exponentialRampToValueAtTime(v||.2,ac.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.start();o.stop(ac.currentTime+d)}catch(e){}}
let tiles=[],score=0,lives=3,target=0,playing=false,lastT=0,req=0,spawnAcc=0,tgtAcc=0,H=0,W=0;
function measure(){const r=board.getBoundingClientRect();H=r.height;W=r.width}
function speed(){return (H*0.00028)*(1+score*0.05)}
function interval(){return Math.max(560,1150-score*22)}
function newTarget(){let n;do{n=Math.floor(Math.random()*COLORS.length)}while(n===target&&COLORS.length>1);target=n;swatch.style.background=COLORS[target].c;swatch.style.color=COLORS[target].c;cname.textContent=COLORS[target].n;cname.style.color=COLORS[target].c}
function render(){scoreEl.textContent=score;livesEl.textContent='♥'.repeat(Math.max(0,lives))+'·'.repeat(Math.max(0,3-lives))}
function spawn(){const col=Math.floor(Math.random()*4);const isTarget=Math.random()<0.5;let ci=isTarget?target:Math.floor(Math.random()*COLORS.length);const t={col,ci,y:-0.22*H,el:document.createElement('div')};t.el.className='tile';t.el.style.color=COLORS[ci].c;t.el.style.background=COLORS[ci].c;colEls[col].appendChild(t.el);place(t);tiles.push(t)}
function place(t){const cw=W/4;t.el.style.left=(cw*0.1)+'px';t.el.style.transform='translateY('+t.y+'px)'}
function popText(col,txt,color){const p=document.createElement('div');p.className='pop';p.textContent=txt;p.style.color=color;p.style.left='50%';p.style.bottom='14%';p.style.transform='translateX(-50%)';p.style.transition='none';colEls[col].appendChild(p);requestAnimationFrame(()=>{p.style.transition=reduced?'opacity .3s':'opacity .5s,bottom .5s';p.style.bottom='30%';p.style.opacity='0'});setTimeout(()=>p.remove(),reduced?320:560)}
function loseLife(){lives--;render();beep(150,.2,'sawtooth',.22);if(lives<=0)over()}
function tapCol(col){if(!playing)return;colEls[col].classList.add('hit');setTimeout(()=>colEls[col].classList.remove('hit'),90);let best=null;for(const t of tiles){if(t.col!==col||t.caught)continue;if(t.y>H*0.55){if(!best||t.y>best.y)best=t}}if(!best){return}best.caught=true;if(best.ci===target){score++;beep(900+score*8,.08,'square');popText(col,'+1',COLORS[target].c);host('score',{score,progress:Math.min(100,Math.round(score/50*100)),state:{score,lives}});render();statusEl.textContent='Nice catch!'}else{popText(col,'✕',COLORS[best.ci].c);statusEl.textContent='Wrong color!';loseLife()}best.el.style.transition='opacity .15s,transform .15s';best.el.style.opacity='0';best.el.style.transform+=' scale(.4)';const bt=best;setTimeout(()=>{bt.el.remove();tiles=tiles.filter(x=>x!==bt)},150)}
function loop(t){if(!playing)return;const dt=lastT?Math.min(48,t-lastT):16;lastT=t;spawnAcc+=dt;tgtAcc+=dt;if(tgtAcc>=7000){tgtAcc=0;newTarget();statusEl.textContent='New target: '+COLORS[target].n;beep(700,.1,'triangle')}if(spawnAcc>=interval()){spawnAcc=0;spawn()}const sp=speed()*dt;for(const tl of tiles){if(tl.caught)continue;tl.y+=sp;tl.el.style.transform='translateY('+tl.y+'px)';if(tl.y>=H){tl.caught=true;const wasTarget=tl.ci===target;const el=tl.el;tiles=tiles.filter(x=>x!==tl);el.remove();if(wasTarget){statusEl.textContent='Missed a '+COLORS[target].n+' tile!';loseLife();if(!playing)return}}}req=requestAnimationFrame(loop)}
function over(){playing=false;cancelAnimationFrame(req);statusEl.textContent='Game over — score '+score+'.';btn.textContent='Play again';btn.classList.remove('hide');beep(300,.3,'triangle');host('complete',{score,progress:100,state:{score,lives:0}})}
function start(){measure();tiles.forEach(t=>t.el.remove());tiles=[];score=0;lives=3;playing=true;spawnAcc=0;tgtAcc=0;lastT=0;target=-1;render();newTarget();btn.classList.add('hide');statusEl.textContent='Go!';host('score',{score:0,progress:0,state:{score:0,lives:3}});req=requestAnimationFrame(loop)}
btn.onclick=start;
colEls.forEach((d,i)=>d.addEventListener('pointerdown',e=>{e.preventDefault();tapCol(i)}));
addEventListener('keydown',e=>{const k=e.key.toLowerCase(),i=['a','s','d','f'].indexOf(k);if(i>=0){e.preventDefault();tapCol(i)}else if(e.key==='Enter'&&!playing)start()});
addEventListener('resize',()=>{if(playing)measure()});
document.addEventListener('visibilitychange',()=>{if(document.hidden){cancelAnimationFrame(req)}else if(playing){lastT=0;req=requestAnimationFrame(loop)}});
measure();render();host('ready');
</script></body></html>
