let reduced=false,sound=true,gpOn=false,gpIdx=null,gpPrev=[false,false,false,false];
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion;sound=!!e.data.sound;gpOn=!!e.data.gamepad}});
const COLORS=[{n:'GREEN',c:'#41ffa1'},{n:'CYAN',c:'#42d9ff'},{n:'AMBER',c:'#ffc24d'},{n:'MAGENTA',c:'#ff5cc8'},{n:'VIOLET',c:'#b078ff'}];
const KEYS=['A','S','D','F'];
const board=document.getElementById('board'),cols=document.getElementById('cols'),targetBox=document.getElementById('targetBox'),swatch=document.getElementById('swatch'),cname=document.getElementById('cname'),scoreEl=document.getElementById('score'),comboEl=document.getElementById('combo'),livesEl=document.getElementById('lives'),statusEl=document.getElementById('status'),btn=document.getElementById('btn');
const colEls=[];for(let i=0;i<4;i++){const d=document.createElement('div');d.className='col';d.dataset.c=i;const k=document.createElement('div');k.className='key';k.textContent=KEYS[i];d.appendChild(k);cols.appendChild(d);colEls.push(d)}
let ac=null;function beep(f,d,t,v){if(!sound)return;try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(.0001,ac.currentTime);g.gain.exponentialRampToValueAtTime(v||.2,ac.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.start();o.stop(ac.currentTime+d)}catch(e){}}
let tiles=[],score=0,combo=0,lives=3,target=0,playing=false,lastT=0,req=0,spawnAcc=0,tgtAcc=0,H=0,W=0;
function measure(){const r=board.getBoundingClientRect();H=r.height;W=r.width}
function speed(){return (H*0.00026)*(1+Math.min(40,score)*0.045+combo*.018)}
function interval(){return Math.max(430,1130-score*18-combo*14)}
function surge(color=COLORS[target]?.c||'#41ffa1'){board.style.setProperty('--target',color);board.style.setProperty('--surge',color);board.classList.remove('surge');void board.offsetWidth;board.classList.add('surge')}function sweep(col,color=COLORS[target]?.c||'#41ffa1'){const c=colEls[col];c.style.setProperty('--hot',color+'33');c.classList.remove('sweep');void c.offsetWidth;c.classList.add('sweep');setTimeout(()=>c.classList.remove('sweep'),760)}function burst(col,y,color,n=10){if(reduced)return;const lane=colEls[col];for(let i=0;i<n;i++){const s=document.createElement('i');s.className='spark';s.style.color=color;s.style.left='50%';s.style.top=y+'px';lane.appendChild(s);const a=Math.random()*Math.PI*2,d=24+Math.random()*42;s.animate([{opacity:0,transform:'translate(-50%,-50%) scale(.3)'},{opacity:1,offset:.2},{opacity:0,transform:`translate(${Math.cos(a)*d-50}%,${Math.sin(a)*d-50}%) scale(1.4)`}],{duration:520+Math.random()*280,easing:'ease-out'}).onfinish=()=>s.remove()}}function newTarget(){let n;do{n=Math.floor(Math.random()*COLORS.length)}while(n===target&&COLORS.length>1);target=n;swatch.style.background=COLORS[target].c;swatch.style.color=COLORS[target].c;cname.textContent=COLORS[target].n;cname.style.color=COLORS[target].c;targetBox.classList.remove('flash');void targetBox.offsetWidth;targetBox.classList.add('flash');colEls.forEach(c=>{c.style.setProperty('--hot',COLORS[target].c+'22')});surge(COLORS[target].c)}
function render(){scoreEl.textContent=score;comboEl.textContent=combo;livesEl.textContent='♥'.repeat(Math.max(0,lives))+'·'.repeat(Math.max(0,3-lives))}
function spawn(){const col=Math.floor(Math.random()*4);const isTarget=Math.random()<Math.min(.68,.42+combo*.018);let ci=isTarget?target:Math.floor(Math.random()*COLORS.length);const t={col,ci,y:-0.22*H,el:document.createElement('div')};t.el.className='tile'+(ci===target?' target':'');t.el.style.color=COLORS[ci].c;t.el.style.background=COLORS[ci].c;colEls[col].appendChild(t.el);place(t);tiles.push(t)}
function place(t){const cw=W/4;t.el.style.left=(cw*0.1)+'px';t.el.style.transform='translateY('+t.y+'px)'}
function popText(col,txt,color){const p=document.createElement('div');p.className='pop';p.textContent=txt;p.style.color=color;p.style.left='50%';p.style.bottom='14%';p.style.transform='translateX(-50%)';p.style.transition='none';colEls[col].appendChild(p);requestAnimationFrame(()=>{p.style.transition=reduced?'opacity .3s':'opacity .5s,bottom .5s';p.style.bottom='30%';p.style.opacity='0'});setTimeout(()=>p.remove(),reduced?320:560)}
function loseLife(){combo=0;lives--;surge('#ff5c77');render();beep(150,.2,'sawtooth',.22);if(lives<=0)over()}
function tapCol(col){if(!playing)return;colEls[col].classList.add('hit');setTimeout(()=>colEls[col].classList.remove('hit'),90);let best=null;for(const t of tiles){if(t.col!==col||t.caught)continue;if(t.y>H*0.55){if(!best||t.y>best.y)best=t}}if(!best){combo=0;sweep(col,'#ff5c77');render();beep(180,.05,'sawtooth',.08);return}best.caught=true;if(best.ci===target){combo++;const gain=1+Math.floor(combo/5);score+=gain;beep(820+combo*18,.07,'square');popText(col,combo>=5?`+${gain} x${combo}`:`+${gain}`,COLORS[target].c);host('score',{score,progress:Math.min(100,Math.round(score/60*100)),state:{score,lives,combo}});render();statusEl.textContent=combo>=5?`Rush chain x${combo}!`:'Nice catch!';if(combo>0&&combo%7===0)newTarget()}else{sweep(col,'#ff5c77');burst(col,best.y,COLORS[best.ci].c,12);popText(col,'✕',COLORS[best.ci].c);statusEl.textContent='Wrong color! Combo broken.';loseLife()}best.el.style.transition='opacity .15s,transform .15s';best.el.style.opacity='0';best.el.style.transform+=' scale(.4)';const bt=best;setTimeout(()=>{bt.el.remove();tiles=tiles.filter(x=>x!==bt)},150)}
function loop(t){if(!playing)return;const dt=lastT?Math.min(48,t-lastT):16;lastT=t;spawnAcc+=dt;tgtAcc+=dt;if(tgtAcc>=Math.max(4200,7000-combo*120)){tgtAcc=0;newTarget();statusEl.textContent='New target: '+COLORS[target].n;beep(700,.1,'triangle')}if(spawnAcc>=interval()){spawnAcc=0;spawn()}const sp=speed()*dt;for(const tl of tiles){if(tl.caught)continue;tl.y+=sp;tl.el.style.transform='translateY('+tl.y+'px)';if(tl.y>H*.55&&tl.ci===target)colEls[tl.col].classList.add('hot');if(tl.y>=H){tl.caught=true;const wasTarget=tl.ci===target;const el=tl.el;tiles=tiles.filter(x=>x!==tl);el.remove();if(wasTarget){statusEl.textContent='Missed a '+COLORS[target].n+' tile!';loseLife();if(!playing)return}}}colEls.forEach((c,i)=>{if(!tiles.some(t=>!t.caught&&t.col===i&&t.ci===target&&t.y>H*.55))c.classList.remove('hot')});req=requestAnimationFrame(loop)}
function over(){playing=false;cancelAnimationFrame(req);statusEl.textContent='Game over — score '+score+'.';btn.textContent='Play again';btn.classList.remove('hide');beep(300,.3,'triangle');host('complete',{score,progress:100,state:{score,lives:0}})}
function start(){measure();tiles.forEach(t=>t.el.remove());tiles=[];score=0;combo=0;lives=3;playing=true;spawnAcc=0;tgtAcc=0;lastT=0;target=-1;render();newTarget();btn.classList.add('hide');statusEl.textContent='Go!';host('score',{score:0,progress:0,state:{score:0,lives:3,combo:0}});req=requestAnimationFrame(loop)}
btn.onclick=start;
colEls.forEach((d,i)=>d.addEventListener('pointerdown',e=>{e.preventDefault();tapCol(i)}));
addEventListener('keydown',e=>{const k=e.key.toLowerCase(),i=['a','s','d','f'].indexOf(k);if(i>=0){e.preventDefault();tapCol(i)}else if(e.key==='Enter'&&!playing)start()});
function gpPad(){const p=navigator.getGamepads?navigator.getGamepads():[];if(gpIdx===null)for(let i=0;i<p.length;i++)if(p[i]){gpIdx=i;break}return gpIdx===null?null:p[gpIdx]}
(function gpLoop(){if(gpOn&&playing){const pad=gpPad();if(pad){for(let i=0;i<4;i++){const pressed=!!(pad.buttons[i]&&pad.buttons[i].pressed);if(pressed&&!gpPrev[i])tapCol(i);gpPrev[i]=pressed}}}requestAnimationFrame(gpLoop)})();
addEventListener('resize',()=>{if(playing)measure()});
document.addEventListener('visibilitychange',()=>{if(document.hidden){cancelAnimationFrame(req)}else if(playing){lastT=0;req=requestAnimationFrame(loop)}});
measure();render();host('ready');
