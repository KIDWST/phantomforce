<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
    <title>BeatStrike - PhantomPlay</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header class="hud">
      <div class="hud-stat"><b data-score>0</b><span>SCORE</span></div>
      <div class="hud-stat"><b data-streak>0</b><span>STREAK</span></div>
      <div class="hud-stat"><b data-acc>100%</b><span>ACC</span></div>
      <div class="hud-stat track"><b data-track>GROOVE</b><span>TRACK</span></div>
      <button class="pause-control" type="button" data-pause-btn aria-label="Pause" title="Pause"><i></i></button>
    </header>

    <canvas id="stage" aria-label="BeatStrike rhythm highway"></canvas>
    <div class="feedback" data-feedback aria-live="polite"></div>

    <div class="keyboard" data-keyboard>
      <div class="krow top">
        <button type="button" data-key="q">Q</button><button type="button" data-key="w">W</button><button type="button" data-key="e">E</button><button type="button" data-key="r">R</button><button type="button" data-key="t">T</button>
        <button type="button" data-key="y">Y</button><button type="button" data-key="u">U</button><button type="button" data-key="i">I</button><button type="button" data-key="o">O</button><button type="button" data-key="p">P</button>
      </div>
      <div class="krow home">
        <button type="button" data-key="a">A</button><button type="button" data-key="s">S</button><button type="button" data-key="d">D</button><button type="button" data-key="f">F</button><button type="button" data-key="g">G</button>
        <button type="button" data-key="h">H</button><button type="button" data-key="j">J</button><button type="button" data-key="k">K</button><button type="button" data-key="l">L</button>
      </div>
      <div class="krow bottom">
        <button type="button" data-key="z">Z</button><button type="button" data-key="x">X</button><button type="button" data-key="c">C</button><button type="button" data-key="v">V</button>
        <button type="button" data-key="b">B</button><button type="button" data-key="n">N</button><button type="button" data-key="m">M</button>
      </div>
    </div>

    <div class="overlay" data-pause-overlay hidden>
      <div class="panel compact">
        <h2>Paused</h2>
        <p>The beat and chart are locked together.</p>
        <button type="button" data-resume-btn>RESUME</button>
      </div>
    </div>

    <div class="overlay" data-start-overlay>
      <div class="panel">
        <h2 data-start-title>BeatStrike</h2>
        <p data-start-copy>Spell short words as their letters reach the gold strike line.</p>
        <div class="onboard" aria-hidden="true">
          <span>C</span><i></i><span>A</span><i></i><span>T</span>
        </div>
        <div class="opts">
          <div class="opt-row" role="group" aria-label="Track difficulty">
            <span class="opt-label">TRACK</span>
            <button type="button" data-difficulty="starter">Starter</button>
            <button type="button" data-difficulty="groove">Groove</button>
            <button type="button" data-difficulty="rush">Rush</button>
          </div>
          <div class="opt-row" role="group" aria-label="Note speed">
            <span class="opt-label">READ TIME</span>
            <button type="button" data-speed="slow">Long</button>
            <button type="button" data-speed="standard">Standard</button>
            <button type="button" data-speed="fast">Short</button>
          </div>
          <div class="opt-row">
            <span class="opt-label">KEY GUIDE</span>
            <button type="button" data-guide-toggle aria-pressed="true">Shown</button>
          </div>
        </div>
        <button type="button" class="start-button" data-start-btn>START TRACK</button>
      </div>
    </div>
    <script src="game.js"></script>
  </body>
</html>
