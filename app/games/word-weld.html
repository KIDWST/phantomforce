*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020806;color:#effff6;font-family:system-ui,sans-serif}body{display:grid;place-items:start center;padding:18px;background:radial-gradient(circle at 50% 0,#123a2d,#020806 60%)}main{width:min(560px,100%)}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:14px;gap:12px}h1{margin:0;color:#58ffa8;font-size:40px}p{color:#94ad9f;margin:4px 0 0}.meta{text-align:right;font:800 13px ui-monospace;color:#77ffb8;white-space:nowrap}.meta b{font-size:22px;display:block;color:#effff6}.current{min-height:52px;display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0 14px;font:900 30px ui-monospace;letter-spacing:4px;color:#effff6;border:1px dashed #42ff9a44;border-radius:14px;padding:8px}.current.bad{border-color:#ff6d6d88;color:#ffb3b3}.current.good{border-color:#51ffab;color:#76ffba}.letters{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:12px}.letter{aspect-ratio:1;border:1px solid #42ff9a55;border-radius:14px;background:linear-gradient(145deg,#0a2118,#020806);color:#dfffee;font:900 30px ui-monospace;cursor:pointer;transition:transform .12s,background .12s}.letter:hover{transform:translateY(-2px)}.letter:disabled{opacity:.28;cursor:default;transform:none}.letter.sel{background:#0b3424;border-color:#51ffab;color:#76ffba}.controls{display:flex;gap:8px;margin-bottom:14px}.controls button{flex:1;border:1px solid #42ff9a55;border-radius:12px;background:#03110c;color:#caffdf;font-weight:800;padding:12px;cursor:pointer}.controls button.primary{background:#41ffa1;color:#012}.status{text-align:center;min-height:24px;color:#a9c5b7;margin-bottom:10px}.found h2{font:800 12px ui-monospace;color:#8ba99a;letter-spacing:1px;margin:0 0 8px}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{border:1px solid #42ff9a44;border-radius:999px;padding:4px 10px;font:700 13px ui-monospace;color:#76ffba;background:#0a2118}.over{position:fixed;inset:0;display:grid;place-items:center;background:#010504e6;padding:20px}.over[hidden]{display:none}.over div{text-align:center;max-width:420px}.over h1{font-size:48px;margin:0}.over button{border:0;border-radius:999px;background:#55ffa8;padding:14px 26px;font-weight:900;cursor:pointer;margin-top:12px}@media(max-width:460px){h1{font-size:32px}.letter{font-size:24px}.current{font-size:24px}}</style></head><body><main><header><div><h1>Word Weld</h1><p>Weld letters into words. 3+ letters. Enter to submit.</p></div><div class="meta"><b data-score>0</b>SCORE<br><b data-time>90</b>TIME</div></header><div class="current" data-current>&nbsp;</div><div class="letters"></div><div class="controls"><button data-clear>Clear</button><button data-shuffle>Shuffle</button><button class="primary" data-submit>Submit</button></div><div class="status" data-status>Type or tap letters.</div><div class="found"><h2>WELDED WORDS <span data-count>0</span></h2><div class="chips" data-chips></div></div></main><div class="over" hidden><div><h1>Time!</h1><p data-result></p><button data-again>Play again</button></div></div><script>

tyro ugly ulna undo unit unto upon urea urge urns used user uses vain vale vamp vane vans vary vase vast vats veal veer veil vein vend vent verb very vest veto veto vets vial vibe vice vied vies view vile vine viol visa vise void vole volt vote vows wade wads waft wage wags waif wail wait wake wale walk wall wand wane want ward ware warm warn warp wars wart wary wash wasp watt wave wavy waxy ways weak weal wean wear webs weds weed week weep weft weir weld well welt wend went wept were west wets wham what when whet whey whim whip whir whit whiz whoa whom whop wick wide wife wigs wild wile will wilt wily wimp wind wine wing wink wino wins wipe wire wiry wise wish wisp wits wive woes woke wolf womb wont wood woof wool woos word wore work worm worn wort wove wows wrap wren writ wury yack yaks yams yank yaps yard yarn yaws yeah year yeas yell yelp yens yeti yews yips yoga yoke yolk yore your yowl yuck yule yurt zags zany zaps zeal zebra zero zest zinc zing zip zips zits zone zonk zoom zoos zap zed".split(/\s+/).filter(w=>w.length>=3&&w.length<=6));
const VOW="aeiou".split(""),CONS="bcdfghjklmnprstvwy".split("");
let letters=[],current=[],found=new Set,score=0,timeLeft=90,timer=null,running=false;
const lettersEl=document.querySelector('.letters'),curEl=document.querySelector('[data-current]'),statusEl=document.querySelector('[data-status]'),chipsEl=document.querySelector('[data-chips]');
function makeSet(){for(let attempt=0;attempt<200;attempt++){const set=[];let v=2+Math.floor(Math.random()*2);for(let i=0;i<v;i++)set.push(VOW[Math.floor(Math.random()*VOW.length)]);while(set.length<6)set.push(CONS[Math.floor(Math.random()*CONS.length)]);for(let i=set.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[set[i],set[j]]=[set[j],set[i]]}if(hasWord(set))return set}return['s','t','a','r','e','d']}
function hasWord(set){for(const w of DICT){if(canForm(w,set))return true}return false}
function canForm(w,set){const pool=set.slice();for(const ch of w){const idx=pool.indexOf(ch);if(idx<0)return false;pool.splice(idx,1)}return true}
function renderLetters(){lettersEl.innerHTML=letters.map((ch,i)=>`<button class="letter ${current.includes(i)?'sel':''}" data-i="${i}" ${current.includes(i)?'disabled':''}>${ch.toUpperCase()}</button>`).join('');lettersEl.querySelectorAll('button').forEach(b=>b.onclick=()=>addIndex(+b.dataset.i))}
function renderCurrent(cls){curEl.className='current'+(cls?' '+cls:'');curEl.innerHTML=current.length?current.map(i=>letters[i].toUpperCase()).join(''):'&nbsp;'}
function addIndex(i){if(!running||current.includes(i))return;current.push(i);renderCurrent();renderLetters()}
function clearCurrent(){current=[];renderCurrent();renderLetters();statusEl.textContent='Cleared.'}
function typeLetter(ch){if(!running)return;ch=ch.toLowerCase();for(let i=0;i<letters.length;i++){if(letters[i]===ch&&!current.includes(i)){addIndex(i);return}}}
function backspace(){if(!running)return;current.pop();renderCurrent();renderLetters()}
function shuffleLetters(){for(let i=letters.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[letters[i],letters[j]]=[letters[j],letters[i]]}current=[];renderCurrent();renderLetters();statusEl.textContent='Shuffled.'}
function submit(){if(!running)return;const word=current.map(i=>letters[i]).join('');if(word.length<3){renderCurrent('bad');statusEl.textContent='Need 3+ letters.';return}if(found.has(word)){renderCurrent('bad');statusEl.textContent='Already welded.';return}if(!DICT.has(word)){renderCurrent('bad');statusEl.textContent=`"${word.toUpperCase()}" not in lexicon.`;return}found.add(word);const pts=word.length*word.length;score+=pts;renderCurrent('good');statusEl.textContent=`+${pts} for ${word.toUpperCase()}!`;document.querySelector('[data-score]').textContent=score;document.querySelector('[data-count]').textContent=found.size;chipsEl.insertAdjacentHTML('afterbegin',`<span class="chip">${word.toUpperCase()} +${pts}</span>`);host('score',{score,progress:Math.min(99,Math.round((90-timeLeft)/90*100)),state:{words:found.size}});current=[];setTimeout(()=>{renderCurrent();renderLetters()},220)}
function tick(){if(document.hidden)return;timeLeft--;document.querySelector('[data-time]').textContent=Math.max(0,timeLeft);host('progress',{score,progress:Math.min(99,Math.round((90-timeLeft)/90*100))});if(timeLeft<=0)finish()}
function finish(){running=false;clearInterval(timer);document.querySelector('[data-result]').textContent=`You welded ${found.size} words for ${score} points.`;document.querySelector('.over').hidden=false;host('complete',{score,progress:100,state:{words:found.size}})}
function start(){letters=makeSet();current=[];found=new Set;score=0;timeLeft=90;running=true;document.querySelector('[data-score]').textContent=0;document.querySelector('[data-time]').textContent=90;document.querySelector('[data-count]').textContent=0;chipsEl.innerHTML='';document.querySelector('.over').hidden=true;statusEl.textContent='Type or tap letters.';renderLetters();renderCurrent();clearInterval(timer);timer=setInterval(tick,1000);host('progress',{score:0,progress:0})}
document.querySelector('[data-clear]').onclick=clearCurrent;document.querySelector('[data-shuffle]').onclick=shuffleLetters;document.querySelector('[data-submit]').onclick=submit;document.querySelector('[data-again]').onclick=start;
addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submit()}else if(e.key==='Backspace'){e.preventDefault();backspace()}else if(e.key===' '){e.preventDefault();shuffleLetters()}else if(/^[a-zA-Z]$/.test(e.key)){typeLetter(e.key)}});
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){/* honor reducedMotion + sound */}});
start();host('ready');
