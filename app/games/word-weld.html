<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
  <title>Word Weld</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020706;color:#effff7;font-family:system-ui,-apple-system,Segoe UI,sans-serif;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}
    body{display:grid;place-items:center;padding:max(10px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 0,#173c2b 0,#04100b 42%,#010403 100%)}
    main{width:min(820px,100%);height:100%;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;gap:10px}
    header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:4px}
    h1{margin:0;color:#56ffab;font-size:34px;line-height:1;text-shadow:0 0 22px #41ffa166}
    .hud{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;font:900 10px ui-monospace,monospace;color:#9fffd0}.hud span{padding:7px 9px;border:1px solid #41ffa14d;border-radius:999px;background:#03140ee0}.hud b{color:#fff}
    .modebar{display:grid;grid-template-columns:1fr 1fr;gap:8px}.modebar button,.key button,.actions button,.start button,.pause button{border:1px solid #41ffa155;border-radius:14px;background:#071a12;color:#dffff0;font-weight:900;cursor:pointer}.modebar button{min-height:46px}.modebar button.active{background:#52ffa8;color:#04120b;border-color:#52ffa8;box-shadow:0 0 28px #41ffa144}
    .board-wrap{min-height:0;display:grid;place-items:center;border:1px solid #41ffa133;border-radius:18px;background:linear-gradient(180deg,#05150fee,#020807ee);box-shadow:inset 0 0 80px #41ffa10c;overflow:hidden}
    .board{display:grid;grid-template-rows:repeat(6,1fr);gap:7px;width:min(380px,95%);padding:10px}
    .row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.tile{aspect-ratio:1;border:1px solid #41ffa13b;border-radius:11px;background:#07130f;display:grid;place-items:center;font:900 28px ui-monospace,monospace;color:#effff7;text-transform:uppercase;box-shadow:inset 0 0 20px #0008}.tile.hit{background:#1fd887;color:#03110b;border-color:#55ffb0}.tile.near{background:#d7aa35;color:#170f02;border-color:#ffd36e}.tile.miss{background:#25302e;color:#99aaa2;border-color:#3b4a45}.tile.active{border-color:#56ffab;box-shadow:0 0 18px #41ffa133,inset 0 0 20px #0008}
    .keyboard{display:grid;gap:6px}.keyrow{display:flex;justify-content:center;gap:5px}.key button{min-width:clamp(25px,8vw,42px);height:39px;border-radius:10px;font:900 15px ui-monospace,monospace}.key button.big{min-width:64px}.key button.hit{background:#1fd887;color:#03110b}.key button.near{background:#d7aa35;color:#170f02}.key button.miss{opacity:.45}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.actions button{min-height:44px}.actions button.primary{background:#52ffa8;color:#04120b;border-color:#52ffa8}
    .toast{min-height:32px;text-align:center;color:#b8d8c8;font-weight:800}.toast b{color:#56ffab}
    .start,.pause{position:fixed;z-index:8;inset:0;display:grid;place-items:center;background:#010504e8;backdrop-filter:blur(6px);padding:16px}.start[hidden],.pause[hidden]{display:none}.start>div,.pause>div{width:min(480px,100%);padding:24px;border:1px solid #41ffa155;border-radius:22px;background:#07120fee;text-align:center}.start h2,.pause h2{margin:0 0 8px;color:#56ffab;font-size:42px}.start p,.pause p{color:#a9c5b7;line-height:1.5}.start .choices{display:grid;gap:10px}.start button,.pause button{min-height:48px;background:#52ffa8;color:#04120b}.fine{font-size:12px;color:#86a596}
    @media(max-width:520px){h1{font-size:28px}.hud{font-size:9px}.board{gap:5px}.row{gap:5px}.tile{font-size:23px}.key button{height:35px}.key button.big{min-width:55px}}
  </style>
</head>
<body>
  <main>
    <header><h1>Word Weld</h1><div class="hud"><span data-mode>Daily</span><span>Score <b data-score>0</b></span><span>Streak <b data-streak>0</b></span></div></header>
    <div class="modebar"><button type="button" data-mode-btn="daily" class="active">Daily Weld</button><button type="button" data-mode-btn="buddy">Buddy Duel</button></div>
    <section class="board-wrap"><div class="board" data-board></div></section>
    <div>
      <div class="toast" data-toast>One daily word. Six tries. Everyone gets the same one.</div>
      <div class="keyboard key" data-keyboard></div>
      <div class="actions"><button type="button" data-back>Delete</button><button type="button" class="primary" data-enter>Enter</button></div>
    </div>
  </main>
  <div class="start"><div><h2>Word Weld</h2><p>Daily Wordle-style puzzle or a buddy duel you can pass around today. No filler rack game anymore.</p><div class="choices"><button type="button" data-start="daily">Play Daily</button><button type="button" data-start="buddy">Start Buddy Duel</button></div><p class="fine">Daily can only be completed once per day on this workspace device.</p></div></div>
  <div class="pause" hidden><div><h2>Paused</h2><p>The board is held.</p><button type="button">Resume</button></div></div>
  <script>
    'use strict';
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    // Theme music — inline PhantomScore engine (see app/games/shared/phantomScore.js for
    // the canonical shared copy; inlined here because this file's CSP is script-src
    // 'unsafe-inline' only, same constraint every other single-file game works under).
    const theme=(function(){const LOOKAHEAD_MS=25,SCHEDULE_AHEAD_S=.15;const NOTE_RE=/^([A-Ga-g])(#|b)?(-?\d+)$/;function noteToFreq(n){if(typeof n==='number')return n;const m=NOTE_RE.exec(String(n).trim());if(!m)return 220;const L={C:0,D:2,E:4,F:5,G:7,A:9,B:11};let s=L[m[1].toUpperCase()];if(m[2]==='#')s+=1;if(m[2]==='b')s-=1;const oct=parseInt(m[3],10);return 440*Math.pow(2,((oct+1)*12+s-69)/12)}let noiseBuf=null;function noise(ctx){if(!noiseBuf||noiseBuf.sampleRate!==ctx.sampleRate){noiseBuf=ctx.createBuffer(1,ctx.sampleRate*.6,ctx.sampleRate);const d=noiseBuf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1}return noiseBuf}const VOICES={pluck(ctx,dest,freq,t0,dur,vel,opts){const o=ctx.createOscillator();o.type=(opts&&opts.wave)||'triangle';o.frequency.setValueAtTime(freq,t0);const g=ctx.createGain();const peak=.22*vel;g.gain.setValueAtTime(.0001,t0);g.gain.exponentialRampToValueAtTime(peak,t0+.008);g.gain.exponentialRampToValueAtTime(.0001,t0+Math.max(dur*.9,.05));o.connect(g).connect(dest);o.start(t0);o.stop(t0+dur+.05)},pad(ctx,dest,freq,t0,dur,vel,opts){const wave=(opts&&opts.wave)||'sine';const det=opts&&opts.unison?[0,6,-6]:[0];det.forEach(c=>{const o=ctx.createOscillator();o.type=wave;o.frequency.setValueAtTime(freq,t0);o.detune.setValueAtTime(c,t0);const g=ctx.createGain();const peak=(.14*vel)/det.length;const atk=Math.min(.35,dur*.3);g.gain.setValueAtTime(.0001,t0);g.gain.linearRampToValueAtTime(peak,t0+atk);g.gain.setValueAtTime(peak,t0+Math.max(dur-.25,atk));g.gain.exponentialRampToValueAtTime(.0001,t0+dur+.25);o.connect(g).connect(dest);o.start(t0);o.stop(t0+dur+.3)})},bass(ctx,dest,freq,t0,dur,vel,opts){const o=ctx.createOscillator();o.type=(opts&&opts.wave)||'triangle';o.frequency.setValueAtTime(freq,t0);const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=(opts&&opts.cutoff)||900;const g=ctx.createGain();const peak=.26*vel;g.gain.setValueAtTime(.0001,t0);g.gain.linearRampToValueAtTime(peak,t0+.015);g.gain.exponentialRampToValueAtTime(.0001,t0+Math.max(dur*.95,.08));o.connect(f).connect(g).connect(dest);o.start(t0);o.stop(t0+dur+.05)},kick(ctx,dest,freq,t0,dur,vel){const o=ctx.createOscillator();o.type='sine';const base=freq||130;o.frequency.setValueAtTime(base,t0);o.frequency.exponentialRampToValueAtTime(Math.max(base*.3,32),t0+.09);const g=ctx.createGain();g.gain.setValueAtTime(.32*vel,t0);g.gain.exponentialRampToValueAtTime(.001,t0+.16);o.connect(g).connect(dest);o.start(t0);o.stop(t0+.2)},snare(ctx,dest,freq,t0,dur,vel){const src=ctx.createBufferSource();src.buffer=noise(ctx);const f=ctx.createBiquadFilter();f.type='bandpass';f.frequency.value=1800;f.Q.value=.7;const g=ctx.createGain();g.gain.setValueAtTime(.22*vel,t0);g.gain.exponentialRampToValueAtTime(.001,t0+.1);src.connect(f).connect(g).connect(dest);src.start(t0);src.stop(t0+.12)},hat(ctx,dest,freq,t0,dur,vel){const src=ctx.createBufferSource();src.buffer=noise(ctx);const f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=6000;const g=ctx.createGain();g.gain.setValueAtTime(.1*vel,t0);g.gain.exponentialRampToValueAtTime(.001,t0+.045);src.connect(f).connect(g).connect(dest);src.start(t0);src.stop(t0+.06)}};class ScoreEngine{constructor(data){this.data=data;this.tempo=data.tempo||100;this.stepsPerBar=data.stepsPerBar||16;this.swing=data.swing||0;this.tracks=data.tracks||{};this.states=data.states||{default:{}};this.ctx=null;this.master=null;this.busses={};this.state=data.defaultState||'default';this.started=false;this.muted=false;this.volume=1;this._timer=null;this._nextStepTime=0;this._stepIndex=0;this._loopSteps=this._loopLen()}_loopLen(){let m=this.stepsPerBar*(this.data.bars||4);Object.keys(this.tracks).forEach(n=>{this.tracks[n].forEach(e=>{if(e.step+(e.dur||1)>m)m=e.step+(e.dur||1)})});return m}_ctx(){if(this.ctx)return this.ctx;const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return null;try{this.ctx=new AC();this.master=this.ctx.createGain();this.master.gain.value=this.muted?0:this.volume;this.master.connect(this.ctx.destination);Object.keys(this.tracks).forEach(n=>{const g=this.ctx.createGain();g.gain.value=this._gain(n,this.state);g.connect(this.master);this.busses[n]=g})}catch(e){this.ctx=null}return this.ctx}_gain(track,state){const s=this.states[state]||{};return Object.prototype.hasOwnProperty.call(s,track)?s[track]:1}start(){const ctx=this._ctx();if(!ctx||this.started)return;if(ctx.state==='suspended')ctx.resume().catch(()=>{});this.started=true;this._stepIndex=0;this._nextStepTime=ctx.currentTime+.05;const tick=()=>{if(!this.started)return;while(this._nextStepTime<this.ctx.currentTime+SCHEDULE_AHEAD_S){this._step(this._stepIndex,this._nextStepTime);const sd=(60/this.tempo/4)*(this.stepsPerBar/16);const sw=this.swing&&this._stepIndex%2===1?sd*this.swing:0;this._nextStepTime+=sd+sw;this._stepIndex=(this._stepIndex+1)%this._loopSteps}this._timer=setTimeout(tick,LOOKAHEAD_MS)};tick()}_step(step,t0){const sd=60/this.tempo/4;Object.keys(this.tracks).forEach(name=>{const bus=this.busses[name];if(!bus)return;this.tracks[name].forEach(evt=>{if(evt.step!==step)return;const vf=VOICES[evt.voice||name];if(!vf)return;const freq=evt.note!=null?noteToFreq(evt.note):0;const dur=(evt.dur||1)*sd;vf(this.ctx,bus,freq,t0,dur,evt.vel!=null?evt.vel:.85,evt.opts)})})}setState(name,ramp){this.state=name;if(!this.ctx)return;const t=this.ctx.currentTime;const r=ramp!=null?ramp:1.1;Object.keys(this.busses).forEach(tr=>{const target=this.muted?0:this._gain(tr,name);try{this.busses[tr].gain.setTargetAtTime(target,t,r/3)}catch(e){}})}setVolume(v){this.volume=Math.max(0,Math.min(1,v));if(this.master&&!this.muted){try{this.master.gain.setTargetAtTime(this.volume,this.ctx.currentTime,.05)}catch(e){}}}mute(){this.muted=true;if(this.master){try{this.master.gain.setTargetAtTime(0,this.ctx.currentTime,.05)}catch(e){}}}unmute(){this.muted=false;if(this.master){try{this.master.gain.setTargetAtTime(this.volume,this.ctx.currentTime,.05)}catch(e){}}}stop(){this.started=false;if(this._timer){clearTimeout(this._timer);this._timer=null}}}return{create:d=>new ScoreEngine(d)}})().create({"tempo":88,"stepsPerBar":16,"bars":2,"defaultState":"main","states":{"main":{}},"tracks":{"pad":[{"step":0,"note":"G3","dur":32,"vel":.22,"voice":"pad","opts":{"wave":"sine","unison":true}},{"step":0,"note":"B3","dur":32,"vel":.18,"voice":"pad","opts":{"wave":"sine","unison":true}},{"step":0,"note":"D4","dur":32,"vel":.18,"voice":"pad","opts":{"wave":"sine","unison":true}}],"bass":[{"step":0,"note":"G2","dur":15,"vel":.4,"voice":"bass"},{"step":16,"note":"D2","dur":15,"vel":.35,"voice":"bass"}],"lead":[{"step":0,"note":"G4","dur":4,"vel":.55,"voice":"pluck","opts":{"wave":"triangle"}},{"step":6,"note":"B4","dur":4,"vel":.5,"voice":"pluck","opts":{"wave":"triangle"}},{"step":12,"note":"D5","dur":4,"vel":.55,"voice":"pluck","opts":{"wave":"triangle"}},{"step":20,"note":"B4","dur":4,"vel":.5,"voice":"pluck","opts":{"wave":"triangle"}},{"step":26,"note":"G4","dur":6,"vel":.5,"voice":"pluck","opts":{"wave":"triangle"}}]}});
    addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){if(e.data.sound!==false)theme.unmute();else theme.mute()}});
    addEventListener('pointerdown',()=>theme.start(),{once:true});
    const WORDS=['agent','alert','amber','arena','audio','badge','beach','black','blade','bloom','boost','brain','brave','break','brick','build','cable','cache','camps','charm','chase','check','clean','clear','cloud','codex','comet','coral','crown','delta','draft','dream','drift','eagle','early','ember','event','field','final','flame','flash','focus','forge','frame','fresh','frost','ghost','glide','green','guard','heart','human','laser','light','logic','media','model','money','music','night','orbit','owner','phase','pixel','power','press','prime','quick','reach','reply','river','route','score','shape','shift','shoot','skill','smart','sound','spark','speed','stack','stage','storm','style','sweep','sword','table','think','tiger','trace','track','video','voice','welds','world'];
    const VALID=new Set([...WORDS,'about','above','after','again','apple','basic','bring','clock','cover','dance','earth','enter','extra','first','glass','grand','house','image','joint','knife','level','magic','north','ocean','party','queen','right','snake','tower','under','water','young']);
    const rows=6,cols=5,keys=['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
    const boardEl=document.querySelector('[data-board]'),kbdEl=document.querySelector('[data-keyboard]'),toastEl=document.querySelector('[data-toast]'),pauseEl=document.querySelector('.pause'),startEl=document.querySelector('.start');
    let mode='daily',answer='',guesses=[],current='',score=0,streak=0,done=false,paused=false,keyState={};
    const dayKey=()=>new Date().toISOString().slice(0,10);
    const storeKey=()=>`pf.wordweld.${mode}.${dayKey()}`;
    function seededIndex(seed){let h=2166136261;for(const ch of seed){h^=ch.charCodeAt(0);h=Math.imul(h,16777619)}return Math.abs(h)%WORDS.length}
    function setToast(msg){toastEl.innerHTML=msg}
    function pickAnswer(){answer=mode==='daily'?WORDS[seededIndex(dayKey())]:WORDS[Math.floor(Math.random()*WORDS.length)]}
    function save(){try{localStorage.setItem(storeKey(),JSON.stringify({answer,guesses,score,streak,done,keyState}))}catch{}}
    function load(){try{const raw=JSON.parse(localStorage.getItem(storeKey())||'null');if(raw&&raw.answer){answer=raw.answer;guesses=raw.guesses||[];score=raw.score||0;streak=raw.streak||0;done=!!raw.done;keyState=raw.keyState||{};return true}}catch{}return false}
    function grade(word){const out=Array(cols).fill('miss'),left=answer.split('');for(let i=0;i<cols;i++){if(word[i]===answer[i]){out[i]='hit';left[i]='*'}}for(let i=0;i<cols;i++){if(out[i]==='hit')continue;const j=left.indexOf(word[i]);if(j>=0){out[i]='near';left[j]='*'}}return out}
    function stronger(a,b){return a==='hit'||b==='hit'?'hit':a==='near'||b==='near'?'near':a==='miss'||b==='miss'?'miss':''}
    function render(){
      document.querySelector('[data-mode]').textContent=mode==='daily'?'Daily':'Buddy';
      document.querySelector('[data-score]').textContent=score;document.querySelector('[data-streak]').textContent=streak;
      document.querySelectorAll('[data-mode-btn]').forEach(b=>b.classList.toggle('active',b.dataset.modeBtn===mode));
      boardEl.innerHTML='';
      for(let r=0;r<rows;r++){const row=document.createElement('div');row.className='row';const word=guesses[r]||'';const marks=word?grade(word):[];for(let c=0;c<cols;c++){const tile=document.createElement('div');tile.className='tile '+(marks[c]||(!word&&r===guesses.length?'active':''));tile.textContent=word[c]||(r===guesses.length?current[c]||'':'');row.appendChild(tile)}boardEl.appendChild(row)}
      kbdEl.innerHTML=keys.map((line,ri)=>`<div class="keyrow">${ri===2?'<button class="big" type="button" data-enter>ENT</button>':''}${line.split('').map(k=>`<button type="button" class="${keyState[k.toLowerCase()]||''}" data-key="${k.toLowerCase()}">${k}</button>`).join('')}${ri===2?'<button class="big" type="button" data-back>DEL</button>':''}</div>`).join('');
      kbdEl.querySelectorAll('[data-key]').forEach(b=>b.onclick=()=>typeLetter(b.dataset.key));kbdEl.querySelectorAll('[data-enter]').forEach(b=>b.onclick=submit);kbdEl.querySelectorAll('[data-back]').forEach(b=>b.onclick=backspace);
    }
    function start(nextMode='daily',force=false){mode=nextMode;guesses=[];current='';score=0;done=false;keyState={};pickAnswer();if(mode==='daily'&&load()){setToast(done?`Daily finished. Answer was <b>${answer.toUpperCase()}</b>. Come back tomorrow.`:'Daily board restored.')}else{setToast(mode==='daily'?'Daily Weld loaded. One puzzle today.':'Buddy Duel loaded. Pass turns and keep welding.')}paused=false;startEl.hidden=true;pauseEl.hidden=true;render();host('progress',{score,progress:0,state:{mode,day:dayKey(),guesses:guesses.length}})}
    function typeLetter(ch){if(paused||done||current.length>=cols)return;current+=ch;render()}
    function backspace(){if(paused||done)return;current=current.slice(0,-1);render()}
    function submit(){if(paused||done)return;if(current.length!==cols){setToast('Need five letters.');return}const word=current.toLowerCase();if(!VALID.has(word)){setToast(`<b>${word.toUpperCase()}</b> is not in the weld list.`);return}const marks=grade(word);guesses.push(word);for(let i=0;i<cols;i++)keyState[word[i]]=stronger(keyState[word[i]],marks[i]);current='';if(word===answer){done=true;streak++;score+=Math.max(10,70-guesses.length*10);setToast(`Welded in <b>${guesses.length}</b>.`);host('complete',{score,progress:100,state:{mode,day:dayKey(),answer,guesses:guesses.length,win:true}})}else if(guesses.length>=rows){done=true;streak=0;setToast(`Board cracked. Answer was <b>${answer.toUpperCase()}</b>.`);host('complete',{score,progress:100,state:{mode,day:dayKey(),answer,guesses:guesses.length,win:false}})}else{score+=3;setToast('Keep welding.')}save();render();if(!done)host('score',{score,progress:Math.round(guesses.length/rows*85),state:{mode,day:dayKey(),guesses:guesses.length}})}
    function setMode(next){if(mode===next)return;mode=next;start(next,true)}
    function setPaused(next){if(done)return;paused=next;pauseEl.hidden=!paused;host('paused',{paused})}
    document.querySelectorAll('[data-start]').forEach(b=>b.onclick=()=>start(b.dataset.start));
    document.querySelectorAll('[data-mode-btn]').forEach(b=>b.onclick=()=>setMode(b.dataset.modeBtn));
    document.querySelectorAll('[data-enter]').forEach(b=>b.onclick=submit);document.querySelectorAll('[data-back]').forEach(b=>b.onclick=backspace);pauseEl.querySelector('button').onclick=()=>setPaused(false);
    addEventListener('keydown',event=>{if(event.key==='Enter'){event.preventDefault();submit()}else if(event.key==='Backspace'){event.preventDefault();backspace()}else if(event.key==='Escape'){setPaused(!paused)}else if(/^[a-z]$/i.test(event.key)){typeLetter(event.key.toLowerCase())}});
    document.addEventListener('visibilitychange',()=>{if(document.hidden)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')start(mode,true)});
    render();host('ready');
  </script>
</body>
</html>
