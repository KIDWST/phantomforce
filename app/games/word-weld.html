<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
  <title>Word Weld</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#010605;color:#eafff4;font-family:system-ui,sans-serif;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;padding:max(14px,env(safe-area-inset-top)) 14px max(14px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 8%,#17402e,#020807 58%)}main{position:relative;width:min(760px,100%);height:100%;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;gap:12px}header{display:flex;align-items:center;justify-content:space-between;gap:12px}h1{margin:0;color:#5effac;font-size:42px;line-height:1}.hud{display:flex;gap:8px;font:800 11px ui-monospace;color:#88ffc2}.hud span{padding:8px 10px;border:1px solid #41ffa144;border-radius:999px;background:#06120d}.hud b{color:#effff6}.word{min-height:64px;display:flex;align-items:center;justify-content:center;border:1px solid #41ffa155;border-radius:16px;background:#03100bcc;font-size:30px;font-weight:900;letter-spacing:.12em;box-shadow:inset 0 0 26px #41ffa10d;transition:box-shadow .18s,transform .18s}.word.good{box-shadow:0 0 32px #41ffa155,inset 0 0 28px #41ffa122;transform:scale(1.015)}.word.bad{box-shadow:0 0 28px #ff5f7a55,inset 0 0 28px #ff5f7a22}.rack{display:grid;grid-template-columns:repeat(7,1fr);gap:9px;align-self:center}.rack button{aspect-ratio:1;border:1px solid #41ffa155;border-radius:15px;background:linear-gradient(145deg,#0c2a1c,#03110c);color:#dffff0;font-size:34px;font-weight:900;cursor:pointer;touch-action:manipulation;box-shadow:0 0 16px #41ffa112;transition:transform .12s,box-shadow .12s,border-color .12s}.rack button:hover{border-color:#5effac;box-shadow:0 0 22px #41ffa133}.rack button:active{transform:scale(.94)}.rack button:disabled{opacity:.28;transform:scale(.9)}.rack button:focus-visible{outline:2px solid #5effac}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions button{min-height:48px;border:1px solid #41ffa155;border-radius:13px;background:#07150f;color:#dffff0;font-weight:900}.actions button.primary{background:#54ffa8;color:#021009;border-color:#54ffa8}.log{min-height:110px;overflow:auto;padding:12px;border:1px solid #41ffa12d;border-radius:13px;color:#a9c5b7;background:#020807bb}.log b{color:#5effac}.toast{position:absolute;left:50%;top:45%;transform:translate(-50%,-50%);pointer-events:none;opacity:0;font:900 42px system-ui;color:#ffd25e;text-shadow:0 0 22px #ffd25eaa}.toast.show{animation:toast .85s ease-out}.spark{position:absolute;width:7px;height:7px;border-radius:50%;background:#5effac;box-shadow:0 0 16px #5effac;pointer-events:none}.pause,.start{position:fixed;z-index:6;inset:0;display:grid;place-items:center;background:#010504de;backdrop-filter:blur(5px)}.pause[hidden],.start[hidden]{display:none}.pause div,.start div{text-align:center;max-width:440px;padding:24px}.pause h2,.start h2{margin:0;color:#5effac;font-size:46px}.pause p,.start p{color:#a9c5b7}.pause button,.start button{min-width:150px;min-height:48px;border:0;border-radius:999px;background:#54ffa8;color:#021009;font-weight:900}@keyframes toast{0%{opacity:0;transform:translate(-50%,-20%) scale(.75)}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-95%) scale(1.18)}}@media(max-width:560px){body{padding:10px}h1{font-size:31px}.hud{font-size:9px}.rack{gap:6px}.rack button{border-radius:11px;font-size:24px}.word{min-height:54px;font-size:22px}.log{font-size:13px}.actions button{min-height:44px}}
  </style>
</head>
<body>
  <main>
    <header><h1>Word Weld</h1><div class="hud"><span data-score>0 pts</span><span data-time>90s</span><span>COMBO <b data-combo>0</b></span></div></header>
    <div class="word" data-word aria-live="polite">WORD</div>
    <div class="rack" data-rack></div>
    <div class="actions"><button type="button" data-clear>Clear</button><button class="primary" type="button" data-submit>Submit</button></div>
    <div class="log" data-log>Make words with 3+ letters. Enter submits.</div>
    <div class="toast" data-toast></div>
  </main>
  <div class="start"><div><h2>Word Weld</h2><p>Build words from the rack before the timer runs out.</p><button type="button">Start</button></div></div>
  <div class="pause" hidden><div><h2>Paused</h2><p>Your rack is saved.</p><button type="button">Resume</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const banks=['SIGNALS','PHANTOM','CONTENT','MARKETZ','FOCUSAI','GROWTHS','SYSTEMS','CREATOR','CASHBOX','LAUNCHS','FORGEAI','BRANDUP','CLIENTS','AUTOMATE'],common=new Set(['signal','signals','sign','sing','gain','gains','phantom','atom','path','than','man','math','content','tone','note','net','ten','one','market','mark','team','make','take','rate','focus','suit','fast','growth','grow','throw','system','stem','sets','creator','create','react','trace','cash','box','launch','lunch','haunt','host','ghost','forge','rage','gear','brand','bran','band','client','lent','line','tile','automate','auto','mate','tame','mode','data','lead','deal']);
    const rackEl=document.querySelector('[data-rack]'),wordEl=document.querySelector('[data-word]'),scoreEl=document.querySelector('[data-score]'),timeEl=document.querySelector('[data-time]'),comboEl=document.querySelector('[data-combo]'),logEl=document.querySelector('[data-log]'),toastEl=document.querySelector('[data-toast]'),mainEl=document.querySelector('main'),startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause');
    let letters=[],used=[],word='',score=0,combo=0,time=90,timer=0,paused=false,started=false,found=new Set(),reduced=false,sound=true,actx=null;
    addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion;sound=!!e.data.sound}});
    function tone(freq=330,dur=.07,gain=.025,type='triangle'){if(!sound)return;try{actx=actx||new(AudioContext||webkitAudioContext)();const o=actx.createOscillator(),v=actx.createGain();o.type=type;o.frequency.value=freq;v.gain.setValueAtTime(.0001,actx.currentTime);v.gain.exponentialRampToValueAtTime(gain,actx.currentTime+.01);v.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);o.connect(v);v.connect(actx.destination);o.start();o.stop(actx.currentTime+dur)}catch{}}
    function toast(text,good=true){toastEl.textContent=text;toastEl.style.color=good?'#ffd25e':'#ff8fa3';toastEl.classList.remove('show');void toastEl.offsetWidth;toastEl.classList.add('show')}
    function sparks(n=18){if(reduced)return;for(let i=0;i<n;i++){const s=document.createElement('i');s.className='spark';s.style.left=(20+Math.random()*60)+'%';s.style.top=(24+Math.random()*46)+'%';s.animate([{opacity:0,transform:'translate(-50%,-50%) scale(.4)'},{opacity:1,offset:.18},{opacity:0,transform:`translate(${(Math.random()-.5)*180}px,${(Math.random()-.5)*120}px) scale(1.6)`}],{duration:650+Math.random()*450,easing:'ease-out'}).onfinish=()=>s.remove();mainEl.appendChild(s)}}
    function shuffle(a){for(let i=a.length-1;i;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
    function newRack(){letters=shuffle((banks[Math.floor(Math.random()*banks.length)]||'PHANTOM').split('')).slice(0,7);used=letters.map(()=>false);word='';render()}
    function render(){wordEl.textContent=word||'WORD';scoreEl.textContent=`${score} pts`;timeEl.textContent=`${time}s`;comboEl.textContent=combo;rackEl.innerHTML=letters.map((l,i)=>`<button type="button" data-i="${i}" ${used[i]?'disabled':''}>${l}</button>`).join('');rackEl.querySelectorAll('button').forEach(b=>b.onclick=()=>pick(Number(b.dataset.i)))}
    function pick(i){if(paused||!started||used[i])return;used[i]=true;word+=letters[i];tone(320+word.length*35,.035,.014);render()}
    function clearWord(){used=letters.map(()=>false);word='';render()}
    function log(text){logEl.innerHTML=`<b>${text}</b><br>${logEl.textContent}`.slice(0,900)}
    function pulse(kind){wordEl.classList.remove('good','bad');void wordEl.offsetWidth;wordEl.classList.add(kind);setTimeout(()=>wordEl.classList.remove(kind),260)}
    function submit(){const value=word.toLowerCase();if(value.length<3){combo=0;pulse('bad');toast('3+ LETTERS',false);tone(130,.08,.02,'sawtooth');log('Use at least 3 letters.');render();return}if(found.has(value)){combo=0;pulse('bad');toast('DUPLICATE',false);tone(150,.08,.02,'sawtooth');log('Already welded.');clearWord();return}const valid=common.has(value)||value.length>=5; if(!valid){combo=0;pulse('bad');toast('NO WELD',false);tone(120,.12,.025,'sawtooth');log(`${word} did not hold.`);clearWord();return}found.add(value);combo++;const base=value.length*10+(value.length>=6?25:0),bonus=(combo-1)*15;score+=base+bonus;time=Math.min(120,time+(value.length>=6?3:1));pulse('good');toast(combo>1?`COMBO x${combo}`:`+${base}`);sparks(12+combo*4);tone(520+value.length*40,.08,.028);setTimeout(()=>tone(760+combo*22,.07,.02),70);log(`+${base+bonus} ${word}${bonus?` · combo +${bonus}`:''}`);host('score',{score,progress:Math.min(98,Math.round(score/6)),state:{found:found.size,time,combo}});newRack()}
    function end(){clearInterval(timer);started=false;startEl.hidden=false;startEl.querySelector('h2').textContent='Time';startEl.querySelector('p').textContent=`You welded ${found.size} words for ${score} points.`;startEl.querySelector('button').textContent='Play again';host('complete',{score,progress:100,state:{found:found.size}})}
    function start(){score=0;combo=0;time=90;found=new Set();started=true;paused=false;startEl.hidden=true;pauseEl.hidden=true;newRack();clearInterval(timer);timer=setInterval(()=>{if(document.hidden)return;if(paused||!started)return;time--;render();if(time<=0)end()},1000);host('progress',{score:0,progress:0,state:{found:0}})}
    function setPaused(next){if(!started)return;paused=next;pauseEl.hidden=!paused;host('paused',{paused})}
    document.querySelector('[data-clear]').onclick=clearWord;document.querySelector('[data-submit]').onclick=submit;startEl.querySelector('button').onclick=start;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submit()}else if(e.key==='Backspace'){word=word.slice(0,-1);used=letters.map(()=>false);render()}else if(e.key==='p'||e.key==='P'){setPaused(!paused)}else if(/^[a-z]$/i.test(e.key)){const i=letters.findIndex((l,j)=>!used[j]&&l.toLowerCase()===e.key.toLowerCase());if(i>=0)pick(i)}});
    document.addEventListener('visibilitychange',()=>{if(document.hidden)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')start()});
    render();host('ready');
  </script>
</body>
</html>
