<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>Pixel Bloom</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020806;color:#effff6;font-family:system-ui,sans-serif}body{display:grid;place-items:center;padding:14px;background:radial-gradient(circle at 50% 18%,#0f342a,#020806 66%)}main{width:min(560px,100%);text-align:center}h1{margin:0 0 2px;color:#58ffa8;font-size:32px}.sub{color:#8ba99a;margin:0 0 10px;font-size:13px}.hud{display:flex;justify-content:center;gap:20px;margin-bottom:10px}.hud div{min-width:80px}.hud span{display:block;color:#8ba99a;font:700 11px ui-monospace;letter-spacing:.5px}.hud b{color:#63ffad;font-size:22px}.wrap{position:relative;width:min(88vw,440px);margin:0 auto}canvas{width:100%;display:block;border:1px solid #41ffa133;border-radius:14px;background:#03110c;touch-action:none;cursor:crosshair}.msg{min-height:20px;margin-top:10px;color:#a9c5b7;font-size:13px}.bar{height:8px;border-radius:999px;background:#0b3424;margin:10px auto 0;overflow:hidden}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,#41ffa1,#7dffc0);transition:width .3s}.done .msg{color:#7dffc0;font-weight:800}@media(max-width:400px){h1{font-size:26px}}</style></head><body><main><h1>Pixel Bloom</h1><p class="sub">Tap the grid to bloom a mandala. Arrow keys move, Space blooms. Fill the canvas.</p><div class="hud"><div><span>FILLED</span><b data-fill>0%</b></div><div><span>SCORE</span><b data-score>0</b></div><div><span>COMBO</span><b data-combo>0</b></div></div><div class="wrap"><canvas></canvas></div><div class="bar"><i data-bar></i></div><div class="msg" data-msg>Breathe out. Place a bloom anywhere.</div></main><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*'),c=document.querySelector('canvas'),g=c.getContext('2d');
const N=16,TARGET=60;// grid NxN, fill target %
let cell=[],hue=[],DPR,px,cur={x:Math.floor(N/2),y:Math.floor(N/2)},score=0,combo=0,filledCount=0,hueBase=140,done=false,reduced=false,paused=false,raf=0;
const fillEl=document.querySelector('[data-fill]'),scoreEl=document.querySelector('[data-score]'),comboEl=document.querySelector('[data-combo]'),msgEl=document.querySelector('[data-msg]'),barEl=document.querySelector('[data-bar]');
function reset(){cell=Array.from({length:N},()=>Array(N).fill(0));hue=Array.from({length:N},()=>Array(N).fill(0));score=0;combo=0;filledCount=0;done=false;document.body.classList.remove('done');cur={x:Math.floor(N/2),y:Math.floor(N/2)};update();host('progress',{score:0,progress:0})}
function size(){DPR=Math.min(2,devicePixelRatio||1);const w=c.clientWidth||440;c.width=w*DPR;c.height=w*DPR;px=w/N;g.setTransform(DPR,0,0,DPR,0,0)}
function pct(){return filledCount/(N*N)*100}
function fillCell(x,y,h){if(x<0||y<0||x>=N||y>=N)return;if(!cell[x][y])filledCount++;cell[x][y]=1;hue[x][y]=h}
function hasFilledNeighbor(x,y){const d=[[1,0],[-1,0],[0,1],[0,-1]];return d.some(([dx,dy])=>{const nx=x+dx,ny=y+dy;return nx>=0&&ny>=0&&nx<N&&ny<N&&cell[nx][ny]})}
function bloom(x,y){if(done||paused||x<0||y<0||x>=N||y>=N)return;
const wasNeighbor=hasFilledNeighbor(x,y),already=cell[x][y];
hueBase=(hueBase+18)%360;const h=hueBase;
// diamond petal shape around (x,y), mirrored 4-fold across both axes
const shape=[[0,0],[1,0],[-1,0],[0,1],[0,-1]];
const mx=N-1-x,my=N-1-y;
let newCells=0;
[[x,y],[mx,y],[x,my],[mx,my]].forEach(([cx,cy])=>{shape.forEach(([dx,dy])=>{const nx=cx+dx,ny=cy+dy;if(nx>=0&&ny>=0&&nx<N&&ny<N&&!cell[nx][ny])newCells++;fillCell(nx,ny,(h+(dx+dy)*6+360)%360)})});
// combo: adjacent to existing bloom and adds new area
if(wasNeighbor&&newCells>0&&!already){combo++;score+=10+combo*5;msgEl.textContent=`Combo x${combo}! Petals connect.`}
else{if(combo>0)msgEl.textContent='Fresh bloom placed.';combo=0;score+=5}
update();
const p=Math.min(100,Math.round(pct()/TARGET*100));
if(pct()>=TARGET){finish()}else{host('score',{score,progress:p,state:{filled:Math.round(pct()),combo}})}}
function finish(){done=true;document.body.classList.add('done');msgEl.textContent=`Canvas in bloom — ${Math.round(pct())}% filled. Tap anywhere to bloom a fresh canvas.`;host('complete',{score,progress:100,state:{filled:Math.round(pct()),combo}})}
function update(){fillEl.textContent=Math.round(pct())+'%';scoreEl.textContent=score;comboEl.textContent=combo;barEl.style.width=Math.min(100,pct()/TARGET*100)+'%'}
function draw(t){const w=c.clientWidth||440;g.clearRect(0,0,w,w);
const shift=reduced?0:(t||0)*0.02;
for(let x=0;x<N;x++)for(let y=0;y<N;y++){const X=x*px,Y=y*px;
if(cell[x][y]){const hh=(hue[x][y]+shift)%360;g.fillStyle=`hsl(${hh} 90% ${reduced?55:60}%)`;
if(!reduced){g.shadowColor=`hsl(${hh} 90% 60%)`;g.shadowBlur=6}
g.fillRect(X+1,Y+1,px-2,px-2);g.shadowBlur=0}
else{g.fillStyle='#06170f';g.fillRect(X+1,Y+1,px-2,px-2)}}
// cursor
const cx=cur.x*px,cy=cur.y*px;g.strokeStyle='#effff6';g.lineWidth=2;g.strokeRect(cx+1.5,cy+1.5,px-3,px-3);
raf=requestAnimationFrame(draw)}
function evtCell(e){const r=c.getBoundingClientRect();const cxp=(e.clientX-r.left)/r.width*N,cyp=(e.clientY-r.top)/r.height*N;const x=Math.max(0,Math.min(N-1,Math.floor(cxp))),y=Math.max(0,Math.min(N-1,Math.floor(cyp)));cur={x,y};bloom(x,y)}
c.addEventListener('pointerdown',e=>{e.preventDefault();if(done){reset();return}evtCell(e)});
addEventListener('keydown',e=>{if(done){if(e.code==='Enter'||e.code==='Space'){e.preventDefault();reset()}return}let handled=true;
if(e.code==='ArrowLeft')cur.x=Math.max(0,cur.x-1);
else if(e.code==='ArrowRight')cur.x=Math.min(N-1,cur.x+1);
else if(e.code==='ArrowUp')cur.y=Math.max(0,cur.y-1);
else if(e.code==='ArrowDown')cur.y=Math.min(N-1,cur.y+1);
else if(e.code==='Space'||e.code==='Enter')bloom(cur.x,cur.y);
else handled=false;
if(handled)e.preventDefault()});
addEventListener('resize',size);
function setPaused(next){paused=next;host('paused',{paused})}
addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')reset();if(event.data.type==='settings')reduced=!!event.data.reducedMotion});
size();reset();raf=requestAnimationFrame(draw);host('ready');
</script></body></html>
