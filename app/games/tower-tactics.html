<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>Tower Tactics</title><style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020806;color:#effff6;font-family:system-ui,sans-serif}body{display:grid;place-items:start center;padding:18px;background:radial-gradient(circle at 50% 0,#123a2d,#020806 60%)}main{width:min(460px,100%)}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:14px;gap:12px}h1{margin:0;color:#58ffa8;font-size:38px}p{color:#94ad9f;margin:4px 0 0}.meta{text-align:right;font:800 12px ui-monospace;color:#77ffb8;white-space:nowrap}.meta b{font-size:24px;display:block;color:#effff6}.board{position:relative;width:100%;aspect-ratio:1;background:#08160f;border:1px solid #133a29;border-radius:14px;padding:2.5%;touch-action:none;user-select:none}.grid,.tiles{position:absolute;inset:2.5%;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:3%}.grid .bg{background:#0d2318;border-radius:10px}.tiles{gap:0}.tile{position:absolute;width:22.75%;height:22.75%;display:grid;place-items:center;border-radius:10px;font:900 28px ui-monospace;transition:left .12s,top .12s,transform .1s;color:#012}.tile.pop{animation:pop .16s}@keyframes pop{0%{transform:scale(.6)}100%{transform:scale(1)}}.status{text-align:center;min-height:24px;color:#a9c5b7;margin:12px 0 4px}.controls{display:flex;gap:8px}.controls button{flex:1;border:1px solid #42ff9a55;border-radius:12px;background:#03110c;color:#caffdf;font-weight:800;padding:12px;cursor:pointer}.controls button.primary{background:#41ffa1;color:#012}.over{position:fixed;inset:0;display:grid;place-items:center;background:#010504e6;padding:20px}.over[hidden]{display:none}.over div{text-align:center;max-width:380px}.over h1{font-size:48px;margin:0}.over button{border:0;border-radius:999px;background:#55ffa8;padding:14px 26px;font-weight:900;cursor:pointer;margin-top:12px}@media(max-width:460px){h1{font-size:30px}}</style></head><body><main><header><div><h1>Tower Tactics</h1><p>Merge towers. Arrow keys or swipe. Reach 2048.</p></div><div class="meta"><b data-score>0</b>SCORE<br><b data-best>0</b>BEST</div></header><div class="board"><div class="grid"></div><div class="tiles"></div></div><div class="status" data-status>Swipe or use arrow keys.</div><div class="controls"><button data-new>New game</button></div></main><div class="over" hidden><div><h1 data-title>Stalemate</h1><p data-result></p><button data-again>Play again</button></div></div><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
const SIZE=4,COLORS={2:'#d7ffe9',4:'#a9ffce',8:'#76ffba',16:'#54f5a4',32:'#41ffa1',64:'#2fe08c',128:'#22c97b',256:'#17b06a',512:'#0e9459',1024:'#0a7a49',2048:'#ffd447'};
let grid=[],score=0,best=0,over=false,won=false,reduced=false,uid=1;
const tilesEl=document.querySelector('.tiles'),gridEl=document.querySelector('.grid'),statusEl=document.querySelector('[data-status]');
gridEl.innerHTML=Array(16).fill('<div class="bg"></div>').join('');
function empties(){const e=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!grid[r][c])e.push([r,c]);return e}
function addTile(){const e=empties();if(!e.length)return;const [r,c]=e[Math.floor(Math.random()*e.length)];grid[r][c]={v:Math.random()<0.9?2:4,id:uid++,pop:true}}
function render(){const bw=tilesEl.clientWidth,step=bw/SIZE,gap=step*0.06,cell=step-gap*2;const frag=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const t=grid[r][c];if(!t)continue;const x=c*step+gap,y=r*step+gap;frag.push(`<div class="tile ${t.pop?'pop':''}" data-id="${t.id}" style="left:${x}px;top:${y}px;width:${cell}px;height:${cell}px;background:${COLORS[t.v]||'#ffd447'};font-size:${t.v>=1024?Math.max(14,cell*0.3):Math.max(16,cell*0.4)}px">${t.v}</div>`);t.pop=false}tilesEl.innerHTML=frag.join('');document.querySelector('[data-score]').textContent=score;document.querySelector('[data-best]').textContent=best}
function clone(row){return row.map(t=>t?{...t}:null)}
function slide(row){
 // row: array of tiles/null -> move toward index 0, merge
 let arr=row.filter(Boolean);let res=[];let gained=0;
 for(let i=0;i<arr.length;i++){
  if(i+1<arr.length&&arr[i].v===arr[i+1].v){const nv=arr[i].v*2;res.push({v:nv,id:arr[i].id,pop:true});gained+=nv;i++}
  else res.push(arr[i]);
 }
 while(res.length<SIZE)res.push(null);
 return {row:res,gained};
}
function rowsEqual(a,b){for(let i=0;i<SIZE;i++){const x=a[i],y=b[i];if((x?x.v:0)!==(y?y.v:0))return false}return true}
function move(dir){
 if(over)return;
 let moved=false,gained=0;
 // build lines in the direction of movement (index 0 = destination)
 for(let i=0;i<SIZE;i++){
  let line=[];
  for(let j=0;j<SIZE;j++){
   let r,c;
   if(dir==='left'){r=i;c=j}else if(dir==='right'){r=i;c=SIZE-1-j}else if(dir==='up'){r=j;c=i}else{r=SIZE-1-j;c=i}
   line.push(grid[r][c]);
  }
  const before=clone(line);const {row,gained:g}=slide(line);gained+=g;
  if(!rowsEqual(before,row))moved=true;
  for(let j=0;j<SIZE;j++){
   let r,c;
   if(dir==='left'){r=i;c=j}else if(dir==='right'){r=i;c=SIZE-1-j}else if(dir==='up'){r=j;c=i}else{r=SIZE-1-j;c=i}
   grid[r][c]=row[j];
  }
 }
 if(!moved)return;
 score+=gained;best=Math.max(best,score);
 addTile();render();
 const maxv=Math.max(...grid.flat().filter(Boolean).map(t=>t.v));
 const progress=Math.min(99,Math.round(Math.log2(Math.max(2,maxv))/11*100));
 host('score',{score,progress,state:{max:maxv}});
 if(gained>0&&statusEl)statusEl.textContent=`+${gained}`;
 if(maxv>=2048&&!won){won=true;statusEl.textContent='2048 reached! Keep going.'}
 if(!canMove())gameOver();
}
function canMove(){
 if(empties().length)return true;
 for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const v=grid[r][c].v;if(c+1<SIZE&&grid[r][c+1].v===v)return true;if(r+1<SIZE&&grid[r+1][c].v===v)return true}
 return false;
}
function gameOver(){over=true;const maxv=Math.max(...grid.flat().filter(Boolean).map(t=>t.v));document.querySelector('[data-title]').textContent=won?'Victory!':'Stalemate';document.querySelector('[data-result]').textContent=`Highest tower ${maxv}. Final score ${score}.`;document.querySelector('.over').hidden=false;host('complete',{score,progress:100,state:{max:maxv}})}
function newGame(){grid=Array.from({length:SIZE},()=>Array(SIZE).fill(null));score=0;over=false;won=false;uid=1;addTile();addTile();document.querySelector('.over').hidden=true;statusEl.textContent='Swipe or use arrow keys.';render();host('progress',{score:0,progress:0})}
addEventListener('keydown',e=>{const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};if(m[e.key]){e.preventDefault();move(m[e.key])}});
const board=document.querySelector('.board');let tx=0,ty=0,ts=false;
board.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;ts=true},{passive:true});
board.addEventListener('touchend',e=>{if(!ts)return;ts=false;const t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up')},{passive:true});
let mx=0,my=0,md=false;
board.addEventListener('mousedown',e=>{mx=e.clientX;my=e.clientY;md=true});
addEventListener('mouseup',e=>{if(!md)return;md=false;const dx=e.clientX-mx,dy=e.clientY-my;if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up')});
document.querySelector('[data-new]').onclick=newGame;
document.querySelector('[data-again]').onclick=newGame;
addEventListener('resize',render);
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion;document.body.style.setProperty('--rm',reduced?'1':'0')}});
newGame();host('ready');
</script></body></html>
