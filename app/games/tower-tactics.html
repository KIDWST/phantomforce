function tone(freq=300,dur=.07,gain=.025,type='triangle'){if(!actx)return;const o=actx.createOscillator(),v=actx.createGain();o.type=type;o.frequency.value=freq;v.gain.setValueAtTime(.0001,actx.currentTime);v.gain.exponentialRampToValueAtTime(gain,actx.currentTime+.01);v.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);o.connect(v);v.connect(actx.destination);o.start();o.stop(actx.currentTime+dur)}

function boardSpark(n=14){if(reduced||!boardEl)return;for(let i=0;i<n;i++){const s=document.createElement('i');s.className='spark';s.style.left=(12+Math.random()*76)+'%';s.style.top=(12+Math.random()*76)+'%';s.style.transform=`translate(${(Math.random()-.5)*56}px,${(Math.random()-.5)*56}px) scale(${.6+Math.random()*1.2})`;s.style.opacity=String(.25+Math.random()*.75);boardEl.appendChild(s);setTimeout(()=>s.remove(),260+Math.random()*260)}}

function empties(){const e=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)if(!grid[r][c])e.push([r,c]);return e}

function render(){const bw=tilesEl.clientWidth,step=bw/SIZE,gap=step*0.06,cell=step-gap*2;const frag=[];for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const t=grid[r][c];if(!t)continue;const x=c*step+gap,y=r*step+gap;frag.push(`<div class="tile ${t.pop?'pop':''} ${t.v>=512?'big':''}" data-id="${t.id}" style="left:${x}px;top:${y}px;width:${cell}px;height:${cell}px;background:${COLORS[t.v]||'#ffd447'};font-size:${t.v>=1024?Math.max(14,cell*0.3):Math.max(16,cell*0.4)}px">${t.v}</div>`);t.pop=false}tilesEl.innerHTML=frag.join('');document.querySelector('[data-score]').textContent=score;document.querySelector('[data-best]').textContent=best;if(comboEl)comboEl.textContent=combo}

function slide(row){
 // row: array of tiles/null -> move toward index 0, merge
 let arr=row.filter(Boolean);let res=[];let gained=0;
 for(let i=0;i<arr.length;i++){
  if(i+1<arr.length&&arr[i].v===arr[i+1].v){const nv=arr[i].v*2;res.push({v:nv,id:arr[i].id,pop:true});gained+=nv;i++}

 return {row:res,gained};
}
function rowsEqual(a,b){for(let i=0;i<SIZE;i++){const x=a[i],y=b[i];if((x?x.v:0)!==(y?y.v:0))return false}return true}
function move(dir){
 if(over)return;
 ensureAudio();
 let moved=false,gained=0;
 // build lines in the direction of movement (index 0 = destination)
 for(let i=0;i<SIZE;i++){
  let line=[];
  for(let j=0;j<SIZE;j++){
   let r,c;
   if(dir==='left'){r=i;c=j}else if(dir==='right'){r=i;c=SIZE-1-j}else if(dir==='up'){r=j;c=i}else{r=SIZE-1-j;c=i}
   line.push(grid[r][c]);
  }
  const before=clone(line);const {row,gained:g}=slide(line);gained+=g;
  if(!rowsEqual(before,row))moved=true;
  for(let j=0;j<SIZE;j++){
   let r,c;
   if(dir==='left'){r=i;c=j}else if(dir==='right'){r=i;c=SIZE-1-j}else if(dir==='up'){r=j;c=i}else{r=SIZE-1-j;c=i}
   grid[r][c]=row[j];
  }
 }
 if(!moved){combo=0;if(comboEl)comboEl.textContent=combo;shakeBoard();tone(130,.06,.015,'sawtooth');return}
 if(gained>0){combo++;score+=gained+(combo-1)*25;flash(combo>1?`COMBO x${combo}`:`+${gained}`);boardSpark(10+combo*4);tone(280+Math.min(860,gained*.75),.08,.025);setTimeout(()=>tone(420+Math.min(900,gained*.5),.06,.018),60);statusEl.textContent=combo>1?`Chain merge x${combo}. +${gained}`:`+${gained}`}else{combo=0;score+=gained;statusEl.textContent='Shifted. Set up the next merge.';tone(190,.05,.014)}
 best=Math.max(best,score);
 addTile();render();
 const maxv=Math.max(...grid.flat().filter(Boolean).map(t=>t.v));
 const progress=Math.min(99,Math.round(Math.log2(Math.max(2,maxv))/11*100));
 host('score',{score,progress,state:{max:maxv}});
 if(maxv>=2048&&!won){won=true;statusEl.textContent='2048 reached! Keep going.'}
 if(!canMove())gameOver();
}
function canMove(){
 if(empties().length)return true;
 for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){const v=grid[r][c].v;if(c+1<SIZE&&grid[r][c+1].v===v)return true;if(r+1<SIZE&&grid[r+1][c].v===v)return true}
 return false;
}
function gameOver(){over=true;combo=0;const maxv=Math.max(...grid.flat().filter(Boolean).map(t=>t.v));document.querySelector('[data-title]').textContent=won?'Victory!':'Stalemate';document.querySelector('[data-result]').textContent=`Highest tower ${maxv}. Final score ${score}.`;document.querySelector('.over').hidden=false;host('complete',{score,progress:100,state:{max:maxv}})}
function newGame(){grid=Array.from({length:SIZE},()=>Array(SIZE).fill(null));score=0;combo=0;over=false;won=false;uid=1;addTile();addTile();document.querySelector('.over').hidden=true;statusEl.textContent='Swipe or use arrow keys.';render();host('progress',{score:0,progress:0})}
addEventListener('keydown',e=>{const m={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};if(m[e.key]){e.preventDefault();move(m[e.key])}});
const board=document.querySelector('.board');let tx=0,ty=0,ts=false;
board.addEventListener('touchstart',e=>{const t=e.touches[0];tx=t.clientX;ty=t.clientY;ts=true},{passive:true});
board.addEventListener('touchend',e=>{if(!ts)return;ts=false;const t=e.changedTouches[0],dx=t.clientX-tx,dy=t.clientY-ty;if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up')},{passive:true});
let mx=0,my=0,md=false;
board.addEventListener('mousedown',e=>{mx=e.clientX;my=e.clientY;md=true});
addEventListener('mouseup',e=>{if(!md)return;md=false;const dx=e.clientX-mx,dy=e.clientY-my;if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?'right':'left');else move(dy>0?'down':'up')});
document.querySelector('[data-new]').onclick=newGame;
document.querySelector('[data-again]').onclick=newGame;
addEventListener('resize',render);
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion;document.body.style.setProperty('--rm',reduced?'1':'0')}});
newGame();host('ready');
</script></body></html>
