<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:; media-src 'none'; frame-src 'none'">
<title>Court Vision</title>
<style>
:root{color-scheme:dark;--ink:#071117;--panel:#0c1a21;--line:#ffffff24;--home:#36e6a1;--away:#ff596d;--gold:#ffd166;--cyan:#4bc8ff;--text:#f4fff9;--muted:#9bb1b5}
*{box-sizing:border-box}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--ink);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif;touch-action:none;user-select:none;overscroll-behavior:none}
button{font:inherit;color:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
button:focus-visible{outline:3px solid var(--gold);outline-offset:3px}
#court{position:fixed;inset:0;width:100%;height:100%;display:block;background:#071117}
.screen{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:max(18px,env(safe-area-inset-top)) 18px max(18px,env(safe-area-inset-bottom));overflow:auto;background:#071117ed}
.screen[hidden],.hud[hidden],.touch[hidden],.pause[hidden]{display:none}
.brand{margin:0;font-size:78px;line-height:.9;text-transform:uppercase;letter-spacing:0;font-weight:950;color:var(--text);text-align:center;text-shadow:0 5px 0 #102b32}
.brand span{display:block;color:var(--gold)}
.kicker{margin:0 0 10px;color:var(--cyan);font:900 12px ui-monospace,monospace;text-transform:uppercase;letter-spacing:.12em}
.tagline{max-width:560px;margin:18px auto 24px;text-align:center;color:var(--muted);font-size:15px;line-height:1.55}
.record{min-height:22px;margin:14px 0 0;color:#b9cfcb;font:800 12px ui-monospace,monospace}
.button-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{min-height:46px;border:1px solid var(--line);border-radius:7px;background:#12232a;padding:11px 18px;font-weight:900;text-transform:uppercase;letter-spacing:.04em}
.btn:hover{background:#183039}
.btn.primary{background:var(--gold);border-color:var(--gold);color:#182028}
.btn.primary:hover{background:#ffe39a}
.setup-wrap{width:min(760px,96vw);display:grid;gap:18px}
.setup-head{text-align:center}
.setup-head h1,.results h1{margin:0;font-size:42px;text-transform:uppercase}
.setup-band{border-top:1px solid var(--line);padding-top:14px}
.setup-band h2{margin:0 0 9px;color:var(--muted);font:900 11px ui-monospace,monospace;text-transform:uppercase;letter-spacing:.12em}
.segments{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.segments.two{grid-template-columns:repeat(2,1fr)}
.seg{min-height:48px;border:1px solid var(--line);border-radius:6px;background:#0d1c22;color:#b8ccce;font-weight:900}
.seg[aria-pressed="true"]{border-color:var(--home);background:#17372f;color:#effff7;box-shadow:inset 0 -3px 0 var(--home)}
.roster{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.team-roster{border-left:4px solid var(--home);padding:5px 10px;background:#ffffff06}
.team-roster.away{border-color:var(--away)}
.team-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-weight:950;text-transform:uppercase}
.player-chip{display:flex;justify-content:space-between;gap:12px;padding:4px 0;color:#c6d7d5;font:700 12px ui-monospace,monospace}
.player-chip b{color:var(--gold)}
.setup-actions{display:flex;justify-content:space-between;gap:10px;align-items:center}
.hud{position:fixed;z-index:8;inset:max(8px,env(safe-area-inset-top)) 10px auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:start;pointer-events:none}
.scorebox{display:flex;align-items:center;gap:10px;min-width:0}
.scorebox.away{justify-content:flex-end;text-align:right}
.scorebox b{font-size:42px;line-height:1}
.scorebox span{font:900 10px ui-monospace,monospace;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.scorebox.home b{color:var(--home)}.scorebox.away b{color:var(--away)}
.clockbox{min-width:126px;padding:7px 12px;border:1px solid var(--line);border-radius:6px;background:#071117d9;text-align:center;box-shadow:0 5px 18px #0008}
.clockbox b{display:block;font:950 24px ui-monospace,monospace;color:var(--gold)}
.clockbox span{display:flex;justify-content:center;gap:10px;color:#c4d5d4;font:800 10px ui-monospace,monospace;text-transform:uppercase}
.pause-button{position:fixed;z-index:9;right:12px;top:94px;width:40px;height:40px;border:1px solid var(--line);border-radius:6px;background:#071117c9;font-weight:950}
.announce{position:fixed;z-index:7;left:50%;top:23%;transform:translate(-50%,-50%) scale(.8);opacity:0;color:#fff;font-size:58px;font-weight:1000;text-transform:uppercase;text-align:center;pointer-events:none;text-shadow:0 5px 0 #071117,0 0 28px #000;max-width:90vw}
.announce.show{animation:callout .9s ease-out}
.possession{position:fixed;z-index:7;left:50%;bottom:max(14px,env(safe-area-inset-bottom));transform:translateX(-50%);padding:6px 10px;border-radius:5px;background:#071117c9;color:#d7e7e4;font:800 10px ui-monospace,monospace;text-transform:uppercase;pointer-events:none}
.pause{position:fixed;z-index:30;inset:0;display:grid;place-items:center;background:#040a0edb}
.pause-inner{text-align:center}.pause h2{font-size:42px;margin:0 0 18px;text-transform:uppercase}
.touch{position:fixed;z-index:10;inset:auto 0 max(10px,env(safe-area-inset-bottom));display:flex;justify-content:space-between;align-items:flex-end;padding:0 14px;pointer-events:none}
.dpad{position:relative;width:142px;height:142px;pointer-events:auto}
.touch-btn{position:absolute;width:48px;height:48px;border:1px solid #ffffff3b;border-radius:7px;background:#071117b8;color:#fff;font-weight:950;backdrop-filter:blur(5px)}
.touch-btn[data-dir="up"]{left:47px;top:0}.touch-btn[data-dir="down"]{left:47px;bottom:0}.touch-btn[data-dir="left"]{left:0;top:47px}.touch-btn[data-dir="right"]{right:0;top:47px}
.action-pad{display:flex;gap:10px;align-items:flex-end;pointer-events:auto}
.action{position:static;width:68px;height:58px;border-color:#ffffff4a}.action.shoot{width:82px;height:82px;background:#ff596dcc}.action.pass{background:#167b63cc}
.results{width:min(650px,94vw);text-align:center}
.result-word{font-size:88px;font-weight:1000;line-height:.9;color:var(--gold);text-transform:uppercase;margin:8px 0}
.final-score{font:950 62px ui-monospace,monospace;margin:10px 0 18px}
.result-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:0 0 20px}
.result-stats div{padding:10px 4px;border-top:3px solid var(--cyan);background:#ffffff07}
.result-stats b{display:block;font-size:22px}.result-stats span{color:var(--muted);font-size:10px;text-transform:uppercase}
@keyframes callout{0%{opacity:0;transform:translate(-50%,-35%) scale(.65)}18%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}60%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-68%) scale(.96)}}
@media(max-width:620px){.screen{justify-content:flex-start}.screen>.setup-wrap,.screen>.results{margin:auto 0}.brand{font-size:50px}.setup-head h1,.results h1{font-size:30px}.tagline{font-size:13px}.roster{grid-template-columns:1fr}.team-roster{padding:3px 8px}.player-chip{font-size:11px}.hud{grid-template-columns:1fr auto 1fr}.scorebox span{display:none}.scorebox b{font-size:28px}.clockbox{min-width:108px;padding:5px 8px}.clockbox b{font-size:20px}.pause-button{top:74px}.announce{font-size:34px}.result-word{font-size:58px}.final-score{font-size:44px}.result-stats{grid-template-columns:repeat(2,1fr)}}
@media(pointer:fine){.touch{display:none!important}}
@media(pointer:coarse){.possession{bottom:164px}}
@media(prefers-reduced-motion:reduce){.announce.show{animation:none;opacity:1;transform:translate(-50%,-50%)}.seg,.btn{transition:none}}
</style>
</head>
<body>
<canvas id="court" aria-label="Court Vision arcade basketball court"></canvas>

<section class="screen" data-screen="title">
  <p class="kicker">PhantomPlay Arcade</p>
  <h1 class="brand">Court <span>Vision</span></h1>
  <p class="tagline">Fast breaks, hot streaks, hard dunks. Build a squad and own four furious quarters.</p>
  <div class="button-row"><button class="btn primary" data-open-setup>Play</button></div>
  <p class="record" data-record></p>
</section>

<section class="screen" data-screen="setup" hidden>
  <div class="setup-wrap">
    <div class="setup-head"><p class="kicker">Locker Room</p><h1>Quickplay Setup</h1></div>
    <div class="setup-band"><h2>Lineup</h2><div class="segments" data-size-options>
      <button class="seg" data-size="1" aria-pressed="false">1 vs 1</button>
      <button class="seg" data-size="2" aria-pressed="true">2 vs 2</button>
      <button class="seg" data-size="3" aria-pressed="false">3 vs 3</button>
    </div></div>
    <div class="setup-band"><h2>Local players</h2><div class="segments two" data-human-options>
      <button class="seg" data-humans="1" aria-pressed="true">Solo</button>
      <button class="seg" data-humans="2" aria-pressed="false">Two players</button>
    </div></div>
    <div class="setup-band"><h2>Match clock</h2><div class="segments two" data-time-options>
      <button class="seg" data-seconds="120" aria-pressed="true">2 minute sprint</button>
      <button class="seg" data-seconds="180" aria-pressed="false">3 minute classic</button>
    </div></div>
    <div class="roster" data-roster></div>
    <div class="setup-actions"><button class="btn" data-title>Back</button><button class="btn primary" data-tipoff>Tip Off</button></div>
  </div>
</section>

<div class="hud" hidden>
  <div class="scorebox home"><div><span>Neon Pulse</span><b data-home-score>0</b></div></div>
  <div class="clockbox"><b data-clock>0:30</b><span><i data-quarter>Q1</i><i data-shot-clock>16</i></span></div>
  <div class="scorebox away"><div><span>Solar Rush</span><b data-away-score>0</b></div></div>
</div>
<button class="pause-button" data-pause aria-label="Pause" hidden>II</button>
<div class="announce" aria-live="polite" data-announce></div>
<div class="possession" data-possession hidden></div>

<div class="touch" hidden>
  <div class="dpad" aria-label="Movement controls">
    <button class="touch-btn" data-dir="up" aria-label="Move up">&#9650;</button>
    <button class="touch-btn" data-dir="down" aria-label="Move down">&#9660;</button>
    <button class="touch-btn" data-dir="left" aria-label="Move left">&#9664;</button>
    <button class="touch-btn" data-dir="right" aria-label="Move right">&#9654;</button>
  </div>
  <div class="action-pad">
    <button class="touch-btn action pass" data-touch-pass>Pass</button>
    <button class="touch-btn action shoot" data-touch-shoot>Shoot</button>
  </div>
</div>

<div class="pause" data-pause-overlay hidden><div class="pause-inner"><p class="kicker">Timeout</p><h2>Paused</h2><div class="button-row"><button class="btn primary" data-resume>Resume</button><button class="btn" data-quit>Quit</button></div></div></div>

<section class="screen" data-screen="results" hidden>
  <div class="results">
    <p class="kicker">Final</p><h1 data-result-title>Neon Pulse Wins</h1>
    <div class="result-word" data-result-word>Victory</div>
    <div class="final-score" data-final-score>0 - 0</div>
    <div class="result-stats" data-result-stats></div>
    <div class="button-row"><button class="btn primary" data-rematch>Rematch</button><button class="btn" data-change>Change Lineup</button></div>
  </div>
</section>

<script>
(function(){
"use strict";
var host=function(type,data){data=data||{};var msg={source:"phantomplay-game",type:type};for(var k in data)msg[k]=data[k];parent.postMessage(msg,"*");};
var cv=document.getElementById("court"),ctx=cv.getContext("2d");
var VW=0,VH=0,DPR=1,SCALE=1,OX=0,OY=0;
var WORLD_W=1000,WORLD_H=560,COURT={left:45,right:955,top:42,bottom:518,mid:500};
var HOME=0,AWAY=1,TEAM_NAMES=["Neon Pulse","Solar Rush"],TEAM_COLORS=["#36e6a1","#ff596d"];
var ROSTERS=[["Ace","Mira","Jet"],["Nova","Rio","Lux"]];
var KEYS=[{up:"KeyW",down:"KeyS",left:"KeyA",right:"KeyD",pass:"KeyJ",shoot:"KeyK"},{up:"ArrowUp",down:"ArrowDown",left:"ArrowLeft",right:"ArrowRight",pass:"Comma",shoot:"Period"}];
var settings={size:2,humans:1,seconds:120};
var save={wins:0,games:0,best:0};
try{var saved=JSON.parse(localStorage.getItem("courtVision.v2")||"null");if(saved&&typeof saved==="object")save=Object.assign(save,saved);}catch(e){}
var game=null,pressed=new Set(),touchDir={up:false,down:false,left:false,right:false},hostPaused=false,reducedMotion=matchMedia("(prefers-reduced-motion: reduce)").matches,soundOn=true,gamepadOn=false;
var audio=null,master=null,last=0,raf=0,announceTimer=0,particles=[],flashT=0,shakeT=0,shakeMag=0;
var screenEls=document.querySelectorAll("[data-screen]");

function showScreen(name){screenEls.forEach(function(el){el.hidden=el.getAttribute("data-screen")!==name;});}
function saveLocal(){try{localStorage.setItem("courtVision.v2",JSON.stringify(save));}catch(e){}}
function persisted(){return {v:2,career:save,setup:settings};}
function mergeState(state){if(!state||typeof state!=="object")return;if(state.career)save=Object.assign(save,state.career);if(state.setup){settings.size=Math.max(1,Math.min(3,Number(state.setup.size)||2));settings.humans=Math.max(1,Math.min(2,Number(state.setup.humans)||1));settings.seconds=[120,180].indexOf(Number(state.setup.seconds))>=0?Number(state.setup.seconds):120;}saveLocal();renderSetup();renderRecord();}
function ensureAudio(){if(audio||!soundOn)return;try{audio=new (window.AudioContext||window.webkitAudioContext)();master=audio.createGain();master.gain.value=.23;master.connect(audio.destination);}catch(e){}}
function tone(freq,dur,type,gain,delay){if(!audio||!master||!soundOn)return;var t=audio.currentTime+(delay||0),o=audio.createOscillator(),g=audio.createGain();o.type=type||"sine";o.frequency.setValueAtTime(freq,t);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(gain||.15,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.connect(g);g.connect(master);o.start(t);o.stop(t+dur+.03);}
function sfx(name){if(name==="bounce")tone(115,.04,"sine",.11);else if(name==="pass")tone(240,.06,"triangle",.1);else if(name==="steal"){tone(180,.08,"square",.1);tone(360,.08,"square",.08,.06);}else if(name==="rim")tone(125,.11,"square",.16);else if(name==="swish"){tone(540,.12,"triangle",.18);tone(840,.16,"triangle",.13,.07);}else if(name==="dunk"){tone(95,.16,"sawtooth",.18);tone(430,.2,"square",.12,.04);}else if(name==="horn"){tone(155,.35,"square",.12);tone(116,.45,"square",.1,.18);}}
function announce(text,color){var el=document.querySelector("[data-announce]");el.textContent=text;el.style.color=color||"#fff";el.classList.remove("show");void el.offsetWidth;el.classList.add("show");clearTimeout(announceTimer);announceTimer=setTimeout(function(){el.classList.remove("show");},900);}
function burst(x,y,color,count){if(reducedMotion)return;for(var i=0;i<count;i++){var a=Math.random()*Math.PI*2,s=60+Math.random()*210;particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.6+Math.random()*.4,max:1,color:color,r:2+Math.random()*4});}}
function fitView(){var portrait=VW<600&&VH>VW*1.25&&game&&game.phase!=="finished";if(portrait){SCALE=Math.min(VW/650,VH*.62/WORLD_H);var focus=game.ball?game.ball.x:500;focus=Math.max(325,Math.min(675,focus));OX=VW/2-focus*SCALE;OY=Math.max(92,(VH-WORLD_H*SCALE)*.42);}else{SCALE=Math.min(VW/WORLD_W,VH/WORLD_H);OX=(VW-WORLD_W*SCALE)/2;OY=(VH-WORLD_H*SCALE)/2;}}
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);VW=innerWidth;VH=innerHeight;cv.width=Math.round(VW*DPR);cv.height=Math.round(VH*DPR);cv.style.width=VW+"px";cv.style.height=VH+"px";fitView();}
addEventListener("resize",resize);

function renderRecord(){var el=document.querySelector("[data-record]");el.textContent=save.games?"Record "+save.wins+"-"+(save.games-save.wins)+"  |  Best "+save.best:"First tip-off awaits";}
function choose(selector,attr,value){document.querySelectorAll(selector).forEach(function(b){b.setAttribute("aria-pressed",String(Number(b.getAttribute(attr))===value));});}
function renderSetup(){choose("[data-size]","data-size",settings.size);choose("[data-humans]","data-humans",settings.humans);choose("[data-seconds]","data-seconds",settings.seconds);var html="";for(var team=0;team<2;team++){html+='<div class="team-roster '+(team===1?'away':'')+'"><div class="team-title"><span>'+TEAM_NAMES[team]+'</span><span>'+settings.size+' players</span></div>';for(var i=0;i<settings.size;i++){var human=(team===0&&i===0)||(team===1&&i===0&&settings.humans===2);html+='<div class="player-chip"><span>#'+(i+1)+' '+ROSTERS[team][i]+'</span><b>'+(human?(team===0?'P1':'P2'):'CPU')+'</b></div>';}html+='</div>';}document.querySelector("[data-roster]").innerHTML=html;}

function makePlayer(team,slot,humanSlot){var attack=team===HOME?1:-1;var baseX=team===HOME?310:690;return{id:team*3+slot,team:team,slot:slot,name:ROSTERS[team][slot],number:slot+1,humanSlot:humanSlot,x:baseX-attack*slot*45,y:190+slot*90,vx:0,vy:0,speed:0,dir:attack>0?0:Math.PI,shooting:false,shotMeter:0,shotDir:1,stealCd:0,aiCd:.3+Math.random()*.7,stun:0,hot:0,lastMade:false};}
function startMatch(){ensureAudio();if(audio&&audio.state==="suspended")audio.resume();var players=[];for(var t=0;t<2;t++)for(var i=0;i<settings.size;i++){var hs=(t===HOME&&i===0)?0:(t===AWAY&&i===0&&settings.humans===2?1:null);players.push(makePlayer(t,i,hs));}game={phase:"countdown",players:players,ball:{owner:null,x:500,y:280,z:55,vx:0,vy:0,vz:0,flight:null,looseT:0},score:[0,0],quarter:1,qLength:settings.seconds/4,time:settings.seconds/4,shotClock:16,possession:Math.random()<.5?HOME:AWAY,countdown:3.2,breakT:0,resetT:0,active:[players.find(function(p){return p.team===HOME&&p.slot===0;}).id,players.find(function(p){return p.team===AWAY&&p.slot===0;}).id],stats:{makes:[0,0],attempts:[0,0],steals:[0,0],passes:[0,0],dunks:[0,0],threes:[0,0]},lastProgressQuarter:0,overtime:false,finished:false};particles=[];flashT=0;hostPaused=false;document.querySelector(".hud").hidden=false;document.querySelector("[data-pause]").hidden=false;document.querySelector(".touch").hidden=false;document.querySelector("[data-possession]").hidden=false;showScreen("none");resetPossession(game.possession,true);announce("Tip Off",TEAM_COLORS[game.possession]);}
function teamPlayers(team){return game.players.filter(function(p){return p.team===team;});}
function playerById(id){return game.players.find(function(p){return p.id===id;})||null;}
function hoopFor(team){return team===HOME?{x:919,y:280}:{x:81,y:280};}
function attackDir(team){return team===HOME?1:-1;}
function clampPlayer(p){p.x=Math.max(COURT.left+30,Math.min(COURT.right-30,p.x));p.y=Math.max(COURT.top+28,Math.min(COURT.bottom-28,p.y));}
function resetPositions(){for(var t=0;t<2;t++){var ps=teamPlayers(t),attack=attackDir(t),base=t===HOME?330:670;ps.forEach(function(p,i){p.x=base-attack*(i%2)*90;p.y=190+i*(180/Math.max(1,ps.length-1));if(ps.length===1)p.y=280;p.vx=p.vy=0;p.shooting=false;p.stun=0;});}}
function resetPossession(team,opening){if(!game)return;resetPositions();game.possession=team;game.shotClock=16;var ps=teamPlayers(team),owner=ps[0];game.ball.owner=owner.id;game.ball.flight=null;game.ball.x=owner.x;game.ball.y=owner.y;game.ball.z=18;game.ball.looseT=0;game.active[team]=owner.id;if(!opening)announce(team===HOME?"Pulse Ball":"Rush Ball",TEAM_COLORS[team]);}
function getControlled(team){return playerById(game.active[team])||teamPlayers(team)[0];}
function nearestPlayer(team,x,y){var best=null,bd=Infinity;teamPlayers(team).forEach(function(p){var d=(p.x-x)*(p.x-x)+(p.y-y)*(p.y-y);if(d<bd){bd=d;best=p;}});return best;}
function moveToward(p,tx,ty,speed,dt){var dx=tx-p.x,dy=ty-p.y,d=Math.hypot(dx,dy)||1;p.vx=dx/d*speed;p.vy=dy/d*speed;p.x+=p.vx*dt;p.y+=p.vy*dt;p.dir=Math.atan2(p.vy,p.vx);clampPlayer(p);}
function humanVector(slot){var k=KEYS[slot],x=(pressed.has(k.right)?1:0)-(pressed.has(k.left)?1:0),y=(pressed.has(k.down)?1:0)-(pressed.has(k.up)?1:0);if(slot===0){x+=(touchDir.right?1:0)-(touchDir.left?1:0);y+=(touchDir.down?1:0)-(touchDir.up?1:0);}if(gamepadOn){var pad=(navigator.getGamepads&&navigator.getGamepads()[slot])||null;if(pad){var ax=pad.axes[0]||0,ay=pad.axes[1]||0;if(Math.abs(ax)>.18)x+=ax;if(Math.abs(ay)>.18)y+=ay;}}var d=Math.hypot(x,y);return d>1?{x:x/d,y:y/d}:{x:x,y:y};}

document.querySelectorAll("[data-seconds]").forEach(function(b){b.onclick=function(){settings.seconds=Number(b.getAttribute("data-seconds"));renderSetup();};});
document.querySelector("[data-tipoff]").onclick=startMatch;document.querySelector("[data-pause]").onclick=function(){setPause(true);};document.querySelector("[data-resume]").onclick=function(){setPause(false);};document.querySelector("[data-quit]").onclick=function(){setPause(false);game=null;document.querySelector(".hud").hidden=true;document.querySelector("[data-pause]").hidden=true;document.querySelector(".touch").hidden=true;document.querySelector("[data-possession]").hidden=true;renderRecord();showScreen("title");};document.querySelector("[data-rematch]").onclick=startMatch;document.querySelector("[data-change]").onclick=function(){renderSetup();showScreen("setup");};
addEventListener("message",function(e){var d=e.data;if(!d||d.source!=="phantomplay-host")return;if(d.type==="settings"){soundOn=d.sound!==false;reducedMotion=!!d.reducedMotion||matchMedia("(prefers-reduced-motion: reduce)").matches;gamepadOn=!!d.gamepad;if(master)master.gain.value=soundOn?.23:0;}else if(d.type==="pause")setPause(true);else if(d.type==="resume")setPause(false);else if(d.type==="restart"){setPause(false);if(game)startMatch();else{renderSetup();showScreen("setup");}}else if(d.type==="exit")setPause(true);else if(d.type==="restore"||d.type==="load-state")mergeState(d.state);else if(d.type==="save-state")host("progress",{score:game?game.score[0]:0,progress:game?Math.round(((game.quarter-1)+(1-game.time/game.qLength))/4*100):0,state:persisted()});});
resize();renderRecord();renderSetup();showScreen("title");raf=requestAnimationFrame(loop);host("ready");
})();
