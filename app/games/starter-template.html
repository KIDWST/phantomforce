<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>PhantomPlay Starter Template</title>
<!--
  ═══════════════════════════════════════════════════════════════════
  PHANTOMPLAY STARTER TEMPLATE — copy this file to begin your game.

  This is a complete, working PhantomPlay game in one file. It shows
  everything the platform expects from you:

    1. The CSP meta tag above — keep it EXACTLY as is. Your game runs
       in a sandboxed iframe; no external scripts, styles, fonts,
       images, or network calls will load. Inline everything.

    2. The host() bridge — how your game talks to PhantomPlay:
         host('ready')                        once, when playable
         host('score',   {score, progress})   whenever score changes
         host('progress',{score, progress})   on meaningful progress
         host('complete',{score, progress:100, state:{...}})
                                              EXACTLY ONCE per run
       progress is an integer 0-100. state is any small JSON object.

    3. The settings listener — PhantomPlay sends the player's
       preferences. Honor both:
         sound: false         → mute all audio
         reducedMotion: true  → remove glow/parallax/animation

    4. House rules the review team checks:
       • Keyboard AND touch controls
       • Responsive to 360px-wide screens
       • Start overlay, game-over overlay with "Play again"
       • Pause when the tab is hidden (visibilitychange)
       • 'complete' can only fire once per run
       • No trackers, no popups, no external requests

  The demo game below: targets appear, tap/click them or press Space
  when the ring is over one. 30 seconds, score as high as you can.
  Replace the game logic; keep the plumbing.
  ═══════════════════════════════════════════════════════════════════
-->
<style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020806;color:#effff6;font-family:system-ui,sans-serif}
body{display:grid;place-items:center;background:radial-gradient(circle at 50% 16%,#10362a,#020806 62%)}
main{width:min(560px,94vw);text-align:center}
h1{margin:0 0 4px;color:#58ffa8;font-size:32px}
.sub{color:#8ba99a;margin:0 0 12px;font-size:13px}
.hud{display:flex;justify-content:center;gap:24px;margin-bottom:10px}
.hud span{display:block;color:#8ba99a;font:700 11px ui-monospace;letter-spacing:.5px}
.hud b{color:#63ffad;font-size:24px}
.field{position:relative;width:min(88vw,440px);height:min(60vw,300px);margin:0 auto;border:1px solid #41ffa133;border-radius:14px;background:#03110c;touch-action:none;overflow:hidden}
.target{position:absolute;width:44px;height:44px;border-radius:50%;background:radial-gradient(circle at 38% 32%,#8fffc6,#17925e);box-shadow:0 0 18px #41ffa188;border:0;cursor:pointer;transition:transform .1s}
.target:active{transform:scale(.85)}
.overlay{position:absolute;inset:0;display:grid;place-items:center;background:#010504e6;border-radius:14px}
.overlay[hidden]{display:none}
.overlay h2{margin:0 0 6px;color:#5affa9;font-size:30px}
.overlay p{margin:0 0 14px;color:#a9c5b7;font-size:14px}
.overlay button{border:0;border-radius:999px;background:#55ffa8;padding:12px 26px;font-weight:900;font-size:15px;cursor:pointer}
.reduced .target{box-shadow:none;transition:none}
@media(max-width:400px){h1{font-size:26px}.hud b{font-size:20px}}
</style></head><body><main>
<h1>Starter Template</h1><p class="sub">Tap the signals before they fade. This whole file is yours to copy.</p>
<div class="hud"><div><span>SCORE</span><b data-score>0</b></div><div><span>TIME</span><b data-time>30</b></div></div>
<div class="field">
  <div class="overlay start"><div><h2>Ready to build?</h2><p>Tap the glowing signals. 30 seconds.<br>Then open this file's source — every rule is explained inline.</p><button type="button">Start</button></div></div>
  <div class="overlay over" hidden><div><h2>Run complete</h2><p data-final></p><button type="button">Play again</button></div></div>
</div>
</main><script>
/* ── 1. The host bridge. Keep this line verbatim. ──────────────── */
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');

/* ── 2. Player settings from PhantomPlay. Honor both flags. ────── */
let soundOn=true,reduced=false;
addEventListener('message',e=>{
  if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){
    soundOn=!!e.data.sound;
    reduced=!!e.data.reducedMotion;
    document.body.classList.toggle('reduced',reduced);
  }
});

/* ── 3. Tiny WebAudio blip, gated behind the sound setting. ────── */
let audioCtx=null;
function blip(freq){
  if(!soundOn)return;
  try{
    audioCtx=audioCtx||new AudioContext();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.frequency.value=freq;o.type='sine';
    g.gain.setValueAtTime(.08,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.15);
    o.connect(g).connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+.16);
  }catch{}
}

/* ── 4. Game state. running guards every loop and input path. ──── */
const field=document.querySelector('.field'),scoreEl=document.querySelector('[data-score]'),
      timeEl=document.querySelector('[data-time]'),startOv=document.querySelector('.start'),
      overOv=document.querySelector('.over'),finalEl=document.querySelector('[data-final]');
let running=false,score=0,timeLeft=30,timer=0,spawner=0,completed=false;

function spawn(){
  if(!running)return;
  const t=document.createElement('button');
  t.className='target';t.setAttribute('aria-label','Signal');
  t.style.left=Math.random()*(field.clientWidth-52)+4+'px';
  t.style.top=Math.random()*(field.clientHeight-52)+4+'px';
  t.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(!running)return;
    score+=10;scoreEl.textContent=score;blip(660);t.remove();
    /* Report the score. progress ramps with elapsed time. */
    host('score',{score,progress:Math.min(99,Math.round((30-timeLeft)/30*100)),state:{hits:score/10}});
  });
  field.appendChild(t);
  /* Signals fade if ignored — keep the field honest. */
  setTimeout(()=>{if(t.isConnected)t.remove()},reduced?2600:1900);
}

function tick(){
  if(document.hidden)return;           /* pause while tab is hidden */
  timeLeft--;timeEl.textContent=timeLeft;
  host('progress',{score,progress:Math.min(99,Math.round((30-timeLeft)/30*100))});
  if(timeLeft<=0)finish();
}

function start(){
  running=true;completed=false;score=0;timeLeft=30;
  scoreEl.textContent='0';timeEl.textContent='30';
  startOv.hidden=true;overOv.hidden=true;
  field.querySelectorAll('.target').forEach(t=>t.remove());
  clearInterval(timer);clearInterval(spawner);
  timer=setInterval(tick,1000);
  spawner=setInterval(spawn,reduced?900:650);
  spawn();
  host('progress',{score:0,progress:0});
}

/* ── 5. Game over: fire 'complete' EXACTLY once, then offer reset. */
function finish(){
  if(completed)return;                 /* the once-only guard */
  completed=true;running=false;
  clearInterval(timer);clearInterval(spawner);
  field.querySelectorAll('.target').forEach(t=>t.remove());
  finalEl.textContent=`You caught ${score/10} signals for ${score} points.`;
  overOv.hidden=false;blip(330);
  host('complete',{score,progress:100,state:{hits:score/10}});
}

startOv.querySelector('button').addEventListener('click',start);
overOv.querySelector('button').addEventListener('click',start);
/* Keyboard path: Space/Enter starts, or pops the oldest live target. */
addEventListener('keydown',e=>{
  if(e.code!=='Space'&&e.code!=='Enter')return;
  e.preventDefault();
  if(!running){start();return}
  const t=field.querySelector('.target');
  if(t)t.dispatchEvent(new PointerEvent('pointerdown',{bubbles:true}));
});

/* ── 6. Tell PhantomPlay the game is interactive. Once. ────────── */
host('ready');
</script></body></html>
