<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:">
  <title>Type Storm</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020806;color:#effff6;font-family:system-ui,sans-serif;user-select:none}
    body{display:grid;grid-template-rows:auto minmax(0,1fr) auto;padding:max(10px,env(safe-area-inset-top)) 12px max(10px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 0,#0f3628,#020806 60%)}
    .hud{display:flex;justify-content:space-between;align-items:center;gap:10px;width:min(760px,100%);margin:0 auto;padding:2px 4px}
    .hud span{display:block;color:#8ba99a;font:700 10px ui-monospace,monospace;letter-spacing:.14em}
    .hud b{color:#63ffad;font-size:24px;font-variant-numeric:tabular-nums}
    .hud .shields b{color:#41ffa1;letter-spacing:3px}
    .stage{position:relative;width:min(760px,100%);margin:0 auto;min-height:0}
    canvas{display:block;width:100%;height:100%;border:1px solid #42ff9a3d;border-radius:14px;background:#03110c;touch-action:none}
    .kbd{position:fixed;bottom:0;left:0;width:2px;height:2px;opacity:0;border:0;padding:0;background:transparent;color:transparent;caret-color:transparent}
    .hint{width:min(760px,100%);margin:8px auto 0;min-height:44px;padding:10px 16px;border:1px solid #4dffa36b;border-radius:999px;background:#03110ce8;color:#caffdf;font-weight:800;font-size:13px;cursor:pointer}
    .hint:active{background:#41ffa124}
    .overlay{position:fixed;z-index:6;inset:0;display:grid;place-items:center;background:#010504dc;backdrop-filter:blur(4px)}
    .overlay[hidden]{display:none}
    .overlay>div{text-align:center;padding:26px;max-width:470px}
    .overlay h1{font-size:48px;line-height:1;margin:0;color:#5affa9;text-shadow:0 0 26px #41ffa155}
    .overlay p{color:#9db8aa;line-height:1.55}
    .overlay .big{color:#effff6;font-size:20px;font-weight:800}
    .overlay button{min-width:150px;min-height:48px;border:0;border-radius:999px;background:#55ffa8;padding:14px 24px;font-weight:900;font-size:15px;cursor:pointer;color:#02150c}
    body.reduced .overlay h1{text-shadow:none}
    @media(max-width:420px){.overlay h1{font-size:36px}.hud b{font-size:19px}}
  </style>
</head>
<body>
  <header class="hud">
    <div><span>SCORE</span><b data-score>0</b></div>
    <div><span>COMBO</span><b data-combo>0</b></div>
    <div class="shields"><span>SHIELDS</span><b data-shields>&#11041;&#11041;&#11041;</b></div>
  </header>
  <div class="stage"><canvas aria-label="Type Storm play field"></canvas></div>
  <button class="hint" type="button">&#9000; Tap to open keyboard &mdash; type falling words before they land</button>
  <input class="kbd" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" aria-hidden="true" tabindex="-1">
  <div class="overlay start"><div><h1>Type Storm</h1><p>Words rain toward the baseline. Type a word's letters in order to lock on and destroy it. A word that lands breaks one of your 3 shields.</p><button type="button">Start</button></div></div>
  <div class="overlay pause" hidden><div><h1>Paused</h1><p>The storm is holding its breath.</p><button type="button">Resume</button></div></div>
  <div class="overlay result" hidden><div><h1>Shields down</h1><p class="big" data-final></p><p data-detail></p><button type="button">Play again</button></div></div>
  <script>
    'use strict';
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const WORDS=['able','about','above','acorn','actor','adapt','after','again','agent','alarm','alert','alien','alpha','amber','angle','ankle','apple','arch','area','arrow','atlas','atom','audio','autumn','award','axis','badge','baker','basic','basket','beach','beacon','begin','bell','below','bench','berry','binary','bird','black','blade','blaze','block','bloom','blue','board','bonus','boost','bottle','brain','brave','bread','break','brick','bridge','bright','bring','brook','brush','buffer','build','cabin','cable','cache','camera','candle','canyon','carbon','cargo','castle','cedar','chain','chair','chalk','charm','chart','chase','check','chess','chief','chord','cider','cipher','circle','city','claim','clean','clear','clever','cliff','climb','clock','cloud','clover','coast','cobalt','code','coin','comet','coral','cosmic','count','cover','crane','crater','creek','crisp','cross','crown','curve','cycle','daisy','dance','dark','dawn','decode','delta','denim','depth','desert','design','digit','dome','door','draft','dragon','dream','drift','drive','drop','dusk','dust','eagle','early','earth','echo','edge','eight','elbow','ember','empty','energy','engine','enter','equal','event','exact','exit','extra','fable','falcon','fast','fern','field','film','final','fire','first','five','flame','flash','fleet','flint','float','floor','flow','fluid','flux','focus','fold','forest','forge','form','forum','found','four','frame','fresh','frost','fruit','galaxy','game','gamma','garden','gate','gear','giant','gift','glass','gleam','glide','globe','glow','gold','grain','grand','grape','graph','grass','green'];
    const cvs=document.querySelector('canvas'),ctx=cvs.getContext('2d'),kbd=document.querySelector('.kbd');
    const startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause'),resultEl=document.querySelector('.result');
    const hintEl=document.querySelector('.hint');
    const FONT='700 20px ui-monospace,SFMono-Regular,Menlo,monospace';
    let cw=320,ch=480,baseY=420;
    let falling=[],active=null,phase='start',paused=false,completed=false;
    let score=0,shields=3,wordsDestroyed=0,streak=0,bestCombo=0,elapsed=0,spawnT=0,flash=0;
    let last=0,soundOn=true,reduced=false,audio=null;

    function beep(freq,dur=0.05,gain=0.03){
      if(!soundOn)return;
      try{
        audio=audio||new (window.AudioContext||window.webkitAudioContext)();
        if(audio.state==='suspended')audio.resume();
        const o=audio.createOscillator(),g=audio.createGain();
        o.type='triangle';o.frequency.value=freq;
        g.gain.setValueAtTime(gain,audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001,audio.currentTime+dur);
        o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+dur);
      }catch(err){}
    }
    function fit(){
      const dpr=Math.min(2.5,devicePixelRatio||1),rect=cvs.getBoundingClientRect();
      cw=Math.max(280,rect.width);ch=Math.max(300,rect.height);
      cvs.width=Math.round(cw*dpr);cvs.height=Math.round(ch*dpr);
      ctx.setTransform(dpr,0,0,dpr,0,0);
      baseY=ch-46;
      for(const w of falling)w.x=Math.min(w.x,Math.max(8,cw-8-w.width));
      draw();
    }
    function updateHud(){
      document.querySelector('[data-score]').textContent=score;
      document.querySelector('[data-combo]').textContent=streak;
      document.querySelector('[data-shields]').textContent=shields>0?'⬢'.repeat(shields):'—';
    }
    function spawn(){
      if(falling.length>=10)return;
      const text=WORDS[Math.floor(Math.random()*WORDS.length)];
      if(falling.some(w=>w.text===text))return;
      ctx.font=FONT;
      const width=ctx.measureText(text).width;
      const base=Math.min(120,30+elapsed*1.25);
      let x=8+Math.random()*Math.max(1,cw-16-width);
      for(let tries=0;tries<4;tries++){
        const clash=falling.some(w=>w.y<60&&x<w.x+w.width+18&&x+width+18>w.x);
        if(!clash)break;
        x=8+Math.random()*Math.max(1,cw-16-width);
      }
      falling.push({text,matched:0,x,y:-14,width,speed:base*(0.85+Math.random()*0.3)});
    }
    function startRun(){
      falling=[];active=null;
      score=0;shields=3;wordsDestroyed=0;streak=0;bestCombo=0;elapsed=0;spawnT=1.2;flash=0;completed=false;
      phase='playing';paused=false;
      startEl.hidden=true;pauseEl.hidden=true;resultEl.hidden=true;
      updateHud();
      host('progress',{score:0,progress:0,state:{words:0,bestCombo:0}});
      kbd.focus({preventScroll:true});
    }
    function gameOver(){
      if(completed||phase==='over')return;
      phase='over';completed=true;active=null;
      resultEl.querySelector('[data-final]').textContent=`Final score ${score}`;
      resultEl.querySelector('[data-detail]').textContent=`${wordsDestroyed} word${wordsDestroyed===1?'':'s'} destroyed · best combo ${bestCombo}.`;
      resultEl.hidden=false;
      host('complete',{score,progress:100,state:{words:wordsDestroyed,bestCombo}});
    }
    function miss(){
      streak=0;flash=Math.max(flash,0.25);
      updateHud();beep(130,0.09,0.035);
    }
    function destroyWord(word){
      falling=falling.filter(w=>w!==word);
      if(active===word)active=null;
      wordsDestroyed++;
      const bonus=Math.min(50,streak*5);
      score+=word.text.length*5+bonus;
      streak++;bestCombo=Math.max(bestCombo,streak);
      updateHud();beep(660+Math.min(400,streak*30),0.07,0.04);
      host('score',{score,progress:Math.min(99,wordsDestroyed*3),state:{words:wordsDestroyed,bestCombo}});
    }
    function handleLetter(ch){
      if(phase!=='playing'||paused)return;
      if(active&&falling.includes(active)){
        if(active.text[active.matched]===ch){
          active.matched++;beep(500+active.matched*40,0.03,0.02);
          if(active.matched>=active.text.length)destroyWord(active);
        }else miss();
        return;
      }
      active=null;
      let target=null;
      for(const w of falling)if(w.text[0]===ch&&(!target||w.y>target.y))target=w;
      if(target){target.matched=1;active=target;beep(520,0.03,0.02)}
      else miss();
    }
    function loseShield(word){
      falling=falling.filter(w=>w!==word);
      if(active===word)active=null;
      shields--;streak=0;flash=0.5;
      updateHud();beep(110,0.3,0.05);
      if(shields<=0){gameOver();return}
      host('progress',{score,progress:Math.min(99,wordsDestroyed*3),state:{words:wordsDestroyed,bestCombo}});
    }
    function update(dt){
      elapsed+=dt;
      if(flash>0)flash=Math.max(0,flash-dt);
      spawnT-=dt;
      const interval=Math.max(0.65,2.2-elapsed*0.028);
      if(spawnT<=0){spawn();spawnT=interval}
      for(const w of [...falling]){
        w.y+=w.speed*dt;
        if(w.y>=baseY){loseShield(w);if(phase!=='playing')return}
      }
    }
    function draw(){
      ctx.clearRect(0,0,cw,ch);
      ctx.strokeStyle='#36ff9414';ctx.lineWidth=1;
      for(let y=30;y<ch;y+=44){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(cw,y);ctx.stroke()}
      ctx.strokeStyle=flash>0?'#effff6':'#41ffa1';
      ctx.lineWidth=2;
      if(!reduced){ctx.shadowColor='#41ffa1';ctx.shadowBlur=flash>0?22:10}
      ctx.beginPath();ctx.moveTo(0,baseY);ctx.lineTo(cw,baseY);ctx.stroke();
      ctx.shadowBlur=0;
      ctx.fillStyle='#5f8371';ctx.font='700 10px ui-monospace,monospace';ctx.textAlign='left';
      ctx.fillText('BASELINE',8,baseY+16);
      ctx.font=FONT;
      for(const w of falling){
        const isActive=w===active;
        if(isActive){
          ctx.fillStyle='#0b3424';
          if(!reduced){ctx.shadowColor='#41ffa1';ctx.shadowBlur=14}
          ctx.beginPath();
          if(ctx.roundRect)ctx.roundRect(w.x-7,w.y-19,w.width+14,27,8);
          else ctx.rect(w.x-7,w.y-19,w.width+14,27);
          ctx.fill();ctx.shadowBlur=0;
          ctx.strokeStyle='#58ffa8';ctx.lineWidth=1;ctx.stroke();
        }
        const pre=w.text.slice(0,w.matched),rest=w.text.slice(w.matched);
        ctx.fillStyle='#58ffa8';
        ctx.fillText(pre,w.x,w.y);
        ctx.fillStyle=isActive?'#effff6':'#a9c5b7';
        ctx.fillText(rest,w.x+ctx.measureText(pre).width,w.y);
      }
    }
    function loop(t){
      requestAnimationFrame(loop);
      if(paused||phase!=='playing'){last=t;return}
      const dt=Math.min(0.05,Math.max(0,(t-last)/1000));
      last=t;
      update(dt);
      if(phase==='playing')draw();
    }
    function setPaused(next){
      if(phase!=='playing')return;
      paused=next;pauseEl.hidden=!paused;
      host('paused',{paused});
    }
    kbd.addEventListener('input',()=>{
      const v=kbd.value.toLowerCase();
      for(const ch of v)if(ch>='a'&&ch<='z')handleLetter(ch);
      kbd.value='';
    });
    addEventListener('keydown',e=>{
      if(e.ctrlKey||e.metaKey||e.altKey)return;
      if(e.key==='Escape'){e.preventDefault();setPaused(!paused);return}
      if(e.target===kbd)return;
      const k=e.key.toLowerCase();
      if(k.length===1&&k>='a'&&k<='z'){e.preventDefault();handleLetter(k)}
    });
    hintEl.addEventListener('click',()=>kbd.focus({preventScroll:true}));
    cvs.addEventListener('pointerdown',()=>{if(phase==='playing')kbd.focus({preventScroll:true})});
    addEventListener('resize',fit);
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&phase==='playing'&&!paused)setPaused(true)});
    addEventListener('message',e=>{
      if(e.data?.source!=='phantomplay-host')return;
      if(e.data.type==='settings'){
        if('sound' in e.data)soundOn=!!e.data.sound;
        if('reducedMotion' in e.data){reduced=!!e.data.reducedMotion;document.body.classList.toggle('reduced',reduced)}
      }
      if(e.data.type==='pause')setPaused(true);
      if(e.data.type==='resume')setPaused(false);
      if(e.data.type==='restart')startRun();
    });
    startEl.querySelector('button').onclick=startRun;
    pauseEl.querySelector('button').onclick=()=>setPaused(false);
    resultEl.querySelector('button').onclick=startRun;
    fit();updateHud();
    requestAnimationFrame(loop);
    host('ready');
  </script>
</body>
</html>
