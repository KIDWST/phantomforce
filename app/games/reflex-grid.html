<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>Reflex Grid</title><style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020806;color:#effff6;font-family:system-ui,sans-serif;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 50% 0,#0f3a2c,#020806 60%)}main{width:min(520px,100%)}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:14px;gap:10px}h1{margin:0;color:#58ffa8;font-size:34px;letter-spacing:-1px}.sub{color:#8fae9f;font-size:12px;margin:2px 0 0}.stats{display:flex;gap:14px;font:800 12px ui-monospace,monospace}.stats b{color:#77ffb8;font-size:20px;display:block}.stats span{color:#6f8a7d;text-transform:uppercase;letter-spacing:1px;font-size:9px}.lives{color:#ff7a7a}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.cell{aspect-ratio:1;border:1px solid #42ff9a30;border-radius:18px;background:linear-gradient(150deg,#0a2017,#04100b);cursor:pointer;position:relative;transition:transform .06s,box-shadow .12s,background .12s;display:grid;place-items:center;font:800 26px ui-monospace,monospace;color:#2f5a48}.cell:active{transform:scale(.95)}.cell.lit{background:radial-gradient(circle at 50% 40%,#7dffc0,#17a866);border-color:#aeffd6;box-shadow:0 0 26px #41ffa1aa,inset 0 0 18px #ffffff55;color:#04120b}.cell.good{background:#0d4a30;border-color:#58ffa8}.cell.bad{background:#4a1414;border-color:#ff7a7a}.bar{height:7px;border-radius:6px;background:#0c2119;overflow:hidden;margin:14px 0 0}.bar i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#41ffa1,#effff6);transform-origin:left;transition:transform .05s linear}.status{text-align:center;min-height:22px;margin-top:12px;color:#a9c5b7;font-size:14px}.btn{display:block;margin:14px auto 0;padding:12px 26px;border:1px solid #58ffa8;border-radius:30px;background:#0c3221;color:#defff0;font:800 15px system-ui;cursor:pointer}.btn:active{transform:scale(.96)}.hide{display:none}@media(max-width:420px){h1{font-size:28px}.grid{gap:9px}.cell{border-radius:14px}}</style></head><body><main><header><div><h1>Reflex Grid</h1><p class="sub">Tap the lit cell before it fades. Keys 1-9.</p></div><div class="stats"><div><b id="score">0</b><span>Score</span></div><div><b class="lives" id="lives">♥♥♥</b><span>Lives</span></div></div></header><div class="grid" id="grid"></div><div class="bar"><i id="fuse"></i></div><div class="status" id="status">Tap start to begin.</div><button class="btn" id="btn">Start</button></main><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
let reduced=false,sound=true;
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion;sound=!!e.data.sound}});
const grid=document.getElementById('grid'),scoreEl=document.getElementById('score'),livesEl=document.getElementById('lives'),statusEl=document.getElementById('status'),fuse=document.getElementById('fuse'),btn=document.getElementById('btn');
const cells=[];for(let i=0;i<9;i++){const c=document.createElement('div');c.className='cell';c.dataset.i=i;c.textContent=i+1;cells.push(c);grid.appendChild(c)}
let score=0,lives=3,active=-1,playing=false,litAt=0,duration=0,raf=0,timer=0;
let ac=null;function beep(f,d,t){if(!sound)return;try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(.0001,ac.currentTime);g.gain.exponentialRampToValueAtTime(.18,ac.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.start();o.stop(ac.currentTime+d)}catch(e){}}
function dur(){return Math.max(430,1150-score*22)}
function progress(){return Math.min(100,Math.round(score/40*100))}
function render(){scoreEl.textContent=score;livesEl.textContent='♥'.repeat(lives)+'·'.repeat(3-lives)}
function spawn(){if(!playing)return;cells.forEach(c=>c.className='cell');active=Math.floor(Math.random()*9);const c=cells[active];c.classList.add('lit');duration=dur();litAt=performance.now();if(sound)beep(880,.06,'square');tick()}
function tick(){cancelAnimationFrame(raf);raf=requestAnimationFrame(function loop(){if(!playing)return;const el=performance.now()-litAt,left=1-el/duration;fuse.style.transform='scaleX('+Math.max(0,left)+')';if(el>=duration){miss();return}raf=requestAnimationFrame(loop)})}
function miss(){if(active<0)return;cells[active].classList.remove('lit');cells[active].classList.add('bad');active=-1;beep(160,.18,'sawtooth');lives--;render();statusEl.textContent='Missed! '+lives+' left.';if(lives<=0)return over();timer=setTimeout(spawn,reduced?260:420)}
function hit(i){if(!playing||active<0)return;if(i===active){const c=cells[active];c.classList.remove('lit');c.classList.add('good');active=-1;score++;beep(1200,.07,'square');render();statusEl.textContent='Hit!';host('score',{score,progress:progress(),state:{score,lives}});timer=setTimeout(spawn,reduced?200:300)}else{cells[i].classList.add('bad');setTimeout(()=>cells[i].classList.remove('bad'),200);beep(140,.16,'sawtooth');lives--;render();statusEl.textContent='Wrong cell! '+lives+' left.';if(lives<=0){cancelAnimationFrame(raf);return over()}}}
function over(){playing=false;cancelAnimationFrame(raf);clearTimeout(timer);cells.forEach(c=>c.classList.remove('lit'));fuse.style.transform='scaleX(0)';active=-1;statusEl.textContent='Game over — score '+score+'.';btn.textContent='Play again';btn.classList.remove('hide');beep(300,.3,'triangle');host('complete',{score,progress:100,state:{score,lives:0}})}
function start(){score=0;lives=3;playing=true;active=-1;render();btn.classList.add('hide');statusEl.textContent='Go!';host('score',{score:0,progress:0,state:{score:0,lives:3}});timer=setTimeout(spawn,reduced?300:500)}
btn.onclick=start;
cells.forEach(c=>c.addEventListener('pointerdown',e=>{e.preventDefault();hit(+c.dataset.i)}));
addEventListener('keydown',e=>{if(e.key>='1'&&e.key<='9'){hit(+e.key-1)}else if(e.key==='Enter'&&!playing){start()}});
let pausedElapsed=-1;document.addEventListener('visibilitychange',()=>{if(document.hidden&&playing&&active>=0){cancelAnimationFrame(raf);pausedElapsed=performance.now()-litAt}else if(!document.hidden&&playing&&active>=0&&pausedElapsed>=0){litAt=performance.now()-pausedElapsed;pausedElapsed=-1;tick()}});
render();host('ready');
</script></body></html>
