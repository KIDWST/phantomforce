    function tone(f,d=.05,g=.025,type='triangle'){if(!sound)return;try{ac=ac||new(AudioContext||webkitAudioContext)();const o=ac.createOscillator(),v=ac.createGain();o.type=type;o.frequency.value=f;v.gain.setValueAtTime(.0001,ac.currentTime);v.gain.exponentialRampToValueAtTime(g,ac.currentTime+.01);v.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.connect(v);v.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}catch{}}
    function toast(t){toastEl.textContent=t;toastEl.classList.remove('show');void toastEl.offsetWidth;toastEl.classList.add('show')}
    function spark(i,n=10,color='#7dffc0'){if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;const b=grid.querySelector(`[data-i="${i}"]`);if(!b)return;const r=b.getBoundingClientRect(),gr=grid.getBoundingClientRect();for(let k=0;k<n;k++){const s=document.createElement('i');s.className='spark';s.style.color=color;s.style.background=color;s.style.left=(r.left-gr.left+r.width/2)+'px';s.style.top=(r.top-gr.top+r.height/2)+'px';const a=Math.random()*Math.PI*2,d=34+Math.random()*38;grid.appendChild(s);s.animate([{opacity:0,transform:'translate(-50%,-50%) scale(.3)'},{opacity:1,offset:.18},{opacity:.45,offset:.62},{opacity:0,transform:`translate(${Math.cos(a)*d-50}%,${Math.sin(a)*d-50}%) scale(1.45)`}],{duration:900+Math.random()*360,easing:'ease-out'}).onfinish=()=>s.remove()}}
    function shock(){grid.classList.remove('shock');void grid.offsetWidth;grid.classList.add('shock')}
    function render(){scoreEl.textContent=`${score}`;leftEl.textContent=`${left} left`;livesEl.textContent=`${lives} lives`;comboEl.textContent=combo;grid.innerHTML=Array.from({length:16},(_,i)=>`<button class="cell ${i===live?'live':''} ${i===bonus?'bonus':''}" data-i="${i}" type="button">${i===bonus?'BONUS':i===live?'HIT':i+1}</button>`).join('');grid.querySelectorAll('button').forEach(b=>b.onclick=()=>pick(Number(b.dataset.i)))}
    function tickBar(){if(!started||paused){barEl.style.transform='scaleX(1)';return}const remain=Math.max(0,(deadline-performance.now())/speed);barEl.style.transform=`scaleX(${remain})`;barTimer=requestAnimationFrame(tickBar)}
    function next(){if(!started||paused)return;do{live=Math.floor(Math.random()*16)}while(live===lastLive);lastLive=live;bonus=(combo>=4&&Math.random()<.32)?Math.floor(Math.random()*16):-1;if(bonus===live)bonus=(bonus+5)%16;render();deadline=performance.now()+speed;cancelAnimationFrame(barTimer);tickBar();clearTimeout(timer);timer=setTimeout(()=>{if(!started||paused)return;lives--;combo=0;bonus=-1;tone(120,.1,.03,'sawtooth');shock();host('score',{score,progress:Math.round((30-left)/30*100),state:{lives,left,combo,bestCombo}});if(lives<=0)finish('Missed signal');else next()},speed)}
    function pick(i){if(!started||paused||resolving)return;if(i===bonus){score+=75+combo*5;bonus=-1;tone(920,.06,.03,'sine');spark(i,18,'#ffd25e');toast('BONUS');render();host('score',{score,progress:Math.round((30-left)/30*100),state:{lives,left,combo,bestCombo,bonus:true}});return}if(i===live){resolving=true;clearTimeout(timer);combo++;bestCombo=Math.max(bestCombo,combo);score+=10+Math.max(0,30-left)+combo*2;left--;speed=Math.max(300,speed-20-combo);tone(620+combo*26,.045,.026);spark(i,10+Math.min(18,combo*2),'#7dffc0');toast(combo>=5?`x${combo}`:'+');host('score',{score,progress:Math.round((30-left)/30*100),state:{lives,left,combo,bestCombo}});setTimeout(()=>{resolving=false;if(left<=0)finish('Grid clear');else next()},650)}else{resolving=true;clearTimeout(timer);combo=0;lives--;render();shock();spark(i,12,'#ff4f75');tone(130,.08,.028,'sawtooth');host('score',{score,progress:Math.round((30-left)/30*100),state:{lives,left,combo,bestCombo}});setTimeout(()=>{resolving=false;if(lives<=0)finish('Overloaded');else next()},650)}}
    function finish(title){clearTimeout(timer);cancelAnimationFrame(barTimer);started=false;live=-1;render();startEl.hidden=false;startEl.querySelector('h2').textContent=title;startEl.querySelector('p').textContent=`Score ${score}. ${left} signals left. Best combo ${bestCombo}.`;startEl.querySelector('button').textContent='Play again';host('complete',{score,progress:100,state:{lives,left,bestCombo}})}
    function start(){score=0;left=30;lives=3;combo=0;bestCombo=0;speed=950;resolving=false;started=true;paused=false;startEl.hidden=true;pauseEl.hidden=true;host('progress',{score:0,progress:0,state:{lives,left,combo}});next()}
    function setPaused(nextState){if(!started)return;paused=nextState;pauseEl.hidden=!paused;host('paused',{paused});if(paused){clearTimeout(timer);cancelAnimationFrame(barTimer)}else next()}
    document.querySelector('[data-pause]').onclick=()=>setPaused(true);document.querySelector('[data-restart]').onclick=start;startEl.querySelector('button').onclick=start;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    addEventListener('keydown',e=>{if(e.key==='Escape')setPaused(!paused);const n=Number(e.key);if(n>=1&&n<=9)pick(n-1)});
    document.addEventListener('visibilitychange',()=>{if(document.hidden)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='settings')sound=event.data.sound!==false;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')start()});
    render();host('ready');
  </script>
</body>
</html>
