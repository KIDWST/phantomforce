<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:">
  <title>Neon Breaker</title>
  <style>
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;min-height:100%;overflow:hidden;background:#020806;color:#effff6;font-family:system-ui,sans-serif;user-select:none}
    body{display:grid;place-items:center;height:100dvh;min-height:100dvh;padding:max(6px,env(safe-area-inset-top)) 8px max(6px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 8%,#10382a,#020806 62%)}
    main{width:min(100%,720px);height:100%;max-height:100%;display:grid;grid-template-rows:auto minmax(0,1fr);justify-items:center;gap:8px}
    .hud{width:min(480px,100%);display:flex;justify-content:space-between;align-items:center;padding:2px 4px}
    .hud span{display:block;color:#8ba99a;font:700 10px ui-monospace,monospace;letter-spacing:.14em}
    .hud b{color:#63ffad;font-size:24px;font-variant-numeric:tabular-nums}
    .hud .lives b{color:#41ffa1;letter-spacing:4px}
    .stage{position:relative;height:100%;width:100%;display:grid;place-items:center;min-height:0;overflow:hidden}
    canvas{display:block;width:auto;height:auto;max-height:92%;max-width:92%;aspect-ratio:3/4;border:1px solid #42ff9a3d;border-radius:14px;background:#03110c;touch-action:none;cursor:none}
    .overlay{position:fixed;z-index:6;inset:0;display:grid;place-items:center;background:#010504dc;backdrop-filter:blur(4px)}
    .overlay[hidden]{display:none}
    .overlay>div{text-align:center;padding:26px;max-width:460px}
    .overlay h1{font-size:48px;line-height:1;margin:0;color:#5affa9;text-shadow:0 0 26px #41ffa155}
    .overlay p{color:#9db8aa;line-height:1.55}
    .overlay .big{color:#effff6;font-size:20px;font-weight:800}
    .overlay button{min-width:150px;min-height:48px;border:0;border-radius:999px;background:#55ffa8;padding:14px 24px;font-weight:900;font-size:15px;cursor:pointer;color:#02150c}
    body.reduced .overlay h1{text-shadow:none}
    @media(max-width:420px){.overlay h1{font-size:36px}.hud b{font-size:19px}}
  </style>
</head>
<body>
  <main>
    <header class="hud">
      <div><span>SCORE</span><b data-score>0</b></div>
      <div><span>LEVEL</span><b data-level>1</b></div>
      <div><span>COMBO</span><b data-combo>0</b></div>
      <div class="lives"><span>LIVES</span><b data-lives>&#9679;&#9679;&#9679;</b></div>
    </header>
    <div class="stage"><canvas aria-label="Neon Breaker play field"></canvas></div>
  </main>
  <div class="overlay start"><div><h1>Neon Breaker</h1><p>Slide the paddle (drag or Arrow keys / A-D), tap or press Space to launch, and smash every brick. Top rows pay the most.</p><button type="button">Start</button></div></div>
  <div class="overlay pause" hidden><div><h1>Paused</h1><p>The ball is frozen mid-flight.</p><button type="button">Resume</button></div></div>
  <div class="overlay result" hidden><div><h1>Run over</h1><p class="big" data-final></p><p data-detail></p><button type="button">Play again</button></div></div>
  <script>
    'use strict';
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const cvs=document.querySelector('canvas'),ctx=cvs.getContext('2d');
    const startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause'),resultEl=document.querySelector('.result');
    const W=480,H=640,COLS=10,ROWS=6,GAP=4,BLEFT=12,BTOP=64,BW=(W-BLEFT*2-GAP*(COLS-1))/COLS,BH=18,TOTAL=ROWS*COLS;
    const ROW_COLORS=['#9dffd9','#6fffbf','#41ffa1','#2ce68d','#1fc478','#16a465'];
    const BASE_SPEED=300,MAX_SPEED=560,PADDLE_SPEED=470;

    let bricks=[],score=0,level=1,lives=3,destroyed=0,totalDestroyed=0,combo=0,wideTimer=0,slowTimer=0;
    let phase='start',paused=false,completed=false,serving=true;
    let paddle={x:W/2-48,y:H-82,w:96,baseW:96,h:14};
    let ball={x:W/2,y:H-84,vx:0,vy:0,r:7};
    let speed=BASE_SPEED,last=0,levelFlash=0;
    let particles=[],powerups=[],trail=[];
    const keys=new Set();
    let soundOn=true,reduced=false,audio=null;

    function beep(freq,dur=0.05,gain=0.035){
      if(!soundOn)return;
      try{
        audio=audio||new (window.AudioContext||window.webkitAudioContext)();
        if(audio.state==='suspended')audio.resume();
        const o=audio.createOscillator(),g=audio.createGain();
        o.type='square';o.frequency.value=freq;
        g.gain.setValueAtTime(gain,audio.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001,audio.currentTime+dur);
        o.connect(g).connect(audio.destination);o.start();o.stop(audio.currentTime+dur);
      }catch(err){}
    }

    function resetBricks(){
      bricks=[];
      for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)
        bricks.push({x:BLEFT+c*(BW+GAP),y:BTOP+r*(BH+GAP),alive:true,value:(ROWS-r)*10,color:ROW_COLORS[r]});
      destroyed=0;
    }
    function updateHud(){
      document.querySelector('[data-score]').textContent=score;
      document.querySelector('[data-level]').textContent=level;
      document.querySelector('[data-combo]').textContent=combo;
      document.querySelector('[data-lives]').textContent=lives>0?'●'.repeat(lives):'—';
    }
    function fit(){
      const dpr=Math.min(2.5,devicePixelRatio||1),rect=cvs.parentElement.getBoundingClientRect();
      const maxW=Math.max(220,Math.floor(rect.width));
      const maxH=Math.max(300,Math.floor(rect.height));
      let cssH=Math.min(Math.floor(maxH*.92),Math.floor(maxW*4/3));
      let cssW=Math.floor(cssH*3/4);
      if(cssW>maxW){cssW=maxW;cssH=Math.floor(cssW*4/3)}
      cvs.style.width=cssW+'px';
      cvs.style.height=cssH+'px';
      cvs.width=Math.max(180,Math.round(cssW*dpr));
      cvs.height=Math.max(240,Math.round(cssH*dpr));
      ctx.setTransform(cvs.width/W,0,0,cvs.height/H,0,0);
      draw();
    }
    function startRun(){
      score=0;level=1;lives=3;totalDestroyed=0;combo=0;wideTimer=0;slowTimer=0;speed=BASE_SPEED;completed=false;levelFlash=0;particles=[];powerups=[];trail=[];
      resetBricks();serve();
      phase='playing';paused=false;
      startEl.hidden=true;pauseEl.hidden=true;resultEl.hidden=true;
      updateHud();
      host('progress',{score:0,progress:0,state:{level:1,bricks:0}});
    }
    function serve(){
      serving=true;
      combo=0;
      paddle.x=Math.min(Math.max(paddle.x,8),W-8-paddle.w);
      ball.x=paddle.x+paddle.w/2;ball.y=paddle.y-ball.r-2;ball.vx=0;ball.vy=0;
    }
    function launch(){
      if(phase!=='playing'||paused||!serving)return;
      serving=false;
      const ang=(Math.random()*0.6-0.3);
      ball.vx=Math.sin(ang)*speed;ball.vy=-Math.cos(ang)*speed;
      beep(520,0.06);
    }
    function loseLife(){
      lives--;updateHud();beep(150,0.22,0.05);
      if(lives<=0){gameOver();return}
      combo=0;
      serve();
    }
    function gameOver(){
      if(completed||phase==='over')return;
      phase='over';completed=true;serving=true;
      resultEl.querySelector('[data-final]').textContent=`Final score ${score}`;
      resultEl.querySelector('[data-detail]').textContent=`Level ${level} · ${totalDestroyed} brick${totalDestroyed===1?'':'s'} broken · best run score ${score}.`;
      resultEl.hidden=false;
      host('complete',{score,progress:100,state:{level,bricks:totalDestroyed}});
    }
    function levelClear(){
      score+=200;level++;
      speed=Math.min(MAX_SPEED,speed*1.08);
      combo+=5;burst(W/2,H*.45,'#facc15',44);resetBricks();serve();levelFlash=1.4;
      updateHud();beep(760,0.14,0.05);
      host('progress',{score,progress:0,state:{level,bricks:totalDestroyed}});
    }
    function hitBrick(b){
      b.alive=false;destroyed++;totalDestroyed++;combo++;score+=b.value+combo*4;
      burst(b.x+BW/2,b.y+BH/2,b.color,18);
      if(Math.random()<.12+Math.min(.18,combo*.01)) powerups.push({x:b.x+BW/2,y:b.y+BH/2,vy:72,type:Math.random()<.5?'wide':'slow'});
      updateHud();beep(340+b.value*4,0.05);
      const progress=Math.min(99,Math.round(destroyed/TOTAL*100));
      host('score',{score,progress,state:{level,bricks:totalDestroyed,combo}});
      if(destroyed>=TOTAL)levelClear();
    }
    function burst(x,y,color,n=16){
      if(reduced)return;
      for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()*2-1)*130,vy:(Math.random()*2-1)*110,a:1,c:color,s:2+Math.random()*3});
    }
    function applyPowerup(type){
      if(type==='wide'){wideTimer=7;paddle.w=138;beep(760,0.09,0.045)}
      else{slowTimer=5;beep(520,0.08,0.04);setTimeout(()=>beep(360,0.06,0.035),60)}
    }
    function step(sdt){
      ball.x+=ball.vx*sdt*(slowTimer>0?.82:1);ball.y+=ball.vy*sdt*(slowTimer>0?.82:1);
      trail.push({x:ball.x,y:ball.y,a:.45}); if(trail.length>18)trail.shift();
      if(ball.x<ball.r+3){ball.x=ball.r+3;ball.vx=Math.abs(ball.vx);beep(240,0.03)}
      else if(ball.x>W-3-ball.r){ball.x=W-3-ball.r;ball.vx=-Math.abs(ball.vx);beep(240,0.03)}
      if(ball.y<ball.r+3){ball.y=ball.r+3;ball.vy=Math.abs(ball.vy);beep(240,0.03)}
      if(ball.vy>0&&ball.y+ball.r>=paddle.y&&ball.y-ball.r<=paddle.y+paddle.h&&ball.x>paddle.x-ball.r&&ball.x<paddle.x+paddle.w+ball.r){
        const hit=Math.max(-1,Math.min(1,(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2)));
        const ang=hit*1.05;
        ball.vx=Math.sin(ang)*speed;ball.vy=-Math.cos(ang)*speed;
        ball.y=paddle.y-ball.r;
        combo=Math.max(0,combo-1);
        beep(420,0.04);
      }
      for(const b of bricks){
        if(!b.alive)continue;
        const cx=Math.max(b.x,Math.min(ball.x,b.x+BW)),cy=Math.max(b.y,Math.min(ball.y,b.y+BH));
        const dx=ball.x-cx,dy=ball.y-cy;
        if(dx*dx+dy*dy>ball.r*ball.r)continue;
        if(dx===0&&dy===0){ball.vy=-ball.vy}
        else if(Math.abs(dx)>Math.abs(dy)){ball.vx=dx>0?Math.abs(ball.vx):-Math.abs(ball.vx);ball.x=cx+Math.sign(dx)*ball.r}
        else{ball.vy=dy>0?Math.abs(ball.vy):-Math.abs(ball.vy);ball.y=cy+Math.sign(dy)*ball.r}
        hitBrick(b);
        break;
      }
      if(ball.y-ball.r>H)loseLife();
    }
    function update(dt){
      let move=0;
      if(keys.has('arrowleft')||keys.has('a'))move-=1;
      if(keys.has('arrowright')||keys.has('d'))move+=1;
      if(move)paddle.x=Math.min(Math.max(paddle.x+move*PADDLE_SPEED*dt,8),W-8-paddle.w);
      if(wideTimer>0){wideTimer=Math.max(0,wideTimer-dt); if(wideTimer===0)paddle.w=paddle.baseW}
      if(slowTimer>0)slowTimer=Math.max(0,slowTimer-dt);
      if(levelFlash>0)levelFlash=Math.max(0,levelFlash-dt);
      if(serving){ball.x=paddle.x+paddle.w/2;ball.y=paddle.y-ball.r-2;return}
      const dist=speed*dt,steps=Math.max(1,Math.ceil(dist/(BH*0.5)));
      const sdt=dt/steps;
      for(let i=0;i<steps;i++){
        step(sdt);
        if(phase!=='playing'||serving)break;
      }
      for(const p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=90*dt;p.a-=dt*1.8}
      particles=particles.filter(p=>p.a>0);
      for(const p of powerups){
        p.y+=p.vy*dt;
        if(p.y>paddle.y-8&&p.y<paddle.y+paddle.h+12&&p.x>paddle.x&&p.x<paddle.x+paddle.w){p.dead=true;applyPowerup(p.type);burst(p.x,p.y,p.type==='wide'?'#5eead4':'#facc15',22)}
        if(p.y>H+20)p.dead=true;
      }
      powerups=powerups.filter(p=>!p.dead);
    }
    function draw(){
      ctx.clearRect(0,0,W,H);
      ctx.strokeStyle='#36ff9414';ctx.lineWidth=1;
      for(let y=40;y<H;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
      for(const b of bricks){
        if(!b.alive)continue;
        ctx.fillStyle=b.color;
        ctx.shadowColor=b.color;ctx.shadowBlur=reduced?0:9;
        ctx.fillRect(b.x,b.y,BW,BH);
      }
      ctx.shadowBlur=0;
      for(const p of powerups){
        ctx.shadowColor=p.type==='wide'?'#5eead4':'#facc15';ctx.shadowBlur=reduced?0:12;
        ctx.fillStyle=p.type==='wide'?'#5eead4':'#facc15';
        ctx.fillRect(p.x-9,p.y-9,18,18);
        ctx.fillStyle='#03110c';ctx.font='900 11px ui-monospace,monospace';ctx.textAlign='center';ctx.fillText(p.type==='wide'?'W':'S',p.x,p.y+4);
      }
      ctx.fillStyle='#0a3323';
      ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
      ctx.fillStyle='#58ffa8';
      ctx.shadowColor='#58ffa8';ctx.shadowBlur=reduced?0:14;
      ctx.fillRect(paddle.x,paddle.y,paddle.w,3);
      for(const t of trail){ctx.globalAlpha=t.a;ctx.beginPath();ctx.arc(t.x,t.y,ball.r*.75,0,Math.PI*2);ctx.fillStyle='#41ffa1';ctx.fill();t.a*=.92}
      ctx.globalAlpha=1;
      ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
      ctx.fillStyle='#effff6';ctx.shadowColor='#41ffa1';ctx.shadowBlur=reduced?0:16;ctx.fill();
      for(const p of particles){ctx.globalAlpha=Math.max(0,p.a);ctx.shadowColor=p.c;ctx.shadowBlur=reduced?0:8;ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.s,p.s)}
      ctx.globalAlpha=1;
      ctx.shadowBlur=0;
      if(phase==='playing'&&serving){
        ctx.fillStyle='#8fd8b4';ctx.font='700 15px ui-monospace,monospace';ctx.textAlign='center';
        ctx.fillText('Tap / Space to launch',W/2,H-70);
      }
      if(levelFlash>0){
        ctx.fillStyle='#bfffdd';ctx.font='900 30px system-ui,sans-serif';ctx.textAlign='center';
        ctx.globalAlpha=Math.min(1,levelFlash);
        ctx.fillText('LEVEL '+level+'  +200',W/2,H*0.55);
        ctx.globalAlpha=1;
      }
    }
    function loop(t){
      requestAnimationFrame(loop);
      if(paused||phase!=='playing'){last=t;return}
      const dt=Math.min(0.033,Math.max(0,(t-last)/1000));
      last=t;
      update(dt);
      draw();
    }
    function setPaused(next){
      if(phase!=='playing')return;
      paused=next;pauseEl.hidden=!paused;
      host('paused',{paused});
    }
    function pointerX(e){
      const rect=cvs.getBoundingClientRect();
      return (e.clientX-rect.left)/rect.width*W;
    }
    cvs.addEventListener('pointermove',e=>{
      e.preventDefault();
      if(phase!=='playing'||paused)return;
      paddle.x=Math.min(Math.max(pointerX(e)-paddle.w/2,8),W-8-paddle.w);
    });
    cvs.addEventListener('pointerdown',e=>{
      e.preventDefault();
      if(phase!=='playing'||paused)return;
      paddle.x=Math.min(Math.max(pointerX(e)-paddle.w/2,8),W-8-paddle.w);
      launch();
    });
    addEventListener('keydown',e=>{
      const k=e.key.toLowerCase();
      if(['arrowleft','arrowright','a','d'].includes(k)){e.preventDefault();keys.add(k)}
      if(e.code==='Space'||k==='arrowup'||e.code==='Enter'){e.preventDefault();launch()}
      if(k==='p'){e.preventDefault();setPaused(!paused)}
    });
    addEventListener('keyup',e=>keys.delete(e.key.toLowerCase()));
    addEventListener('resize',fit);
    if(window.visualViewport)visualViewport.addEventListener('resize',fit);
    document.addEventListener('visibilitychange',()=>{if(document.hidden&&phase==='playing'&&!paused)setPaused(true)});
    addEventListener('message',e=>{
      if(e.data?.source!=='phantomplay-host')return;
      if(e.data.type==='settings'){
        if('sound' in e.data)soundOn=!!e.data.sound;
        if('reducedMotion' in e.data){reduced=!!e.data.reducedMotion;document.body.classList.toggle('reduced',reduced)}
      }
      if(e.data.type==='pause')setPaused(true);
      if(e.data.type==='resume')setPaused(false);
      if(e.data.type==='restart')startRun();
    });
    startEl.querySelector('button').onclick=startRun;
    pauseEl.querySelector('button').onclick=()=>setPaused(false);
    resultEl.querySelector('button').onclick=startRun;
    resetBricks();serve();fit();updateHud();
    requestAnimationFrame(loop);
    host('ready');
  </script>
</body>
</html>
