<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>Breath Pacer</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020806;color:#effff6;font-family:system-ui,sans-serif}body{display:grid;place-items:center;padding:16px;background:radial-gradient(circle at 50% 22%,#0f342a,#020806 64%)}main{width:min(560px,100%);text-align:center}h1{margin:0 0 2px;color:#58ffa8;font-size:34px;letter-spacing:.5px}.sub{color:#8ba99a;margin:0 0 12px;font-size:14px}.stage{position:relative;width:min(74vw,320px);height:min(74vw,320px);margin:6px auto 10px;display:grid;place-items:center}.ring{position:absolute;inset:0;margin:auto;width:100%;height:100%;border-radius:50%;border:2px solid #41ffa155;box-shadow:0 0 40px #41ffa11f inset}.core{position:absolute;width:34%;height:34%;border-radius:50%;background:radial-gradient(circle at 40% 35%,#7dffc0,#1c8f5f);box-shadow:0 0 50px #41ffa166;transition:transform .12s linear}.phase{position:relative;z-index:2;pointer-events:none}.phase b{display:block;font-size:26px;color:#effff6;font-weight:800}.phase .cd{font:800 40px ui-monospace;color:#7dffc0}.hud{display:flex;justify-content:center;gap:22px;margin:4px 0 12px}.hud div{min-width:78px}.hud span{display:block;color:#8ba99a;font:700 11px ui-monospace;letter-spacing:.5px}.hud b{color:#63ffad;font-size:24px}.tap{border:1px solid #4dffa36b;border-radius:999px;background:#03110c;color:#caffdf;font-weight:800;font-size:16px;padding:14px 26px;cursor:pointer;-webkit-tap-highlight-color:transparent}.tap:active{background:#0b3424}.msg{min-height:22px;margin-top:10px;color:#a9c5b7;font-size:14px}.freeze .core{transition:none!important}@media(max-width:400px){h1{font-size:28px}.phase .cd{font-size:32px}}</style></head><body><main><h1>Breath Pacer</h1><p class="sub">Tap in rhythm at each phase change. Breathe the box: in 4, hold 4, out 4, hold 4.</p><div class="stage"><div class="ring"></div><div class="core"></div><div class="phase"><b data-phase>Ready</b><div class="cd" data-cd>4</div></div></div><div class="hud"><div><span>ACCURACY</span><b data-acc>100%</b></div><div><span>TIME</span><b data-time>2:00</b></div><div><span>TAPS</span><b data-taps>0</b></div></div><button class="tap" data-tap>Tap / Space</button><div class="msg" data-msg>Follow the light. Tap right when a phase begins.</div></main><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
const PHASES=[{n:'Inhale',s:1.0,e:1.0,scale:false},{n:'Hold',s:1.0,e:1.0},{n:'Exhale',s:1.0,e:1.0},{n:'Hold',s:1.0,e:1.0}];
const NAMES=['Inhale','Hold','Exhale','Hold'],SCALES=[[.34,1],[1,1],[1,.34],[.34,.34]],PHASE_MS=4000,TARGET_MS=120000;
const core=document.querySelector('.core'),phaseEl=document.querySelector('[data-phase]'),cdEl=document.querySelector('[data-cd]'),accEl=document.querySelector('[data-acc]'),timeEl=document.querySelector('[data-time]'),tapsEl=document.querySelector('[data-taps]'),msgEl=document.querySelector('[data-msg]'),stage=document.querySelector('.stage');
let reduced=false,started=false,done=false,startAt=0,phaseIdx=0,phaseStart=0,taps=0,accSum=0,accCount=0,scored=false,raf=0,pausedAt=0;
function fmt(ms){ms=Math.max(0,ms);const s=Math.round(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function accuracy(){return accCount?Math.round(accSum/accCount*100):100}
function begin(){if(started)return;started=true;done=false;startAt=performance.now();phaseIdx=0;phaseStart=startAt;taps=0;accSum=0;accCount=0;tapsEl.textContent='0';accEl.textContent='100%';msgEl.textContent='Breathe with the light.';host('progress',{score:0,progress:0});loop()}
function setScale(v){if(reduced){core.style.transform='scale(0.6)';return}core.style.transform='scale('+v+')'}
function loop(now){now=now||performance.now();const elapsed=now-startAt;const pElapsed=now-phaseStart;
if(pElapsed>=PHASE_MS){phaseIdx=(phaseIdx+1)%4;phaseStart=now;scored=false;host('score',{score:accuracy(),progress:Math.min(99,Math.round(elapsed/TARGET_MS*100)),state:{taps,accuracy:accuracy()}})}
const idx=phaseIdx,t=Math.min(1,(now-phaseStart)/PHASE_MS);
phaseEl.textContent=NAMES[idx];cdEl.textContent=Math.max(1,Math.ceil(PHASE_MS/1000-t*4));
const[from,to]=SCALES[idx];setScale(from+(to-from)*t);
core.style.background=`radial-gradient(circle at 40% 35%,#7dffc0,#1c8f5f)`;
const progress=Math.min(100,Math.round(elapsed/TARGET_MS*100));timeEl.textContent=fmt(TARGET_MS-elapsed);
if(elapsed>=TARGET_MS){finish();return}
raf=requestAnimationFrame(loop)}
function finish(){done=true;started=false;cancelAnimationFrame(raf);phaseEl.textContent='Complete';cdEl.textContent='✓';setScale(.5);timeEl.textContent='0:00';msgEl.textContent=`Session complete. Calm accuracy ${accuracy()}% over ${taps} breaths. Tap to begin again.`;host('complete',{score:accuracy(),progress:100,state:{taps,accuracy:accuracy()}})}
function tap(){if(done){done=false;timeEl.textContent='2:00';begin();return}if(!started){begin();return}
taps++;tapsEl.textContent=taps;
const pElapsed=(performance.now()-phaseStart);
// distance to nearest phase boundary (either just-started this phase, or about to end)
const distStart=pElapsed,distEnd=PHASE_MS-pElapsed;const off=Math.min(distStart,distEnd);
const acc=Math.max(0,1-off/1500);accSum+=acc;accCount++;
accEl.textContent=accuracy()+'%';
msgEl.textContent=acc>.85?'In rhythm.':acc>.5?'Close — ease into it.':'Let the light lead you.';
host('score',{score:accuracy(),progress:Math.min(99,Math.round((performance.now()-startAt)/TARGET_MS*100)),state:{taps,accuracy:accuracy()}})}
document.querySelector('[data-tap]').onclick=tap;
addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();tap()}});
stage.addEventListener('click',tap);
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion;document.body.classList.toggle('freeze',reduced);if(reduced)setScale(.6)}});
document.addEventListener('visibilitychange',()=>{if(!started||done)return;
if(document.hidden){pausedAt=performance.now();cancelAnimationFrame(raf)}
else if(pausedAt){const d=performance.now()-pausedAt;startAt+=d;phaseStart+=d;pausedAt=0;raf=requestAnimationFrame(loop)}});
host('ready');
</script></body></html>
