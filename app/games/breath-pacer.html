<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>Breath Pacer</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020806;color:#effff6;font-family:system-ui,sans-serif}body{display:grid;place-items:center;padding:16px;background:radial-gradient(circle at 50% 16%,#12382c,#020806 68%)}main{width:min(610px,100%);text-align:center}h1{margin:0 0 2px;color:#58ffa8;font-size:clamp(29px,2.5rem,42px);letter-spacing:.6px}.sub{color:#9ab6a8;margin:0 0 12px;font-size:14px}.stage{position:relative;width:min(74vw,340px);height:min(74vw,340px);margin:8px auto 12px;display:grid;place-items:center;isolation:isolate}.stage.phase-hit{animation:phasePop .42s ease-out}.aura{position:absolute;inset:-20%;border-radius:50%;background:conic-gradient(from 0deg,#41ffa100,#41ffa12d,#7dffc05f,#6cf6ff22,#41ffa100);filter:blur(11px);opacity:.72;animation:spin 16s linear infinite}.ring{position:absolute;inset:0;border-radius:50%;border:2px solid #41ffa166;box-shadow:0 0 46px #41ffa122 inset,0 0 38px #41ffa114}.ring:before,.ring:after{content:"";position:absolute;border-radius:50%;border:1px dashed #7dffc04d}.ring:before{inset:14%}.ring:after{inset:29%;opacity:.7}.wave{position:absolute;inset:18%;border-radius:50%;border:2px solid #7dffc0;opacity:0;box-shadow:0 0 20px #41ffa155;pointer-events:none}.wave.go{animation:breathWave 1.2s ease-out}.core{position:absolute;width:34%;height:34%;border-radius:50%;background:radial-gradient(circle at 38% 32%,#d9ffe9,#1c8f5f);box-shadow:0 0 54px #41ffa177;transition:transform .12s linear,background .18s}.phase{position:relative;z-index:2;pointer-events:none;text-shadow:0 3px 18px #020806}.phase b{display:block;font-size:28px;color:#effff6;font-weight:900}.phase .cd{font:900 44px ui-monospace;color:#7dffc0}.spark{position:absolute;z-index:1;width:6px;height:6px;border-radius:50%;background:#7dffc0;box-shadow:0 0 16px #7dffc0;opacity:0}.hud{display:flex;justify-content:center;gap:12px;margin:4px 0 12px;flex-wrap:wrap}.hud div{min-width:82px;padding:8px 10px;border:1px solid #41ffa11f;border-radius:12px;background:#04130eaa}.hud span{display:block;color:#8ba99a;font:800 10px ui-monospace;letter-spacing:.8px;text-transform:uppercase}.hud b{color:#63ffad;font-size:24px}.tap{border:1px solid #4dffa36b;border-radius:999px;background:#03110c;color:#caffdf;font-weight:900;font-size:16px;padding:14px 28px;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 0 0 #41ffa100;transition:box-shadow .2s,transform .15s}.tap:active{background:#0b3424;transform:scale(.98)}.tap.is-hot{box-shadow:0 0 32px #41ffa144}.msg{min-height:24px;margin-top:10px;color:#b2d1c1;font-size:14px}.freeze .core,.freeze .aura,.freeze .wave{transition:none!important;animation:none!important}@keyframes spin{to{transform:rotate(360deg)}}@keyframes breathWave{0%{opacity:.65;transform:scale(.45)}100%{opacity:0;transform:scale(1.9)}}@keyframes phasePop{0%{transform:scale(.98)}45%{transform:scale(1.035)}100%{transform:scale(1)}}@media(max-width:420px){.hud{gap:7px}.hud div{min-width:70px}.phase .cd{font-size:34px}}</style></head><body><main><h1>Breath Pacer</h1><p class="sub">Box breathing with timing feedback, flow streaks, and phase cues. Tap exactly as the light changes.</p><div class="stage"><div class="aura"></div><div class="ring"></div><div class="wave" data-wave></div><div class="core"></div><div class="phase"><b data-phase>Ready</b><div class="cd" data-cd>4</div></div></div><div class="hud"><div><span>Accuracy</span><b data-acc>100%</b></div><div><span>Time</span><b data-time>2:00</b></div><div><span>Taps</span><b data-taps>0</b></div><div><span>Flow</span><b data-flow>0</b></div></div><button class="tap" data-tap>Start / Tap / Space</button><div class="msg" data-msg>Follow the light. Tap right when a phase begins.</div></main><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
const NAMES=['Inhale','Hold','Exhale','Hold'],SCALES=[[.34,1],[1,1],[1,.34],[.34,.34]],COLORS=['#d9ffe9,#1c8f5f','#b9ffe0,#24754e','#6cf6ff,#196d80','#d7ffd9,#205c36'],PHASE_MS=4000,TARGET_MS=120000;
const core=document.querySelector('.core'),phaseEl=document.querySelector('[data-phase]'),cdEl=document.querySelector('[data-cd]'),accEl=document.querySelector('[data-acc]'),timeEl=document.querySelector('[data-time]'),tapsEl=document.querySelector('[data-taps]'),flowEl=document.querySelector('[data-flow]'),msgEl=document.querySelector('[data-msg]'),stage=document.querySelector('.stage'),tapBtn=document.querySelector('[data-tap]'),waveEl=document.querySelector('[data-wave]');
let reduced=false,started=false,done=false,startAt=0,phaseIdx=0,phaseStart=0,lastPhase=-1,taps=0,accSum=0,accCount=0,flow=0,raf=0,pausedAt=0,actx=null;
function fmt(ms){ms=Math.max(0,ms);const s=Math.round(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}
function accuracy(){return accCount?Math.round(accSum/accCount*100):100}
function ensureAudio(){if(actx||reduced)return;try{actx=new (AudioContext||webkitAudioContext)()}catch{}}
function tone(freq=220,dur=.16,gain=.035,type='sine'){if(!actx)return;const o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(.0001,actx.currentTime);g.gain.exponentialRampToValueAtTime(gain,actx.currentTime+.02);g.gain.exponentialRampToValueAtTime(.0001,actx.currentTime+dur);o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+dur)}
function sparkle(n=10){if(reduced)return;for(let i=0;i<n;i++){const s=document.createElement('i');s.className='spark';stage.appendChild(s);const a=Math.random()*Math.PI*2,r=34+Math.random()*44;s.style.left=50+Math.cos(a)*r+'%';s.style.top=50+Math.sin(a)*r+'%';s.animate([{opacity:0,transform:'translate(-50%,-50%) scale(.4)'},{opacity:1,offset:.25},{opacity:0,transform:`translate(${Math.cos(a)*46-50}%,${Math.sin(a)*46-50}%) scale(1.6)`}],{duration:900+Math.random()*400,easing:'ease-out'}).onfinish=()=>s.remove()}}
function phaseWave(idx){if(reduced||!waveEl)return;waveEl.style.borderColor=['#7dffc0','#b9ffe0','#6cf6ff','#91ff9f'][idx]||'#7dffc0';waveEl.classList.remove('go');stage.classList.remove('phase-hit');void waveEl.offsetWidth;waveEl.classList.add('go');stage.classList.add('phase-hit');setTimeout(()=>stage.classList.remove('phase-hit'),460)}
function cuePhase(idx){tone([196,246,174,220][idx],.26,.028,'triangle');phaseWave(idx);sparkle(idx===0?18:8);tapBtn.classList.add('is-hot');setTimeout(()=>tapBtn.classList.remove('is-hot'),650)}
function setScale(v){core.style.transform='scale('+(reduced?.6:v)+')'}
function begin(){ensureAudio();if(started)return;started=true;done=false;startAt=performance.now();phaseIdx=0;phaseStart=startAt;lastPhase=-1;taps=0;accSum=0;accCount=0;flow=0;tapsEl.textContent='0';flowEl.textContent='0';accEl.textContent='100%';msgEl.textContent='Breathe with the light.';host('progress',{score:0,progress:0});loop()}
function loop(now=performance.now()){const elapsed=now-startAt,pElapsed=now-phaseStart;if(pElapsed>=PHASE_MS){phaseIdx=(phaseIdx+1)%4;phaseStart=now;host('score',{score:accuracy()+flow,progress:Math.min(99,Math.round(elapsed/TARGET_MS*100)),state:{taps,accuracy:accuracy(),flow}})}if(lastPhase!==phaseIdx){lastPhase=phaseIdx;cuePhase(phaseIdx)}const idx=phaseIdx,t=Math.min(1,(now-phaseStart)/PHASE_MS);phaseEl.textContent=NAMES[idx];cdEl.textContent=Math.max(1,Math.ceil(PHASE_MS/1000-t*4));const[from,to]=SCALES[idx];setScale(from+(to-from)*t);core.style.background=`radial-gradient(circle at 38% 32%,${COLORS[idx]})`;timeEl.textContent=fmt(TARGET_MS-elapsed);if(elapsed>=TARGET_MS){finish();return}raf=requestAnimationFrame(loop)}
function finish(){done=true;started=false;cancelAnimationFrame(raf);phaseEl.textContent='Complete';cdEl.textContent='✓';setScale(.5);timeEl.textContent='0:00';sparkle(34);tone(330,.22,.04);setTimeout(()=>tone(440,.28,.035),120);msgEl.textContent=`Session complete. Calm accuracy ${accuracy()}% · flow ${flow}. Tap to begin again.`;host('complete',{score:accuracy()+flow,progress:100,state:{taps,accuracy:accuracy(),flow}})}
function tap(){ensureAudio();if(done){done=false;timeEl.textContent='2:00';begin();return}if(!started){begin();return}taps++;tapsEl.textContent=taps;const pElapsed=performance.now()-phaseStart,off=Math.min(pElapsed,PHASE_MS-pElapsed),acc=Math.max(0,1-off/1500);accSum+=acc;accCount++;if(acc>.85){flow++;tone(520,.08,.025);sparkle(5)}else if(acc<.35){flow=Math.max(0,flow-1);tone(130,.08,.018,'sawtooth')}accEl.textContent=accuracy()+'%';flowEl.textContent=flow;msgEl.textContent=acc>.85?'Perfect phase. Flow rising.':acc>.5?'Close — ease into it.':'Let the light lead you.';host('score',{score:accuracy()+flow,progress:Math.min(99,Math.round((performance.now()-startAt)/TARGET_MS*100)),state:{taps,accuracy:accuracy(),flow}})}
tapBtn.onclick=tap;stage.addEventListener('click',tap);addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();tap()}});
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion;document.body.classList.toggle('freeze',reduced);if(reduced)setScale(.6);gpOn=!!e.data.gamepad}});
document.addEventListener('visibilitychange',()=>{if(!started||done)return;if(document.hidden){pausedAt=performance.now();cancelAnimationFrame(raf)}else if(pausedAt){const d=performance.now()-pausedAt;startAt+=d;phaseStart+=d;pausedAt=0;raf=requestAnimationFrame(loop)}});
// --- Gamepad (PhantomPlay standard mapping): A/Cross = tap ---
let gpOn=false,gpIdx=null,gpPrevA=false;
function gpPad(){const p=navigator.getGamepads?navigator.getGamepads():[];if(gpIdx===null)for(let i=0;i<p.length;i++)if(p[i]){gpIdx=i;break}return gpIdx===null?null:p[gpIdx]}
(function gpLoop(){if(gpOn){const pad=gpPad();if(pad){const a=!!(pad.buttons[0]&&pad.buttons[0].pressed);if(a&&!gpPrevA)tap();gpPrevA=a}}requestAnimationFrame(gpLoop)})();
host('ready');
</script></body></html>
