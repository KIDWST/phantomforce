<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'self' file: blob: data:"><title>Tak Arcade</title><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020705;color:#effff6;font-family:Inter,system-ui,sans-serif}body{display:grid;place-items:center;background:radial-gradient(circle at 50% 12%,#123725,#020705 64%)}main{width:min(1180px,100vw);height:min(740px,100vh);padding:12px;display:grid;grid-template-rows:auto 1fr auto;gap:10px}.top,.bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;border:1px solid #39ff9440;border-radius:16px;background:#03120de0;box-shadow:0 0 28px #18ff7a14}.k{color:#3eff9a;font:900 11px ui-monospace;letter-spacing:2px}.top h1{margin:0;font-size:clamp(24px,4vw,42px)}.top p{margin:4px 0 0;color:#a9c7b9}.stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:end}.stats span,.bar button{border:1px solid #41ffa144;border-radius:999px;padding:8px 12px;background:#020907;color:#cffff0;font-weight:900}.bar button{cursor:pointer}.bar button.primary{background:#38ff91;color:#04100a;border:0}canvas{width:100%;height:100%;display:block;border:1px solid #39ff9445;border-radius:18px;background:#06100c;box-shadow:inset 0 0 80px #41ff9b12,0 0 45px #000}.stage{position:relative;min-height:0}.overlay{position:absolute;inset:0;display:grid;place-items:center;background:#010504d9;border-radius:18px;text-align:center;padding:22px}.overlay[hidden]{display:none}.card{max-width:560px}.card h2{font-size:clamp(34px,6vw,62px);margin:0;color:#55ffa8}.card p{color:#c0d8cb;line-height:1.5}.toast{position:absolute;left:50%;top:16px;transform:translateX(-50%);padding:9px 13px;border:1px solid #41ffa155;border-radius:999px;background:#02100bd9;color:#bfffe0;font-weight:900;opacity:0;transition:.2s}.toast.show{opacity:1}.pizza-ui{position:absolute;right:18px;bottom:18px;display:flex;gap:8px;flex-wrap:wrap;max-width:520px}.pizza-ui button{border:1px solid #41ffa155;border-radius:12px;background:#062014;color:#effff6;padding:10px 12px;font-weight:900;cursor:pointer}.pizza-ui button.primary{background:#41ffa1;color:#02100a}@media(max-width:680px){main{padding:6px}.top{align-items:start;flex-direction:column}.stats{justify-content:start}.pizza-ui{left:12px;right:12px;bottom:12px}}</style></head><body><main><header class="top"><div><div class="k">BY TAK · PHANTOMPLAY ORIGINAL</div><h1 id="title">Tak Arcade</h1><p id="sub">Loading…</p></div><div class="stats" id="stats"></div></header><section class="stage"><canvas id="c" tabindex="0" aria-label="Game canvas"></canvas><div class="toast" id="toast"></div><div class="overlay" id="start"><div class="card"><h2 id="startTitle">Ready?</h2><p id="help"></p><button class="primary" id="play">Play</button></div></div><div class="pizza-ui" id="pizzaUi" hidden></div></section><footer class="bar"><span id="hint">WASD/arrows + mouse/tap.</span><button id="restart">Restart</button><button id="exit">Exit</button></footer></main><script>
const $=s=>document.querySelector(s),cv=$("#c"),x=cv.getContext("2d"),stats=$("#stats"),toast=$("#toast"),start=$("#start"),pizzaUi=$("#pizzaUi");
const mode=(new URLSearchParams(location.search).get("game")||"speedback").toLowerCase();
const W=960,H=560;let dpr=1,keys={},mouse={x:W/2,y:H/2,down:false},run=true,t=0,last=0,score=0,level=1,state={};
const modes={
 empire:["Tiny Empire Forge","Mini RTS skirmish: gather glow, raise huts, train wisps, crack the rival tower.","Click map spots. 1 worker, 2 soldier, Space rally. Destroy the red keep."],
 speedback:["Speedback","Football dodge-run: hit lanes, dodge tacklers, grab lightning, score touchdowns.","Arrows/WASD move. A stiff-arm. S spin. Reach the glowing end zone."],
 mirage:["Mirage Realm Classic","Top-down online-RPG style arena: quest, collect crystals, level up, clear mobs.","Move, collect blue crystals, click/Space to swing, survive waves."],
 kronk:["Kronk Neon Arena","Fast browser FPS-inspired top-down blaster with bots, strafing, pickups, and aim pressure.","WASD move. Mouse aims. Hold click/Space to fire. First to 20 KOs."],
 chess:["Phantom Chess","Clean chess board for one or two players. Move pieces, capture, reset fast.","Click a piece, then a square. Legal-move coach is light; this is quick play/testing."],
 pizza:["Tak's Pizza Rush","Pizza-shop time management: take orders, build pies, bake, serve, and keep streaks alive.","Use ingredient buttons in order. Bake then Serve before patience runs out."]
};
const cfg=modes[mode]||modes.speedback;$("#title").textContent=cfg[0];$("#sub").textContent=cfg[1];$("#startTitle").textContent=cfg[0];$("#help").textContent=cfg[2];$("#hint").textContent=cfg[2];
function fit(){dpr=Math.min(2,devicePixelRatio||1);cv.width=W*dpr;cv.height=H*dpr;x.setTransform(dpr,0,0,dpr,0,0)}addEventListener("resize",fit);fit();
function say(s){toast.textContent=s;toast.classList.add("show");setTimeout(()=>toast.classList.remove("show"),900)}
function post(type,extra={}){try{parent.postMessage({source:"phantomplay-game",type,score,progress:{score,level,mode},...extra},"*")}catch{}}
addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;if([" ","arrowup","arrowdown","arrowleft","arrowright"].includes(e.key.toLowerCase()))e.preventDefault()});
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);
cv.onpointermove=e=>{const r=cv.getBoundingClientRect();mouse.x=(e.clientX-r.left)/r.width*W;mouse.y=(e.clientY-r.top)/r.height*H};
cv.onpointerdown=e=>{mouse.down=true;cv.focus();click(mouse.x,mouse.y)};cv.onpointerup=()=>mouse.down=false;
$("#play").onclick=()=>{start.hidden=true;reset()};$("#restart").onclick=()=>reset();$("#exit").onclick=()=>post("exit");
function stat(rows){stats.innerHTML=rows.map(([a,b])=>`<span>${a} <b>${b}</b></span>`).join("")}
function rnd(a,b){return a+Math.random()*(b-a)}function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function reset(){score=0;level=1;run=true;t=0;pizzaUi.hidden=true;state={};({empire:initEmpire,speedback:initSpeed,mirage:initMirage,kronk:initKronk,chess:initChess,pizza:initPizza}[mode]||initSpeed)();post("ready")}
function click(mx,my){({empire:clickEmpire,kronk:()=>fire(),chess:clickChess,pizza:()=>0,mirage:()=>attack()}[mode]||(()=>0))(mx,my)}
function loop(ts){const dt=Math.min(.033,(ts-last)/1000||.016);last=ts;t+=dt;if(run){({empire:updateEmpire,speedback:updateSpeed,mirage:updateMirage,kronk:updateKronk,chess:updateChess,pizza:updatePizza}[mode]||updateSpeed)(dt)}requestAnimationFrame(loop)}requestAnimationFrame(loop);
function bg(){x.clearRect(0,0,W,H);x.fillStyle="#04100b";x.fillRect(0,0,W,H);x.strokeStyle="#123d29";for(let i=0;i<W;i+=40){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke()}for(let j=0;j<H;j+=40){x.beginPath();x.moveTo(0,j);x.lineTo(W,j);x.stroke()}}
function circle(o,c,r=o.r||12){x.fillStyle=c;x.beginPath();x.arc(o.x,o.y,r,0,7);x.fill()}
function rect(o,c){x.fillStyle=c;x.fillRect(o.x-o.w/2,o.y-o.h/2,o.w,o.h)}
function initSpeed(){state.p={x:W/2,y:H-50,r:13,spd:250,boost:0,tries:3};state.def=Array.from({length:7},(_,i)=>({x:rnd(80,W-80),y:80+i*60,r:18,v:rnd(45,90)}));state.pick={x:rnd(80,W-80),y:rnd(110,H-160),r:12};}
function updateSpeed(dt){bg();let p=state.p;let vx=(keys.d||keys.arrowright)-(keys.a||keys.arrowleft),vy=(keys.s||keys.arrowdown)-(keys.w||keys.arrowup);p.x=clamp(p.x+vx*p.spd*dt,35,W-35);p.y=clamp(p.y+vy*p.spd*dt,35,H-35);x.fillStyle="#0b5";x.fillRect(0,0,W,48);x.fillRect(0,H-80,W,80);x.strokeStyle="#dff";for(let y=80;y<H;y+=80){x.beginPath();x.moveTo(0,y);x.lineTo(W,y);x.stroke()}circle(state.pick,"#cfff36",12);if(dist(p,state.pick)<26){p.spd=380;state.pick={x:rnd(80,W-80),y:rnd(110,H-160),r:12};say("LIGHTNING");score+=250}state.def.forEach((d,i)=>{d.x+=Math.sin(t+i)*d.v*dt;if(d.x<35||d.x>W-35)d.v*=-1;circle(d,"#ff4d4d",18);if(dist(p,d)<31){if(keys["a"]||keys["s"]){score+=100;say(keys.a?"STIFF ARM":"SPIN")}else{p.tries--;p.x=W/2;p.y=H-50;say("TACKLED");if(p.tries<=0)end()}}});circle(p,"#5df",14);if(p.y<52){score+=1000;level++;p.y=H-50;say("TOUCHDOWN")}stat([["SCORE",score],["TD",level-1],["TRIES",p.tries]])}
function initEmpire(){state.gold=80;state.base={x:105,y:H/2,hp:500};state.enemy={x:W-105,y:H/2,hp:500};state.units=[{x:130,y:H/2,type:"worker",hp:40}];state.foes=[];state.spawn=0}
function clickEmpire(mx,my){if(state.gold>=30){state.gold-=30;state.units.push({x:130,y:H/2+rnd(-45,45),tx:mx,ty:my,type:keys["2"]?"soldier":"worker",hp:keys["2"]?70:35})}}
function updateEmpire(dt){bg();state.gold+=dt*8;state.spawn-=dt;if(state.spawn<0){state.spawn=2.8;state.foes.push({x:W-140,y:H/2+rnd(-80,80),type:"raider",hp:55})}rect({x:state.base.x,y:state.base.y,w:70,h:150},"#36ff91");rect({x:state.enemy.x,y:state.enemy.y,w:70,h:150},"#ff4b56");state.units.forEach(u=>{u.tx??=state.enemy.x;u.ty??=state.enemy.y;let a=Math.atan2(u.ty-u.y,u.tx-u.x);u.x+=Math.cos(a)*dt*(u.type==="soldier"?80:55);u.y+=Math.sin(a)*dt*(u.type==="soldier"?80:55);circle(u,u.type==="soldier"?"#7df":"#ffe16b",u.type==="soldier"?11:8);if(dist(u,state.enemy)<60){state.enemy.hp-=dt*(u.type==="soldier"?28:8);score+=dt*8}});state.foes.forEach(f=>{let a=Math.atan2(state.base.y-f.y,state.base.x-f.x);f.x+=Math.cos(a)*dt*52;f.y+=Math.sin(a)*dt*52;circle(f,"#ff6a6a",10);if(dist(f,state.base)<50)state.base.hp-=dt*18});if(state.enemy.hp<=0){say("RIVAL KEEP BROKEN");end(true)}if(state.base.hp<=0)end();stat([["GLOW",Math.floor(state.gold)],["OUR KEEP",Math.ceil(state.base.hp)],["RIVAL",Math.ceil(state.enemy.hp)]])}
function initMirage(){state.p={x:W/2,y:H/2,r:13,hp:100,xp:0};state.mobs=Array.from({length:8},()=>({x:rnd(40,W-40),y:rnd(60,H-40),hp:30,r:12}));state.gems=Array.from({length:14},()=>({x:rnd(40,W-40),y:rnd(60,H-40),r:7}))}
function attack(){state.mobs.forEach(m=>{if(dist(state.p,m)<55){m.hp-=24;say("SLASH")}})}
function updateMirage(dt){bg();let p=state.p;p.x=clamp(p.x+(((keys.d||keys.arrowright)-(keys.a||keys.arrowleft))*210*dt),18,W-18);p.y=clamp(p.y+(((keys.s||keys.arrowdown)-(keys.w||keys.arrowup))*210*dt),18,H-18);if(keys[" "])attack();state.gems=state.gems.filter(g=>{circle(g,"#58d7ff",7);if(dist(p,g)<22){score+=50;p.xp++;return false}return true});state.mobs.forEach(m=>{let a=Math.atan2(p.y-m.y,p.x-m.x);m.x+=Math.cos(a)*dt*45;m.y+=Math.sin(a)*dt*45;circle(m,"#b15cff",m.r);if(dist(p,m)<24)p.hp-=dt*12});state.mobs=state.mobs.filter(m=>m.hp>0);circle(p,"#41ffa1",14);if(!state.mobs.length){level++;state.mobs=Array.from({length:6+level*2},()=>({x:rnd(40,W-40),y:rnd(60,H-40),hp:25+level*8,r:12}))}if(p.hp<=0)end();stat([["SCORE",score],["LV",level],["HP",Math.ceil(p.hp)],["GEMS",p.xp]])}
function initKronk(){state.p={x:W/2,y:H/2,hp:100};state.b=[];state.bots=Array.from({length:7},()=>({x:rnd(60,W-60),y:rnd(70,H-60),hp:45,cd:rnd(.2,1)}));state.cd=0}
function fire(){if(state.cd>0)return;state.cd=.12;let a=Math.atan2(mouse.y-state.p.y,mouse.x-state.p.x);state.b.push({x:state.p.x,y:state.p.y,vx:Math.cos(a)*540,vy:Math.sin(a)*540,own:1})}
function updateKronk(dt){bg();let p=state.p;state.cd-=dt;p.x=clamp(p.x+(((keys.d||keys.arrowright)-(keys.a||keys.arrowleft))*260*dt),18,W-18);p.y=clamp(p.y+(((keys.s||keys.arrowdown)-(keys.w||keys.arrowup))*260*dt),18,H-18);if(mouse.down||keys[" "])fire();state.bots.forEach(b=>{b.cd-=dt;let a=Math.atan2(p.y-b.y,p.x-b.x);b.x+=Math.cos(a)*dt*55;b.y+=Math.sin(a)*dt*55;if(b.cd<0){b.cd=rnd(.7,1.4);state.b.push({x:b.x,y:b.y,vx:Math.cos(a)*300,vy:Math.sin(a)*300,own:0})}circle(b,"#ff4f64",13)});state.b.forEach(q=>{q.x+=q.vx*dt;q.y+=q.vy*dt;circle(q,q.own?"#8ff":"#ffb84a",4)});state.b=state.b.filter(q=>q.x>0&&q.y>0&&q.x<W&&q.y<H);state.b.forEach(q=>{if(q.own)state.bots.forEach(b=>{if(dist(q,b)<15){b.hp-=20;q.x=-9}});else if(dist(q,p)<15){p.hp-=12;q.x=-9}});state.bots=state.bots.filter(b=>{if(b.hp<=0){score++;return false}return true});if(state.bots.length<5)state.bots.push({x:rnd(60,W-60),y:rnd(70,H-60),hp:45+level*4,cd:rnd(.2,1)});if(score>=20)end(true);if(p.hp<=0)end();circle(p,"#41ffa1",15);stat([["KOS",score],["HP",Math.ceil(p.hp)],["BOTS",state.bots.length]])}
const pieces={r:"♜",n:"♞",b:"♝",q:"♛",k:"♚",p:"♟",R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔",P:"♙"};
function initChess(){state.board=["rnbqkbnr","pppppppp","........","........","........","........","PPPPPPPP","RNBQKBNR"].map(r=>[...r]);state.sel=null;state.turn="White";score=0}
function clickChess(mx,my){let s=Math.floor(Math.min(W,H-20)/8),ox=(W-s*8)/2,oy=20;let c=Math.floor((mx-ox)/s),r=Math.floor((my-oy)/s);if(r<0||c<0||r>7||c>7)return;let p=state.board[r][c];if(state.sel){let [sr,sc]=state.sel;if(sr!==r||sc!==c){if(state.board[r][c]!==".")score+=100;state.board[r][c]=state.board[sr][sc];state.board[sr][sc]=".";state.turn=state.turn==="White"?"Black":"White"}state.sel=null}else if(p!==".")state.sel=[r,c]}
function updateChess(){x.fillStyle="#06100c";x.fillRect(0,0,W,H);let s=Math.floor(Math.min(W,H-20)/8),ox=(W-s*8)/2,oy=20;x.font=`${s*.62}px serif`;x.textAlign="center";x.textBaseline="middle";for(let r=0;r<8;r++)for(let c=0;c<8;c++){x.fillStyle=(r+c)%2?"#0e3724":"#b8ffd5";x.fillRect(ox+c*s,oy+r*s,s,s);if(state.sel&&state.sel[0]===r&&state.sel[1]===c){x.fillStyle="#ffee63aa";x.fillRect(ox+c*s,oy+r*s,s,s)}let p=state.board[r][c];if(p!=="."){x.fillStyle=p===p.toUpperCase()?"#03130b":"#122";x.fillText(pieces[p],ox+c*s+s/2,oy+r*s+s/2)}}stat([["TURN",state.turn],["CAPTURE",score]])}
function initPizza(){state.order=null;state.made=[];state.time=70;state.done=0;pizzaUi.hidden=false;newOrder();pizzaUi.innerHTML=["sauce","cheese","pepper","mushroom","olive"].map(i=>`<button data-ing="${i}">${i}</button>`).join("")+`<button class="primary" data-bake>Bake</button><button class="primary" data-serve>Serve</button>`;pizzaUi.querySelectorAll("[data-ing]").forEach(b=>b.onclick=()=>{state.made.push(b.dataset.ing);say(state.made.join(" + "))});pizzaUi.querySelector("[data-bake]").onclick=()=>{state.baked=true;say("BAKED")};pizzaUi.querySelector("[data-serve]").onclick=servePizza}
function newOrder(){let pool=["sauce","cheese","pepper","mushroom","olive"];state.order=pool.sort(()=>Math.random()-.5).slice(0,2+Math.floor(Math.random()*3));state.made=[];state.baked=false;state.time=45}
function servePizza(){let ok=state.baked&&state.order.join(",")===state.made.join(",");if(ok){score+=500+Math.floor(state.time*10);state.done++;say("PERFECT PIE");newOrder()}else{score=Math.max(0,score-150);say("WRONG ORDER");state.made=[];state.baked=false}}
function updatePizza(dt){bg();state.time-=dt;if(state.time<0){score=Math.max(0,score-200);say("CUSTOMER LEFT");newOrder()}x.fillStyle="#163321";x.fillRect(80,110,360,300);x.fillStyle="#6b3d22";x.fillRect(100,310,320,70);x.fillStyle="#27221b";x.fillRect(560,120,260,280);x.fillStyle="#effff6";x.font="900 28px system-ui";x.fillText("ORDER: "+state.order.join(" + "),120,170);x.fillText("MADE: "+(state.made.join(" + ")||"—"),120,225);x.fillText(state.baked?"OVEN: READY":"OVEN: WAITING",585,180);stat([["SCORE",score],["SERVED",state.done],["TIME",Math.ceil(state.time)]])}
function end(win=false){run=false;say(win?"VICTORY":"RUN OVER");post("complete",{score});start.hidden=false;$("#startTitle").textContent=win?"Victory":"Run over";$("#help").textContent=`Score ${Math.floor(score)}. ${cfg[2]}`}
reset();
</script></body></html>
