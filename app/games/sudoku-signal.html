body{display:grid;place-items:center;background:radial-gradient(circle at 50% 12%,#0a1510 0,#060b09 40%,#05070a 78%)}

.wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding:12px;max-height:100%}

.cell.same{background:#16653444;color:#86efac}

@keyframes throb{from{text-shadow:0 0 4px #ef444466}to{text-shadow:0 0 14px #ef4444dd}}
.reduced .cell{transition:none}.reduced .cell.conflict{animation:none}

.row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}

.row button{flex:1;min-width:70px;padding:10px 8px;font-size:11px}

// ---------- sudoku engine ----------
const rowOf=i=>i/9|0,colOf=i=>i%9,boxOf=i=>(rowOf(i)/3|0)*3+(colOf(i)/3|0);
const UNITS=[];
for(let r=0;r<9;r++)UNITS.push(Array.from({length:9},(_,c)=>r*9+c));

function fillGrid(){ // random complete valid grid via backtracking
  const g=new Array(81).fill(0),rw=new Array(9).fill(0),cl=new Array(9).fill(0),bx=new Array(9).fill(0);
  (function go(i){if(i===81)return true;const r=rowOf(i),c=colOf(i),b=boxOf(i);
    for(const v of shuffle([1,2,3,4,5,6,7,8,9])){const bit=1<<v;
      if(!(rw[r]&bit)&&!(cl[c]&bit)&&!(bx[b]&bit)){g[i]=v;rw[r]|=bit;cl[c]|=bit;bx[b]|=bit;
        if(go(i+1))return true;g[i]=0;rw[r]&=~bit;cl[c]&=~bit;bx[b]&=~bit}}
    return false})(0);
  return g}
function countSolutions(cells,cap,sol){ // MRV backtracking counter, early-exits at cap
  const rw=new Array(9).fill(0),cl=new Array(9).fill(0),bx=new Array(9).fill(0),blanks=[];
  for(let i=0;i<81;i++){const v=cells[i];if(v){const bit=1<<v,r=rowOf(i),c=colOf(i),b=boxOf(i);
    if((rw[r]&bit)||(cl[c]&bit)||(bx[b]&bit))return 0;rw[r]|=bit;cl[c]|=bit;bx[b]|=bit}else blanks.push(i)}

let puzzle=new Array(81).fill(0),entries=new Array(81).fill(0),solution=new Array(81).fill(0),marks=Array.from({length:81},()=>0);

// ---------- audio (inline, no external resources) ----------
let ac=null;
function beep(f,d=.06,g=.025){if(!soundOn)return;try{ac=ac||new (window.AudioContext||window.webkitAudioContext)();
  const o=ac.createOscillator(),v=ac.createGain();o.type='square';o.frequency.value=f;

// ---------- board DOM ----------
const cellEls=[];
for(let i=0;i<81;i++){const el=document.createElement('div');let base='cell';
  if(colOf(i)%3===2&&colOf(i)!==8)base+=' br';if(rowOf(i)%3===2&&rowOf(i)!==8)base+=' bb';
  el.dataset.base=base;el.className=base;
  el.addEventListener('pointerdown',()=>{if(!started||paused||won)return;sel=i;render()});
  boardEl.appendChild(el);cellEls.push(el)}
for(let n=1;n<=9;n++){const b=document.createElement('button');b.textContent=n;
  b.addEventListener('pointerdown',e=>{e.preventDefault();input(n)});padEl.appendChild(b)}

function conflictSet(){const bad=new Set();
  for(const u of UNITS){const seen={};for(const i of u){const v=val(i);if(!v)continue;(seen[v]||(seen[v]=[])).push(i)}
    for(const k in seen)if(seen[k].length>1)for(const i of seen[k])bad.add(i)}
  return bad}
function render(){
  const bad=conflictSet(),selVal=sel!=null?val(sel):0;
  const selPeers=sel!=null?new Set(PEERS[sel]):null;
  for(let i=0;i<81;i++){const el=cellEls[i],v=val(i);let cls=el.dataset.base;
    if(puzzle[i])cls+=' given';
    if(sel===i)cls+=' sel';else if(selPeers&&selPeers.has(i))cls+=' peer';
    if(selVal&&v===selVal&&i!==sel)cls+=' same';
    if(bad.has(i))cls+=' conflict';
    if(wrongSet.has(i))cls+=' wrong';
    el.className=cls;
    if(v){el.textContent=v}
    else if(marks[i]){let h='<span class="marks">';for(let n=1;n<=9;n++)h+='<i>'+((marks[i]>>n)&1?n:'')+'</i>';el.innerHTML=h+'</span>'}
    else el.textContent=''}

  diffEl.textContent=difficulty?difficulty.toUpperCase():'—';
  checksEl.textContent='CHECKS '+checks;
  streakEl.textContent=streak}
const fmt=s=>String(s/60|0).padStart(2,'0')+':'+String(s%60).padStart(2,'0');

// ---------- protocol out ----------
function sendProgress(){let filled=0;for(let i=0;i<81;i++)if(val(i))filled++;
  host('progress',{progress:Math.round(filled/81*99),state:{
    puzzle:puzzle.join(''),entries:entries.join(''),
    difficulty:difficulty||'steady',seconds:String(seconds),checks:String(checks),streak:String(streak),bestStreak:String(bestStreak)}})}

// ---------- game flow ----------
function newGame(diff){
  difficulty=diff;const made=makePuzzle(TARGETS[diff]);
  puzzle=made.puzzle;solution=made.solution;
  entries=new Array(81).fill(0);marks=Array.from({length:81},()=>0);wrongSet.clear();
  sel=puzzle.findIndex(v=>!v);if(sel<0)sel=0;
  seconds=0;checks=0;streak=0;bestStreak=0;won=false;started=true;
  startOv.hidden=true;if(paused)setPaused(false);pauseOv.hidden=true;
  render();sendProgress();beep(520,.05)}
function input(v){if(!started||paused||won||sel==null||puzzle[sel])return;
  if(pencil&&!entries[sel]){marks[sel]^=1<<v;render();beep(340,.03,.015);return}
  entries[sel]=v;marks[sel]=0;wrongSet.delete(sel);
  if(v===solution[sel]){streak++;bestStreak=Math.max(bestStreak,streak);beep(520+Math.min(420,streak*18),.04)}
  else{streak=0;wrongSet.add(sel);beep(180,.08,.02)}
  for(const p of PEERS[sel])marks[p]&=~(1<<v); // prune candidate from peers
  render();sendProgress();checkWin()}
function erase(){if(!started||paused||won||sel==null||puzzle[sel])return;
  if(!entries[sel]&&!marks[sel])return;
  entries[sel]=0;marks[sel]=0;wrongSet.delete(sel);
  render();sendProgress();beep(260,.04,.015)}
function doCheck(){if(!started||paused||won)return;
  checks++;seconds+=30;let flagged=0;
  streak=0;
  for(let i=0;i<81;i++)if(!puzzle[i]&&entries[i]&&entries[i]!==solution[i]){wrongSet.add(i);flagged++}
  render();sendProgress();beep(flagged?220:640,.09,.03)}
function checkWin(){
  for(let i=0;i<81;i++)if(val(i)!==solution[i])return;
  won=true;const score=Math.max(100,3000-seconds-200*checks)*MULT[difficulty];
  host('score',{score});host('complete',{score,progress:100,state:{seconds,checks,bestStreak}});
  beep(523,.09);setTimeout(()=>beep(659,.09),110);setTimeout(()=>beep(784,.14),220);
  startH1.textContent='Signal decoded';
  startMsg.textContent='Grid solved in '+fmt(seconds)+' with '+checks+' check'+(checks===1?'':'s')+'. Best signal streak '+bestStreak+'. Score '+score+'. Pick a difficulty to run it again.';

function tryRestore(s){

  streak=Math.max(0,parseInt(s.streak,10)||0);
  bestStreak=Math.max(streak,parseInt(s.bestStreak,10)||0);
  sel=puzzle.findIndex(v=>!v);if(sel<0)sel=0;
  won=false;started=true;startOv.hidden=true;pauseOv.hidden=paused?false:true;
  render();checkWin();
  return true}

// ---------- input wiring ----------
addEventListener('keydown',e=>{
  if(!started||won)return;const k=e.key;
  if(k==='ArrowLeft'||k==='ArrowRight'||k==='ArrowUp'||k==='ArrowDown'){
    e.preventDefault();if(paused)return;if(sel==null){sel=0;render();return}
    let r=rowOf(sel),c=colOf(sel);
    if(k==='ArrowLeft')c=(c+8)%9;if(k==='ArrowRight')c=(c+1)%9;
    if(k==='ArrowUp')r=(r+8)%9;if(k==='ArrowDown')r=(r+1)%9;
    sel=r*9+c;render()}
  else if(k>='1'&&k<='9')input(+k);
  else if(k==='0'||k==='Backspace'||k==='Delete'){e.preventDefault();erase()}
  else if(k==='p'||k==='P')togglePencil()});
function togglePencil(){pencil=!pencil;const b=$('[data-pencil]');
  b.textContent=pencil?'PENCIL ON':'PENCIL OFF';b.classList.toggle('on',pencil)}
$('[data-erase]').addEventListener('pointerdown',e=>{e.preventDefault();erase()});
$('[data-pencil]').onclick=togglePencil;
$('[data-check]').onclick=doCheck;
$('[data-pause]').onclick=()=>{if(started&&!won)setPaused(!paused)};
$('[data-resume]').onclick=()=>setPaused(false);
$('[data-new]').onclick=()=>{startH1.textContent='Sudoku Signal';
  startMsg.textContent='Decode the grid. Every row, column and 3×3 box carries digits 1–9 exactly once. Arrows move, 1–9 write, 0/Backspace erase, P toggles pencil marks.';
  startOv.hidden=false};
for(const b of startOv.querySelectorAll('[data-d]'))b.onclick=()=>newGame(b.dataset.d);

// ---------- protocol in ----------
addEventListener('message',e=>{const d=e.data;if(!d||d.source!=='phantomplay-host')return;
  switch(d.type){
    case 'settings':if('sound'in d)soundOn=!!d.sound;reduced=!!d.reducedMotion;document.body.classList.toggle('reduced',reduced);break;
    case 'pause':setPaused(true,true);break;
    case 'resume':setPaused(false,true);break;
    case 'restart':newGame(DIFFS.includes(difficulty)?difficulty:'steady');break;
    case 'restore':tryRestore(d.state);break}});
render();host('ready');
</script></body></html>
