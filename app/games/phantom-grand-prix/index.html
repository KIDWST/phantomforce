<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
<title>Phantom Grand Prix - PhantomPlay</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="stage" aria-label="First-person Phantom Grand Prix race view"></canvas>

<section class="overlay title-overlay" data-title-overlay>
  <div class="title-lockup">
    <p class="kicker">PhantomPlay Motorsport</p>
    <h1>Phantom<br><span>Grand Prix</span></h1>
    <p>Drift the impossible line. Fire the boost. Take the flag.</p>
    <button class="btn-primary" data-garage-btn>Enter Garage</button>
  </div>
</section>

<section class="overlay" data-start-overlay hidden>
  <div class="panel setup-panel">
    <p class="kicker">Race Setup</p>
    <h2>Choose Your Circuit</h2>
    <div class="track-choice">
      <button class="track-btn" data-track="ghostlight" aria-pressed="true"><strong>Ghostlight</strong><span>Night city</span></button>
      <button class="track-btn" data-track="redwood" aria-pressed="false"><strong>Redwood Run</strong><span>Forest dawn</span></button>
      <button class="track-btn" data-track="aurora" aria-pressed="false"><strong>Aurora Ring</strong><span>Polar sky</span></button>
    </div>
    <h2>Starting Grid</h2>
    <div class="mode-choice">
      <button class="mode-btn" data-mode="1p"><strong>Solo Grand Prix</strong><span>1 driver + 3 CPU rivals</span></button>
      <button class="mode-btn" data-mode="2p"><strong>Local Split Race</strong><span>2 drivers + 2 CPU rivals</span></button>
    </div>
    <div class="controls-grid">
      <div><b>Driver 1</b><span>WASD / Shift / Space</span></div>
      <div><b>Driver 2</b><span>Arrows / Slash / Enter</span></div>
    </div>
    <button class="btn-ghost" data-title-btn>Back</button>
  </div>
</section>

<div class="overlay countdown-overlay" data-countdown-overlay hidden><div class="countdown-num" data-countdown-num>3</div></div>

<div class="overlay" data-pause-overlay hidden>
  <div class="panel"><p class="kicker">Yellow Flag</p><h2>Race Paused</h2><button class="btn-primary" data-resume-btn>Resume</button></div>
</div>

<section class="overlay" data-finish-overlay hidden>
  <div class="panel results-panel">
    <p class="kicker">Official Classification</p><h2>Race Finished</h2><p data-finish-track></p>
    <div class="standings" data-standings></div>
    <button class="btn-primary" data-restart-btn>Race Again</button><button class="btn-ghost" data-menu-btn>Change Setup</button>
  </div>
</section>

<div class="touch-controls" data-touch-controls hidden>
  <div class="touch-steer"><button data-touch="left" aria-label="Steer left">&#9664;</button><button data-touch="right" aria-label="Steer right">&#9654;</button></div>
  <div class="touch-actions"><button data-touch="drift">Drift</button><button class="gas" data-touch="gas">Gas</button><button data-touch="item">Item</button></div>
</div>

<script src="game.js"></script>
</body>
</html>
