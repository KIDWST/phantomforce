<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
  <title>Penalty Kick</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#eafff4;font-family:system-ui,sans-serif;touch-action:manipulation;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;padding:max(12px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 10%,#163c2b,#020807 62%)}main{width:min(760px,100%);height:100%;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:12px}header{display:flex;align-items:center;justify-content:space-between;gap:10px}h1{margin:0;color:#5effac;font-size:42px;line-height:1}.hud{display:flex;gap:8px;font:900 11px ui-monospace;color:#80ffc0}.hud span{padding:8px 10px;border:1px solid #41ffa144;border-radius:999px;background:#06120d}.field{position:relative;align-self:center;min-height:0;border:1px solid #41ffa144;border-radius:18px;overflow:hidden;background:linear-gradient(#082018,#03110c)}.goal{position:absolute;inset:10% 10% 42%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border:3px solid #87ffc4;border-bottom:0;padding:8px}.lane{border:1px solid #41ffa155;border-radius:10px;background:#07150f66;color:#dffff0;font-weight:900;cursor:pointer}.lane.active{background:#54ffa8;color:#021009;box-shadow:0 0 24px #41ffa166}.keeper{position:absolute;left:50%;top:38%;width:74px;height:52px;margin-left:-37px;border-radius:999px;background:#ff4f75;box-shadow:0 0 24px #ff4f7566;transition:transform .28s ease}.ball{position:absolute;left:50%;bottom:12%;width:42px;height:42px;margin-left:-21px;border-radius:50%;background:#eafff4;box-shadow:0 0 22px #41ffa166;transition:transform .42s cubic-bezier(.2,1,.25,1)}.meter{position:absolute;left:12%;right:12%;bottom:5%;height:12px;border-radius:999px;background:#ffffff18;overflow:hidden}.meter i{display:block;width:18%;height:100%;border-radius:999px;background:#54ffa8;transform:translateX(0);animation:sweep 1.2s ease-in-out infinite alternate}@keyframes sweep{to{transform:translateX(455%)}}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions button{min-height:48px;border:1px solid #41ffa155;border-radius:13px;background:#07150f;color:#dffff0;font-weight:900}.actions button.primary{background:#54ffa8;color:#021009;border-color:#54ffa8}.message{text-align:center;color:#a9c5b7;min-height:24px}.pause,.start{position:fixed;z-index:6;inset:0;display:grid;place-items:center;background:#010504df;backdrop-filter:blur(5px)}.pause[hidden],.start[hidden]{display:none}.pause div,.start div{text-align:center;max-width:430px;padding:24px}.pause h2,.start h2{margin:0;color:#5effac;font-size:46px}.pause p,.start p{color:#a9c5b7}.pause button,.start button{min-width:150px;min-height:48px;border:0;border-radius:999px;background:#54ffa8;color:#021009;font-weight:900}@media(max-width:560px){h1{font-size:31px}.hud{font-size:9px}.goal{inset:12% 5% 44%;gap:5px}.keeper{width:58px;height:44px;margin-left:-29px}.ball{width:34px;height:34px;margin-left:-17px}.actions button{min-height:44px}}
  </style>
</head>
<body>
  <main>
    <header><h1>Penalty Kick</h1><div class="hud"><span data-score>0 goals</span><span data-shots>5 shots</span></div></header>
    <section class="field"><div class="goal"><button class="lane" data-lane="0">LEFT</button><button class="lane" data-lane="1">CENTER</button><button class="lane" data-lane="2">RIGHT</button></div><div class="keeper"></div><div class="ball"></div><div class="meter"><i></i></div></section>
    <div class="message" data-msg>Pick a lane, then shoot.</div>
    <div class="actions"><button type="button" data-pause>Pause</button><button type="button" class="primary" data-shoot>Shoot</button></div>
  </main>
  <div class="start"><div><h2>Penalty Kick</h2><p>Five shots. Choose your side and time the strike.</p><button type="button">Start</button></div></div>
  <div class="pause" hidden><div><h2>Paused</h2><p>Take the kick when ready.</p><button type="button">Resume</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const lanes=[...document.querySelectorAll('[data-lane]')],keeper=document.querySelector('.keeper'),ball=document.querySelector('.ball'),meter=document.querySelector('.meter i'),scoreEl=document.querySelector('[data-score]'),shotsEl=document.querySelector('[data-shots]'),msg=document.querySelector('[data-msg]'),startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause');
    let selected=1,score=0,shots=5,started=false,paused=false,busy=false;
    function render(){lanes.forEach((b,i)=>b.classList.toggle('active',i===selected));scoreEl.textContent=`${score} goals`;shotsEl.textContent=`${shots} shots`;keeper.style.transform=`translateX(${(selected-1)*18}px)`}
    function start(){score=0;shots=5;selected=1;started=true;paused=false;busy=false;startEl.hidden=true;pauseEl.hidden=true;msg.textContent='Pick a lane, then shoot.';ball.style.transform='';host('progress',{score:0,progress:0,state:{shots,goals:score}});render()}
    function setPaused(next){if(!started)return;paused=next;pauseEl.hidden=!paused;host('paused',{paused})}
    function shoot(){if(!started||paused||busy)return;busy=true;const power=parseFloat(getComputedStyle(meter).transform.split(',')[4]||'0')||0;const sweet=power>80&&power<185;const keeperLane=Math.floor(Math.random()*3);keeper.style.transform=`translateX(${(keeperLane-1)*120}px)`;ball.style.transform=`translate(${(selected-1)*170}px,-260px) scale(.72)`;setTimeout(()=>{const goal=selected!==keeperLane&&sweet;if(goal){score++;msg.textContent='Goal.'}else msg.textContent=sweet?'Saved.':'Off target.';shots--;host('score',{score,progress:Math.round((5-shots)/5*100),state:{shots,goals:score}});if(shots<=0){started=false;startEl.hidden=false;startEl.querySelector('h2').textContent='Final whistle';startEl.querySelector('p').textContent=`${score} goals from 5 shots.`;startEl.querySelector('button').textContent='Play again';host('complete',{score:score*100,progress:100,state:{goals:score}})}else{ball.style.transform='';keeper.style.transform='';busy=false;render()}},520)}
    lanes.forEach((button,i)=>button.onclick=()=>{if(!busy){selected=i;render()}});document.querySelector('[data-shoot]').onclick=shoot;document.querySelector('[data-pause]').onclick=()=>setPaused(true);startEl.querySelector('button').onclick=start;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    addEventListener('keydown',e=>{if(e.key==='ArrowLeft')selected=Math.max(0,selected-1);if(e.key==='ArrowRight')selected=Math.min(2,selected+1);if(e.key===' '||e.key==='Enter'){e.preventDefault();shoot()}if(e.key==='p'||e.key==='P')setPaused(!paused);render()});
    document.addEventListener('visibilitychange',()=>{if(document.hidden)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='restart')start()});
    render();host('ready');
  </script>
</body>
</html>
