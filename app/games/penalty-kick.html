<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; img-src data:"><title>Penalty Kick</title><style>
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#020806;color:#effff6;font-family:system-ui,sans-serif;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;padding:16px;background:radial-gradient(circle at 50% 0,#0f3a2c,#020806 62%)}main{width:min(560px,100%)}header{display:flex;justify-content:space-between;align-items:end;margin-bottom:12px;gap:10px}h1{margin:0;color:#58ffa8;font-size:32px;letter-spacing:-1px}.sub{color:#8fae9f;font-size:12px;margin:2px 0 0}.stats{display:flex;gap:14px;font:800 12px ui-monospace,monospace;text-align:right}.stats b{color:#77ffb8;font-size:20px;display:block}.stats span{color:#6f8a7d;text-transform:uppercase;letter-spacing:1px;font-size:9px}
.pitch{position:relative;width:100%;aspect-ratio:16/11;border:1px solid #42ff9a30;border-radius:16px;background:linear-gradient(180deg,#04140d 0%,#072819 55%,#0a3a24 100%);overflow:hidden;cursor:pointer}
.goal{position:absolute;left:8%;top:8%;width:84%;height:44%;border:3px solid #cfffe6;border-bottom:none;border-radius:6px 6px 0 0;box-shadow:0 0 18px #41ffa155;background:repeating-linear-gradient(90deg,#ffffff08 0 6px,transparent 6px 12px),repeating-linear-gradient(0deg,#ffffff08 0 6px,transparent 6px 12px)}
.keeper{position:absolute;top:22%;width:16%;height:26%;border-radius:20% 20% 8px 8px;background:linear-gradient(180deg,#ff9a4d,#e0631a);box-shadow:0 0 14px #ff8a3a88;transition:left .12s linear}.keeper::before{content:"";position:absolute;left:28%;top:-32%;width:44%;aspect-ratio:1;border-radius:50%;background:#ffb877}
.retline{position:absolute;left:8%;width:84%;top:52%;height:2px;background:#ffffff22}
.reticle{position:absolute;top:44%;width:10%;aspect-ratio:1;transform:translateX(-50%);pointer-events:none}.reticle::before,.reticle::after{content:"";position:absolute;inset:0;border:2px solid #58ffa8;border-radius:50%;box-shadow:0 0 12px #41ffa1}.reticle::after{inset:34%;border-radius:50%;background:#58ffa8;border:none}
.ball{position:absolute;bottom:5%;left:50%;width:9%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 38% 32%,#ffffff,#b9d8c9 70%,#7fa793);box-shadow:0 4px 10px #0009;transform:translateX(-50%);transition:none;z-index:3}
.ball.shot{transition:left .32s cubic-bezier(.2,.7,.3,1),bottom .32s cubic-bezier(.3,.6,.4,1),transform .32s}
.kicks{position:absolute;left:10px;bottom:8px;display:flex;gap:5px;z-index:4}.kicks i{width:11px;height:11px;border-radius:50%;border:1px solid #58ffa877;background:transparent}.kicks i.goal{background:#58ffa8;box-shadow:0 0 8px #41ffa1}.kicks i.miss{background:#ff6a6a;border-color:#ff6a6a}
.flash{position:absolute;inset:0;display:grid;place-items:center;font:900 46px system-ui;color:#effff6;text-shadow:0 0 20px #000;opacity:0;pointer-events:none;z-index:5}.flash.go{color:#7dffc0}.flash.no{color:#ff8a8a}
.bar{height:7px;border-radius:6px;background:#0c2119;overflow:hidden;margin:12px 0 0}.bar i{display:block;height:100%;background:linear-gradient(90deg,#41ffa1,#effff6);width:0;transition:width .2s}
.status{text-align:center;min-height:22px;margin-top:10px;color:#a9c5b7;font-size:14px}
.btn{display:block;margin:12px auto 0;padding:12px 30px;border:1px solid #58ffa8;border-radius:30px;background:#0c3221;color:#defff0;font:800 15px system-ui;cursor:pointer}.btn:active{transform:scale(.96)}.hide{display:none}
@media(max-width:420px){h1{font-size:26px}.flash{font-size:34px}}</style></head><body><main><header><div><h1>Penalty Kick</h1><p class="sub">Space / tap to shoot. Beat the keeper.</p></div><div class="stats"><div><b id="goals">0</b><span>Goals</span></div><div><b id="round">1</b><span>Round</span></div></div></header>
<div class="pitch" id="pitch"><div class="goal"></div><div class="keeper" id="keeper"></div><div class="retline"></div><div class="reticle" id="reticle"></div><div class="ball" id="ball"></div><div class="kicks" id="kicks"></div><div class="flash" id="flash"></div></div>
<div class="bar"><i id="prog"></i></div><div class="status" id="status">Tap start to take your kicks.</div><button class="btn" id="btn">Start</button></main><script>
const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
let reduced=false,sound=true;
addEventListener('message',e=>{if(e.data?.source==='phantomplay-host'&&e.data.type==='settings'){reduced=!!e.data.reducedMotion;sound=!!e.data.sound}});
const pitch=document.getElementById('pitch'),keeper=document.getElementById('keeper'),reticle=document.getElementById('reticle'),ball=document.getElementById('ball'),flash=document.getElementById('flash'),goalsEl=document.getElementById('goals'),roundEl=document.getElementById('round'),kicksEl=document.getElementById('kicks'),prog=document.getElementById('prog'),statusEl=document.getElementById('status'),btn=document.getElementById('btn');
const TOTAL=5,FINAL_ROUND=5,MIN=10,MAX=90;
let ac=null;function beep(f,d,t,v){if(!sound)return;try{ac=ac||new(window.AudioContext||window.webkitAudioContext)();const o=ac.createOscillator(),g=ac.createGain();o.type=t||'sine';o.frequency.value=f;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(.0001,ac.currentTime);g.gain.exponentialRampToValueAtTime(v||.2,ac.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+d);o.start();o.stop(ac.currentTime+d)}catch(e){}}
let goals=0,round=1,kicks=0,missStreak=0,pos=50,dir=1,retSpeed=1.1,keeperX=50,keeperHalf=8,retIdle=false,retReq=0,lastT=0,playing=false,results=[];
function setReticle(){reticle.style.left=pos+'%'}
function setKeeper(){keeper.style.left=(keeperX-keeperHalf)+'%'}
function keeperReach(){return 9+round*1.4}
function loop(t){if(!playing||retIdle){lastT=t;retReq=requestAnimationFrame(loop);return}const dt=lastT?(t-lastT):16;lastT=t;pos+=dir*retSpeed*(dt/16);if(pos>=MAX){pos=MAX;dir=-1}if(pos<=MIN){pos=MIN;dir=1}setReticle();retReq=requestAnimationFrame(loop)}
function renderKicks(){let h='';for(let i=0;i<TOTAL;i++){const r=results[i];h+='<i class="'+(r||'')+'"></i>'}kicksEl.innerHTML=h}
function newRound(){retSpeed=1.0+round*0.55;renderKicks()}
function nextKick(){retIdle=false;pos=MIN+Math.random()*(MAX-MIN);dir=Math.random()<.5?1:-1;keeperX=20+Math.random()*60;setKeeper();keeperHalf=keeperReach();ball.className='ball';ball.style.left='50%';ball.style.bottom='5%';ball.style.transform='translateX(-50%)';statusEl.textContent='Round '+round+' — kick '+(kicks+1)+' of '+TOTAL;setReticle()}
function showFlash(txt,cls){flash.textContent=txt;flash.className='flash '+cls;flash.style.transition='none';flash.style.opacity='1';flash.style.transform='scale(1.15)';requestAnimationFrame(()=>{flash.style.transition=reduced?'opacity .2s':'opacity .6s .3s,transform .6s';flash.style.opacity='0';flash.style.transform='scale(1)'})}
function shoot(){if(!playing||retIdle)return;retIdle=true;const shotX=pos,keeperCenter=keeperX,saved=Math.abs(shotX-keeperCenter)<keeperHalf;kicks++;ball.classList.add('shot');ball.style.left=shotX+'%';if(saved){ball.style.bottom='24%';ball.style.transform='translateX(-50%) scale(.7)';beep(150,.25,'sawtooth',.22);results[kicks-1]='miss';missStreak++;showFlash('SAVED','no');statusEl.textContent='Keeper saves it!'}else{ball.style.bottom='30%';ball.style.transform='translateX(-50%) scale(.55)';beep(880,.09,'square');setTimeout(()=>beep(1250,.12,'square'),90);goals++;results[kicks-1]='goal';missStreak=0;showFlash('GOAL!','go');goalsEl.textContent=goals;statusEl.textContent='GOAL! Nets it clean.'}renderKicks();const progress=Math.round(kicks/TOTAL*100);host('progress',{score:goals,progress});if(missStreak>=3)return setTimeout(()=>end('Three saves in a row — keeper wins.'),900);setTimeout(afterKick,reduced?600:950)}
function afterKick(){if(!playing)return;if(kicks>=TOTAL){if(round>=FINAL_ROUND)return end('Full time! You scored '+goals+' goals.');round++;kicks=0;results=[];roundEl.textContent=round;newRound();statusEl.textContent='Round '+round+'! Keeper is faster.';beep(660,.15,'triangle');setTimeout(nextKick,reduced?400:700)}else{nextKick()}}
function end(msg){playing=false;retIdle=true;cancelAnimationFrame(retReq);lastT=0;statusEl.textContent=msg;btn.textContent='Play again';btn.classList.remove('hide');host('complete',{score:goals,progress:100,state:{goals,round}})}
function start(){goals=0;round=1;kicks=0;missStreak=0;results=[];playing=true;goalsEl.textContent='0';roundEl.textContent='1';btn.classList.add('hide');newRound();host('score',{score:0,progress:0,state:{goals:0,round:1}});lastT=0;retReq=requestAnimationFrame(loop);nextKick()}
btn.onclick=start;
pitch.addEventListener('pointerdown',e=>{e.preventDefault();shoot()});
addEventListener('keydown',e=>{if(e.code==='Space'||e.key===' '){e.preventDefault();if(playing)shoot()}else if(e.key==='Enter'&&!playing)start()});
document.addEventListener('visibilitychange',()=>{if(document.hidden){cancelAnimationFrame(retReq)}else if(playing){lastT=0;retReq=requestAnimationFrame(loop)}});
setReticle();setKeeper();host('ready');
</script></body></html>
