<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
  <title>Penalty Kick</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#eafff4;font-family:system-ui,sans-serif;touch-action:manipulation;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;padding:max(12px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 10%,#163c2b,#020807 62%)}main{width:min(840px,100%);height:100%;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:12px}header{display:flex;align-items:center;justify-content:space-between;gap:10px}h1{margin:0;color:#5effac;font-size:42px;line-height:1;text-shadow:0 0 24px #41ffa166}.hud{display:flex;gap:8px;flex-wrap:wrap;font:900 11px ui-monospace;color:#80ffc0}.hud span{padding:8px 10px;border:1px solid #41ffa144;border-radius:999px;background:#06120d;box-shadow:0 0 18px #41ffa120}.field{position:relative;align-self:stretch;height:100%;min-height:280px;border:1px solid #41ffa144;border-radius:18px;overflow:hidden;background:radial-gradient(circle at 50% 70%,#0d4a32 0,#062019 42%,#03110c 100%)}.field::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,#ffffff08 0 2px,transparent 2px 72px),linear-gradient(transparent 68%,#58ffa816 68% 70%,transparent 70%);opacity:.65}.goal{position:absolute;inset:8% 8% 41%;display:grid;grid-template-columns:repeat(5,1fr);gap:7px;border:3px solid #87ffc4;border-bottom:0;padding:8px;box-shadow:0 0 28px #41ffa122}.lane{position:relative;border:1px solid #41ffa155;border-radius:10px;background:#07150f66;color:#dffff0;font-weight:900;cursor:pointer;overflow:hidden}.lane::after{content:attr(data-points);position:absolute;right:6px;bottom:5px;font:900 10px ui-monospace;color:#80ffc0aa}.lane.active{background:#54ffa8;color:#021009;box-shadow:0 0 24px #41ffa166}.lane.danger{outline:2px solid #ff4f7566}.keeper{position:absolute;left:50%;top:38%;width:86px;height:54px;margin-left:-43px;border-radius:999px;background:linear-gradient(90deg,#ff4f75,#ff9ab0);box-shadow:0 0 24px #ff4f7566;transition:transform .34s cubic-bezier(.2,1,.2,1)}.keeper::before,.keeper::after{content:"";position:absolute;top:16px;width:34px;height:10px;border-radius:999px;background:#ff9ab0}.keeper::before{left:-26px;transform:rotate(-18deg)}.keeper::after{right:-26px;transform:rotate(18deg)}.ball{position:absolute;left:50%;bottom:12%;width:42px;height:42px;margin-left:-21px;border-radius:50%;background:radial-gradient(circle at 32% 28%,#fff,#eafff4 45%,#9fffc9);box-shadow:0 0 22px #41ffa166;transition:transform .52s cubic-bezier(.2,1,.25,1)}.target{position:absolute;width:50px;height:50px;border:2px dashed #54ffa8aa;border-radius:50%;left:50%;top:28%;margin:-25px 0 0 -25px;opacity:.55;pointer-events:none;filter:drop-shadow(0 0 12px #54ffa8)}.spark{position:absolute;width:7px;height:7px;border-radius:50%;background:#54ffa8;box-shadow:0 0 14px currentColor;pointer-events:none;animation:pop .55s ease-out forwards}@keyframes pop{to{transform:translate(var(--x),var(--y)) scale(.2);opacity:0}}.call{position:absolute;left:50%;top:58%;transform:translate(-50%,-50%) scale(.9);font:900 clamp(28px,8vw,82px) ui-monospace;color:#eafff4;text-shadow:0 0 22px #41ffa1;opacity:0;pointer-events:none;transition:.18s;z-index:3}.call.show{opacity:1;transform:translate(-50%,-50%) scale(1)}.meter{position:absolute;left:10%;right:10%;bottom:5%;height:15px;border-radius:999px;background:#ffffff18;overflow:hidden}.meter::after{content:"";position:absolute;inset:0 40%;background:#54ffa844;border-left:1px solid #54ffa8cc;border-right:1px solid #54ffa8cc;box-shadow:0 0 20px #54ffa855}.meter i{position:relative;z-index:1;display:block;width:14%;height:100%;border-radius:999px;background:#54ffa8;transform:translateX(0);animation:sweep var(--meter-speed,1.08s) ease-in-out infinite alternate}@keyframes sweep{to{transform:translateX(615%)}}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions button{min-height:48px;border:1px solid #41ffa155;border-radius:13px;background:#07150f;color:#dffff0;font-weight:900}.actions button.primary{background:#54ffa8;color:#021009;border-color:#54ffa8}.message{text-align:center;color:#a9c5b7;min-height:24px}.pause,.start{position:fixed;z-index:6;inset:0;display:grid;place-items:center;background:#010504df;backdrop-filter:blur(5px)}.pause[hidden],.start[hidden]{display:none}.pause div,.start div{text-align:center;max-width:470px;padding:24px}.pause h2,.start h2{margin:0;color:#5effac;font-size:46px}.pause p,.start p{color:#a9c5b7}.pause button,.start button{min-width:150px;min-height:48px;border:0;border-radius:999px;background:#54ffa8;color:#021009;font-weight:900}@media(max-width:560px){h1{font-size:31px}.hud{font-size:9px}.field{min-height:300px}.goal{inset:12% 3% 45%;gap:4px}.keeper{width:62px;height:44px;margin-left:-31px}.ball{width:34px;height:34px;margin-left:-17px}.actions button{min-height:44px}}
  </style>
</head>
<body>
  <main>
    <header><h1>Penalty Kick</h1><div class="hud"><span data-score>SCORE 0</span><span data-goals>0 goals</span><span data-streak>STREAK 0</span><span data-shots>7 shots</span></div></header>
    <section class="field"><div class="goal"><button class="lane" data-lane="0" data-points="+150">TOP L</button><button class="lane" data-lane="1" data-points="+100">LEFT</button><button class="lane" data-lane="2" data-points="+80">CENTER</button><button class="lane" data-lane="3" data-points="+100">RIGHT</button><button class="lane" data-lane="4" data-points="+150">TOP R</button></div><div class="target"></div><div class="keeper"></div><div class="ball"></div><div class="call" data-call></div><div class="meter"><i></i></div></section>
    <div class="message" data-msg>Pick a lane, then shoot.</div>
    <div class="actions"><button type="button" data-pause>Pause</button><button type="button" class="primary" data-shoot>Shoot</button></div>
  </main>
  <div class="start"><div><h2>Penalty Kick</h2><p>Seven shots. Pick corners, read the keeper, and time the perfect strike for streak bonuses.</p><button type="button">Start</button></div></div>
  <div class="pause" hidden><div><h2>Paused</h2><p>Take the kick when ready.</p><button type="button">Resume</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const lanes=[...document.querySelectorAll('[data-lane]')],field=document.querySelector('.field'),keeper=document.querySelector('.keeper'),ball=document.querySelector('.ball'),target=document.querySelector('.target'),meter=document.querySelector('.meter i'),scoreEl=document.querySelector('[data-score]'),goalsEl=document.querySelector('[data-goals]'),shotsEl=document.querySelector('[data-shots]'),streakEl=document.querySelector('[data-streak]'),call=document.querySelector('[data-call]'),msg=document.querySelector('[data-msg]'),startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause');
    const totalShots=7,laneNames=['top-left','left','center','right','top-right'],lanePoints=[150,100,80,100,150];
    let selected=2,score=0,goals=0,shots=totalShots,streak=0,round=1,started=false,paused=false,busy=false,audio=null,keeperTell=2;
    function laneOffset(lane,distance){return(lane-2)*distance}
    function audioCtx(){if(audio)return audio;try{audio=new (window.AudioContext||window.webkitAudioContext)()}catch{}return audio}
    function tone(freq,dur=.08,type='sine',gain=.04){const ac=audioCtx();if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(gain,ac.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);o.connect(g).connect(ac.destination);o.start();o.stop(ac.currentTime+dur)}
    function showCall(text){call.textContent=text;call.classList.add('show');clearTimeout(call._t);call._t=setTimeout(()=>call.classList.remove('show'),650)}
    function sparks(x,y,color='#54ffa8',n=20){if(matchMedia('(prefers-reduced-motion: reduce)').matches)return;for(let i=0;i<n;i++){const s=document.createElement('i');s.className='spark';s.style.left=x+'px';s.style.top=y+'px';s.style.color=color;s.style.background=color;s.style.setProperty('--x',`${(Math.random()*220-110)}px`);s.style.setProperty('--y',`${(Math.random()*160-80)}px`);field.appendChild(s);setTimeout(()=>s.remove(),600)}}
    function meterPower(){const track=meter.parentElement.getBoundingClientRect(),marker=meter.getBoundingClientRect(),travel=Math.max(1,track.width-marker.width);return Math.max(0,Math.min(1,(marker.left-track.left)/travel))}
    function resetRound(){const box=field.getBoundingClientRect();keeperTell=Math.max(0,Math.min(4,selected+(Math.random()<.62?0:(Math.random()<.5?-1:1))));ball.style.transform='';keeper.style.transform=`translateX(${laneOffset(keeperTell,Math.min(74,box.width*.1))}px)`;target.style.transform=`translateX(${laneOffset(selected,Math.min(115,box.width*.16))}px) translateY(${selected===0||selected===4?'-46px':'0px'})`;lanes.forEach((b,i)=>b.classList.toggle('danger',i===keeperTell))}
    function render(){lanes.forEach((b,i)=>b.classList.toggle('active',i===selected));document.documentElement.style.setProperty('--meter-speed',`${Math.max(.62,1.1-round*.055)}s`);scoreEl.textContent=`SCORE ${score}`;goalsEl.textContent=`${goals} goal${goals===1?'':'s'}`;streakEl.textContent=`STREAK ${streak}`;shotsEl.textContent=`${shots} shot${shots===1?'':'s'}`;if(!busy)resetRound()}
    function start(){score=0;goals=0;shots=totalShots;streak=0;round=1;selected=2;started=true;paused=false;busy=false;startEl.hidden=true;pauseEl.hidden=true;startEl.querySelector('h2').textContent='Penalty Kick';startEl.querySelector('p').textContent='Seven shots. Pick corners, read the keeper, and time the perfect strike.';startEl.querySelector('button').textContent='Start';msg.textContent='Keeper is leaning. Pick a lane, then hit the bright meter zone.';host('progress',{score:0,progress:0,state:{shots,goals,streak}});tone(330,.06,'square');setTimeout(()=>tone(520,.08,'triangle'),80);render()}
    function setPaused(next){if(!started)return;paused=next;pauseEl.hidden=!paused;host('paused',{paused})}
    function chooseLane(lane){if(busy||paused)return;selected=Math.max(0,Math.min(4,lane));msg.textContent=`Lane: ${laneNames[selected]}. ${selected===keeperTell?'Keeper is leaning there. Brave.':'Keeper is leaning elsewhere.'}`;render()}
    function shoot(){if(!started||paused||busy)return;busy=true;tone(190,.05,'square',.04);const power=meterPower(),perfect=power>=.43&&power<=.57,sweet=power>=.34&&power<=.66,keeperLane=Math.max(0,Math.min(4,keeperTell+(Math.random()<.45?0:(Math.random()<.5?-1:1)))),box=field.getBoundingClientRect(),goalW=Math.min(115,box.width*.16),kickX=laneOffset(selected,goalW)+(power-.5)*52,kickY=-Math.min(selected===0||selected===4?310:250,box.height*.68),keeperX=laneOffset(keeperLane,Math.min(92,box.width*.13));keeper.style.transform=`translateX(${keeperX}px) scale(${selected===keeperLane?1.18:1})`;ball.style.transform=`translate(${kickX}px,${kickY}px) scale(.58) rotate(${(power-.5)*360}deg)`;setTimeout(()=>{const goal=selected!==keeperLane&&sweet;if(goal){goals++;streak++;const add=lanePoints[selected]+(perfect?90:0)+streak*20;score+=add;msg.textContent=perfect?`Perfect strike. +${add}`:`Goal. +${add}`;showCall(perfect?'PERFECT':'GOAL');tone(perfect?820:620,.12,'triangle',.05);setTimeout(()=>tone(perfect?1180:860,.14,'triangle',.04),80);sparks(box.width/2+kickX,box.height*.34+kickY*.12,perfect?'#facc15':'#54ffa8',perfect?42:28)}else{streak=0;msg.textContent=sweet?'Saved — the keeper read it.':'Wide — hit the bright meter zone.';showCall(sweet?'SAVED':'WIDE');tone(sweet?120:80,.16,'sawtooth',.055);sparks(box.width/2+kickX,box.height*.34+kickY*.12,'#ff4f75',18)}shots--;round++;host('score',{score,progress:Math.round((totalShots-shots)/totalShots*100),state:{shots,goals,streak}});if(shots<=0){started=false;startEl.hidden=false;startEl.querySelector('h2').textContent=goals>=5?'Cup run complete':'Final whistle';startEl.querySelector('p').textContent=`Score ${score}. ${goals} goals from ${totalShots} shots. Best streak ${streak}.`;startEl.querySelector('button').textContent='Play again';host('complete',{score,progress:100,state:{goals,streak}})}else{busy=false;render()}},620)}
    lanes.forEach((button,i)=>button.onclick=()=>chooseLane(i));document.querySelector('[data-shoot]').onclick=shoot;document.querySelector('[data-pause]').onclick=()=>setPaused(true);startEl.querySelector('button').onclick=start;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){e.preventDefault();chooseLane(selected-1)}if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){e.preventDefault();chooseLane(selected+1)}if(/^[1-5]$/.test(e.key)){chooseLane(Number(e.key)-1)}if(e.key===' '||e.key==='Enter'){e.preventDefault();if(started)shoot();else start()}if(e.key==='p'||e.key==='P')setPaused(!paused)});
    document.addEventListener('visibilitychange',()=>{if(document.hidden)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')start()});
    render();host('ready');
  </script>
</body>
</html>
