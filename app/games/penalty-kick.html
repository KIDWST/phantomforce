<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src data:; connect-src 'none'; media-src 'none'; frame-src 'none'">
  <title>Penalty Kick</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#020807;color:#eafff4;font-family:system-ui,sans-serif;touch-action:none;user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}body{display:grid;place-items:center;padding:max(12px,env(safe-area-inset-top)) 12px max(12px,env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 8%,#18402e,#020807 62%)}main{width:min(790px,100%);height:100%;min-height:0;display:grid;grid-template-rows:auto minmax(0,1fr) auto auto;gap:10px}header{display:flex;align-items:center;justify-content:space-between;gap:10px}h1{margin:0;color:#5effac;font-size:42px;line-height:1}.hud{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;font:900 11px ui-monospace;color:#80ffc0}.hud span{padding:8px 10px;border:1px solid #41ffa144;border-radius:999px;background:#06120d}.field{position:relative;align-self:stretch;height:100%;min-height:280px;border:1px solid #41ffa144;border-radius:18px;overflow:hidden;background:linear-gradient(#082018,#03110c)}.field::before{content:"";position:absolute;inset:54% -10% -28%;border-top:1px solid #41ffa122;border-radius:50%;background:radial-gradient(circle at 50% 20%,#54ffa80f,transparent 55%)}.goal{position:absolute;inset:8% 8% 42%;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;border:3px solid #87ffc4;border-bottom:0;padding:8px}.lane{border:1px solid #41ffa155;border-radius:10px;background:#07150f88;color:#dffff0;font-weight:900;cursor:pointer}.lane.active{background:#54ffa8;color:#021009;box-shadow:0 0 24px #41ffa166}.keeper{position:absolute;left:50%;top:37%;width:74px;height:52px;margin-left:-37px;border-radius:999px;background:#ff4f75;box-shadow:0 0 24px #ff4f7566;transition:transform .32s ease}.keeper::after{content:"KEEPER";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font:900 9px ui-monospace;color:#210209}.target{position:absolute;left:50%;bottom:24%;width:96px;height:54px;margin-left:-48px;border:1px dashed #54ffa866;border-radius:50%;transform:translateX(var(--target-x,0px));transition:transform .2s ease}.ball{position:absolute;left:50%;bottom:12%;width:42px;height:42px;margin-left:-21px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff,#b9ffda 62%,#6ee7a8);box-shadow:0 0 22px #41ffa166;transition:transform .42s cubic-bezier(.2,1,.25,1)}.meter{position:relative;height:16px;border-radius:999px;background:#ffffff18;overflow:hidden}.meter::after{content:"";position:absolute;inset:0 28%;background:#54ffa833;border-left:1px solid #54ffa8aa;border-right:1px solid #54ffa8aa}.meter i{position:relative;z-index:1;display:block;width:16%;height:100%;border-radius:999px;background:#54ffa8;transform:translateX(0);animation:sweep 1.15s ease-in-out infinite alternate}@keyframes sweep{to{transform:translateX(525%)}}.meter-labels{display:flex;justify-content:space-between;margin-top:4px;font:800 10px ui-monospace;color:#7bb29d}.meter-wrap{padding:0 2px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}.actions button{min-height:48px;border:1px solid #41ffa155;border-radius:13px;background:#07150f;color:#dffff0;font-weight:900}.actions button.primary{background:#54ffa8;color:#021009;border-color:#54ffa8}.actions button:disabled{opacity:.48;cursor:not-allowed}.message{text-align:center;color:#c8e7d8;min-height:24px;font-weight:800}.pause,.start{position:fixed;z-index:6;inset:0;display:grid;place-items:center;background:#010504df;backdrop-filter:blur(5px)}.pause[hidden],.start[hidden]{display:none}.pause div,.start div{text-align:center;max-width:440px;padding:24px}.pause h2,.start h2{margin:0;color:#5effac;font-size:46px}.pause p,.start p{color:#a9c5b7}.pause button,.start button{min-width:150px;min-height:48px;border:0;border-radius:999px;background:#54ffa8;color:#021009;font-weight:900}@media(max-width:560px){h1{font-size:31px}.hud{font-size:9px}.field{min-height:260px}.goal{inset:11% 5% 45%;gap:5px}.keeper{width:58px;height:44px;margin-left:-29px}.ball{width:34px;height:34px;margin-left:-17px}.actions button{min-height:44px}.pause h2,.start h2{font-size:36px}}@media(max-height:560px){body{padding:8px}main{gap:6px}header{align-items:flex-start}h1{font-size:28px}.hud{gap:4px;font-size:8px}.hud span{padding:5px 7px}.field{min-height:clamp(128px,36vh,200px);border-radius:14px}.goal{inset:7% 6% 42%;gap:5px;padding:5px}.keeper{top:36%;width:56px;height:40px;margin-left:-28px}.target{bottom:22%;width:76px;height:44px;margin-left:-38px}.ball{bottom:10%;width:32px;height:32px;margin-left:-16px}.meter{height:12px}.meter-labels{margin-top:2px;font-size:8px}.message{min-height:18px;font-size:12px;line-height:1.2}.actions{gap:6px}.actions button{min-height:38px;border-radius:10px}.pause h2,.start h2{font-size:34px}.pause div,.start div{padding:18px}}@media(max-height:400px){h1{font-size:22px}.hud span{padding:3px 5px}.field{min-height:110px}.goal{inset:5% 5% 40%}.lane{font-size:10px}.message{font-size:11px}.pause h2,.start h2{font-size:30px}.pause button,.start button{min-height:42px}}
  </style>
</head>
<body>
  <main>
    <header><h1>Penalty Kick</h1><div class="hud"><span data-score>SCORE 0</span><span data-goals>0 goals</span><span data-shots>5 shots</span><span data-power>TIME IT</span></div></header>
    <section class="field" data-field aria-label="Penalty field"><div class="goal"><button class="lane" data-lane="0">LEFT</button><button class="lane" data-lane="1">CENTER</button><button class="lane" data-lane="2">RIGHT</button></div><div class="keeper"></div><div class="target"></div><div class="ball"></div></section>
    <div class="meter-wrap"><div class="meter"><i></i></div><div class="meter-labels"><span>Early</span><span>Green zone</span><span>Late</span></div></div>
    <div class="message" data-msg>Pick a lane, then shoot.</div>
    <div class="actions"><button type="button" data-pause>Pause</button><button type="button" class="primary" data-shoot>Shoot</button></div>
  </main>
  <div class="start"><div><h2>Penalty Kick</h2><p>Pick a side, hit shoot when the meter is in the green zone, and beat the keeper.</p><button type="button">Start</button></div></div>
  <div class="pause" hidden><div><h2>Paused</h2><p>Take the kick when ready.</p><button type="button">Resume</button></div></div>
  <script>
    const host=(type,data={})=>parent.postMessage({source:'phantomplay-game',type,...data},'*');
    const lanes=[...document.querySelectorAll('[data-lane]')],field=document.querySelector('.field'),keeper=document.querySelector('.keeper'),target=document.querySelector('.target'),ball=document.querySelector('.ball'),meter=document.querySelector('.meter i'),scoreEl=document.querySelector('[data-score]'),goalsEl=document.querySelector('[data-goals]'),shotsEl=document.querySelector('[data-shots]'),powerEl=document.querySelector('[data-power]'),msg=document.querySelector('[data-msg]'),startEl=document.querySelector('.start'),pauseEl=document.querySelector('.pause'),shootButton=document.querySelector('[data-shoot]');
    const totalShots=5,laneNames=['left','center','right'];
    let selected=1,score=0,shots=totalShots,started=false,paused=false,busy=false;
    function laneOffset(lane,distance){return(lane-1)*distance}
    function meterPower(){const track=meter.parentElement.getBoundingClientRect(),marker=meter.getBoundingClientRect(),travel=Math.max(1,track.width-marker.width);return Math.max(0,Math.min(1,(marker.left-track.left)/travel))}
    function meterLabel(power){return power<.28?'EARLY':power>.72?'LATE':'LOCKED'}
    function resetRound(){ball.style.transform='';keeper.style.transform=`translateX(${laneOffset(selected,18)}px)`;target.style.setProperty('--target-x',`${laneOffset(selected,Math.min(170,field.getBoundingClientRect().width*.27))}px`)}
    function render(){lanes.forEach((b,i)=>{b.classList.toggle('active',i===selected);b.disabled=busy||paused});scoreEl.textContent=`SCORE ${score*100}`;goalsEl.textContent=`${score} goal${score===1?'':'s'}`;shotsEl.textContent=`${shots} shot${shots===1?'':'s'}`;shootButton.disabled=busy||paused||!started;if(!busy)resetRound()}
    function start(){score=0;shots=totalShots;selected=1;started=true;paused=false;busy=false;startEl.hidden=true;pauseEl.hidden=true;startEl.querySelector('h2').textContent='Penalty Kick';startEl.querySelector('p').textContent='Pick a side, hit shoot when the meter is in the green zone, and beat the keeper.';startEl.querySelector('button').textContent='Start';msg.textContent='Tap a lane or use arrows. Shoot when the meter says LOCKED.';host('progress',{score:0,progress:0,state:{shots,goals:score}});render()}
    function setPaused(next){if(!started)return;paused=next;pauseEl.hidden=!paused;render();host('paused',{paused})}
    function chooseLane(lane){if(busy||paused)return;selected=Math.max(0,Math.min(2,lane));msg.textContent=`Lane: ${laneNames[selected]}. Hit the green zone.`;render()}
    function chooseLaneFromPoint(event){if(event.target?.closest?.('[data-lane]'))return;const box=field.getBoundingClientRect(),third=box.width/3;chooseLane(Math.max(0,Math.min(2,Math.floor((event.clientX-box.left)/third))))}
    function finishShot(goal,sweet,keeperLane){if(goal){score++;msg.textContent='Goal. Clean strike.'}else msg.textContent=sweet?`Saved. Keeper read ${laneNames[keeperLane]}.`:'Off target - shoot inside the green zone.';shots--;busy=false;render();host('score',{score:score*100,progress:Math.round((totalShots-shots)/totalShots*100),state:{shots,goals:score}});if(shots<=0){started=false;render();startEl.hidden=false;startEl.querySelector('h2').textContent='Final whistle';startEl.querySelector('p').textContent=`Score ${score*100}. ${score} goals from ${totalShots} shots.`;startEl.querySelector('button').textContent='Play again';host('complete',{score:score*100,progress:100,state:{shots,goals:score}})}}
    function shoot(){if(!started||paused||busy)return;busy=true;render();const power=meterPower(),sweet=power>=.28&&power<=.72,keeperLane=Math.floor(Math.random()*3),box=field.getBoundingClientRect(),kickX=laneOffset(selected,Math.min(170,box.width*.27)),kickY=-Math.min(260,box.height*.62),keeperX=laneOffset(keeperLane,Math.min(120,box.width*.2));powerEl.textContent=meterLabel(power);keeper.style.transform=`translateX(${keeperX}px)`;ball.style.transform=`translate(${kickX}px,${kickY}px) scale(.72)`;setTimeout(()=>finishShot(selected!==keeperLane&&sweet,sweet,keeperLane),520)}
    lanes.forEach((button,i)=>button.onclick=()=>chooseLane(i));field.addEventListener('pointerdown',chooseLaneFromPoint);shootButton.onclick=shoot;document.querySelector('[data-pause]').onclick=()=>setPaused(true);startEl.querySelector('button').onclick=start;pauseEl.querySelector('button').onclick=()=>setPaused(false);
    addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){e.preventDefault();chooseLane(selected-1)}if(e.key==='ArrowRight'){e.preventDefault();chooseLane(selected+1)}if(e.key===' '||e.key==='Enter'){e.preventDefault();if(started)shoot();else start()}if(e.key==='p'||e.key==='P')setPaused(!paused)});
    document.addEventListener('visibilitychange',()=>{if(document.hidden)setPaused(true)});
    addEventListener('message',event=>{if(event.data?.source!=='phantomplay-host')return;if(event.data.type==='pause')setPaused(true);if(event.data.type==='resume')setPaused(false);if(event.data.type==='exit')setPaused(true);if(event.data.type==='restart')start()});
    setInterval(()=>{if(started&&!paused&&!busy)powerEl.textContent=meterLabel(meterPower())},120);
    render();host('ready');
  </script>
</body>
</html>
