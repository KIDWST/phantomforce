version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 8
    groups:
      production-runtime:
        dependency-type: "production"
      development-tooling:
        dependency-type: "development"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:15"
      timezone: "America/Chicago"
    open-pull-requests-limit: 4
