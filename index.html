<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>PhantomForce</title>
    <meta name="description" content="Meet PhantomForce — the private AI that runs your business. Just speak to it." />
    <meta property="og:title" content="PhantomForce" />
    <meta property="og:description" content="The private AI that runs your business. Speak to it." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://phantomforce.online/" />
    <meta name="theme-color" content="#02060a" />
    <link rel="canonical" href="https://phantomforce.online/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="void.css?v=1" />
  </head>
  <body>
    <!-- the void -->
    <canvas class="void-canvas" data-void aria-hidden="true"></canvas>
    <div class="void-fallback" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <!-- the entity's presence: text materializes in space -->
    <main class="presence" id="main">
      <p class="sigil" data-sigil>👻</p>
      <p class="wordmark" data-wordmark>PHANTOMFORCE</p>

      <div class="say" data-say aria-live="polite">
        <p class="say-line" data-say-line>I'm the private AI that runs your business. What's eating your time?</p>
      </div>

      <div class="orbits" data-orbits>
        <button type="button" data-answer="I run a service business">service business</button>
        <button type="button" data-answer="I run a sports organization">sports org</button>
        <button type="button" data-answer="I run a media company">media</button>
        <button type="button" data-answer="Something else">something else</button>
      </div>

      <form class="speak" data-speak>
        <span class="speak-caret" aria-hidden="true">›</span>
        <input
          type="text"
          data-speak-input
          autocomplete="off"
          spellcheck="false"
          placeholder="speak to phantomforce…"
          aria-label="Speak to PhantomForce"
        />
      </form>

      <a class="summon" hidden data-summon href="mailto:demo@phantomforce.online">
        summon my operator <span>→</span>
      </a>
    </main>

    <p class="hint" data-hint>type anything · or tap a thought</p>

    <script type="module" src="void.js?v=1"></script>
  </body>
</html>
