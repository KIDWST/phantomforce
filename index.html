<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <script>
      // Force HTTPS on the live domain (belt-and-suspenders alongside GitHub Pages "Enforce HTTPS").
      if (location.protocol === "http:" && location.hostname.indexOf("phantomforce.online") !== -1) {
        location.replace("https://" + location.host + location.pathname + location.search + location.hash);
      }
    </script>
    <title>PhantomForce</title>
    <meta name="description" content="Meet PhantomForce — the private cyber AI that runs your business. Just speak to it." />
    <meta property="og:title" content="PhantomForce" />
    <meta property="og:description" content="The private cyber AI that runs your business." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://phantomforce.online/" />
    <meta name="theme-color" content="#02060a" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="canonical" href="https://phantomforce.online/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="void.css?v=25" />
  </head>
  <body>
    <canvas class="void-canvas" data-void aria-hidden="true"></canvas>
    <div class="void-fallback" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="riskfield" data-riskfield aria-hidden="true"></div>

    <main class="presence" id="main">
      <!-- the phantom itself is the 3D entity on the canvas behind (void.js) -->
      <p class="wordmark" data-wordmark>PHANTOMFORCE</p>

      <!-- the entity speaks; you answer in the box right under it -->
      <div class="say" data-say aria-live="polite">
        <p class="say-line">I'm a private cyber-AI that runs your business. Point me at what's eating your time.</p>
      </div>
      <div class="orbits" data-orbits></div>
      <form class="speak" data-speak>
        <span class="speak-caret" aria-hidden="true">›</span>
        <input type="text" data-speak-input autocomplete="off" spellcheck="false" placeholder="ask phantomforce…" aria-label="Speak to PhantomForce" />
      </form>
      <button class="download-cta" type="button" hidden data-download-cta>
        Download PhantomForce <span aria-hidden="true">→</span>
      </button>
    </main>
    <div class="download-modal" hidden data-download-modal role="dialog" aria-modal="true" aria-labelledby="download-title">
      <button class="download-backdrop" type="button" data-download-close aria-label="Close download form"></button>
      <form class="download-card" data-download-form>
        <button class="download-x" type="button" data-download-close aria-label="Close">×</button>
        <p class="download-kicker">Private access</p>
        <h2 id="download-title">Download PhantomForce</h2>
        <div class="download-fields">
          <label>
            <span>Name</span>
            <input type="text" data-download-name required autocomplete="name" placeholder="Jordan West" />
          </label>
          <label>
            <span>Email</span>
            <input type="email" data-download-email required autocomplete="email" placeholder="you@company.com" />
          </label>
        </div>
        <button class="download-submit" type="submit">Send download link <span aria-hidden="true">→</span></button>
        <p class="download-status" hidden data-download-status aria-live="polite"></p>
        <p class="download-alt">Already have access? <a href="app/">Open your cockpit →</a></p>
      </form>
    </div>
    <p class="hint" data-hint hidden></p>
    <script type="module" src="void.js?v=24"></script>
  </body>
</html>
