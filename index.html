<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <title>PhantomForce</title>
    <meta name="description" content="Meet PhantomForce — the private cyber AI that runs your business. Just speak to it." />
    <meta property="og:title" content="PhantomForce" />
    <meta property="og:description" content="The private cyber AI that runs your business." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://phantomforce.online/" />
    <meta name="theme-color" content="#02060a" />
    <link rel="canonical" href="https://phantomforce.online/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="void.css?v=3" />
  </head>
  <body>
    <canvas class="void-canvas" data-void aria-hidden="true"></canvas>
    <div class="void-fallback" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="riskfield" data-riskfield aria-hidden="true"></div>

    <main class="presence" id="main">
      <!-- custom cyber-phantom -->
      <div class="phantom" data-phantom aria-hidden="true">
        <svg viewBox="0 0 120 132" class="phantom-svg" role="img">
          <defs>
            <linearGradient id="pbody" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#7dffc0" stop-opacity="0.18" />
              <stop offset="1" stop-color="#0bdf78" stop-opacity="0.02" />
            </linearGradient>
            <linearGradient id="pstroke" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#b9ffe0" />
              <stop offset="1" stop-color="#19e886" />
            </linearGradient>
            <clipPath id="pclip">
              <path d="M60 12 C34 12 20 32 20 58 L20 110 L31 99 L42 110 L53 99 L64 110 L75 99 L86 110 L100 99 L100 58 C100 32 86 12 60 12 Z" />
            </clipPath>
          </defs>
          <g class="phantom-layer">
            <path class="phantom-body" d="M60 12 C34 12 20 32 20 58 L20 110 L31 99 L42 110 L53 99 L64 110 L75 99 L86 110 L100 99 L100 58 C100 32 86 12 60 12 Z" />
            <g clip-path="url(#pclip)" class="phantom-scan">
              <rect x="14" y="20" width="92" height="1.2" /><rect x="14" y="34" width="92" height="1.2" />
              <rect x="14" y="48" width="92" height="1.2" /><rect x="14" y="62" width="92" height="1.2" />
              <rect x="14" y="76" width="92" height="1.2" /><rect x="14" y="90" width="92" height="1.2" />
            </g>
            <g class="eyes-live">
              <path class="phantom-eye" d="M40 52 L54 50 L52 66 L42 64 Z" />
              <path class="phantom-eye" d="M80 52 L66 50 L68 66 L78 64 Z" />
            </g>
            <g class="eyes-x">
              <path d="M40 50 L52 64 M52 50 L40 64" />
              <path d="M68 50 L80 64 M80 50 L68 64" />
            </g>
            <path class="mouth mouth-idle" d="M47 84 Q60 78 73 84" />
            <path class="mouth mouth-happy" d="M46 78 Q60 91 74 78" />
          </g>
        </svg>
      </div>

      <p class="wordmark" data-wordmark>PHANTOMFORCE</p>

      <div class="say" data-say aria-live="polite">
        <p class="say-line">I'm a private cyber-AI that runs your business. Point me at what's eating your time.</p>
      </div>

      <div class="orbits" data-orbits></div>

      <form class="speak" data-speak>
        <span class="speak-caret" aria-hidden="true">›</span>
        <input type="text" data-speak-input autocomplete="off" spellcheck="false" placeholder="or just say it…" aria-label="Speak to PhantomForce" />
      </form>

      <a class="summon" hidden data-summon href="mailto:demo@phantomforce.online">
        summon my operator <span>→</span>
      </a>
    </main>

    <p class="hint" data-hint>tap a thought · or type anything</p>
    <script type="module" src="void.js?v=3"></script>
  </body>
</html>
