<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080a0d" />
    <script>
      (() => {
        const adminHost = "admin.phantomforce.online";
        const clientHost = "app.phantomforce.online";
        const phantomEntryPaths = new Set(["/", "/app", "/app/"]);
        if (!phantomEntryPaths.has(location.pathname)) return;
        const target = "/app/index.html" + location.search + location.hash;
        if (location.hostname === adminHost) {
          location.replace(target);
        }
        if (location.hostname === clientHost) {
          location.replace(target);
        }
      })();
    </script>
    <meta
      name="description"
      content="PhantomForce Phantom is a private AI business operating system for command, work, media, reviews, and approvals."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/assets/operator-core.png" />
    <title>PhantomForce — Phantom</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
